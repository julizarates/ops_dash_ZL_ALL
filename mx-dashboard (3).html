<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>TurboOps MX · Resumen País</title>
<link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{
  --red:#E24B4A;--red-bg:#FEF2F2;--green:#10B981;--green-bg:#ECFDF5;
  --yellow:#F59E0B;--yellow-bg:#FFFBEB;--blue:#3B82F6;
  --gold:#F59E0B;--silver:#94A3B8;--bronze:#FB923C;
  --bg:#F5F5F5;--surface:#FFFFFF;--surface2:#F9FAFB;
  --border:#E5E7EB;--text:#111827;--text-sm:#6B7280;
  --accent:#E24B4A;--radius:12px;--shadow:0 1px 4px rgba(0,0,0,0.08);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Figtree',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5}
.header{background:#fff;border-bottom:2.5px solid var(--accent);padding:12px 16px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,0.06)}
.logo{font-size:20px;font-weight:800;letter-spacing:-0.5px}.logo em{font-style:normal;color:var(--accent)}
.header-right{flex:1;text-align:right}
.header-tag{font-size:10px;font-weight:600;color:var(--text-sm);text-transform:uppercase;letter-spacing:0.3px}
.mx-badge{display:inline-flex;align-items:center;gap:4px;background:var(--accent);color:#fff;font-size:10px;font-weight:700;padding:2px 9px;border-radius:20px;margin-top:2px}
.period-bar{background:#fff;border-bottom:1px solid var(--border);padding:8px 10px;display:flex;gap:6px;align-items:center;overflow-x:auto;scrollbar-width:none}
.period-bar::-webkit-scrollbar{display:none}
.period-label{font-size:10px;font-weight:700;color:var(--text-sm);text-transform:uppercase;white-space:nowrap;flex-shrink:0}
.pbtn{font-family:'Figtree',sans-serif;font-size:11px;font-weight:600;padding:5px 12px;border-radius:20px;border:1.5px solid var(--border);background:transparent;color:var(--text-sm);cursor:pointer;white-space:nowrap;flex-shrink:0;transition:all 0.15s}
.pbtn:hover{border-color:var(--accent);color:var(--text)}
.pbtn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.zl-wrap{position:relative;margin-left:auto;flex-shrink:0}
.zl-wrap::after{content:'▾';position:absolute;right:8px;top:50%;transform:translateY(-50%);font-size:9px;color:var(--text-sm);pointer-events:none}
select.zl-sel{font-family:'Figtree',sans-serif;font-size:11px;font-weight:600;padding:5px 22px 5px 10px;border:1.5px solid var(--border);border-radius:20px;background:var(--surface2);color:var(--text);appearance:none;cursor:pointer}
select.zl-sel:focus{outline:none;border-color:var(--accent)}
#loading{text-align:center;padding:60px 24px;color:var(--text-sm);font-size:13px}
.spinner{width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.7s linear infinite;margin:0 auto 14px}
@keyframes spin{to{transform:rotate(360deg)}}
.content{padding:10px;max-width:580px;margin:0 auto}
.sec{background:var(--surface);border-radius:var(--radius);margin-bottom:10px;overflow:hidden;border:1px solid var(--border);box-shadow:var(--shadow)}
.sec-hd{padding:12px 14px 0;display:flex;align-items:center;justify-content:space-between;gap:8px}
.sec-title{font-size:12px;font-weight:700;letter-spacing:0.5px;text-transform:uppercase;color:var(--text-sm);display:flex;align-items:center;gap:6px}
.sec-body{padding:10px 14px 14px}
.kpi-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.kpi-card{background:var(--surface2);border-radius:10px;padding:10px 8px 8px;border:1px solid var(--border);text-align:center}
.kpi-num{font-size:22px;font-weight:800;line-height:1;margin-bottom:2px}
.kpi-lbl{font-size:9px;font-weight:600;letter-spacing:0.5px;text-transform:uppercase;color:var(--text-sm)}
.chart-wrap{position:relative;height:170px}
.qa-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.qa-met{background:var(--surface2);border-radius:8px;padding:9px 10px;border:1px solid var(--border)}
.qa-met.crit{border-color:var(--red);background:var(--red-bg)}
.qa-met-name{font-size:10px;font-weight:600;color:var(--text-sm);margin-bottom:4px}
.qa-met-val{font-size:16px;font-weight:800}
.qa-met-target{font-size:9px;color:var(--text-sm);margin-top:2px}
.qa-bar{height:3px;border-radius:2px;background:var(--border);margin-top:5px;overflow:hidden}
.qa-bar-fill{height:100%;border-radius:2px}
.mission-row{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--border)}
.mission-row:last-child{border-bottom:none}
.mission-lbl{font-size:12px;font-weight:600;flex:1}
.mw{font-size:10px;color:var(--text-sm);font-weight:400}
.mission-bar-track{width:80px;height:7px;background:var(--border);border-radius:4px;overflow:hidden;flex-shrink:0}
.mission-bar-fill{height:100%;border-radius:4px}
.mission-pct{font-size:12px;font-weight:700;width:36px;text-align:right;flex-shrink:0}
.mission-count{font-size:10px;color:var(--text-sm);width:58px;text-align:right;flex-shrink:0}
.table-scroll{overflow-x:auto;scrollbar-width:none}
.table-scroll::-webkit-scrollbar{display:none}
.stores-table{width:100%;border-collapse:collapse;font-size:11px}
.stores-table th{text-align:left;font-size:9px;font-weight:700;letter-spacing:0.8px;text-transform:uppercase;color:var(--text-sm);padding:6px 8px;border-bottom:1px solid var(--border)}
.stores-table td{padding:7px 8px;border-bottom:1px solid var(--border)}
.stores-table tr:last-child td{border-bottom:none}
.stores-table tr:hover td{background:var(--surface2)}
.t-name{font-weight:600;max-width:110px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cbadge{display:inline-flex;align-items:center;font-size:9px;font-weight:700;padding:2px 7px;border-radius:10px;white-space:nowrap}
.cbadge.gold{background:#FEF3C7;color:#92400E}
.cbadge.silver{background:#F1F5F9;color:#475569}
.cbadge.bronze{background:#FFF7ED;color:#9A3412}
.cbadge.critico{background:#FEF2F2;color:#991B1B}
.cbadge.regular{background:#FFFBEB;color:#92400E}
.cbadge.moderado{background:#EFF6FF;color:#1E40AF}
.cbadge.goldqa{background:#ECFDF5;color:#065F46}
.sort-btn{background:none;border:none;color:var(--text-sm);font-size:9px;cursor:pointer;font-family:inherit;letter-spacing:0.8px;text-transform:uppercase;font-weight:700;padding:2px 6px;border-radius:6px}
.sort-btn.active{color:var(--accent);background:var(--red-bg)}
.empty{text-align:center;padding:28px 24px;color:var(--text-sm);font-size:12px}
/* debug */
#dbg{background:#0f0f0f;color:#4ade80;font-family:monospace;font-size:10px;padding:10px 12px;border-radius:8px;margin-bottom:10px;white-space:pre-wrap;line-height:1.6;display:none}
</style>
</head>
<body>

<div class="header">
  <div class="logo">Turbo<em>Ops</em></div>
  <div class="header-right">
    <div class="header-tag">Resumen País</div>
    <div><span class="mx-badge">🇲🇽 MX</span></div>
  </div>
</div>

<div class="period-bar">
  <span class="period-label">Período</span>
  <button class="pbtn active" data-period="last" onclick="setPeriod('last')">Sem pasada</button>
  <button class="pbtn" data-period="s2"   onclick="setPeriod('s2')">Hace 2 sem</button>
  <button class="pbtn" data-period="s3"   onclick="setPeriod('s3')">Hace 3 sem</button>
  <button class="pbtn" data-period="s4"   onclick="setPeriod('s4')">Hace 4 sem</button>
  <button class="pbtn" data-period="month" onclick="setPeriod('month')">Mes</button>
  <div class="zl-wrap">
    <select class="zl-sel" id="sel-zl"><option value="">👤 Todos los ZL</option></select>
  </div>
</div>

<div id="loading"><div class="spinner"></div>Cargando datos MX...</div>

<div class="content" id="main-content" style="display:none">
  <div id="dbg"></div>

  <div class="sec">
    <div class="sec-hd"><div class="sec-title">📊 Resumen MX</div><div id="period-label" style="font-size:10px;color:var(--text-sm)"></div></div>
    <div class="sec-body"><div class="kpi-grid" id="kpi-grid"></div></div>
  </div>

  <div class="sec">
    <div class="sec-hd"><div class="sec-title">🥇 Clusters Disc Ops · últimas 4 semanas</div></div>
    <div class="sec-body"><div class="chart-wrap"><canvas id="chart-do"></canvas></div></div>
  </div>

  <div class="sec">
    <div class="sec-hd"><div class="sec-title">🎯 Clusters QA · últimas 4 semanas</div></div>
    <div class="sec-body"><div class="chart-wrap"><canvas id="chart-qa"></canvas></div></div>
  </div>

  <div class="sec">
    <div class="sec-hd"><div class="sec-title">📋 Métricas QA · semana más reciente</div></div>
    <div class="sec-body"><div class="qa-grid" id="qa-metrics-grid"></div></div>
  </div>

  <div class="sec">
    <div class="sec-hd"><div class="sec-title">✅ Disciplina Operativa · promedio</div></div>
    <div class="sec-body" id="missions-body"></div>
  </div>

  <div class="sec">
    <div class="sec-hd"><div class="sec-title">📍 Conf. Zonas por tienda · snapshot</div></div>
    <div class="sec-body"><div class="chart-wrap" style="height:200px"><canvas id="chart-zonas"></canvas></div></div>
  </div>

  <div class="sec">
    <div class="sec-hd">
      <div class="sec-title">🏪 Tiendas MX</div>
      <div style="display:flex;gap:4px">
        <button class="sort-btn active" id="sort-do" onclick="setSort('do')">DO ↕</button>
        <button class="sort-btn" id="sort-qa" onclick="setSort('qa')">QA ↕</button>
      </div>
    </div>
    <div class="sec-body" style="padding-bottom:10px">
      <div class="table-scroll"><table class="stores-table" id="stores-table"></table></div>
    </div>
  </div>
  <div style="height:28px"></div>
</div>

<script>
// ═══ CONFIG ═══
// Zonas MX está en el MISMO sheet publicado que TurboOps (misma PUB_ID)
const PUB_ID = '2PACX-1vQnT4uViGiikmSNyKqTYcaQDcW5UUsxipbLFpETotIJm46MVdk8AwgQ0-M5IBE4sRZ6h8KJ0QGy3iXE';
const GID = {
  detalles: '1138623282',
  zl:       '258561144',
  qa:       '1947598243',
  zonasMX:  '1702827094',
};
const csvUrl  = g => `https://docs.google.com/spreadsheets/d/e/${PUB_ID}/pub?gid=${g}&single=true&output=csv`;
const safeFetch = url => fetch(url).then(r=>r.ok?r.text():'').catch(()=>'');

const QA_DEF=[
  {name:'(Instore) Picking Time',short:'Pick Time',  hb:false},
  {name:'Handoff Post',          short:'Handoff',    hb:false},
  {name:'Cancel Rate Partner',   short:'Cancel Rate',hb:false},
  {name:'SO Ops',                short:'SO Ops',     hb:false},
  {name:'SO System',             short:'SO System',  hb:false},
  {name:'Total Stockouts',       short:'Stockouts',  hb:false},
  {name:'Defect Rate',           short:'Defect Rate',hb:false},
  {name:'ONA',                   short:'ONA',        hb:true },
  {name:'Total DR',              short:'Total DR',   hb:false},
];
const KNOWN=['COUNTRY_CODE','WH_ID','DIS_OPS','SEMANA','WAREHOUSENAME','PROGRESS_SURTIDO',
             'COUNTRY','Zone Lead','Key','WH ID','QA Score','CLUSTER','PAIS','PAÍS','WAREHOUSE_ID'];

// ═══ STATE ═══
let activePeriod='last', activeSort='do', sortAsc=false, activeZL='';
let storeRows=[], zlMap={}, qaRows=[], zonasRows=[];
let chartDO=null, chartQA=null, chartZonas=null;

// ═══ CSV ═══
function parseCSV(text){
  return text.replace(/\r/g,'').split('\n').map(line=>{
    const row=[];let cur='',inQ=false;
    for(let i=0;i<=line.length;i++){
      const c=line[i];
      if(c==='"')inQ=!inQ;
      else if((c===','||c===undefined)&&!inQ){row.push(cur);cur='';}
      else cur+=(c||'');
    }
    return row;
  }).filter(r=>r.some(c=>c!==''));
}
function findHdr(rows){
  for(let i=0;i<Math.min(rows.length,30);i++)
    if(rows[i].some(c=>KNOWN.includes((c||'').trim())))return i;
  return 0;
}
function toObjs(rows,h){
  const hdr=rows[h].map(x=>(x||'').trim());
  return rows.slice(h+1).filter(r=>r.some(c=>c))
    .map(r=>Object.fromEntries(hdr.map((k,i)=>[k,(r[i]||'').trim()])));
}
function normWH(w){const n=parseInt(parseFloat(w));return isNaN(n)?w:String(n);}
function normCC(c){return(c||'').trim().toUpperCase();}
function avg(a){return a.length?a.reduce((s,v)=>s+v,0)/a.length:0;}
function fmtPct(n){return Math.round((n||0)*100)+'%';}
function scoreColor(n){return n>=0.9?'var(--green)':n>=0.8?'var(--yellow)':'var(--red)';}
function qaColor(n){return n>=85?'var(--green)':n>=70?'var(--yellow)':'var(--red)';}

// ═══ DATES ═══
// All date math works on ISO "YYYY-MM-DD" strings
function toISO(d){
  const y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,'0'),dd=String(d.getDate()).padStart(2,'0');
  return`${y}-${m}-${dd}`;
}
function mondayOfISO(iso){
  const d=new Date(iso+'T12:00:00'); // noon avoids DST issues
  const dow=d.getDay(), off=dow===0?6:dow-1;
  d.setDate(d.getDate()-off);
  return toISO(d);
}
const MONS={jan:0,feb:1,mar:2,apr:3,may:4,jun:5,jul:6,aug:7,sep:8,oct:9,nov:10,dec:11};
function anyToMondayISO(s){
  if(!s)return null; s=s.trim();
  if(/^\d{4}-\d{2}-\d{2}$/.test(s))return mondayOfISO(s);
  const sl=s.split('/');
  if(sl.length===3){const[m,d,y]=sl.map(Number);if(!isNaN(m*d*y))return mondayOfISO(toISO(new Date(y,m-1,d)));}
  const da=s.split('-');
  if(da.length===2){const d=parseInt(da[0]),m=MONS[(da[1]||'').toLowerCase().slice(0,3)];if(!isNaN(d)&&m!==undefined)return mondayOfISO(toISO(new Date(2026,m,d)));}
  return null;
}
function todayISO(){return toISO(new Date());}
function addW(iso,n){const d=new Date(iso+'T12:00:00');d.setDate(d.getDate()+n*7);return toISO(d);}
function fmtShort(iso){
  if(!iso)return'';
  const d=new Date(iso+'T12:00:00');
  return d.toLocaleDateString('es-MX',{day:'numeric',month:'short'}).replace('.','');
}

// ═══ AVAILABLE WEEKS (from data, ≤ today) ═══
function availDOWeeks(){
  const today=todayISO();
  return[...new Set(storeRows.map(r=>r._week).filter(w=>w&&w<=today))].sort();
}
function availQAWeeks(){
  const today=todayISO();
  return[...new Set(qaRows.map(r=>r.week).filter(w=>w&&w<=today))].sort();
}

function last4DO(){const a=availDOWeeks();return a.slice(-4);}
function last4QA(){const a=availQAWeeks();return a.slice(-4);}

// Weeks for the selected period filter (from DO data)
function getPeriodWeeks(){
  const avail=availDOWeeks();
  if(!avail.length)return[];
  const latest=avail[avail.length-1];
  switch(activePeriod){
    case 'last':  return[latest];
    case 's2':    return avail.filter(w=>w===addW(latest,-1));
    case 's3':    return avail.filter(w=>w===addW(latest,-2));
    case 's4':    return avail.filter(w=>w===addW(latest,-3));
    case 'month': return avail.filter(w=>w.startsWith(latest.substring(0,7)));
    default:      return[latest];
  }
}
function getPeriodLabel(){
  const w=getPeriodWeeks()[0];
  if(!w)return'';
  const labels={last:'Sem más reciente',s2:'Hace 1 sem',s3:'Hace 2 sem',s4:'Hace 3 sem',month:'Mes'};
  return(labels[activePeriod]||'')+' ('+fmtShort(w)+')';
}

// ═══ PROCESSORS ═══
function processDetalles(text){
  const rows=parseCSV(text), h=findHdr(rows), objs=toObjs(rows,h);
  storeRows=objs.filter(r=>normCC(r.COUNTRY_CODE||r.COUNTRY||r.PAÍS||r.PAIS||'')==='MX')
    .map(r=>{
      r._cc='MX';
      r._wh=normWH(r.WH_ID||r.WAREHOUSE_ID||'');
      r._k='MX_'+r._wh;
      r._week=anyToMondayISO((r.SEMANA||'').substring(0,10))||'';
      return r;
    });
}
function processZL(text){
  const rows=parseCSV(text), h=findHdr(rows), objs=toObjs(rows,h);
  zlMap={};
  for(const r of objs){
    const key=(r['Key']||r['KEY']||'').replace(/N$/,'');
    if(!key)continue;
    const cc=normCC(key.substring(0,2));
    if(cc!=='MX')continue;
    zlMap['MX_'+normWH(key.substring(2))]={lead:(r['Zone Lead']||'').trim()};
  }
}
function processQA(text){
  const rows=parseCSV(text);
  if(rows.length<2)return;
  let hi=-1;
  for(let i=0;i<Math.min(rows.length,10);i++){
    if((rows[i][0]||'').trim().toLowerCase()==='key'){hi=i;break;}
  }
  if(hi<0)for(let i=0;i<Math.min(rows.length,10);i++){
    if(rows[i].map(c=>(c||'').toLowerCase()).some(c=>c.includes('qa score')||c.includes('cluster'))){hi=i;break;}
  }
  if(hi<0)hi=0;
  const hdr=rows[hi].map(h=>(h||'').trim().toLowerCase());
  const ci=n=>hdr.indexOf(n.toLowerCase());
  const cp=n=>hdr.findIndex(h=>h.includes(n.toLowerCase()));
  const iW=cp('week')>=0?cp('week'):2;
  const iP=ci('país')>=0?ci('país'):ci('pais')>=0?ci('pais'):3;
  const iWH=ci('wh id')>=0?ci('wh id'):ci('wh_id')>=0?ci('wh_id'):5;
  const iQA=ci('qa score')>=0?ci('qa score'):7;
  const iCL=ci('cluster')>=0?ci('cluster'):8;
  const iQT=ci('quartile qa')>=0?ci('quartile qa'):9;
  const ms=iQT+1, ts=ms+18, cs=ts+9;
  qaRows=[];
  for(const row of rows.slice(hi+1)){
    if(normCC(row[iP]||'')==='MX'){
      const wh=normWH(row[iWH]||'');
      if(!wh||wh==='NaN')continue;
      const week=anyToMondayISO(row[iW]||'');
      if(!week)continue;
      const score=parseFloat((row[iQA]||'').replace(',','.'))||0;
      const cluster=(row[iCL]||'').trim();
      const metrics=QA_DEF.map((m,i)=>({
        name:m.name,short:m.short,hb:m.hb,
        value:(row[ms+i*2]||'').trim(),
        score:parseFloat(row[ms+i*2+1])||0,
        target:(row[ts+i]||'').trim(),
        critic:(row[cs+i]||'').trim().toLowerCase()==='critic',
      }));
      qaRows.push({k:'MX_'+wh,wh,week,score,cluster,metrics});
    }
  }
}
function processZonasMX(text){
  if(!text){zonasRows=[];return;}
  const rows=parseCSV(text);
  if(rows.length<2){zonasRows=[];return;}
  let hi=0;
  for(let i=0;i<Math.min(rows.length,8);i++){
    const r=rows[i].map(c=>(c||'').toLowerCase());
    if(r.some(c=>c.includes('warehouse_id')||c.includes('pct_conf'))){hi=i;break;}
  }
  const hdr=rows[hi].map(x=>(x||'').trim());
  const ci=n=>hdr.findIndex(h=>h.toLowerCase().includes(n.toLowerCase()));
  const iWH =ci('warehouse_id')>=0?ci('warehouse_id'):2;
  const iNM =ci('warehousename')>=0?ci('warehousename'):1;
  const iTP =ci('total')>=0?ci('total'):3;
  const iCP =ci('prods_con_picking')>=0?ci('prods_con_picking'):4;
  const iCB =ci('prods_con_bodega')>=0?ci('prods_con_bodega'):5;
  const iSP =ci('prods_sin_picking')>=0?ci('prods_sin_picking'):6;
  const iSB =ci('prods_sin_bodega')>=0?ci('prods_sin_bodega'):7;
  const iPP =ci('pct_conf_picking')>=0?ci('pct_conf_picking'):8;
  const iPB =ci('pct_conf_bodega')>=0?ci('pct_conf_bodega'):9;
  zonasRows=[];
  for(const row of rows.slice(hi+1)){
    const wh=normWH(row[iWH]||'');
    if(!wh||wh==='NaN')continue;
    zonasRows.push({
      k:'MX_'+wh,wh,
      name:(row[iNM]||'WH '+wh).trim(),
      total:parseInt(row[iTP])||0,
      conPick:parseInt(row[iCP])||0,
      conBod:parseInt(row[iCB])||0,
      sinPick:parseInt(row[iSP])||0,
      sinBod:parseInt(row[iSB])||0,
      pctPick:parseFloat(row[iPP])||0,
      pctBod:parseFloat(row[iPB])||0,
    });
  }
}

// ═══ DATA SELECTORS ═══
function storesByWeeks(weeks){
  const byKey={};
  for(const r of storeRows){
    if(!weeks.includes(r._week))continue;
    if(!zlMap[r._k]||!zlMap[r._k].lead)continue;
    if(activeZL&&zlMap[r._k].lead!==activeZL)continue;
    if(!byKey[r._k]||r._week>byKey[r._k]._week)byKey[r._k]=r;
  }
  return Object.values(byKey);
}
function qaByWeeks(weeks){
  const byKey={};
  for(const q of qaRows){
    if(!weeks.includes(q.week))continue;
    if(activeZL&&zlMap[q.k]&&zlMap[q.k].lead!==activeZL)continue;
    if(!byKey[q.k]||q.week>byKey[q.k].week)byKey[q.k]=q;
  }
  return Object.values(byKey);
}
function clDO(s){const n=parseFloat(s)||0;return n>=0.9?{l:'Gold',c:'gold',e:'🥇'}:n>=0.8?{l:'Silver',c:'silver',e:'🥈'}:{l:'Bronze',c:'bronze',e:'🥉'};}
function clQA(cl){
  const l=(cl||'').toLowerCase().trim();
  if(l==='crítico'||l==='critico')return{l:'Crítico',c:'critico',col:'var(--red)'};
  if(l==='regular')return{l:'Regular',c:'regular',col:'var(--yellow)'};
  if(l==='moderado')return{l:'Moderado',c:'moderado',col:'var(--blue)'};
  return{l:'Gold',c:'goldqa',col:'var(--green)'};
}

// ═══ RENDER ═══
function renderAll(){
  const weeks=getPeriodWeeks();
  const dos=storesByWeeks(weeks);
  const qas=qaByWeeks(weeks);

  // DEBUG
  const dbg=document.getElementById('dbg');
  const aDO=availDOWeeks(), aQA=availQAWeeks();
  dbg.style.display='block';
  dbg.textContent=
    `DO semanas (≤hoy): [${aDO.join(', ')}]\n`+
    `QA semanas (≤hoy): [${aQA.join(', ')}]\n`+
    `Filtro "${activePeriod}" → buscando: [${weeks.join(', ')}]\n`+
    `DO encontradas: ${dos.length} tiendas | QA: ${qas.length} tiendas\n`+
    `Zonas: ${zonasRows.length} tiendas\n`+
    `ZL mapeados: ${Object.keys(zlMap).length}`;

  document.getElementById('period-label').textContent=getPeriodLabel();
  renderKPIs(dos,qas);
  renderChartDO();
  renderChartQA();
  renderQAMetrics();
  renderMissions(dos);
  renderChartZonas();
  renderTable(dos,qas);
}

function renderKPIs(dos,qas){
  const avgDO=avg(dos.map(r=>parseFloat(r.DIS_OPS)||0));
  const avgQA=avg(qas.map(q=>q.score));
  const goldPct=dos.length?dos.filter(r=>(parseFloat(r.DIS_OPS)||0)>=0.9).length/dos.length:0;
  const avgSurt=avg(dos.map(r=>parseFloat(r.PROGRESS_SURTIDO)||0));
  const avgFruv=avg(dos.map(r=>parseFloat(r.DISC_FRUVER)||0));
  const kpis=[
    {n:dos.length,     l:'Tiendas',     col:'var(--text)'},
    {n:fmtPct(avgDO),  l:'Prom DO',     col:scoreColor(avgDO)},
    {n:avgQA?avgQA.toFixed(1):'—',l:'Prom QA',col:avgQA?qaColor(avgQA):'var(--text-sm)'},
    {n:fmtPct(goldPct),l:'% Gold DO',   col:'var(--gold)'},
    {n:fmtPct(avgSurt),l:'Surtido',     col:scoreColor(avgSurt)},
    {n:fmtPct(avgFruv),l:'Fruver/Saneo',col:scoreColor(avgFruv)},
  ];
  document.getElementById('kpi-grid').innerHTML=kpis.map(k=>`
    <div class="kpi-card"><div class="kpi-num" style="color:${k.col}">${k.n}</div><div class="kpi-lbl">${k.l}</div></div>`).join('');
}

function renderChartDO(){
  const weeks=last4DO();
  const ctx=document.getElementById('chart-do').getContext('2d');
  if(chartDO)chartDO.destroy();
  chartDO=new Chart(ctx,{type:'bar',data:{
    labels:weeks.map(fmtShort),
    datasets:[
      {label:'🥇 Gold',  data:weeks.map(w=>storeRows.filter(r=>r._week===w&&zlMap[r._k]&&(!activeZL||zlMap[r._k].lead===activeZL)&&(parseFloat(r.DIS_OPS)||0)>=0.9).length),backgroundColor:'rgba(245,158,11,0.85)',stack:'s'},
      {label:'🥈 Silver',data:weeks.map(w=>storeRows.filter(r=>r._week===w&&zlMap[r._k]&&(!activeZL||zlMap[r._k].lead===activeZL)&&(parseFloat(r.DIS_OPS)||0)>=0.8&&(parseFloat(r.DIS_OPS)||0)<0.9).length),backgroundColor:'rgba(148,163,184,0.8)',stack:'s'},
      {label:'🥉 Bronze',data:weeks.map(w=>storeRows.filter(r=>r._week===w&&zlMap[r._k]&&(!activeZL||zlMap[r._k].lead===activeZL)&&(parseFloat(r.DIS_OPS)||0)<0.8).length),backgroundColor:'rgba(251,146,60,0.8)',stack:'s'},
    ]
  },options:chartOpts()});
}

function renderChartQA(){
  const weeks=last4QA();
  const ctx=document.getElementById('chart-qa').getContext('2d');
  if(chartQA)chartQA.destroy();
  chartQA=new Chart(ctx,{type:'bar',data:{
    labels:weeks.map(fmtShort),
    datasets:[
      {label:'🔴 Crítico', data:weeks.map(w=>qaRows.filter(q=>q.week===w&&(!activeZL||zlMap[q.k]&&zlMap[q.k].lead===activeZL)&&clQA(q.cluster).c==='critico').length),backgroundColor:'rgba(226,75,74,0.85)',stack:'s'},
      {label:'🟡 Regular', data:weeks.map(w=>qaRows.filter(q=>q.week===w&&(!activeZL||zlMap[q.k]&&zlMap[q.k].lead===activeZL)&&clQA(q.cluster).c==='regular').length),backgroundColor:'rgba(245,158,11,0.8)',stack:'s'},
      {label:'🔵 Moderado',data:weeks.map(w=>qaRows.filter(q=>q.week===w&&(!activeZL||zlMap[q.k]&&zlMap[q.k].lead===activeZL)&&clQA(q.cluster).c==='moderado').length),backgroundColor:'rgba(59,130,246,0.75)',stack:'s'},
      {label:'🟢 Gold',    data:weeks.map(w=>qaRows.filter(q=>q.week===w&&(!activeZL||zlMap[q.k]&&zlMap[q.k].lead===activeZL)&&clQA(q.cluster).c==='goldqa').length),backgroundColor:'rgba(16,185,129,0.8)',stack:'s'},
    ]
  },options:chartOpts()});
}

function chartOpts(){
  return{responsive:true,maintainAspectRatio:false,
    plugins:{legend:{labels:{color:'#555',font:{size:10},boxWidth:10}},tooltip:{callbacks:{label:c=>` ${c.dataset.label}: ${c.raw}`}}},
    scales:{
      x:{stacked:true,ticks:{color:'#888',font:{size:10}},grid:{color:'rgba(0,0,0,0.04)'}},
      y:{stacked:true,ticks:{color:'#888',font:{size:10},stepSize:1},grid:{color:'rgba(0,0,0,0.06)'}}
    }};
}

function renderQAMetrics(){
  // Use the latest QA week available
  const latestQAWeek=availQAWeeks().slice(-1)[0];
  if(!latestQAWeek){document.getElementById('qa-metrics-grid').innerHTML='<div class="empty" style="grid-column:1/-1">Sin datos QA</div>';return;}
  const qas=qaByWeeks([latestQAWeek]);
  if(!qas.length){document.getElementById('qa-metrics-grid').innerHTML='<div class="empty" style="grid-column:1/-1">Sin datos QA para la semana más reciente</div>';return;}
  const EXCL=['SO System','ONA','Total DR'];
  const mets=QA_DEF.filter(m=>!EXCL.includes(m.name)).map((m,_i)=>{
    const idx=QA_DEF.indexOf(m);
    const scores=qas.map(q=>q.metrics[idx]?.score||0).filter(v=>v>0);
    const vals=qas.map(q=>q.metrics[idx]?.value||'').filter(Boolean);
    const targets=qas.map(q=>q.metrics[idx]?.target||'').filter(Boolean);
    const isCrit=qas.some(q=>q.metrics[idx]?.critic);
    return{...m,avgScore:avg(scores),val:vals[0]||'—',target:targets[0]||'',isCrit};
  });
  document.getElementById('qa-metrics-grid').innerHTML=mets.map(m=>{
    const bw=Math.min(m.avgScore,100);
    const bc=m.avgScore>=80?'var(--green)':m.avgScore>=60?'var(--yellow)':'var(--red)';
    return`<div class="qa-met ${m.isCrit?'crit':''}">
      <div class="qa-met-name">${m.isCrit?'⚠️ ':''}${m.short}</div>
      <div class="qa-met-val" style="color:${bc}">${m.val}</div>
      ${m.target?`<div class="qa-met-target">Target: ${m.target}</div>`:''}
      <div class="qa-bar"><div class="qa-bar-fill" style="width:${bw}%;background:${bc}"></div></div>
    </div>`;
  }).join('');
}

function renderMissions(dos){
  if(!dos.length){document.getElementById('missions-body').innerHTML='<div class="empty">Sin datos</div>';return;}
  const miss=[
    {l:'Surtido',      f:'PROGRESS_SURTIDO',  w:'40%'},
    {l:'SO Cíclico',   f:'PROGRESS_CYCLIC_SO',w:'20%'},
    {l:'Fruver/Saneo', f:'DISC_FRUVER',        w:'20%'},
    {l:'Cíclicos',     f:'PROGRESS_CYCLICS',   w:'5%'},
  ];
  const offOk=dos.filter(r=>(parseInt(r.OFF_SKU)||0)<=5).length;
  document.getElementById('missions-body').innerHTML=
    miss.map(m=>{
      const val=avg(dos.map(r=>parseFloat(r[m.f])||0));
      const cnt=dos.filter(r=>(parseFloat(r[m.f])||0)>=0.9).length;
      return`<div class="mission-row">
        <div class="mission-lbl">${m.l} <span class="mw">${m.w}</span></div>
        <div class="mission-bar-track"><div class="mission-bar-fill" style="width:${Math.min(val*100,100)}%;background:${scoreColor(val)}"></div></div>
        <div class="mission-pct" style="color:${scoreColor(val)}">${fmtPct(val)}</div>
        <div class="mission-count">${cnt}/${dos.length} ≥90%</div>
      </div>`;
    }).join('')+
    `<div class="mission-row">
      <div class="mission-lbl">Apagados ≤5 <span class="mw">15%</span></div>
      <div class="mission-bar-track"><div class="mission-bar-fill" style="width:${Math.min(offOk/Math.max(dos.length,1)*100,100)}%;background:${scoreColor(offOk/Math.max(dos.length,1))}"></div></div>
      <div class="mission-pct" style="color:${scoreColor(offOk/Math.max(dos.length,1))}">${Math.round(offOk/Math.max(dos.length,1)*100)}%</div>
      <div class="mission-count">${offOk}/${dos.length} ok</div>
    </div>`;
}

function renderChartZonas(){
  const ctx=document.getElementById('chart-zonas').getContext('2d');
  if(chartZonas)chartZonas.destroy();
  if(!zonasRows.length){
    ctx.font='12px Figtree';ctx.fillStyle='#888';
    ctx.fillText('Sin datos de zonas. Verifica que ZONAS_MX esté publicada.',10,60);
    return;
  }
  // Sort by pctPick asc (worst first)
  const sorted=[...zonasRows].sort((a,b)=>a.pctPick-b.pctPick);
  const labels=sorted.map(z=>z.name.length>18?z.name.substring(0,17)+'…':z.name);
  chartZonas=new Chart(ctx,{type:'bar',data:{
    labels,
    datasets:[
      {label:'% Picking',data:sorted.map(z=>z.pctPick),backgroundColor:sorted.map(z=>z.pctPick>=90?'rgba(16,185,129,0.8)':z.pctPick>=80?'rgba(245,158,11,0.8)':'rgba(226,75,74,0.8)'),borderRadius:3},
      {label:'% Bodega', data:sorted.map(z=>z.pctBod), backgroundColor:sorted.map(z=>z.pctBod>=90?'rgba(16,185,129,0.4)':z.pctBod>=80?'rgba(245,158,11,0.4)':'rgba(226,75,74,0.4)'),borderRadius:3},
    ]
  },options:{
    responsive:true,maintainAspectRatio:false,
    plugins:{legend:{labels:{color:'#555',font:{size:10},boxWidth:10}},tooltip:{callbacks:{label:c=>` ${c.dataset.label}: ${c.raw}%`}}},
    scales:{
      x:{ticks:{color:'#888',font:{size:8},maxRotation:45},grid:{display:false}},
      y:{min:0,max:100,ticks:{color:'#888',font:{size:9},callback:v=>v+'%'},grid:{color:'rgba(0,0,0,0.04)'}}
    }
  }});
}

function setSort(col){
  activeSort=col;sortAsc=!sortAsc;
  document.getElementById('sort-do').className='sort-btn'+(col==='do'?' active':'');
  document.getElementById('sort-qa').className='sort-btn'+(col==='qa'?' active':'');
  const weeks=getPeriodWeeks();
  renderTable(storesByWeeks(weeks),qaByWeeks(weeks));
}
function renderTable(dos,qas){
  const qk={};for(const q of qas)qk[q.k]=q;
  let s=[...dos];
  s.sort((a,b)=>{
    if(activeSort==='qa'){const qa=v=>qk[v._k]?.score||0;return sortAsc?qa(a)-qa(b):qa(b)-qa(a);}
    const dv=v=>parseFloat(v.DIS_OPS)||0;return sortAsc?dv(a)-dv(b):dv(b)-dv(a);
  });
  if(!s.length){document.getElementById('stores-table').innerHTML='<tr><td class="empty" colspan="6">Sin tiendas para este período</td></tr>';return;}
  document.getElementById('stores-table').innerHTML=
    `<thead><tr><th>Tienda</th><th>ZL</th><th>DO</th><th>Cluster DO</th><th>QA</th><th>Cluster QA</th></tr></thead>`+
    '<tbody>'+s.map(r=>{
      const do_=parseFloat(r.DIS_OPS)||0,doC=clDO(do_),qa=qk[r._k],qaC=qa?clQA(qa.cluster):null,zl=zlMap[r._k];
      return`<tr>
        <td class="t-name">${r.WAREHOUSENAME||r._k}</td>
        <td style="font-size:10px;color:var(--text-sm);max-width:70px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${zl?.lead||'—'}</td>
        <td style="font-weight:700;color:${scoreColor(do_)}">${fmtPct(do_)}</td>
        <td><span class="cbadge ${doC.c}">${doC.e} ${doC.l}</span></td>
        <td style="font-weight:700;color:${qa?qaColor(qa.score):'var(--text-sm)'}">${qa?qa.score.toFixed(1):'—'}</td>
        <td>${qaC?`<span class="cbadge ${qaC.c}">${qaC.l}</span>`:''}</td>
      </tr>`;
    }).join('')+'</tbody>';
}

// ═══ EVENTS ═══
function setPeriod(p){
  activePeriod=p;
  document.querySelectorAll('.pbtn').forEach(b=>b.classList.toggle('active',b.dataset.period===p));
  renderAll();
}
document.getElementById('sel-zl').addEventListener('change',e=>{activeZL=e.target.value;renderAll();});
function buildZLFilter(){
  const leads=[...new Set(Object.values(zlMap).map(z=>z.lead).filter(Boolean))].sort();
  document.getElementById('sel-zl').innerHTML='<option value="">👤 Todos los ZL</option>'+leads.map(l=>`<option value="${l}">${l}</option>`).join('');
}

// ═══ LOAD ═══
async function loadAll(){
  const loadEl=document.getElementById('loading');
  loadEl.style.display='block';
  document.getElementById('main-content').style.display='none';
  try{
    // All 4 tabs come from the SAME published spreadsheet (PUB_ID)
    const[dTxt,zlTxt,qTxt,zTxt]=await Promise.all([
      safeFetch(csvUrl(GID.detalles)),
      safeFetch(csvUrl(GID.zl)),
      safeFetch(csvUrl(GID.qa)),
      safeFetch(csvUrl(GID.zonasMX)),
    ]);
    if(!dTxt)throw new Error('No se pudo cargar Detalles. Verifica que el sheet esté publicado.');
    processDetalles(dTxt);
    if(zlTxt)processZL(zlTxt);
    if(qTxt) processQA(qTxt);
    if(zTxt) processZonasMX(zTxt);
    buildZLFilter();
    loadEl.style.display='none';
    document.getElementById('main-content').style.display='block';
    renderAll();
  }catch(e){
    loadEl.innerHTML=`<div style="font-size:24px;margin-bottom:8px">⚠️</div><br>${e.message}`;
  }
}
loadAll();
</script>
