<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>TurboOps MX · Resumen País</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root {
  --red:      #E24B4A;
  --red-bg:   #FEF2F2;
  --green:    #10B981;
  --green-bg: #ECFDF5;
  --yellow:   #F59E0B;
  --yellow-bg:#FFFBEB;
  --blue:     #3B82F6;
  --gold:     #F59E0B;
  --silver:   #94A3B8;
  --bronze:   #FB923C;
  --critico:  #E24B4A;
  --regular:  #F59E0B;
  --moderado: #3B82F6;
  --goldqa:   #10B981;
  --bg:       #0F0F0F;
  --surface:  #1A1A1A;
  --surface2: #222222;
  --border:   #2E2E2E;
  --text:     #F0F0F0;
  --text-sm:  #888;
  --accent:   #E24B4A;
  --radius:   10px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;min-height:100vh}

/* ── HEADER ── */
.header{
  background:var(--surface);
  border-bottom:2px solid var(--accent);
  padding:12px 16px;
  display:flex;align-items:center;gap:12px;
  position:sticky;top:0;z-index:100;
}
.logo{font-family:'Space Mono',monospace;font-size:17px;font-weight:700;letter-spacing:-0.5px}
.logo em{font-style:normal;color:var(--accent)}
.header-right{flex:1;text-align:right}
.header-tag{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-sm)}
.mx-badge{display:inline-flex;align-items:center;gap:5px;background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;margin-top:3px}

/* ── PERIOD FILTER ── */
.period-bar{
  background:var(--surface);
  border-bottom:1px solid var(--border);
  padding:10px 14px;
  display:flex;gap:6px;align-items:center;overflow-x:auto;scrollbar-width:none
}
.period-bar::-webkit-scrollbar{display:none}
.period-label{font-size:10px;font-weight:700;color:var(--text-sm);letter-spacing:1px;text-transform:uppercase;white-space:nowrap;margin-right:4px}
.pbtn{
  font-family:'DM Sans',sans-serif;font-size:11px;font-weight:600;
  padding:6px 13px;border-radius:20px;border:1.5px solid var(--border);
  background:transparent;color:var(--text-sm);cursor:pointer;white-space:nowrap;
  transition:all 0.15s
}
.pbtn:hover{border-color:var(--accent);color:var(--text)}
.pbtn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.zl-wrap{position:relative;margin-left:auto;flex-shrink:0}
.zl-wrap::after{content:'▾';position:absolute;right:8px;top:50%;transform:translateY(-50%);font-size:9px;color:var(--text-sm);pointer-events:none}
select.zl-sel{
  font-family:'DM Sans',sans-serif;font-size:11px;font-weight:600;
  padding:5px 22px 5px 10px;border:1.5px solid var(--border);border-radius:20px;
  background:var(--surface2);color:var(--text);appearance:none;cursor:pointer;
}
select.zl-sel:focus{outline:none;border-color:var(--accent)}

/* ── LOADING ── */
#loading{text-align:center;padding:60px 24px;color:var(--text-sm);font-size:13px}
.spinner{width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.7s linear infinite;margin:0 auto 14px}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── LAYOUT ── */
.content{padding:12px;max-width:580px;margin:0 auto}

/* ── SECTION ── */
.sec{background:var(--surface);border-radius:var(--radius);margin-bottom:10px;overflow:hidden;border:1px solid var(--border)}
.sec-hd{padding:12px 14px 0;display:flex;align-items:center;justify-content:space-between;gap:8px}
.sec-title{font-size:12px;font-weight:700;letter-spacing:0.8px;text-transform:uppercase;color:var(--text-sm);display:flex;align-items:center;gap:6px}
.sec-body{padding:10px 14px 14px}

/* ── KPI STRIP ── */
.kpi-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.kpi-card{background:var(--surface2);border-radius:8px;padding:10px 10px 8px;border:1px solid var(--border);text-align:center}
.kpi-num{font-family:'Space Mono',monospace;font-size:24px;font-weight:700;line-height:1;margin-bottom:3px}
.kpi-lbl{font-size:9px;font-weight:600;letter-spacing:0.6px;text-transform:uppercase;color:var(--text-sm)}
.kpi-delta{font-size:10px;font-weight:700;margin-top:2px}
.kpi-delta.up{color:var(--green)}
.kpi-delta.dn{color:var(--red)}
.kpi-delta.neu{color:var(--text-sm)}

/* ── CLUSTER BARS ── */
.chart-wrap{position:relative;height:160px}

/* ── QA METRICS ── */
.qa-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.qa-met{background:var(--surface2);border-radius:8px;padding:9px 10px;border:1px solid var(--border)}
.qa-met.crit{border-color:var(--red);background:#1f1010}
.qa-met-name{font-size:10px;font-weight:600;color:var(--text-sm);margin-bottom:4px;line-height:1.3}
.qa-met-val{font-family:'Space Mono',monospace;font-size:16px;font-weight:700;line-height:1}
.qa-met-target{font-size:9px;color:var(--text-sm);margin-top:2px}
.qa-bar{height:3px;border-radius:2px;background:var(--border);margin-top:5px;overflow:hidden}
.qa-bar-fill{height:100%;border-radius:2px}

/* ── ZONAS ── */
.zonas-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px}
.zona-card{background:var(--surface2);border-radius:8px;padding:10px;border:1px solid var(--border);text-align:center}
.zona-num{font-family:'Space Mono',monospace;font-size:22px;font-weight:700;line-height:1}
.zona-lbl{font-size:9px;font-weight:600;letter-spacing:0.5px;text-transform:uppercase;color:var(--text-sm);margin-top:3px}
.zona-pct{font-size:11px;font-weight:700;margin-top:2px}

/* ── STORES TABLE ── */
.stores-table{width:100%;border-collapse:collapse;font-size:11px}
.stores-table th{text-align:left;font-size:9px;font-weight:700;letter-spacing:0.8px;text-transform:uppercase;color:var(--text-sm);padding:6px 8px;border-bottom:1px solid var(--border)}
.stores-table td{padding:7px 8px;border-bottom:1px solid var(--border)}
.stores-table tr:last-child td{border-bottom:none}
.stores-table tr:hover td{background:var(--surface2)}
.t-name{font-weight:600;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.t-do{font-family:'Space Mono',monospace;font-weight:700}
.t-qa{font-family:'Space Mono',monospace;font-weight:700}
.cbadge{display:inline-flex;align-items:center;font-size:9px;font-weight:700;padding:2px 7px;border-radius:10px;white-space:nowrap}
.cbadge.gold   {background:#2a2000;color:#F59E0B}
.cbadge.silver {background:#1a1f2a;color:#94A3B8}
.cbadge.bronze {background:#2a1200;color:#FB923C}
.cbadge.critico{background:#2a0000;color:#E24B4A}
.cbadge.regular{background:#2a1a00;color:#F59E0B}
.cbadge.moderado{background:#00102a;color:#60a5fa}
.cbadge.goldqa {background:#00201a;color:#10B981}
.sort-btn{background:none;border:none;color:var(--text-sm);font-size:9px;cursor:pointer;font-family:inherit;letter-spacing:0.8px;text-transform:uppercase;font-weight:700}
.sort-btn.active{color:var(--accent)}

/* ── MISSION BLOCK ── */
.mission-row{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--border)}
.mission-row:last-child{border-bottom:none}
.mission-lbl{font-size:12px;font-weight:600;flex:1}
.mission-bar-track{width:90px;height:7px;background:var(--border);border-radius:4px;overflow:hidden;flex-shrink:0}
.mission-bar-fill{height:100%;border-radius:4px}
.mission-pct{font-family:'Space Mono',monospace;font-size:11px;font-weight:700;width:38px;text-align:right;flex-shrink:0}
.mission-count{font-size:10px;color:var(--text-sm);width:60px;text-align:right;flex-shrink:0}

/* ── TREND MINI ── */
.trend-row{display:grid;grid-template-columns:repeat(5,1fr);gap:4px;margin-top:8px}
.trend-cell{text-align:center;background:var(--surface2);border-radius:6px;padding:5px 3px;border:1px solid var(--border)}
.trend-week{font-size:8px;color:var(--text-sm);margin-bottom:2px;font-weight:600}
.trend-val{font-family:'Space Mono',monospace;font-size:11px;font-weight:700}

/* ── EMPTY ── */
.empty{text-align:center;padding:32px 24px;color:var(--text-sm);font-size:12px}

/* ── DIVIDER ── */
.divider{height:1px;background:var(--border);margin:4px 0}

/* ── SCROLL HACK ── */
.table-scroll{overflow-x:auto;scrollbar-width:none}
.table-scroll::-webkit-scrollbar{display:none}

@media(max-width:360px){
  .kpi-grid{grid-template-columns:repeat(3,1fr)}
  .zonas-grid{grid-template-columns:repeat(3,1fr)}
  .qa-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="logo">Turbo<em>Ops</em></div>
  <div class="header-right">
    <div class="header-tag">Resumen País</div>
    <div><span class="mx-badge">🇲🇽 MX</span></div>
  </div>
</div>

<!-- PERIOD FILTER -->
<div class="period-bar">
  <span class="period-label">Período</span>
  <button class="pbtn" data-period="curr" onclick="setPeriod('curr')">Sem actual</button>
  <button class="pbtn active" data-period="last" onclick="setPeriod('last')">Sem pasada</button>
  <button class="pbtn" data-period="s2" onclick="setPeriod('s2')">Hace 2 sem</button>
  <button class="pbtn" data-period="s3" onclick="setPeriod('s3')">Hace 3 sem</button>
  <button class="pbtn" data-period="s4" onclick="setPeriod('s4')">Hace 4 sem</button>
  <button class="pbtn" data-period="month" onclick="setPeriod('month')">Mes actual</button>
  <div class="zl-wrap">
    <select class="zl-sel" id="sel-zl"><option value="">👤 Todos los ZL</option></select>
  </div>
</div>

<div id="loading"><div class="spinner"></div>Cargando datos MX...</div>

<div class="content" id="main-content" style="display:none">

  <!-- KPI STRIP -->
  <div class="sec">
    <div class="sec-hd"><div class="sec-title">📊 Resumen MX</div><div id="period-label" style="font-size:10px;color:var(--text-sm)"></div></div>
    <div class="sec-body">
      <div class="kpi-grid" id="kpi-grid"></div>
    </div>
  </div>

  <!-- CLUSTERS DO - BARRAS APILADAS -->
  <div class="sec">
    <div class="sec-hd"><div class="sec-title">🥇 Clusters Disc Ops · evolución semanal</div></div>
    <div class="sec-body">
      <div class="chart-wrap"><canvas id="chart-do"></canvas></div>
    </div>
  </div>

  <!-- CLUSTERS QA - BARRAS APILADAS -->
  <div class="sec">
    <div class="sec-hd"><div class="sec-title">🎯 Clusters QA · evolución semanal</div></div>
    <div class="sec-body">
      <div class="chart-wrap"><canvas id="chart-qa"></canvas></div>
    </div>
  </div>

  <!-- QA METRICS -->
  <div class="sec">
    <div class="sec-hd"><div class="sec-title">📋 Métricas QA · promedio MX</div><div id="qa-period-lbl" style="font-size:10px;color:var(--text-sm)"></div></div>
    <div class="sec-body">
      <div class="qa-grid" id="qa-metrics-grid"></div>
    </div>
  </div>

  <!-- MISIONES / SANEOS -->
  <div class="sec">
    <div class="sec-hd"><div class="sec-title">✅ Misiones & Saneo · promedio MX</div></div>
    <div class="sec-body" id="missions-body"></div>
  </div>

  <!-- ZONAS SNAPSHOT -->
  <div class="sec">
    <div class="sec-hd"><div class="sec-title">📍 Zonas de Picking · snapshot</div></div>
    <div class="sec-body" id="zonas-body"></div>
  </div>

  <!-- STORES TABLE -->
  <div class="sec">
    <div class="sec-hd">
      <div class="sec-title">🏪 Tiendas MX</div>
      <div style="display:flex;gap:6px">
        <button class="sort-btn active" id="sort-do" onclick="setSort('do')">DO ↕</button>
        <button class="sort-btn" id="sort-qa" onclick="setSort('qa')">QA ↕</button>
      </div>
    </div>
    <div class="sec-body" style="padding-bottom:10px">
      <div class="table-scroll"><table class="stores-table" id="stores-table"></table></div>
    </div>
  </div>

  <div style="height:28px"></div>
</div>

<script>
// ═══════════════════════════════════════════
// CONFIG & CONSTANTS
// ═══════════════════════════════════════════
const PUB_ID = '2PACX-1vQnT4uViGiikmSNyKqTYcaQDcW5UUsxipbLFpETotIJm46MVdk8AwgQ0-M5IBE4sRZ6h8KJ0QGy3iXE';
const GID = {
  detalles:  '1138623282',
  zl:        '258561144',
  qa:        '1947598243',
  zonas:     '1952195501',
  detZonas:  '800059767',
};
const csvUrl = g => `https://docs.google.com/spreadsheets/d/e/${PUB_ID}/pub?gid=${g}&single=true&output=csv`;
const safeFetch = url => fetch(url).then(r => r.ok ? r.text() : '').catch(() => '');

const QA_METRICS = [
  { name:'(Instore) Picking Time', short:'Pick Time', target:'', higherBetter:false },
  { name:'Handoff Post',           short:'Handoff',   target:'', higherBetter:false },
  { name:'Cancel Rate Partner',    short:'Cancel Rate',target:'',higherBetter:false },
  { name:'SO Ops',                 short:'SO Ops',    target:'', higherBetter:false },
  { name:'SO System',              short:'SO System', target:'', higherBetter:false },
  { name:'Total Stockouts',        short:'Stockouts', target:'', higherBetter:false },
  { name:'Defect Rate',            short:'Defect Rate',target:'',higherBetter:false },
  { name:'ONA',                    short:'ONA',       target:'', higherBetter:true  },
  { name:'Total DR',               short:'Total DR',  target:'', higherBetter:false },
];

const KNOWN = ['COUNTRY_CODE','WH_ID','DIS_OPS','SEMANA','WAREHOUSENAME','PROGRESS_SURTIDO',
               'COUNTRY','Zone Lead','Key','WH ID','QA Score','CLUSTER','PAIS','PAÍS','WAREHOUSE_ID'];

// ═══════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════
let activePeriod = 'last';
let activeSort   = 'do';
let activeZL     = '';

let storeRows  = [];   // all MX detalles rows (all weeks)
let zlMap      = {};
let qaRows     = [];   // all MX qa rows (all weeks)
let zonasRows  = [];   // all MX zonas rows
let detZonasRows = []; // current snapshot

let chartDO = null;
let chartQA = null;

// ═══════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════
function normWH(wh){ const n=parseInt(parseFloat(wh)); return isNaN(n)?wh:String(n); }
function normCC(cc){ return (cc||'').trim().toUpperCase(); }

function parseCSV(text){
  const lines=text.replace(/\r/g,'').split('\n');
  return lines.map(line=>{
    const row=[];let cur='',inQ=false;
    for(let i=0;i<=line.length;i++){
      const c=line[i];
      if(c==='"'){inQ=!inQ;}
      else if((c===','||c===undefined)&&!inQ){row.push(cur);cur='';}
      else{cur+=(c||'');}
    }
    return row;
  }).filter(r=>r.some(c=>c!==''));
}
function findHdr(rows){
  for(let i=0;i<Math.min(rows.length,30);i++){
    if(rows[i].some(c=>KNOWN.includes((c||'').trim())))return i;
  }
  return 0;
}
function toObjs(rows,hIdx){
  const h=rows[hIdx].map(x=>(x||'').trim());
  return rows.slice(hIdx+1).filter(r=>r.some(c=>c)).map(r=>Object.fromEntries(h.map((k,i)=>[k,(r[i]||'').trim()])));
}

// Date helpers
function getMondayOfWeek(d){
  const dt=new Date(d);dt.setHours(0,0,0,0);
  const dow=dt.getDay();const off=dow===0?6:dow-1;
  dt.setDate(dt.getDate()-off);return dt;
}
function addWeeks(d,n){const dt=new Date(d);dt.setDate(dt.getDate()+n*7);return dt;}
function dateStr(d){return d instanceof Date?d.toISOString().substring(0,10):(d||'').substring(0,10);}
function parseDate(s){
  if(!s)return null;
  s=s.trim();
  const slash=s.split('/');
  if(slash.length===3){const[m,d,y]=slash.map(Number);if(!isNaN(m)&&!isNaN(d)&&!isNaN(y))return new Date(y,m-1,d);}
  const MONTHS={jan:0,feb:1,mar:2,apr:3,may:4,jun:5,jul:6,aug:7,sep:8,oct:9,nov:10,dec:11};
  const dash=s.split('-');
  if(dash.length===2){const day=parseInt(dash[0]);const mon=MONTHS[(dash[1]||'').toLowerCase().substring(0,3)];if(!isNaN(day)&&mon!==undefined)return new Date(2026,mon,day);}
  const iso=new Date(s);return isNaN(iso.getTime())?null:iso;
}

function getPeriodWeeks(period){
  const today=new Date();today.setHours(0,0,0,0);
  const thisMonday=getMondayOfWeek(today);
  const lastMonday=addWeeks(thisMonday,-1);
  switch(period){
    case 'curr':  return [dateStr(thisMonday)];
    case 'last':  return [dateStr(lastMonday)];
    case 's2':    return [dateStr(addWeeks(lastMonday,-1))];
    case 's3':    return [dateStr(addWeeks(lastMonday,-2))];
    case 's4':    return [dateStr(addWeeks(lastMonday,-3))];
    case 'month':{
      const weeks=[];let d=new Date(thisMonday);
      for(let i=0;i<5;i++){if(d.getMonth()===today.getMonth())weeks.push(dateStr(d));d=addWeeks(d,-1);}
      return weeks;
    }
    default: return [dateStr(lastMonday)];
  }
}
function getAllHistWeeks(){
  // Last 5 mondays
  const today=new Date();today.setHours(0,0,0,0);
  const thisMonday=getMondayOfWeek(today);
  const weeks=[];
  for(let i=4;i>=0;i--) weeks.push(dateStr(addWeeks(thisMonday,-i)));
  return weeks;
}
function getPeriodLabel(period){
  const today=new Date();today.setHours(0,0,0,0);
  const thisMonday=getMondayOfWeek(today);
  const fmt=d=>d.toLocaleDateString('es-MX',{day:'numeric',month:'short'});
  switch(period){
    case 'curr':  return 'Sem actual ('+fmt(thisMonday)+')';
    case 'last':  return 'Sem pasada ('+fmt(addWeeks(thisMonday,-1))+')';
    case 's2':    return 'Hace 2 sem ('+fmt(addWeeks(thisMonday,-2))+')';
    case 's3':    return 'Hace 3 sem ('+fmt(addWeeks(thisMonday,-3))+')';
    case 's4':    return 'Hace 4 sem ('+fmt(addWeeks(thisMonday,-4))+')';
    case 'month': return 'Mes de '+today.toLocaleDateString('es-MX',{month:'long'});
  }
}

function clusterDO(s){
  const n=parseFloat(s)||0;
  if(n>=0.9)return{label:'Gold',   cls:'gold',   emoji:'🥇'};
  if(n>=0.8)return{label:'Silver', cls:'silver', emoji:'🥈'};
  return           {label:'Bronze',cls:'bronze', emoji:'🥉'};
}
function clusterQAColor(cl){
  const l=(cl||'').toLowerCase();
  if(l==='crítico'||l==='critico')return{cls:'critico',color:'var(--critico)', label:'Crítico'};
  if(l==='regular')                return{cls:'regular', color:'var(--regular)',label:'Regular'};
  if(l==='moderado')               return{cls:'moderado',color:'var(--moderado)',label:'Moderado'};
  return                                {cls:'goldqa',  color:'var(--goldqa)', label:'Gold'};
}
function scoreColor(n){
  if(n>=0.9)return'var(--green)';
  if(n>=0.8)return'var(--yellow)';
  return'var(--red)';
}
function qaColor(n){
  if(n>=85)return'var(--green)';
  if(n>=70)return'var(--yellow)';
  return'var(--red)';
}
function fmtPct(n){return Math.round((n||0)*100)+'%';}
function avg(arr){return arr.length?arr.reduce((a,b)=>a+b,0)/arr.length:0;}

// ═══════════════════════════════════════════
// PROCESSORS
// ═══════════════════════════════════════════
function processDetalles(text){
  const rows=parseCSV(text);
  const hIdx=findHdr(rows);
  const objs=toObjs(rows,hIdx);
  storeRows=objs.filter(r=>{
    const cc=normCC(r.COUNTRY_CODE||r.COUNTRY||r.PAÍS||r.PAIS||'');
    return cc==='MX';
  }).map(r=>{
    r._cc='MX';
    r._wh=normWH(r.WH_ID||r.WAREHOUSE_ID||'');
    r._k='MX_'+r._wh;
    r._week=dateStr(r.SEMANA||'');
    return r;
  });
}

function processZL(text){
  const rows=parseCSV(text);
  const hIdx=findHdr(rows);
  const objs=toObjs(rows,hIdx);
  zlMap={};
  for(const r of objs){
    const key=r['Key']||r['KEY']||'';
    if(!key)continue;
    const stripped=key.replace(/N$/,'');
    const cc=normCC(stripped.substring(0,2));
    if(cc!=='MX')continue;
    const wh=normWH(stripped.substring(2));
    const k='MX_'+wh;
    zlMap[k]={lead:(r['Zone Lead']||r['ZL']||'').trim(),email:r['Email ZL']||'',key};
  }
}

function processQA(text){
  const rows=parseCSV(text);
  if(rows.length<2)return;
  let hdrIdx=-1;
  for(let i=0;i<Math.min(rows.length,10);i++){
    if((rows[i][0]||'').trim().toLowerCase()==='key'){hdrIdx=i;break;}
  }
  if(hdrIdx<0){
    for(let i=0;i<Math.min(rows.length,10);i++){
      const r=rows[i].map(c=>(c||'').trim().toLowerCase());
      if(r.includes('qa score')||r.includes('cluster')){hdrIdx=i;break;}
    }
  }
  if(hdrIdx<0)hdrIdx=0;

  const hdr=rows[hdrIdx].map(h=>(h||'').trim().toLowerCase());
  const ci=name=>hdr.indexOf(name.toLowerCase().trim());
  const ciP=name=>hdr.findIndex(h=>h.includes(name.toLowerCase().trim()));

  const iKey=0;
  const iWeek=ciP('week')>=0?ciP('week'):2;
  const iPais=ci('país')>=0?ci('país'):ci('pais')>=0?ci('pais'):3;
  const iWH=ci('wh id')>=0?ci('wh id'):ci('wh_id')>=0?ci('wh_id'):5;
  const iQAScore=ci('qa score')>=0?ci('qa score'):7;
  const iCluster=ci('cluster')>=0?ci('cluster'):8;
  const iQuartile=ci('quartile qa')>=0?ci('quartile qa'):9;
  const metricsStart=iQuartile+1;
  const targetsStart=metricsStart+18;
  const criticsStart=targetsStart+9;

  const MONTHS={jan:0,feb:1,mar:2,apr:3,may:4,jun:5,jul:6,aug:7,sep:8,oct:9,nov:10,dec:11};
  function parseWeekDate(str){
    if(!str)return null;str=str.trim();
    const slash=str.split('/');
    if(slash.length===3){const[m,d,y]=slash.map(Number);if(!isNaN(m)&&!isNaN(d)&&!isNaN(y))return new Date(y,m-1,d);}
    const dash=str.split('-');
    if(dash.length===2){const day=parseInt(dash[0]);const mon=MONTHS[(dash[1]||'').toLowerCase().substring(0,3)];if(!isNaN(day)&&mon!==undefined)return new Date(2026,mon,day);}
    const iso=new Date(str);return isNaN(iso.getTime())?null:iso;
  }

  qaRows=[];
  for(const row of rows.slice(hdrIdx+1)){
    const pais=normCC(row[iPais]||'');
    if(pais!=='MX')continue;
    const wh=normWH(row[iWH]||'');
    if(!wh||wh==='NaN')continue;
    const weekDate=parseWeekDate(row[iWeek]||'');
    if(!weekDate)continue;
    const qaScore=parseFloat((row[iQAScore]||'').replace(',','.'))||0;
    const metrics=QA_METRICS.map((m,i)=>({
      name:m.name,short:m.short,higherBetter:m.higherBetter,
      value:(row[metricsStart+i*2]||'').trim(),
      score:parseFloat(row[metricsStart+i*2+1])||0,
      target:(row[targetsStart+i]||'').trim(),
      critic:(row[criticsStart+i]||'').trim().toLowerCase()==='critic'
    }));
    qaRows.push({
      pais:'MX',wh,k:'MX_'+wh,
      week:dateStr(weekDate),weekDate,
      qaScore,
      cluster:(row[iCluster]||'').trim(),
      metrics
    });
  }
}

function processZonas(text){
  const rows=parseCSV(text);
  const hIdx=findHdr(rows);
  const objs=toObjs(rows,hIdx);
  zonasRows=objs.filter(r=>{
    const cc=normCC(r['COUNTRY']||r['COUNTRY_CODE']||r['PAIS']||r['PAÍS']||'');
    return cc==='MX';
  });
}

function processDetZonas(text){
  const rows=parseCSV(text);
  const hIdx=findHdr(rows);
  const objs=toObjs(rows,hIdx);
  detZonasRows=objs.filter(r=>{
    const cc=normCC(r['COUNTRY_CODE']||r['COUNTRY']||'');
    return cc==='MX';
  });
}

// DATA ACCESSORS

// Get MX store rows for a given set of week strings (latest per store if multiple weeks)
function getStoresByWeeks(weeks){
  if(!weeks||!weeks.length)return[];
  const byKey={};
  for(const r of storeRows){
    if(!weeks.includes(r._week))continue;
    if(!byKey[r._k]||r._week>byKey[r._k]._week)byKey[r._k]=r;
  }
  return Object.values(byKey).filter(r=>{
    if(!zlMap[r._k]||!zlMap[r._k].lead)return false;
    if(activeZL&&zlMap[r._k].lead!==activeZL)return false;
    return true;
  });
}

// Get QA rows for given weeks (latest per store)
function getQAByWeeks(weeks){
  if(!weeks||!weeks.length)return[];
  const byKey={};
  for(const q of qaRows){
    if(!weeks.includes(q.week))continue;
    if(!byKey[q.k]||q.week>byKey[q.k].week)byKey[q.k]=q;
  }
  return Object.values(byKey).filter(q=>{
    if(activeZL&&zlMap[q.k]&&zlMap[q.k].lead!==activeZL)return false;
    return true;
  });
}

// For historical chart: group by week
function getHistByWeek(){
  const histWeeks=getAllHistWeeks();
  return histWeeks.map(w=>{
    const doStores=storeRows.filter(r=>r._week===w&&zlMap[r._k]&&(!activeZL||zlMap[r._k].lead===activeZL));
    const qaS=qaRows.filter(q=>q.week===w&&(!activeZL||( zlMap[q.k]&&zlMap[q.k].lead===activeZL)));
    return{
      week:w,
      weekShort:formatWeekShort(w),
      doStores, qaS,
      gold:   doStores.filter(r=>(parseFloat(r.DIS_OPS)||0)>=0.9).length,
      silver: doStores.filter(r=>{const n=parseFloat(r.DIS_OPS)||0;return n>=0.8&&n<0.9;}).length,
      bronze: doStores.filter(r=>(parseFloat(r.DIS_OPS)||0)<0.8).length,
      qaCritico:  qaS.filter(q=>qaCls(q.cluster)==='critico').length,
      qaRegular:  qaS.filter(q=>qaCls(q.cluster)==='regular').length,
      qaModerat:  qaS.filter(q=>qaCls(q.cluster)==='moderado').length,
      qaGold:     qaS.filter(q=>qaCls(q.cluster)==='goldqa').length,
    };
  });
}
function qaCls(cl){return clusterQAColor(cl).cls;}
function formatWeekShort(w){
  if(!w)return'';
  const d=new Date(w+'T00:00:00');
  if(isNaN(d))return w.substring(5,10);
  return d.toLocaleDateString('es-MX',{day:'numeric',month:'short'}).replace('.','');
}

function renderAll(){
  const weeks=getPeriodWeeks(activePeriod);
  const doStores=getStoresByWeeks(weeks);
  const qaS=getQAByWeeks(weeks);
  const hist=getHistByWeek();

  document.getElementById('period-label').textContent=getPeriodLabel(activePeriod);
  document.getElementById('qa-period-lbl').textContent=getPeriodLabel(activePeriod);

  renderKPIs(doStores,qaS);
  renderClusterDOChart(hist);
  renderClusterQAChart(hist);
  renderQAMetrics(qaS);
  renderMissions(doStores);
  renderZonas();
  renderStoresTable(doStores,qaS);
}

function renderKPIs(doStores,qaS){
  const avgDO=avg(doStores.map(r=>parseFloat(r.DIS_OPS)||0));
  const avgQA=avg(qaS.map(q=>q.qaScore));
  const goldPct=doStores.length?doStores.filter(r=>(parseFloat(r.DIS_OPS)||0)>=0.9).length/doStores.length:0;
  const critPct=qaS.length?qaS.filter(q=>qaCls(q.cluster)==='critico').length/qaS.length:0;
  const avgSurtido=avg(doStores.map(r=>parseFloat(r.PROGRESS_SURTIDO)||0));
  const avgFruver=avg(doStores.map(r=>parseFloat(r.DISC_FRUVER)||0));

  const kpis=[
    {num:doStores.length,label:'Tiendas',color:'var(--text)',delta:''},
    {num:fmtPct(avgDO),label:'Prom DO',color:scoreColor(avgDO),delta:''},
    {num:avgQA?avgQA.toFixed(1):'—',label:'Prom QA',color:avgQA?qaColor(avgQA):'var(--text-sm)',delta:''},
    {num:fmtPct(goldPct),label:'% Gold DO',color:'var(--gold)',delta:''},
    {num:fmtPct(avgSurtido),label:'Surtido',color:scoreColor(avgSurtido),delta:''},
    {num:fmtPct(avgFruver),label:'Fruver/Saneo',color:scoreColor(avgFruver),delta:''},
  ];
  document.getElementById('kpi-grid').innerHTML=kpis.map(k=>`
    <div class="kpi-card">
      <div class="kpi-num" style="color:${k.color}">${k.num}</div>
      <div class="kpi-lbl">${k.label}</div>
    </div>`).join('');
}

    data:{
      labels,
      datasets:[
        {label:'🥇 Gold',  data:hist.map(h=>h.gold),  backgroundColor:'rgba(245,158,11,0.85)',stack:'do'},
        {label:'🥈 Silver',data:hist.map(h=>h.silver),backgroundColor:'rgba(148,163,184,0.75)',stack:'do'},
        {label:'🥉 Bronze',data:hist.map(h=>h.bronze),backgroundColor:'rgba(251,146,60,0.75)',stack:'do'},

    },
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{legend:{labels:{color:'#888',font:{size:10},boxWidth:10}},tooltip:{callbacks:{label:ctx=>` ${ctx.dataset.label}: ${ctx.raw} tiendas`}}},

function renderQAMetrics(qaS){
  if(!qaS.length){
    document.getElementById('qa-metrics-grid').innerHTML='<div class="empty" style="grid-column:1/-1">Sin datos QA para este período</div>';
    return;
  }
  // Average each metric score
  const metAvgs=QA_METRICS.map((m,i)=>{
    const vals=qaS.map(q=>q.metrics[i]?.score||0).filter(v=>v>0);
    const avgScore=avg(vals);
    const rawVals=qaS.map(q=>q.metrics[i]?.value||'').filter(Boolean);
    const targets=qaS.map(q=>q.metrics[i]?.target||'').filter(Boolean);
    const isCrit=qaS.some(q=>q.metrics[i]?.critic);
    return{...m,avgScore,rawVals,targets,isCrit};
  }).filter(m=>m.short!=='SO System'&&m.short!=='ONA'&&m.short!=='Total DR');

  document.getElementById('qa-metrics-grid').innerHTML=metAvgs.map(m=>{
    const barW=Math.min(m.avgScore,100);
    const barColor=m.avgScore>=80?'var(--green)':m.avgScore>=60?'var(--yellow)':'var(--red)';
    const displayVal=m.rawVals.length>0?m.rawVals[0]:'—';
    return`<div class="qa-met ${m.isCrit?'crit':''}">
      <div class="qa-met-name">${m.isCrit?'⚠️ ':''}${m.short}</div>
      <div class="qa-met-val" style="color:${barColor}">${displayVal}</div>
      ${m.targets[0]?`<div class="qa-met-target">Target: ${m.targets[0]}</div>`:''}
      <div class="qa-bar"><div class="qa-bar-fill" style="width:${barW}%;background:${barColor}"></div></div>
    </div>`;
  }).join('');
}

function renderMissions(doStores){
  if(!doStores.length){
    document.getElementById('missions-body').innerHTML='<div class="empty">Sin datos para este período</div>';return;
  }
  const avgSurtido=avg(doStores.map(r=>parseFloat(r.PROGRESS_SURTIDO)||0));
  const avgCyclic=avg(doStores.map(r=>parseFloat(r.PROGRESS_CYCLIC_SO)||0));
  const avgFruver=avg(doStores.map(r=>parseFloat(r.DISC_FRUVER)||0));
  const avgCyclics=avg(doStores.map(r=>parseFloat(r.PROGRESS_CYCLICS)||0));
  const offAvg=avg(doStores.map(r=>parseInt(r.OFF_SKU)||0));
  const offOk=doStores.filter(r=>(parseInt(r.OFF_SKU)||0)<=5).length;

  const missions=[
    {label:'Surtido',     val:avgSurtido, weight:'40%'},
    {label:'SO Cíclico',  val:avgCyclic,  weight:'20%'},
    {label:'Fruver/Saneo',val:avgFruver,  weight:'20%'},
    {label:'Cíclicos',    val:avgCyclics, weight:'5%'},
  ];

  document.getElementById('missions-body').innerHTML=
    missions.map(m=>`<div class="mission-row">
      <div class="mission-lbl">${m.label} <span style="font-size:10px;color:var(--text-sm)">${m.weight}</span></div>
      <div class="mission-bar-track"><div class="mission-bar-fill" style="width:${Math.min(m.val*100,100)}%;background:${scoreColor(m.val)}"></div></div>
      <div class="mission-pct" style="color:${scoreColor(m.val)}">${fmtPct(m.val)}</div>
      <div class="mission-count">${doStores.filter(r=>(parseFloat(r[m.label==='Surtido'?'PROGRESS_SURTIDO':m.label==='SO Cíclico'?'PROGRESS_CYCLIC_SO':m.label==='Fruver/Saneo'?'DISC_FRUVER':'PROGRESS_CYCLICS'])||0)>=0.9).length}/${doStores.length} ≥90%</div>
    </div>`).join('')+
    `<div class="mission-row">
      <div class="mission-lbl">Apagados ≤5 <span style="font-size:10px;color:var(--text-sm)">15%</span></div>
      <div class="mission-bar-track"><div class="mission-bar-fill" style="width:${Math.min(offOk/Math.max(doStores.length,1)*100,100)}%;background:${scoreColor(offOk/Math.max(doStores.length,1))}"></div></div>
      <div class="mission-pct" style="color:${scoreColor(offOk/Math.max(doStores.length,1))}">${Math.round(offOk/Math.max(doStores.length,1)*100)}%</div>
      <div class="mission-count">${offOk}/${doStores.length} ok</div>
    </div>`;
}

function renderZonas(){
  const mxZonas=detZonasRows;
  if(!mxZonas.length){
    document.getElementById('zonas-body').innerHTML='<div class="empty">Sin datos de zonas disponibles</div>';return;
  }
  const total=mxZonas.length;
  const hasPick=mxZonas.filter(r=>(r['PICKING_ZONES']||'').trim()!=='').length;
  const hasStore=mxZonas.filter(r=>(r['STORE_ZONES']||'').trim()!=='').length;
  const noPick=total-hasPick;
  const noStore=total-hasStore;
  const noZone=mxZonas.filter(r=>(r['PICKING_ZONES']||'').trim()===''&&(r['STORE_ZONES']||'').trim()==='').length;
  const pctPick=total>0?hasPick/total:0;
  const pctStore=total>0?hasStore/total:0;

  document.getElementById('zonas-body').innerHTML=`
    <div style="font-size:10px;color:var(--text-sm);margin-bottom:8px">Productos con stock > 0 · snapshot actual</div>
    <div class="zonas-grid">
      <div class="zona-card">
        <div class="zona-num" style="color:${scoreColor(pctPick)}">${Math.round(pctPick*100)}%</div>
        <div class="zona-lbl">Conf. Picking</div>
        <div class="zona-pct" style="color:var(--text-sm)">${hasPick}/${total}</div>
      </div>
      <div class="zona-card">
        <div class="zona-num" style="color:${scoreColor(pctStore)}">${Math.round(pctStore*100)}%</div>
        <div class="zona-lbl">Conf. Bodega</div>
        <div class="zona-pct" style="color:var(--text-sm)">${hasStore}/${total}</div>
      </div>
      <div class="zona-card">
        <div class="zona-num" style="color:${noZone>50?'var(--red)':'var(--yellow)'}">${noZone}</div>
        <div class="zona-lbl">Sin ninguna zona</div>
        <div class="zona-pct" style="color:var(--text-sm)">${total>0?Math.round(noZone/total*100):0}%</div>
      </div>
    </div>
    <div style="margin-top:8px;font-size:10px;color:var(--text-sm)">
      Sin picking: <strong style="color:var(--red)">${noPick}</strong> prods ·
      Sin bodega: <strong style="color:var(--yellow)">${noStore}</strong> prods ·
      Total con stock: <strong>${total}</strong>
    </div>`;
}

let sortAsc=false;
function setSort(col){
  activeSort=col;sortAsc=!sortAsc;
  document.getElementById('sort-do').className='sort-btn'+(col==='do'?' active':'');
  document.getElementById('sort-qa').className='sort-btn'+(col==='qa'?' active':'');
  const weeks=getPeriodWeeks(activePeriod);
  renderStoresTable(getStoresByWeeks(weeks),getQAByWeeks(weeks));
}

function renderStoresTable(doStores,qaS){
  const qaByKey={};
  for(const q of qaS)qaByKey[q.k]=q;

  let sorted=[...doStores];
  if(activeSort==='do'){
    sorted.sort((a,b)=>sortAsc?(parseFloat(a.DIS_OPS)||0)-(parseFloat(b.DIS_OPS)||0):(parseFloat(b.DIS_OPS)||0)-(parseFloat(a.DIS_OPS)||0));
  } else {
    sorted.sort((a,b)=>{
      const qa_a=qaByKey[a._k]?.qaScore||0;
      const qa_b=qaByKey[b._k]?.qaScore||0;
      return sortAsc?qa_a-qa_b:qa_b-qa_a;
    });
  }

  if(!sorted.length){
    document.getElementById('stores-table').innerHTML='<tr><td class="empty" colspan="5">Sin tiendas para este período y filtros</td></tr>';return;
  }

  const rows=sorted.map(r=>{
    const do_=parseFloat(r.DIS_OPS)||0;
    const doC=clusterDO(do_);
    const qa=qaByKey[r._k];
    const qaC=qa?clusterQAColor(qa.cluster):null;
    const zl=zlMap[r._k];
    const name=r.WAREHOUSENAME||r._k;
    return`<tr>
      <td class="t-name">${name}</td>
      <td class="t-do" style="color:${scoreColor(do_)}">${fmtPct(do_)}</td>
      <td><span class="cbadge ${doC.cls}">${doC.emoji}</span></td>
      <td class="t-qa" style="color:${qa?qaColor(qa.qaScore):'var(--text-sm)'}">${qa?qa.qaScore.toFixed(1):'—'}</td>
      <td>${qaC?`<span class="cbadge ${qaC.cls}">${qaC.label}</span>`:''}</td>
    </tr>`;
  }).join('');

  document.getElementById('stores-table').innerHTML=`
    <thead><tr>
      <th>Tienda</th>
      <th>DO</th>
      <th>Cluster DO</th>
      <th>QA</th>
      <th>Cluster QA</th>
    </tr></thead>
    <tbody>${rows}</tbody>`;
}

function setPeriod(p){
  activePeriod=p;
  document.querySelectorAll('.pbtn').forEach(b=>b.classList.toggle('active',b.dataset.period===p));
  renderAll();
}
document.getElementById('sel-zl').addEventListener('change',e=>{
  activeZL=e.target.value;renderAll();
});

function buildZLFilter(){
  const leads=[...new Set(Object.values(zlMap).map(z=>z.lead).filter(Boolean))].sort();
  const sel=document.getElementById('sel-zl');
  sel.innerHTML='<option value="">👤 Todos los ZL</option>'+leads.map(l=>`<option value="${l}">${l}</option>`).join('');
}

// ═══════════════════════════════════════════
// LOAD
// ═══════════════════════════════════════════
async function loadAll(){
  document.getElementById('loading').style.display='block';
  document.getElementById('main-content').style.display='none';
  try{
    const[detTxt,zlTxt,qaTxt,zonTxt,detZTxt]=await Promise.all([
      safeFetch(csvUrl(GID.detalles)),
      safeFetch(csvUrl(GID.zl)),
      safeFetch(csvUrl(GID.qa)),
      safeFetch(csvUrl(GID.zonas)),
      safeFetch(csvUrl(GID.detZonas)),
    ]);
    if(!detTxt)throw new Error('No se pudo cargar el sheet de Detalles.');
    processDetalles(detTxt);
    if(zlTxt) processZL(zlTxt);
    if(qaTxt) processQA(qaTxt);
    if(zonTxt)processZonas(zonTxt);
    if(detZTxt)processDetZonas(detZTxt);
    buildZLFilter();
    document.getElementById('loading').style.display='none';
    document.getElementById('main-content').style.display='block';
    renderAll();
  }catch(e){
    const el=document.getElementById('loading');
    el.innerHTML=`<div style="font-size:24px;margin-bottom:8px">⚠️</div>Error al cargar datos MX.<br><span style="font-size:11px;color:#666">${e.message}</span>`;
  }
}
loadAll();
