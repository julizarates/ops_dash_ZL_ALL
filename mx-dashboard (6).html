<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>TurboOps MX · Resumen País</title>
<link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{
  --red:#E24B4A;--red-bg:#FEF2F2;--green:#10B981;--green-bg:#ECFDF5;
  --yellow:#F59E0B;--yellow-bg:#FFFBEB;--blue:#3B82F6;
  --gold:#F59E0B;--bg:#F5F5F5;--surface:#FFFFFF;--surface2:#F9FAFB;
  --border:#E5E7EB;--text:#111827;--text-sm:#6B7280;
  --accent:#E24B4A;--radius:12px;--shadow:0 1px 4px rgba(0,0,0,0.08);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Figtree',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5}
.header{background:#fff;border-bottom:2.5px solid var(--accent);padding:12px 16px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,0.06)}
.logo{font-size:20px;font-weight:800;letter-spacing:-0.5px}.logo em{font-style:normal;color:var(--accent)}
.header-right{flex:1;text-align:right}
.header-tag{font-size:10px;font-weight:600;color:var(--text-sm);text-transform:uppercase;letter-spacing:0.3px}
.mx-badge{display:inline-flex;align-items:center;gap:4px;background:var(--accent);color:#fff;font-size:10px;font-weight:700;padding:2px 9px;border-radius:20px;margin-top:2px}
/* period bar */
.period-bar{background:#fff;border-bottom:1px solid var(--border);padding:8px 10px;display:flex;gap:6px;align-items:center;overflow-x:auto;scrollbar-width:none}
.period-bar::-webkit-scrollbar{display:none}
.plabel{font-size:10px;font-weight:700;color:var(--text-sm);text-transform:uppercase;white-space:nowrap;flex-shrink:0}
.pbtn{font-family:'Figtree',sans-serif;font-size:11px;font-weight:600;padding:5px 12px;border-radius:20px;border:1.5px solid var(--border);background:transparent;color:var(--text-sm);cursor:pointer;white-space:nowrap;flex-shrink:0;transition:all 0.15s}
.pbtn:hover{border-color:var(--accent);color:var(--text)}
.pbtn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.zl-wrap{position:relative;margin-left:auto;flex-shrink:0}
.zl-wrap::after{content:'▾';position:absolute;right:8px;top:50%;transform:translateY(-50%);font-size:9px;color:var(--text-sm);pointer-events:none}
select.zl-sel{font-family:'Figtree',sans-serif;font-size:11px;font-weight:600;padding:5px 22px 5px 10px;border:1.5px solid var(--border);border-radius:20px;background:var(--surface2);color:var(--text);appearance:none;cursor:pointer}
select.zl-sel:focus{outline:none;border-color:var(--accent)}
/* loading */
#loading{text-align:center;padding:60px 24px;color:var(--text-sm);font-size:13px}
.spinner{width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.7s linear infinite;margin:0 auto 14px}
@keyframes spin{to{transform:rotate(360deg)}}
/* layout */
.content{padding:10px;max-width:580px;margin:0 auto}
.sec{background:var(--surface);border-radius:var(--radius);margin-bottom:10px;overflow:hidden;border:1px solid var(--border);box-shadow:var(--shadow)}
.sec-hd{padding:12px 14px 0;display:flex;align-items:center;justify-content:space-between;gap:8px}
.sec-title{font-size:12px;font-weight:700;letter-spacing:0.5px;text-transform:uppercase;color:var(--text-sm)}
.sec-sub{font-size:10px;color:var(--text-sm)}
.sec-body{padding:10px 14px 14px}
/* kpi */
.kpi-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.kpi-card{background:var(--surface2);border-radius:10px;padding:10px 8px 8px;border:1px solid var(--border);text-align:center}
.kpi-num{font-size:22px;font-weight:800;line-height:1;margin-bottom:2px}
.kpi-lbl{font-size:9px;font-weight:600;letter-spacing:0.5px;text-transform:uppercase;color:var(--text-sm)}
/* charts */
.chart-wrap{position:relative;height:170px}
.chart-wrap-lg{position:relative;height:200px}
/* qa metrics */
.qa-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.qa-met{background:var(--surface2);border-radius:8px;padding:9px 10px;border:1px solid var(--border)}
.qa-met.crit{border-color:var(--red);background:var(--red-bg)}
.qa-met-name{font-size:10px;font-weight:600;color:var(--text-sm);margin-bottom:4px}
.qa-met-val{font-size:16px;font-weight:800}
.qa-met-target{font-size:9px;color:var(--text-sm);margin-top:2px}
.qa-bar{height:3px;border-radius:2px;background:var(--border);margin-top:5px;overflow:hidden}
.qa-bar-fill{height:100%;border-radius:2px}
/* missions */
.mission-row{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--border)}
.mission-row:last-child{border-bottom:none}
.mission-lbl{font-size:12px;font-weight:600;flex:1}
.mw{font-size:10px;color:var(--text-sm);font-weight:400}
.mbar-track{width:80px;height:7px;background:var(--border);border-radius:4px;overflow:hidden;flex-shrink:0}
.mbar-fill{height:100%;border-radius:4px}
.mpct{font-size:12px;font-weight:700;width:36px;text-align:right;flex-shrink:0}
.mcnt{font-size:10px;color:var(--text-sm);width:58px;text-align:right;flex-shrink:0}
/* table */
.tscroll{overflow-x:auto;scrollbar-width:none}.tscroll::-webkit-scrollbar{display:none}
.sto-table{width:100%;border-collapse:collapse;font-size:11px}
.sto-table th{text-align:left;font-size:9px;font-weight:700;letter-spacing:0.8px;text-transform:uppercase;color:var(--text-sm);padding:6px 8px;border-bottom:1px solid var(--border)}
.sto-table td{padding:7px 8px;border-bottom:1px solid var(--border)}
.sto-table tr:last-child td{border-bottom:none}
.sto-table tr:hover td{background:var(--surface2)}
.tname{font-weight:600;max-width:110px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cb{display:inline-flex;align-items:center;font-size:9px;font-weight:700;padding:2px 7px;border-radius:10px;white-space:nowrap}
.cb.gold{background:#FEF3C7;color:#92400E}
.cb.silver{background:#F1F5F9;color:#475569}
.cb.bronze{background:#FFF7ED;color:#9A3412}
.cb.critico{background:#FEF2F2;color:#991B1B}
.cb.regular{background:#FFFBEB;color:#92400E}
.cb.moderado{background:#EFF6FF;color:#1E40AF}
.cb.goldqa{background:#ECFDF5;color:#065F46}
.sbtn{background:none;border:none;color:var(--text-sm);font-size:9px;cursor:pointer;font-family:inherit;letter-spacing:0.8px;text-transform:uppercase;font-weight:700;padding:2px 6px;border-radius:6px}
.sbtn.active{color:var(--accent);background:var(--red-bg)}
.empty{text-align:center;padding:28px 24px;color:var(--text-sm);font-size:12px}
/* debug */
#dbg{background:#0f0f0f;color:#4ade80;font-family:monospace;font-size:10px;padding:10px 12px;border-radius:8px;margin-bottom:10px;white-space:pre-wrap;line-height:1.6}
</style>
</head>
<body>

<div class="header">
  <div class="logo">Turbo<em>Ops</em></div>
  <div class="header-right">
    <div class="header-tag">Resumen País</div>
    <div><span class="mx-badge">🇲🇽 MX</span></div>
  </div>
</div>

<div class="period-bar">
  <span class="plabel">Semana</span>
  <!-- buttons injected by JS once data loads -->
  <div id="week-btns" style="display:flex;gap:6px;flex-shrink:0"></div>
  <div class="zl-wrap">
    <select class="zl-sel" id="sel-zl"><option value="">👤 Todos los ZL</option></select>
  </div>
</div>

<div id="loading"><div class="spinner"></div>Cargando datos MX...</div>

<div class="content" id="main-content" style="display:none">
  <div id="dbg"></div>

  <!-- KPIs -->
  <div class="sec">
    <div class="sec-hd"><div class="sec-title">📊 Resumen MX</div><div id="period-lbl" class="sec-sub"></div></div>
    <div class="sec-body"><div class="kpi-grid" id="kpi-grid"></div></div>
  </div>

  <!-- Cluster DO -->
  <div class="sec">
    <div class="sec-hd"><div class="sec-title">🥇 Clusters Disc Ops · últimas 4 semanas</div></div>
    <div class="sec-body"><div class="chart-wrap"><canvas id="chart-do"></canvas></div></div>
  </div>

  <!-- Cluster QA -->
  <div class="sec">
    <div class="sec-hd"><div class="sec-title">🎯 Clusters QA · últimas 4 semanas</div></div>
    <div class="sec-body"><div class="chart-wrap"><canvas id="chart-qa"></canvas></div></div>
  </div>

  <!-- QA Metrics -->
  <div class="sec">
    <div class="sec-hd"><div class="sec-title">📋 Métricas QA · semana seleccionada</div><div id="qa-week-lbl" class="sec-sub"></div></div>
    <div class="sec-body"><div class="qa-grid" id="qa-metrics-grid"></div></div>
  </div>

  <!-- Misiones DO -->
  <div class="sec">
    <div class="sec-hd"><div class="sec-title">✅ Disciplina Operativa · semana seleccionada</div></div>
    <div class="sec-body" id="missions-body"></div>
  </div>

  <!-- Zonas tendencia -->
  <div class="sec">
    <div class="sec-hd"><div class="sec-title">📍 Conf. Zonas MX · promedio país por semana</div></div>
    <div class="sec-body"><div class="chart-wrap-lg"><canvas id="chart-zonas"></canvas></div></div>
  </div>

  <!-- Tabla tiendas -->
  <div class="sec">
    <div class="sec-hd">
      <div class="sec-title">🏪 Tiendas MX</div>
      <div style="display:flex;gap:4px">
        <button class="sbtn active" id="sort-do" onclick="setSort('do')">DO ↕</button>
        <button class="sbtn" id="sort-qa" onclick="setSort('qa')">QA ↕</button>
      </div>
    </div>
    <div class="sec-body" style="padding-bottom:10px">
      <div class="tscroll"><table class="sto-table" id="sto-table"></table></div>
    </div>
  </div>
  <div style="height:28px"></div>
</div>

<script>
// ══════════════════════════════════════
// CONFIG — mismo PUB_ID para todos los GIDs
// ══════════════════════════════════════
const PUB_ID       = '2PACX-1vQnT4uViGiikmSNyKqTYcaQDcW5UUsxipbLFpETotIJm46MVdk8AwgQ0-M5IBE4sRZ6h8KJ0QGy3iXE';
const PUB_ID_ZONAS = '2PACX-1vQnT4uViGiikmSNyKqTYcaQDcW5UUsxipbLFpETotIJm46MVdk8AwgQ0-M5IBE4sRZ6h8KJ0QGy3iXE';
const GID = { detalles:'1138623282', zl:'258561144', qa:'1947598243', zonasMX:'1702827094' };
const csv      = g => `https://docs.google.com/spreadsheets/d/e/${PUB_ID}/pub?gid=${g}&single=true&output=csv`;
const csvZonas = g => `https://docs.google.com/spreadsheets/d/e/${PUB_ID_ZONAS}/pub?gid=${g}&single=true&output=csv`;
const sf = url => fetch(url).then(r=>r.ok?r.text():'').catch(()=>'');

const QA_DEF=[
  {n:'(Instore) Picking Time',s:'Pick Time',  hb:false},
  {n:'Handoff Post',          s:'Handoff',    hb:false},
  {n:'Cancel Rate Partner',   s:'Cancel Rate',hb:false},
  {n:'SO Ops',                s:'SO Ops',     hb:false},
  {n:'SO System',             s:'SO System',  hb:false},
  {n:'Total Stockouts',       s:'Stockouts',  hb:false},
  {n:'Defect Rate',           s:'Defect Rate',hb:false},
  {n:'ONA',                   s:'ONA',        hb:true },
  {n:'Total DR',              s:'Total DR',   hb:false},
];
const EXCL_QA=['SO System','ONA','Total DR'];
const KNOWN=['COUNTRY_CODE','WH_ID','DIS_OPS','SEMANA','WAREHOUSENAME','PROGRESS_SURTIDO',
             'COUNTRY','Zone Lead','Key','WH ID','QA Score','CLUSTER','PAIS','PAÍS','WAREHOUSE_ID'];

// ══════════════════════════════════════
// STATE
// ══════════════════════════════════════
let activeWeek='', activeZL='', activeSort='do', sortAsc=false;
let storeRows=[], zlMap={}, qaRows=[], zonasRows=[];
let charts={do:null,qa:null,zonas:null};

// ══════════════════════════════════════
// DATE UTILS — all ISO "YYYY-MM-DD" strings
// ══════════════════════════════════════
function toISO(d){
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function mondayOf(iso){
  if(!iso||iso.length<10)return null;
  const d=new Date(iso+'T12:00:00');
  if(isNaN(d))return null;
  const dow=d.getDay(), off=dow===0?6:dow-1;
  d.setDate(d.getDate()-off);
  return toISO(d);
}
const MONS={jan:0,feb:1,mar:2,apr:3,may:4,jun:5,jul:6,aug:7,sep:8,oct:9,nov:10,dec:11};
function parseToMonday(s){
  if(!s)return null; s=s.trim();
  if(/^\d{4}-\d{2}-\d{2}$/.test(s))return mondayOf(s);
  const sl=s.split('/');
  if(sl.length===3){const[m,d,y]=sl.map(Number);if(!isNaN(m*d*y))return mondayOf(toISO(new Date(y,m-1,d)));}
  const da=s.split('-');
  if(da.length===2){const d2=parseInt(da[0]),m2=MONS[(da[1]||'').toLowerCase().slice(0,3)];
    if(!isNaN(d2)&&m2!==undefined)return mondayOf(toISO(new Date(2026,m2,d2)));}
  return null;
}
function todayISO(){return toISO(new Date());}
function fmtShort(iso){
  if(!iso)return'';
  const d=new Date(iso+'T12:00:00');
  return isNaN(d)?iso.slice(5):d.toLocaleDateString('es-MX',{day:'numeric',month:'short'}).replace('.','');
}
function addW(iso,n){const d=new Date(iso+'T12:00:00');d.setDate(d.getDate()+n*7);return toISO(d);}

// ══════════════════════════════════════
// HELPERS
// ══════════════════════════════════════
function normWH(w){const n=parseInt(parseFloat(w));return isNaN(n)?w:String(n);}
function normCC(c){return(c||'').trim().toUpperCase();}
function avg(a){return a.length?a.reduce((s,v)=>s+v,0)/a.length:0;}
function fmtPct(n){return Math.round((n||0)*100)+'%';}
function sc(n){return n>=0.9?'var(--green)':n>=0.8?'var(--yellow)':'var(--red)';}
function qc(n){return n>=85?'var(--green)':n>=70?'var(--yellow)':'var(--red)';}

function clDO(s){const n=parseFloat(s)||0;return n>=0.9?{l:'Gold',c:'gold',e:'🥇'}:n>=0.8?{l:'Silver',c:'silver',e:'🥈'}:{l:'Bronze',c:'bronze',e:'🥉'};}
function clQA(cl){
  const l=(cl||'').toLowerCase().trim();
  if(l==='crítico'||l==='critico')return{l:'Crítico',c:'critico',col:'var(--red)'};
  if(l==='regular') return{l:'Regular', c:'regular', col:'var(--yellow)'};
  if(l==='moderado')return{l:'Moderado',c:'moderado',col:'var(--blue)'};
  return{l:'Gold',c:'goldqa',col:'var(--green)'};
}

// ══════════════════════════════════════
// PARSERS
// ══════════════════════════════════════
function parseCSV(text){
  return text.replace(/\r/g,'').split('\n').map(line=>{
    const row=[];let cur='',inQ=false;
    for(let i=0;i<=line.length;i++){
      const c=line[i];
      if(c==='"')inQ=!inQ;
      else if((c===','||c===undefined)&&!inQ){row.push(cur);cur='';}
      else cur+=(c||'');
    }
    return row;
  }).filter(r=>r.some(c=>c!==''));
}
function findHdr(rows){
  for(let i=0;i<Math.min(rows.length,30);i++)
    if(rows[i].some(c=>KNOWN.includes((c||'').trim())))return i;
  return 0;
}
function toObjs(rows,h){
  const hdr=rows[h].map(x=>(x||'').trim());
  return rows.slice(h+1).filter(r=>r.some(c=>c))
    .map(r=>Object.fromEntries(hdr.map((k,i)=>[k,(r[i]||'').trim()])));
}

function processDetalles(text){
  const rows=parseCSV(text), h=findHdr(rows), objs=toObjs(rows,h);
  storeRows=objs
    .filter(r=>normCC(r.COUNTRY_CODE||r.COUNTRY||r.PAÍS||r.PAIS||'')==='MX')
    .map(r=>{
      r._wh=normWH(r.WH_ID||r.WAREHOUSE_ID||'');
      r._k='MX_'+r._wh;
      // SEMANA es "YYYY-MM-DD" → normalize to monday
      r._week=parseToMonday((r.SEMANA||'').substring(0,10))||'';
      return r;
    })
    .filter(r=>r._week && r._week<=todayISO()); // only past/current weeks
}

function processZL(text){
  const rows=parseCSV(text), h=findHdr(rows), objs=toObjs(rows,h);
  zlMap={};
  for(const r of objs){
    const key=(r['Key']||r['KEY']||'').replace(/N$/,'');
    if(!key)continue;
    const cc=normCC(key.substring(0,2));
    if(cc!=='MX')continue;
    zlMap['MX_'+normWH(key.substring(2))]={lead:(r['Zone Lead']||'').trim()};
  }
}

function processQA(text){
  const rows=parseCSV(text);
  if(rows.length<2)return;
  let hi=-1;
  for(let i=0;i<Math.min(rows.length,10);i++){
    if((rows[i][0]||'').trim().toLowerCase()==='key'){hi=i;break;}
  }
  if(hi<0)for(let i=0;i<Math.min(rows.length,10);i++){
    if(rows[i].map(c=>(c||'').toLowerCase()).some(c=>c.includes('qa score'))){hi=i;break;}
  }
  if(hi<0)hi=0;
  const hdr=rows[hi].map(h=>(h||'').trim().toLowerCase());
  const ci=n=>hdr.indexOf(n.toLowerCase());
  const cp=n=>hdr.findIndex(h=>h.includes(n.toLowerCase()));
  const iW=cp('week')>=0?cp('week'):2;
  const iP=ci('país')>=0?ci('país'):ci('pais')>=0?ci('pais'):3;
  const iWH=ci('wh id')>=0?ci('wh id'):ci('wh_id')>=0?ci('wh_id'):5;
  const iQA=ci('qa score')>=0?ci('qa score'):7;
  const iCL=ci('cluster')>=0?ci('cluster'):8;
  const iQT=ci('quartile qa')>=0?ci('quartile qa'):9;
  const ms=iQT+1, ts=ms+18, cs=ts+9;
  qaRows=[];
  const today=todayISO();
  for(const row of rows.slice(hi+1)){
    if(normCC(row[iP]||'')==='MX'){
      const wh=normWH(row[iWH]||'');
      if(!wh||wh==='NaN')continue;
      const week=parseToMonday(row[iW]||'');
      if(!week||week>today)continue; // skip future weeks
      const score=parseFloat((row[iQA]||'').replace(',','.'))||0;
      const cluster=(row[iCL]||'').trim();
      const metrics=QA_DEF.map((m,i)=>({
        s:m.s,hb:m.hb,
        value:(row[ms+i*2]||'').trim(),
        score:parseFloat(row[ms+i*2+1])||0,
        target:(row[ts+i]||'').trim(),
        critic:(row[cs+i]||'').trim().toLowerCase()==='critic',
      }));
      qaRows.push({k:'MX_'+wh,wh,week,score,cluster,metrics});
    }
  }
}

function processZonas(text){
  if(!text||text.trim()===''){zonasRows=[];return;}

  // Auto-detect separator: if first line has tabs use TSV, else CSV
  const firstLine=(text.split('\n')[0]||'');
  const sep=firstLine.includes('\t')?'\t':',';

  const lines=text.replace(/\r/g,'').split('\n').filter(l=>l.trim());
  if(lines.length<2){zonasRows=[];return;}

  // Parse with detected separator
  const parseRow=line=>line.split(sep).map(c=>c.trim().replace(/^"|"$/g,''));

  // Find header row — skip SQL metadata, search ALL lines for WAREHOUSE_ID + SEMANA
  let hi=-1;
  for(let i=0;i<lines.length;i++){
    const r=parseRow(lines[i]).map(c=>c.trim().toLowerCase());
    if(r.includes('warehouse_id') && r.includes('semana')){hi=i;break;}
  }
  if(hi<0){
    console.warn('[Zonas] header not found in',lines.length,'lines');
    zonasRows=[];return;
  }

  const hdr=parseRow(lines[hi]).map(x=>x.trim().toUpperCase());
  const ci=n=>hdr.findIndex(h=>h===n.toUpperCase());

  const iWH =ci('WAREHOUSE_ID');
  const iSEM=ci('SEMANA');
  const iTP =ci('TOTAL_PRODUCTOS');
  const iCP =ci('PRODS_CON_PICKING');
  const iCB =ci('PRODS_CON_BODEGA');
  const iSP =ci('PRODS_SIN_PICKING');
  const iSB =ci('PRODS_SIN_BODEGA');
  const iPP =ci('PCT_CONF_PICKING');
  const iPB =ci('PCT_CONF_BODEGA');

  // Debug header detection
  console.log('[Zonas] sep='+JSON.stringify(sep)+' hi='+hi+' hdr='+hdr.join('|'));
  console.log('[Zonas] iWH='+iWH+' iSEM='+iSEM+' iTP='+iTP+' iPP='+iPP+' iPB='+iPB);
  console.log('[Zonas] sample row:', parseRow(lines[hi+1]||'').join(' | '));

  zonasRows=[];
  const today=todayISO();
  for(const line of lines.slice(hi+1)){
    if(!line.trim())continue;
    const row=parseRow(line);
    const wh=normWH(row[iWH]||'');
    if(!wh||wh==='NaN')continue;
    const semana=(row[iSEM]||'').substring(0,10);
    if(!semana)continue;
    if(semana>today)continue;
    zonasRows.push({
      k:'MX_'+wh, wh, semana,
      total:  parseFloat(row[iTP])||0,
      conPick:parseFloat(row[iCP])||0,
      conBod: parseFloat(row[iCB])||0,
      sinPick:parseFloat(row[iSP])||0,
      sinBod: parseFloat(row[iSB])||0,
      pctPick:parseFloat(row[iPP])||0,
      pctBod: parseFloat(row[iPB])||0,
    });
  }
  console.log('[Zonas] loaded',zonasRows.length,'rows');
}
// ══════════════════════════════════════
// AVAILABLE WEEKS (from actual data)
// ══════════════════════════════════════
function doWeeks(){
  return[...new Set(storeRows.map(r=>r._week).filter(Boolean))].sort();
}
function qaWeeks(){
  return[...new Set(qaRows.map(r=>r.week).filter(Boolean))].sort();
}
function last4DO(){return doWeeks().slice(-4);}
function last4QA(){return qaWeeks().slice(-4);}
// Closest QA week to the selected DO week
function matchingQAWeek(doWeek){
  if(!doWeek)return null;
  const qw=qaWeeks();
  if(!qw.length)return null;
  // exact match first
  if(qw.includes(doWeek))return doWeek;
  // nearest past week
  const past=qw.filter(w=>w<=doWeek);
  return past.length?past[past.length-1]:qw[0];
}

// ══════════════════════════════════════
// SELECTORS
// ══════════════════════════════════════
function getDoStores(week){
  const byKey={};
  for(const r of storeRows){
    if(r._week!==week)continue;
    if(!zlMap[r._k]||!zlMap[r._k].lead)continue;
    if(activeZL&&zlMap[r._k].lead!==activeZL)continue;
    byKey[r._k]=r;
  }
  return Object.values(byKey);
}
function getQAStores(week){
  if(!week)return[];
  const byKey={};
  for(const q of qaRows){
    if(q.week!==week)continue;
    if(activeZL&&(!zlMap[q.k]||zlMap[q.k].lead!==activeZL))continue;
    byKey[q.k]=q;
  }
  return Object.values(byKey);
}

// ══════════════════════════════════════
// BUILD WEEK BUTTONS
// ══════════════════════════════════════
function buildWeekButtons(){
  const weeks=doWeeks();
  if(!weeks.length)return;
  // default: latest week
  activeWeek=weeks[weeks.length-1];
  const container=document.getElementById('week-btns');
  container.innerHTML=weeks.map(w=>`
    <button class="pbtn${w===activeWeek?' active':''}" data-week="${w}" onclick="setWeek('${w}')">${fmtShort(w)}</button>
  `).join('');
}
function setWeek(w){
  activeWeek=w;
  document.querySelectorAll('#week-btns .pbtn').forEach(b=>b.classList.toggle('active',b.dataset.week===w));
  renderAll();
}

// ══════════════════════════════════════
// RENDER
// ══════════════════════════════════════
function renderAll(){
  const qaWeek=matchingQAWeek(activeWeek);
  const dos=getDoStores(activeWeek);
  const qas=getQAStores(qaWeek);
  const qMap={};for(const q of qas)qMap[q.k]=q;

  // debug
  const dbg=document.getElementById('dbg');
  dbg.textContent=
    `DO weeks en datos: [${doWeeks().join(', ')}]\n`+
    `QA weeks en datos: [${qaWeeks().join(', ')}]\n`+
    `Semana activa DO: ${activeWeek} → QA match: ${qaWeek}\n`+
    `DO tiendas: ${dos.length} | QA tiendas: ${qas.length} | ZL mapeados: ${Object.keys(zlMap).length}\n`+
    `Zonas rows: ${zonasRows.length} | semanas zonas: [${[...new Set(zonasRows.map(z=>z.semana))].sort().join(', ')}]`;

  document.getElementById('period-lbl').textContent='Semana: '+fmtShort(activeWeek);

  renderKPIs(dos,qas);
  renderChartDO();
  renderChartQA();
  renderQAMetrics(qas,qaWeek);
  renderMissions(dos);
  renderChartZonas();
  renderTable(dos,qMap);
}

function renderKPIs(dos,qas){
  const avgDO  =avg(dos.map(r=>parseFloat(r.DIS_OPS)||0));
  const avgQA  =avg(qas.map(q=>q.score));
  const goldPct=dos.length?dos.filter(r=>(parseFloat(r.DIS_OPS)||0)>=0.9).length/dos.length:0;
  const avgSurt=avg(dos.map(r=>parseFloat(r.PROGRESS_SURTIDO)||0));
  const avgFruv=avg(dos.map(r=>parseFloat(r.DISC_FRUVER)||0));
  const kpis=[
    {n:dos.length,         l:'Tiendas',      col:'var(--text)'},
    {n:fmtPct(avgDO),      l:'Prom DO',      col:sc(avgDO)},
    {n:avgQA?avgQA.toFixed(1):'—',l:'Prom QA',col:avgQA?qc(avgQA):'var(--text-sm)'},
    {n:fmtPct(goldPct),    l:'% Gold DO',    col:'var(--gold)'},
    {n:fmtPct(avgSurt),    l:'Surtido',      col:sc(avgSurt)},
    {n:fmtPct(avgFruv),    l:'Fruver/Saneo', col:sc(avgFruv)},
  ];
  document.getElementById('kpi-grid').innerHTML=kpis.map(k=>`
    <div class="kpi-card"><div class="kpi-num" style="color:${k.col}">${k.n}</div><div class="kpi-lbl">${k.l}</div></div>`).join('');
}

function chOpts(stacked){
  return{responsive:true,maintainAspectRatio:false,
    plugins:{legend:{labels:{color:'#555',font:{size:10},boxWidth:10}},
      tooltip:{callbacks:{label:c=>` ${c.dataset.label}: ${c.raw}`}}},
    scales:{
      x:{stacked,ticks:{color:'#888',font:{size:10}},grid:{color:'rgba(0,0,0,0.04)'}},
      y:{stacked,ticks:{color:'#888',font:{size:10},stepSize:1},grid:{color:'rgba(0,0,0,0.06)'}}
    }};
}

function renderChartDO(){
  const weeks=last4DO();
  const ctx=document.getElementById('chart-do').getContext('2d');
  if(charts.do)charts.do.destroy();
  const filt=r=>!activeZL||(zlMap[r._k]&&zlMap[r._k].lead===activeZL);
  charts.do=new Chart(ctx,{type:'bar',data:{
    labels:weeks.map(fmtShort),
    datasets:[
      {label:'🥇 Gold',  data:weeks.map(w=>storeRows.filter(r=>r._week===w&&zlMap[r._k]&&filt(r)&&(parseFloat(r.DIS_OPS)||0)>=0.9).length), backgroundColor:'rgba(245,158,11,0.85)',stack:'s'},
      {label:'🥈 Silver',data:weeks.map(w=>storeRows.filter(r=>r._week===w&&zlMap[r._k]&&filt(r)&&(parseFloat(r.DIS_OPS)||0)>=0.8&&(parseFloat(r.DIS_OPS)||0)<0.9).length),backgroundColor:'rgba(148,163,184,0.8)',stack:'s'},
      {label:'🥉 Bronze',data:weeks.map(w=>storeRows.filter(r=>r._week===w&&zlMap[r._k]&&filt(r)&&(parseFloat(r.DIS_OPS)||0)<0.8).length), backgroundColor:'rgba(251,146,60,0.8)',stack:'s'},
    ]
  },options:chOpts(true)});
}

function renderChartQA(){
  const weeks=last4QA();
  const ctx=document.getElementById('chart-qa').getContext('2d');
  if(charts.qa)charts.qa.destroy();
  // deduplicate by store per week (latest row per store per week)
  const qaByWeek=w=>{
    const byKey={};
    for(const q of qaRows){
      if(q.week!==w)continue;
      if(activeZL&&(!zlMap[q.k]||zlMap[q.k].lead!==activeZL))continue;
      // keep only stores that have a ZL match
      if(!zlMap[q.k]||!zlMap[q.k].lead)continue;
      byKey[q.k]=q;
    }
    return Object.values(byKey);
  };
  charts.qa=new Chart(ctx,{type:'bar',data:{
    labels:weeks.map(fmtShort),
    datasets:[
      {label:'🔴 Crítico', data:weeks.map(w=>qaByWeek(w).filter(q=>clQA(q.cluster).c==='critico').length), backgroundColor:'rgba(226,75,74,0.85)',stack:'s'},
      {label:'🟡 Regular', data:weeks.map(w=>qaByWeek(w).filter(q=>clQA(q.cluster).c==='regular').length), backgroundColor:'rgba(245,158,11,0.8)',stack:'s'},
      {label:'🔵 Moderado',data:weeks.map(w=>qaByWeek(w).filter(q=>clQA(q.cluster).c==='moderado').length),backgroundColor:'rgba(59,130,246,0.75)',stack:'s'},
      {label:'🟢 Gold',    data:weeks.map(w=>qaByWeek(w).filter(q=>clQA(q.cluster).c==='goldqa').length),  backgroundColor:'rgba(16,185,129,0.8)',stack:'s'},
    ]
  },options:chOpts(true)});
}

function renderQAMetrics(qas,qaWeek){
  document.getElementById('qa-week-lbl').textContent=qaWeek?'sem. '+fmtShort(qaWeek):'';
  if(!qas.length){
    document.getElementById('qa-metrics-grid').innerHTML='<div class="empty" style="grid-column:1/-1">Sin datos QA para esta semana</div>';return;
  }
  const mets=QA_DEF.filter(m=>!EXCL_QA.includes(m.n)).map((m,_)=>{
    const idx=QA_DEF.indexOf(m);
    const scores=qas.map(q=>q.metrics[idx]?.score||0).filter(v=>v>0);
    const vals=qas.map(q=>q.metrics[idx]?.value||'').filter(Boolean);
    const targets=qas.map(q=>q.metrics[idx]?.target||'').filter(Boolean);
    const isCrit=qas.some(q=>q.metrics[idx]?.critic);
    const avgScore=avg(scores);
    const bc=avgScore>=80?'var(--green)':avgScore>=60?'var(--yellow)':'var(--red)';
    return`<div class="qa-met ${isCrit?'crit':''}">
      <div class="qa-met-name">${isCrit?'⚠️ ':''}${m.s}</div>
      <div class="qa-met-val" style="color:${bc}">${vals[0]||'—'}</div>
      ${targets[0]?`<div class="qa-met-target">Target: ${targets[0]}</div>`:''}
      <div class="qa-bar"><div class="qa-bar-fill" style="width:${Math.min(avgScore,100)}%;background:${bc}"></div></div>
    </div>`;
  });
  document.getElementById('qa-metrics-grid').innerHTML=mets.join('');
}

function renderMissions(dos){
  if(!dos.length){document.getElementById('missions-body').innerHTML='<div class="empty">Sin datos</div>';return;}
  const miss=[
    {l:'Surtido',      f:'PROGRESS_SURTIDO',  w:'40%'},
    {l:'SO Cíclico',   f:'PROGRESS_CYCLIC_SO',w:'20%'},
    {l:'Fruver/Saneo', f:'DISC_FRUVER',        w:'20%'},
    {l:'Cíclicos',     f:'PROGRESS_CYCLICS',   w:'5%'},
  ];
  const offOk=dos.filter(r=>(parseInt(r.OFF_SKU)||0)<=5).length;
  document.getElementById('missions-body').innerHTML=
    miss.map(m=>{
      const val=avg(dos.map(r=>parseFloat(r[m.f])||0));
      const cnt=dos.filter(r=>(parseFloat(r[m.f])||0)>=0.9).length;
      return`<div class="mission-row">
        <div class="mission-lbl">${m.l} <span class="mw">${m.w}</span></div>
        <div class="mbar-track"><div class="mbar-fill" style="width:${Math.min(val*100,100)}%;background:${sc(val)}"></div></div>
        <div class="mpct" style="color:${sc(val)}">${fmtPct(val)}</div>
        <div class="mcnt">${cnt}/${dos.length} ≥90%</div>
      </div>`;
    }).join('')+
    `<div class="mission-row">
      <div class="mission-lbl">Apagados ≤5 <span class="mw">15%</span></div>
      <div class="mbar-track"><div class="mbar-fill" style="width:${Math.min(offOk/Math.max(dos.length,1)*100,100)}%;background:${sc(offOk/Math.max(dos.length,1))}"></div></div>
      <div class="mpct" style="color:${sc(offOk/Math.max(dos.length,1))}">${Math.round(offOk/Math.max(dos.length,1)*100)}%</div>
      <div class="mcnt">${offOk}/${dos.length} ok</div>
    </div>`;
}

function renderChartZonas(){
  const ctx=document.getElementById('chart-zonas').getContext('2d');
  if(charts.zonas)charts.zonas.destroy();
  if(!zonasRows.length){
    ctx.font='12px Figtree';ctx.fillStyle='#888';
    ctx.fillText('Sin datos de zonas. Verifica que ZONAS_MX esté publicada.',10,60);
    return;
  }
  // Group by semana → promedio ponderado país
  // pct_picking_pais = sum(prods_con_picking) / sum(total_productos) * 100
  const bySem={};
  for(const z of zonasRows){
    if(!bySem[z.semana])bySem[z.semana]={sem:z.semana,totalP:0,conPick:0,conBod:0};
    bySem[z.semana].totalP  +=z.total;
    bySem[z.semana].conPick +=z.conPick;
    bySem[z.semana].conBod  +=z.conBod;
  }
  const sorted=Object.values(bySem).sort((a,b)=>a.sem.localeCompare(b.sem));
  const labels=sorted.map(s=>fmtShort(s.sem));
  const pctPick=sorted.map(s=>s.totalP>0?Math.round(s.conPick/s.totalP*1000)/10:0);
  const pctBod =sorted.map(s=>s.totalP>0?Math.round(s.conBod /s.totalP*1000)/10:0);

  charts.zonas=new Chart(ctx,{type:'bar',data:{
    labels,
    datasets:[
      {label:'% Conf. Picking',data:pctPick,backgroundColor:pctPick.map(v=>v>=90?'rgba(16,185,129,0.85)':v>=80?'rgba(245,158,11,0.85)':'rgba(226,75,74,0.85)'),borderRadius:4},
      {label:'% Conf. Bodega', data:pctBod, backgroundColor:pctBod.map(v=>v>=90?'rgba(16,185,129,0.45)':v>=80?'rgba(245,158,11,0.45)':'rgba(226,75,74,0.45)'),borderRadius:4},
    ]
  },options:{
    responsive:true,maintainAspectRatio:false,
    plugins:{legend:{labels:{color:'#555',font:{size:10},boxWidth:10}},
      tooltip:{callbacks:{label:c=>` ${c.dataset.label}: ${c.raw}%`,
        afterBody:ctx2=>{
          const idx=ctx2[0].dataIndex;
          const s=sorted[idx];
          return[`Total productos: ${s.totalP.toLocaleString()}`,`Con picking: ${s.conPick.toLocaleString()}`,`Con bodega: ${s.conBod.toLocaleString()}`];
        }
      }}},
    scales:{
      x:{ticks:{color:'#888',font:{size:10}},grid:{display:false}},
      y:{min:0,max:100,ticks:{color:'#888',font:{size:9},callback:v=>v+'%'},grid:{color:'rgba(0,0,0,0.04)'}}
    }
  }});
}

function setSort(col){
  activeSort=col; sortAsc=!sortAsc;
  document.getElementById('sort-do').className='sbtn'+(col==='do'?' active':'');
  document.getElementById('sort-qa').className='sbtn'+(col==='qa'?' active':'');
  const qaWeek=matchingQAWeek(activeWeek);
  const qMap={};for(const q of getQAStores(qaWeek))qMap[q.k]=q;
  renderTable(getDoStores(activeWeek),qMap);
}

function renderTable(dos,qMap){
  let s=[...dos];
  s.sort((a,b)=>{
    if(activeSort==='qa'){const v=r=>qMap[r._k]?.score||0;return sortAsc?v(a)-v(b):v(b)-v(a);}
    const v=r=>parseFloat(r.DIS_OPS)||0;return sortAsc?v(a)-v(b):v(b)-v(a);
  });
  if(!s.length){document.getElementById('sto-table').innerHTML='<tr><td class="empty" colspan="6">Sin tiendas para esta semana</td></tr>';return;}
  document.getElementById('sto-table').innerHTML=
    `<thead><tr><th>Tienda</th><th>ZL</th><th>DO</th><th>Cluster DO</th><th>QA</th><th>Cluster QA</th></tr></thead>`+
    '<tbody>'+s.map(r=>{
      const do_=parseFloat(r.DIS_OPS)||0, doC=clDO(do_), qa=qMap[r._k], qaC=qa?clQA(qa.cluster):null, zl=zlMap[r._k];
      return`<tr>
        <td class="tname">${r.WAREHOUSENAME||r._k}</td>
        <td style="font-size:10px;color:var(--text-sm);max-width:70px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${zl?.lead||'—'}</td>
        <td style="font-weight:700;color:${sc(do_)}">${fmtPct(do_)}</td>
        <td><span class="cb ${doC.c}">${doC.e} ${doC.l}</span></td>
        <td style="font-weight:700;color:${qa?qc(qa.score):'var(--text-sm)'}">${qa?qa.score.toFixed(1):'—'}</td>
        <td>${qaC?`<span class="cb ${qaC.c}">${qaC.l}</span>`:''}</td>
      </tr>`;
    }).join('')+'</tbody>';
}

// ══════════════════════════════════════
// EVENTS & LOAD
// ══════════════════════════════════════
document.getElementById('sel-zl').addEventListener('change',e=>{activeZL=e.target.value;renderAll();});

function buildZLFilter(){
  const leads=[...new Set(Object.values(zlMap).map(z=>z.lead).filter(Boolean))].sort();
  document.getElementById('sel-zl').innerHTML='<option value="">👤 Todos los ZL</option>'+
    leads.map(l=>`<option value="${l}">${l}</option>`).join('');
}

async function loadAll(){
  const loadEl=document.getElementById('loading');
  loadEl.style.display='block';
  document.getElementById('main-content').style.display='none';
  try{
    const[dTxt,zlTxt,qTxt,zTxt]=await Promise.all([
      sf(csv(GID.detalles)),
      sf(csv(GID.zl)),
      sf(csv(GID.qa)),
      sf(csvZonas(GID.zonasMX)),
    ]);
    if(!dTxt)throw new Error('No se pudo cargar Detalles. Verifica que el sheet esté publicado.');
    processDetalles(dTxt);
    if(zlTxt)processZL(zlTxt);
    if(qTxt) processQA(qTxt);
    if(zTxt) processZonas(zTxt);
    buildZLFilter();
    buildWeekButtons();
    loadEl.style.display='none';
    document.getElementById('main-content').style.display='block';
    renderAll();
  }catch(e){
    loadEl.innerHTML=`<div style="font-size:24px;margin-bottom:8px">⚠️</div><br>${e.message}`;
  }
}
loadAll();
</script>
