<style>
:root {
  --green-field: #1a6b2e;
  --green-mid:   #22843a;
  --gold:        #FFD700;
  --gold-dark:   #B8860B;
  --red:         #E24B4A;
  --white:       #FFFFFF;
  --off-white:   #F5F5F0;
  --dark:        #0d1b12;
  --dark-mid:    #152318;
  --card-bg:     #1c2e20;
  --card-border: #2d4a33;
  --text:        #F0F0E8;
  --text-dim:    #8aab8f;
  --border:      #2d4a33;
  --radius:      12px;
  --shadow:      0 4px 16px rgba(0,0,0,0.4);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: 'Figtree', sans-serif; background: var(--dark); color: var(--text); font-size: 14px; line-height: 1.5; min-height: 100vh; }
.header {
  background: linear-gradient(135deg, #0d1b12 0%, #1a3d1f 100%);
  border-bottom: 3px solid var(--gold);
  padding: 0 16px;
  position: sticky; top: 0; z-index: 100;
  box-shadow: 0 4px 20px rgba(0,0,0,0.5);
}
.header-inner {
  display: flex; align-items: center; gap: 10px;
  max-width: 540px; margin: 0 auto;
  padding: 10px 0;
}
.logo-text {
  font-family: 'Bebas Neue', cursive;
  font-size: 26px; letter-spacing: 1px;
  line-height: 1; color: var(--gold);
  text-shadow: 0 2px 8px rgba(255,215,0,0.3);
}
.logo-text span { color: #fff; }
.header-right { flex: 1; text-align: right; }
.header-subtitle { font-size: 10px; color: var(--text-dim); font-weight: 600; letter-spacing: 1px; text-transform: uppercase; }
.header-week { font-size: 11px; color: var(--gold); font-weight: 700; margin-top: 1px; }
.hero {
  background: linear-gradient(180deg, #1a3d1f 0%, #0d1b12 100%);
  padding: 20px 16px 16px;
  text-align: center;
  position: relative;
  overflow: hidden;
  border-bottom: 1px solid var(--card-border);
}
.hero::before {
  content: '';
  position: absolute; inset: 0;
  background: repeating-linear-gradient(
    90deg,
    transparent, transparent 40px,
    rgba(255,255,255,0.015) 40px, rgba(255,255,255,0.015) 80px
  );
}
.hero-mascot {
  width: 90px; height: 90px;
  border-radius: 50%;
  border: 3px solid var(--gold);
  box-shadow: 0 0 24px rgba(255,215,0,0.35);
  object-fit: cover;
  margin-bottom: 10px;
  position: relative; z-index: 1;
}
.hero-title {
  font-family: 'Bebas Neue', cursive;
  font-size: 38px; letter-spacing: 2px;
  color: var(--gold);
  text-shadow: 0 2px 12px rgba(255,215,0,0.4);
  line-height: 1; position: relative; z-index: 1;
}
.hero-title span { color: #fff; }
.hero-sub {
  font-size: 12px; color: var(--text-dim); font-weight: 600;
  letter-spacing: 1px; text-transform: uppercase;
  margin-top: 4px; position: relative; z-index: 1;
}
.hero-phases {
  display: flex; justify-content: center; gap: 6px;
  margin-top: 12px; flex-wrap: wrap;
  position: relative; z-index: 1;
}
.phase-pill {
  font-size: 10px; font-weight: 700;
  padding: 3px 10px; border-radius: 20px;
  border: 1px solid; letter-spacing: 0.3px;
  text-transform: uppercase;
}
.phase-pill.active { background: var(--gold); color: #000; border-color: var(--gold); }
.phase-pill.future { background: transparent; color: var(--text-dim); border-color: var(--card-border); }
.filters {
  background: var(--dark-mid);
  border-bottom: 1px solid var(--card-border);
  padding: 8px 12px;
  display: flex; gap: 6px; flex-wrap: wrap;
  max-width: 540px; margin: 0 auto;
}
.filter-wrap { flex: 1; position: relative; min-width: calc(50% - 4px); }
.filter-wrap::after {
  content: '▾'; position: absolute; right: 8px; top: 50%;
  transform: translateY(-50%); font-size: 10px;
  color: var(--text-dim); pointer-events: none;
}
select {
  width: 100%; padding: 7px 22px 7px 9px;
  border: 1px solid var(--card-border); border-radius: 8px;
  background: var(--card-bg); font-family: inherit;
  font-size: 12px; color: var(--text);
  appearance: none; cursor: pointer; font-weight: 600;
}
select:focus { outline: none; border-color: var(--gold); }
select option { background: var(--dark-mid); }
#loading {
  text-align: center; padding: 48px 24px;
  color: var(--text-dim); font-size: 13px;
}
.spinner {
  width: 28px; height: 28px;
  border: 3px solid var(--card-border);
  border-top-color: var(--gold);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  margin: 0 auto 12px;
}
@keyframes spin { to { transform: rotate(360deg); } }
.content-area { padding: 10px; max-width: 540px; margin: 0 auto; }
.group-card {
  background: var(--card-bg); border-radius: var(--radius);
  border: 1px solid var(--card-border);
  margin-bottom: 8px; overflow: hidden;
  box-shadow: var(--shadow);
}
.group-header {
  background: linear-gradient(90deg, var(--green-field), var(--green-mid));
  padding: 8px 14px; display: flex;
  align-items: center; justify-content: space-between;
}
.group-label {
  font-family: 'Bebas Neue', cursive;
  font-size: 18px; letter-spacing: 1px; color: var(--gold);
}
.group-country { font-size: 11px; color: rgba(255,255,255,0.7); font-weight: 600; }
.standings-table { width: 100%; border-collapse: collapse; }
.standings-table th {
  font-size: 9px; font-weight: 700;
  color: var(--text-dim); text-transform: uppercase;
  letter-spacing: 0.5px; padding: 5px 8px;
  border-bottom: 1px solid var(--card-border);
  text-align: left;
}
.standings-table th.right { text-align: right; }
.standings-table td {
  padding: 8px 8px; font-size: 12px;
  border-bottom: 1px solid rgba(45,74,51,0.4);
}
.standings-table tr:last-child td { border-bottom: none; }
.pos-num {
  width: 20px; font-size: 11px; font-weight: 800;
  color: var(--text-dim); text-align: center;
}
.pos-num.top { color: var(--gold); }
.store-name-cell { font-weight: 700; font-size: 13px; }
.wh-id { font-size: 10px; color: var(--text-dim); margin-top: 1px; }
.score-cell {

  font-size: 14px; color: var(--gold);
  white-space: nowrap;
}
.score-cell.loading-dots { color: var(--text-dim); font-size: 11px; }
.score-bar-track {
  height: 4px; background: rgba(255,255,255,0.08);
  border-radius: 2px; overflow: hidden; width: 60px;

.score-bar-fill { height: 100%; border-radius: 2px; background: var(--gold); }
.advance-badge {
  display: inline-block;
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--gold); margin-right: 4px;
  box-shadow: 0 0 4px rgba(255,215,0,0.6);
}
.eliminated .store-name-cell { opacity: 0.45; }
.eliminated .score-cell { opacity: 0.45; }
.back-btn {
  display: inline-flex; align-items: center; gap: 5px;
  font-size: 12px; font-weight: 700; color: var(--gold);
  padding: 6px 12px 6px 8px; border-radius: 8px;
  cursor: pointer; margin-bottom: 8px;
  background: rgba(255,215,0,0.12);
  border: 1px solid rgba(255,215,0,0.25);
  font-family: inherit;

.detail-card {

  margin-bottom: 8px; overflow: hidden;

.detail-top {

.detail-name {

.detail-meta { font-size: 11px; color: var(--text-dim); margin-top: 4px; }
.score-big-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 12px; }

<script>
  const PASS = 'turbo2026.';
  const lockEl = document.getElementById('lock-screen');
  if (sessionStorage.getItem('turboMundialAuth') !== '1') {
    lockEl.style.display = 'flex';
  }
  function checkPwd() {
    if (document.getElementById('pwd-input').value === PASS) {
      sessionStorage.setItem('turboMundialAuth','1');
      lockEl.style.display = 'none';
    } else {
      document.getElementById('pwd-error').style.display = 'block';
      document.getElementById('pwd-input').value = '';

  }
</script>

// PHASE DATE PARSER — handles "8 Jun – 21 Jun" and "22 Jun – 5 Jul"
// Both sides must now always have day + month (e.g. "6 Jul – 12 Jul")
// ============================================================
const PHASE_MONTHS = {Jan:0,Feb:1,Mar:2,Apr:3,May:4,Jun:5,Jul:6,Aug:7,Sep:8,Oct:9,Nov:10,Dec:11};

function isPhaseActive(dates) {
  try {
    const parts = dates.split('–').map(s => s.trim());
    const parseSide = s => {
      const t = s.split(' ');
      return new Date(2026, PHASE_MONTHS[t[1]], parseInt(t[0]));
    };
    const start = parseSide(parts[0]);
    const endParts = parts[1].split(' ');
    const end = new Date(2026, PHASE_MONTHS[endParts[1]], parseInt(endParts[0]), 23, 59, 59);
    const now = new Date();
    return now >= start && now <= end;
  } catch(e) { return false; }
}

function parseCSV(text) {
  const lines = text.replace(/\r/g,'').split('\n');
  return lines.map(line => {
    const row = []; let cur = '', inQ = false;
    for (let i = 0; i <= line.length; i++) {
      const c = line[i];
      if (c === '"') { inQ = !inQ; }
      else if ((c === ',' || c === undefined) && !inQ) { row.push(cur); cur = ''; }
      else { cur += (c||''); }
    }
    return row;
  }).filter(r => r.some(c => c !== ''));
}
function normWH(wh) { const n = parseInt(parseFloat(wh)); return isNaN(n) ? wh : String(n); }
function normCC(cc) { return (cc||'').trim().toUpperCase(); }

const MONTHS = {jan:0,feb:1,mar:2,apr:3,may:4,jun:5,jul:6,aug:7,sep:8,oct:9,nov:10,dec:11};
function parseWeekDate(str) {
  if (!str) return null;
  str = str.trim();
  const slash = str.split('/');
  if (slash.length === 3) {
    const [m,d,y] = slash.map(Number);
    if (!isNaN(m)&&!isNaN(d)&&!isNaN(y)) return new Date(y, m-1, d);
  }
  const dash = str.split('-');
  if (dash.length === 2) {
    const day = parseInt(dash[0]);
    const mon = MONTHS[(dash[1]||'').toLowerCase().substring(0,3)];
    if (!isNaN(day) && mon !== undefined) return new Date(2026, mon, day);
  }
  const iso = new Date(str);
  return isNaN(iso.getTime()) ? null : iso;
}

function processQA(text) {
  const rows = parseCSV(text);
  let hdrIdx = -1;
  for (let i = 0; i < Math.min(rows.length, 10); i++) {
    if ((rows[i][0]||'').trim().toLowerCase() === 'key') { hdrIdx = i; break; }
  }
  if (hdrIdx < 0) {
    for (let i = 0; i < Math.min(rows.length, 10); i++) {
      const r = rows[i].map(c=>(c||'').trim().toLowerCase());
      if (r.includes('qa score') || r.includes('cluster')) { hdrIdx = i; break; }
    }
  }
  if (hdrIdx < 0) hdrIdx = 0;
  const hdr = rows[hdrIdx].map(h=>(h||'').trim().toLowerCase());
  const ci = name => hdr.findIndex(h=>h===name.toLowerCase());
  const ciP = name => hdr.findIndex(h=>h.includes(name.toLowerCase()));
  const iWeek    = ciP('week') >= 0    ? ciP('week')    : 2;
  const iPais    = ci('país') >= 0     ? ci('país') : ci('pais') >= 0 ? ci('pais') : 3;
  const iWH      = ci('wh id') >= 0   ? ci('wh id')    : 5;
  const iQAScore = ci('qa score') >= 0 ? ci('qa score') : 7;
  const iQuartile = ciP('quartile') >= 0 ? ciP('quartile') : 9;
  const metricsStart = iQuartile + 1;
  const METRIC_DEFS = [
    {name:'Picking Time', offset:0,  maxPts:30},
    {name:'Cancel Rate',  offset:4,  maxPts:20},
    {name:'SO Ops',       offset:6,  maxPts:30},
    {name:'Defect Rate',  offset:12, maxPts:20},
  ];
  const rawByStoreWeek = {};
  for (const row of rows.slice(hdrIdx + 1)) {
    const pais = normCC(row[iPais]||'');
    const wh   = normWH(row[iWH]||'');
    if (!pais || !wh || wh==='NaN') continue;
    const weekDate = parseWeekDate(row[iWeek]||'');
    if (!weekDate) continue;
    const weekStr = weekDate.toISOString().substring(0,10);
    const storeKey = pais+'_'+wh;
    const groupKey = storeKey+'|'+weekStr;
    rawByStoreWeek[groupKey] = { pais, wh, storeKey, weekDate, weekStr, row };
  }
  qaData = {};
  for (const { pais, wh, storeKey, weekDate, weekStr, row } of Object.values(rawByStoreWeek)) {
    const qaScore = parseFloat((row[iQAScore]||'').replace(',','.')) || 0;
    const metrics = METRIC_DEFS.map(m => ({
      name:   m.name,
      value:  (row[metricsStart + m.offset] || '').trim(),
      score:  parseFloat((row[metricsStart + m.offset + 1] || '').replace(',','.')) || 0,
      maxPts: m.maxPts,
    }));
    if (!qaData[storeKey]) qaData[storeKey] = [];
    qaData[storeKey].push({ weekDate, weekStr, qaScore, metrics });
  }
  for (const k of Object.keys(qaData)) {
    qaData[k].sort((a,b) => a.weekDate - b.weekDate);
  }
}

function processAusentismo(text) {
  if (!text || text.length < 10) return;
  const rows = parseCSV(text);
  if (rows.length < 2) return;
  let hdrIdx = 0;
  for (let i = 0; i < Math.min(rows.length, 8); i++) {
    const r = rows[i].map(c=>(c||'').trim().toLowerCase());
    if (r.some(x => x.includes('whid') || x === 'wh id' || x === 'wh_id' || x === 'tienda' || x.includes('puntos') || x.includes('semana') || x === 'país' || x === 'pais')) { hdrIdx = i; break; }
  }
  const hdr = rows[hdrIdx].map(h=>(h||'').trim().toLowerCase());
  const ci = name => hdr.findIndex(h => h.includes(name.toLowerCase()));
  const iPais   = ci('país') >= 0 ? ci('país') : ci('pais') >= 0 ? ci('pais') : 0;
  const iWH     = ci('whid') >= 0 ? ci('whid') : ci('wh id') >= 0 ? ci('wh id') : ci('wh_id') >= 0 ? ci('wh_id') : 1;
  const iSemana = ci('semana') >= 0 ? ci('semana') : ci('jueves') >= 0 ? ci('jueves') : 2;
  const iFavor  = ci('favor') >= 0 ? ci('favor') : ci('a favor') >= 0 ? ci('a favor') : 3;
  const iContra = ci('contra') >= 0 ? ci('contra') : ci('en contra') >= 0 ? ci('en contra') : 4;
  absData = {};
  for (const row of rows.slice(hdrIdx + 1)) {
    const pais = normCC(row[iPais]||'');
    const wh   = normWH(row[iWH]||'');
    if (!pais || !wh || wh==='NaN') continue;
    const k = pais+'_'+wh;
    const semana = (row[iSemana]||'').trim();
    const favor  = parseFloat((row[iFavor]||'').replace(',','.')) || 0;
    const contra = parseFloat((row[iContra]||'').replace(',','.')) || 0;
    if (!absData[k]) absData[k] = [];
    absData[k].push({ semana, favor, contra, net: favor - Math.abs(contra) });
  }
}

const _todayG = new Date(); _todayG.setHours(0,0,0,0);
const _dowG = _todayG.getDay();
const _dtmG = _dowG === 0 ? -6 : 1 - _dowG;
const _monG = new Date(_todayG); _monG.setDate(_todayG.getDate() + _dtmG);
const thisMondayStr = _monG.toISOString().substring(0,10);

function computeScores() {
  storeScores = {};
  const TOURNEY_FIRST_MONDAY_STR = '2026-06-08';
  for (const [cc, country] of Object.entries(TOURNAMENT)) {
    for (const stores of Object.values(country.groups)) {
      for (const s of stores) {
        const k = cc+'_'+String(s.wh);
        const weeklyQA = (qaData[k] || [])
          .filter(e => {
            const wStr = e.weekStr || e.weekDate.toISOString().substring(0,10);
            return wStr >= TOURNEY_FIRST_MONDAY_STR && wStr <= thisMondayStr;
          })
          .map(e => ({ date: e.weekStr || e.weekDate.toISOString().substring(0,10), qaScore: e.qaScore, metrics: e.metrics }));
        const qaTotal = weeklyQA.reduce((sum, w) => sum + w.qaScore, 0);
        const absEntries = (absData[k] || []).filter(a => {
          if (!a.semana) return false;
          const d = parseWeekDate(a.semana);
          if (!d) return false;
          const dStr = d.toISOString().substring(0,10);
          return dStr >= '2026-06-08' && dStr <= thisMondayStr;
        });
        const absTotal = cc === 'CO' ? 0 : absEntries.reduce((sum, a) => sum + a.net, 0);
        storeScores[k] = { totalScore: qaTotal + absTotal, qaTotal, absTotal, weekCount: weeklyQA.length, weeklyQA, absEntries };
      }
    }
  }
}

    '</div>' +
    '<div class="score-big-grid">' +
      '<div class="score-big-box"><div class="score-big-label">⭐ Puntaje Total</div><div class="score-big-num">' + (totalScore > 0 ? totalScore.toFixed(1) : '—') + '</div><div class="score-big-sub">' + weekCount + ' semana' + (weekCount !== 1 ? 's' : '') + ' acumuladas</div></div>' +
      '<div class="score-big-box"><div class="score-big-label">🎯 QA Acumulado</div><div class="score-big-num" style="color:' + (qaTotal > 0 ? 'var(--gold)' : 'var(--text-dim)') + '">' + (qaTotal > 0 ? qaTotal.toFixed(1) : '—') + '</div><div class="score-big-sub" style="color:' + (absTotal >= 0 ? '#4ade80' : 'var(--red)') + '">' + (cc === 'CO' ? 'Sin ausentismo' : 'Ausent: ' + (absTotal >= 0 ? '+' : '') + absTotal.toFixed(0) + ' pts') + '</div></div>' +
    '</div>' +
  '</div></div>';
  if (weeklyQA.length > 0) {
    const bars = weeklyQA.map(w => {
      const h = Math.round(w.qaScore / 100 * 46);
      const color = w.qaScore >= 85 ? '#4ade80' : w.qaScore >= 70 ? '#fbbf24' : '#f87171';
      return '<div class="hist-bar-wrap"><div class="hist-val">' + w.qaScore.toFixed(0) + '</div><div class="hist-bar" style="height:' + h + 'px;background:' + color + '"></div><div class="hist-label">' + (w.date || '').substring(5,10) + '</div></div>';
    }).join('');
    html += '<div class="detail-card"><div class="sec-title-bar">📅 Historial semanal QA</div><div class="sec-body"><div class="hist-chart">' + bars + '</div></div></div>';
  }
  const lastQAEntry = (qaData[k] || []).filter(e => { const wStr = e.weekStr || e.weekDate.toISOString().substring(0,10); return wStr >= '2026-06-08' && wStr <= thisMondayStr; }).sort((a,b) => b.weekDate - a.weekDate)[0];
  if (lastQAEntry && lastQAEntry.metrics && lastQAEntry.metrics.length > 0) {
    const lastDate = lastQAEntry.weekStr || lastQAEntry.weekDate.toISOString().substring(0,10);
    const mRows = lastQAEntry.metrics.map(m => '<div class="qa-metric-row"><div class="qa-metric-name">' + m.name + '</div><div style="font-size:13px;font-weight:800;color:var(--gold)">' + (m.value || '—') + '</div></div>').join('');
    html += '<div class="detail-card"><div class="sec-title-bar">📊 Métricas sem. ' + lastDate.substring(5,10) + '</div><div class="sec-body">' + mRows + '</div></div>';
  }
  if (cc !== 'CO' && absEntries.length > 0) {
    const absRows = absEntries.map(a => '<div class="abs-row"><div class="abs-week">' + a.semana + '</div><div style="display:flex;gap:12px;align-items:center">' + (a.favor > 0 ? '<span style="font-size:11px;color:#4ade80">+' + a.favor + ' ✓</span>' : '') + (a.contra < 0 ? '<span style="font-size:11px;color:var(--red)">' + a.contra + ' ✗</span>' : '') + '<div class="abs-pts ' + (a.net > 0 ? 'pos' : a.net < 0 ? 'neg' : 'zero') + '">' + (a.net >= 0 ? '+' : '') + a.net + '</div></div></div>').join('');
    html += '<div class="detail-card"><div class="sec-title-bar">📋 Ausentismo</div><div class="sec-body">' + absRows + '<div style="padding-top:8px;text-align:right;font-size:12px;font-weight:700;color:' + (absTotal >= 0 ? '#4ade80' : 'var(--red)') + '">Total: ' + (absTotal >= 0 ? '+' : '') + absTotal.toFixed(0) + ' pts</div></div></div>';
  }
  html += '<div style="height:24px"></div>';
  cont.innerHTML = html;
}

document.getElementById('sel-pais').addEventListener('change', e => {
  state.pais = e.target.value; state.grupo = ''; state.tienda = '';
  rebuildGrupo(); rebuildTienda(); renderStandings();
});
document.getElementById('sel-grupo').addEventListener('change', e => {
  state.grupo = e.target.value; state.tienda = '';
  rebuildTienda(); renderStandings();
});
document.getElementById('sel-tienda').addEventListener('change', e => {
  state.tienda = e.target.value;
  if (state.tienda) renderDetail(state.tienda);
  else renderStandings();
});

const safeFetch = url => fetch(url).then(r => { if (!r.ok) return ''; return r.text(); }).catch(() => '');

async function loadAll() {
  document.getElementById('loading').style.display = 'block';
  try {
    const [qaTxt, absTxt] = await Promise.all([safeFetch(csvUrl(GID.qa)), safeFetch(csvUrl(GID.ausentismo))]);
    if (qaTxt) processQA(qaTxt);
    if (absTxt) processAusentismo(absTxt);
    computeScores();
    dataLoaded = true;
    const _td = new Date(); _td.setHours(0,0,0,0);
    const _dow = _td.getDay();
    const _dtm = _dow === 0 ? -6 : 1 - _dow;
    const _mon = new Date(_td); _mon.setDate(_td.getDate() + _dtm);
    document.getElementById('header-week').textContent = 'Sem ' + _mon.toISOString().substring(0,10);
    buildFilters();
    document.getElementById('loading').style.display = 'none';
    renderStandings();
  } catch(e) {
    document.getElementById('loading').innerHTML = `<div style="font-size:24px;margin-bottom:8px">⚠️</div>Error al cargar.<br><span style="font-size:11px;color:#666">${e.message}</span>`;
  }
}

loadAll();
</script>
</body>
</html>
