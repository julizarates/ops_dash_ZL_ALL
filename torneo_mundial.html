<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>⚽ TurboOps Mundial 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700;800;900&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
:root {
  --green-field: #1a6b2e;
  --green-mid:   #22843a;
  --gold:        #FFD700;
  --gold-dark:   #B8860B;
  --red:         #E24B4A;
  --white:       #FFFFFF;
  --off-white:   #F5F5F0;
  --dark:        #0d1b12;
  --dark-mid:    #152318;
  --card-bg:     #1c2e20;
  --card-border: #2d4a33;
  --text:        #F0F0E8;
  --text-dim:    #8aab8f;
  --border:      #2d4a33;
  --radius:      12px;
  --shadow:      0 4px 16px rgba(0,0,0,0.4);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: 'Figtree', sans-serif; background: var(--dark); color: var(--text); font-size: 14px; line-height: 1.5; min-height: 100vh; }

/* ── HEADER ── */
.header {
  background: linear-gradient(135deg, #0d1b12 0%, #1a3d1f 100%);
  border-bottom: 3px solid var(--gold);
  padding: 0 16px;
  position: sticky; top: 0; z-index: 100;
  box-shadow: 0 4px 20px rgba(0,0,0,0.5);
}
.header-inner {
  display: flex; align-items: center; gap: 10px;
  max-width: 540px; margin: 0 auto;
  padding: 10px 0;
}
.logo-text {
  font-family: 'Bebas Neue', cursive;
  font-size: 26px; letter-spacing: 1px;
  line-height: 1; color: var(--gold);
  text-shadow: 0 2px 8px rgba(255,215,0,0.3);
}
.logo-text span { color: #fff; }
.header-right { flex: 1; text-align: right; }
.header-subtitle { font-size: 10px; color: var(--text-dim); font-weight: 600; letter-spacing: 1px; text-transform: uppercase; }
.header-week { font-size: 11px; color: var(--gold); font-weight: 700; margin-top: 1px; }

/* ── HERO BANNER ── */
.hero {
  background: linear-gradient(180deg, #1a3d1f 0%, #0d1b12 100%);
  padding: 20px 16px 16px;
  text-align: center;
  position: relative;
  overflow: hidden;
  border-bottom: 1px solid var(--card-border);
}
.hero::before {
  content: '';
  position: absolute; inset: 0;
  background: repeating-linear-gradient(
    90deg,
    transparent, transparent 40px,
    rgba(255,255,255,0.015) 40px, rgba(255,255,255,0.015) 80px
  );
}
.hero-mascot {
  width: 90px; height: 90px;
  border-radius: 50%;
  border: 3px solid var(--gold);
  box-shadow: 0 0 24px rgba(255,215,0,0.35);
  object-fit: cover;
  margin-bottom: 10px;
  position: relative; z-index: 1;
}
.hero-title {
  font-family: 'Bebas Neue', cursive;
  font-size: 38px; letter-spacing: 2px;
  color: var(--gold);
  text-shadow: 0 2px 12px rgba(255,215,0,0.4);
  line-height: 1; position: relative; z-index: 1;
}
.hero-title span { color: #fff; }
.hero-sub {
  font-size: 12px; color: var(--text-dim); font-weight: 600;
  letter-spacing: 1px; text-transform: uppercase;
  margin-top: 4px; position: relative; z-index: 1;
}
.hero-phases {
  display: flex; justify-content: center; gap: 6px;
  margin-top: 12px; flex-wrap: wrap;
  position: relative; z-index: 1;
}
.phase-pill {
  font-size: 10px; font-weight: 700;
  padding: 3px 10px; border-radius: 20px;
  border: 1px solid; letter-spacing: 0.3px;
  text-transform: uppercase;
}
.phase-pill.active { background: var(--gold); color: #000; border-color: var(--gold); }
.phase-pill.future { background: transparent; color: var(--text-dim); border-color: var(--card-border); }

/* ── FILTERS ── */
.filters {
  background: var(--dark-mid);
  border-bottom: 1px solid var(--card-border);
  padding: 8px 12px;
  display: flex; gap: 6px; flex-wrap: wrap;
  max-width: 540px; margin: 0 auto;
}
.filter-wrap { flex: 1; position: relative; min-width: calc(50% - 4px); }
.filter-wrap::after {
  content: '▾'; position: absolute; right: 8px; top: 50%;
  transform: translateY(-50%); font-size: 10px;
  color: var(--text-dim); pointer-events: none;
}
select {
  width: 100%; padding: 7px 22px 7px 9px;
  border: 1px solid var(--card-border); border-radius: 8px;
  background: var(--card-bg); font-family: inherit;
  font-size: 12px; color: var(--text);
  appearance: none; cursor: pointer; font-weight: 600;
}
select:focus { outline: none; border-color: var(--gold); }
select option { background: var(--dark-mid); }

/* ── LOADING ── */
#loading {
  text-align: center; padding: 48px 24px;
  color: var(--text-dim); font-size: 13px;
}
.spinner {
  width: 28px; height: 28px;
  border: 3px solid var(--card-border);
  border-top-color: var(--gold);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  margin: 0 auto 12px;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── CONTENT ── */
.content-area { padding: 10px; max-width: 540px; margin: 0 auto; }

/* ── TAB BAR ── */
.tab-bar {
  display: flex; gap: 4px;
  margin-bottom: 10px;
  background: var(--card-bg);
  border-radius: 10px; padding: 4px;
  border: 1px solid var(--card-border);
}
.tab-btn {
  flex: 1; text-align: center;
  padding: 7px 4px; font-size: 11px; font-weight: 700;
  border-radius: 7px; cursor: pointer;
  border: none; font-family: inherit;
  color: var(--text-dim); background: transparent;
  text-transform: uppercase; letter-spacing: 0.4px;
  transition: all 0.15s;
}
.tab-btn.active { background: var(--gold); color: #000; }

/* ── STANDINGS TABLE ── */
.standings-sec { margin-bottom: 10px; }
.group-card {
  background: var(--card-bg); border-radius: var(--radius);
  border: 1px solid var(--card-border);
  margin-bottom: 8px; overflow: hidden;
  box-shadow: var(--shadow);
}
.group-header {
  background: linear-gradient(90deg, var(--green-field), var(--green-mid));
  padding: 8px 14px; display: flex;
  align-items: center; justify-content: space-between;
}
.group-label {
  font-family: 'Bebas Neue', cursive;
  font-size: 18px; letter-spacing: 1px; color: var(--gold);
}
.group-country { font-size: 11px; color: rgba(255,255,255,0.7); font-weight: 600; }
.standings-table { width: 100%; border-collapse: collapse; }
.standings-table th {
  font-size: 9px; font-weight: 700;
  color: var(--text-dim); text-transform: uppercase;
  letter-spacing: 0.5px; padding: 5px 8px;
  border-bottom: 1px solid var(--card-border);
  text-align: left;
}
.standings-table th.right { text-align: right; }
.standings-table td {
  padding: 8px 8px; font-size: 12px;
  border-bottom: 1px solid rgba(45,74,51,0.4);
}
.standings-table tr:last-child td { border-bottom: none; }
.pos-num {
  width: 20px; font-size: 11px; font-weight: 800;
  color: var(--text-dim); text-align: center;
}
.pos-num.top { color: var(--gold); }
.store-name-cell { font-weight: 700; font-size: 13px; }
.wh-id { font-size: 10px; color: var(--text-dim); margin-top: 1px; }
.score-cell {
  text-align: right; font-weight: 800;
  font-size: 14px; color: var(--gold);
  white-space: nowrap;
}
.score-cell.loading-dots { color: var(--text-dim); font-size: 11px; }
.score-bar-track {
  height: 4px; background: rgba(255,255,255,0.08);
  border-radius: 2px; overflow: hidden; width: 60px;
}
.score-bar-fill { height: 100%; border-radius: 2px; background: var(--gold); }
.advance-badge {
  display: inline-block;
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--gold); margin-right: 4px;
  box-shadow: 0 0 4px rgba(255,215,0,0.6);
}
.eliminated .store-name-cell { opacity: 0.45; }
.eliminated .score-cell { opacity: 0.45; }

/* ── STORE DETAIL ── */
.back-btn {
  display: inline-flex; align-items: center; gap: 5px;
  font-size: 12px; font-weight: 700; color: var(--gold);
  padding: 6px 12px 6px 8px; border-radius: 8px;
  cursor: pointer; margin-bottom: 8px;
  background: rgba(255,215,0,0.12);
  border: 1px solid rgba(255,215,0,0.25);
  font-family: inherit;
}
.detail-card {
  background: var(--card-bg); border-radius: var(--radius);
  border: 1px solid var(--card-border);
  margin-bottom: 8px; overflow: hidden;
}
.detail-top {
  background: linear-gradient(135deg, var(--green-field), var(--dark-mid));
  padding: 16px 14px;
}
.detail-name {
  font-family: 'Bebas Neue', cursive;
  font-size: 28px; letter-spacing: 1px;
  color: var(--gold); line-height: 1;
}
.detail-meta { font-size: 11px; color: var(--text-dim); margin-top: 4px; }
.score-big-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 12px; }
.score-big-box {
  background: rgba(0,0,0,0.25); border-radius: 10px;
  padding: 10px; text-align: center;
  border: 1px solid var(--card-border);
}
.score-big-label { font-size: 9px; font-weight: 700; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.4px; }
.score-big-num { font-size: 30px; font-weight: 900; color: var(--gold); line-height: 1.1; }
.score-big-sub { font-size: 10px; color: var(--text-dim); margin-top: 3px; }
.score-big-delta { font-size: 11px; font-weight: 700; }

.sec-title-bar {
  padding: 10px 14px; border-bottom: 1px solid var(--card-border);
  font-size: 12px; font-weight: 800; letter-spacing: 0.3px;
  text-transform: uppercase; color: var(--text-dim);
  display: flex; align-items: center; gap: 6px;
}
.sec-body { padding: 10px 14px 14px; }

/* QA breakdown */
.qa-metric-row {
  display: flex; align-items: center; gap: 8px;
  padding: 7px 0; border-bottom: 1px solid rgba(45,74,51,0.4);
}
.qa-metric-row:last-child { border-bottom: none; }
.qa-metric-name { font-size: 12px; font-weight: 600; flex: 1; }
.qa-metric-weight { font-size: 10px; color: var(--text-dim); margin-left: 3px; }
.qa-bar-track { width: 70px; height: 6px; background: rgba(255,255,255,0.08); border-radius: 3px; overflow: hidden; flex-shrink: 0; }
.qa-bar-fill { height: 100%; border-radius: 3px; }
.qa-metric-pts { font-size: 12px; font-weight: 800; width: 38px; text-align: right; flex-shrink: 0; }

/* Ausentismo */
.abs-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 0; border-bottom: 1px solid rgba(45,74,51,0.4);
  font-size: 12px;
}
.abs-row:last-child { border-bottom: none; }
.abs-week { font-weight: 600; }
.abs-pts { font-weight: 800; font-size: 14px; }
.abs-pts.pos { color: #4ade80; }
.abs-pts.neg { color: var(--red); }
.abs-pts.zero { color: var(--text-dim); }

/* Match day pill */
.match-day-badge {
  display: inline-flex; align-items: center; gap: 4px;
  background: rgba(255,215,0,0.12); border: 1px solid rgba(255,215,0,0.3);
  color: var(--gold); font-size: 10px; font-weight: 700;
  padding: 2px 8px; border-radius: 20px;
}

/* History bar chart */
.hist-chart { display: flex; align-items: flex-end; gap: 4px; height: 50px; padding-top: 4px; }
.hist-bar-wrap { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 2px; height: 100%; justify-content: flex-end; }
.hist-bar { width: 100%; border-radius: 3px 3px 0 0; background: var(--gold); opacity: 0.8; transition: height 0.3s; }
.hist-label { font-size: 8px; color: var(--text-dim); font-weight: 600; }
.hist-val { font-size: 9px; color: var(--gold); font-weight: 700; }

/* Ranking strip */
.ranking-strip {
  background: linear-gradient(90deg, rgba(255,215,0,0.08), rgba(255,215,0,0.04));
  border: 1px solid rgba(255,215,0,0.2);
  border-radius: 10px; padding: 10px 12px;
  margin-bottom: 10px; display: flex; gap: 12px;
  overflow-x: auto; scrollbar-width: none;
}
.ranking-strip::-webkit-scrollbar { display: none; }
.rs-item { display: flex; flex-direction: column; align-items: center; gap: 1px; white-space: nowrap; flex-shrink: 0; }
.rs-num { font-size: 18px; font-weight: 900; color: var(--gold); }
.rs-label { font-size: 9px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.3px; }
.rs-sep { width: 1px; background: var(--card-border); align-self: stretch; flex-shrink: 0; }

/* Empty */
.empty { text-align: center; padding: 40px 24px; color: var(--text-dim); font-size: 13px; }

/* Phase timeline */
.phase-timeline {
  display: flex; gap: 0; margin-bottom: 10px;
  background: var(--card-bg); border-radius: 10px;
  border: 1px solid var(--card-border); overflow: hidden;
}
.phase-item {
  flex: 1; padding: 8px 6px; text-align: center;
  border-right: 1px solid var(--card-border);
  font-size: 10px;
}
.phase-item:last-child { border-right: none; }
.phase-item.current { background: rgba(255,215,0,0.1); }
.phase-num { font-family: 'Bebas Neue', cursive; font-size: 16px; color: var(--gold); line-height: 1; }
.phase-date { font-size: 9px; color: var(--text-dim); margin-top: 2px; line-height: 1.3; }
.phase-desc { font-size: 9px; color: var(--text); font-weight: 600; margin-top: 2px; line-height: 1.3; }

@media (max-width: 360px) {
  .score-big-grid { grid-template-columns: 1fr; }
}
</style>

// ============================================================
// CSV PARSER
// ============================================================
function parseCSV(text) {
  const lines = text.replace(/\r/g,'').split('\n');
  return lines.map(line => {
    const row = []; let cur = '', inQ = false;
    for (let i = 0; i <= line.length; i++) {
      const c = line[i];
      if (c === '"') { inQ = !inQ; }
      else if ((c === ',' || c === undefined) && !inQ) { row.push(cur); cur = ''; }
      else { cur += (c||''); }
    }
    return row;
  }).filter(r => r.some(c => c !== ''));
}
function normWH(wh) { const n = parseInt(parseFloat(wh)); return isNaN(n) ? wh : String(n); }
function normCC(cc) { return (cc||'').trim().toUpperCase(); }

// PARSE QA

const MONTHS = {jan:0,feb:1,mar:2,apr:3,may:4,jun:5,jul:6,aug:7,sep:8,oct:9,nov:10,dec:11};
function parseWeekDate(str) {
  if (!str) return null;
  str = str.trim();
  const slash = str.split('/');
  if (slash.length === 3) {
    const [m,d,y] = slash.map(Number);
    if (!isNaN(m)&&!isNaN(d)&&!isNaN(y)) return new Date(y, m-1, d);
  }
  const dash = str.split('-');
  if (dash.length === 2) {
    const day = parseInt(dash[0]);
    const mon = MONTHS[(dash[1]||'').toLowerCase().substring(0,3)];
    if (!isNaN(day) && mon !== undefined) return new Date(2026, mon, day);
  }
  const iso = new Date(str);
  return isNaN(iso.getTime()) ? null : iso;
}

function processQA(text) {
  const rows = parseCSV(text);
  let hdrIdx = -1;
  for (let i = 0; i < Math.min(rows.length, 10); i++) {
    if ((rows[i][0]||'').trim().toLowerCase() === 'key') { hdrIdx = i; break; }
  }
  if (hdrIdx < 0) {
    for (let i = 0; i < Math.min(rows.length, 10); i++) {
      const r = rows[i].map(c=>(c||'').trim().toLowerCase());
      if (r.includes('qa score') || r.includes('cluster')) { hdrIdx = i; break; }
    }
  }
  if (hdrIdx < 0) hdrIdx = 0;

  const hdr = rows[hdrIdx].map(h=>(h||'').trim().toLowerCase());
  const ci = name => hdr.findIndex(h=>h===name.toLowerCase());
  const ciP = name => hdr.findIndex(h=>h.includes(name.toLowerCase()));

  const iKey     = 0;
  const iWeek    = ciP('week') >= 0    ? ciP('week')    : 2;
  const iPais    = ci('país') >= 0     ? ci('país')
                 : ci('pais') >= 0     ? ci('pais')     : 3;
  const iWH      = ci('wh id') >= 0   ? ci('wh id')    : 5;
  const iQAScore = ci('qa score') >= 0 ? ci('qa score') : 7;

  // QA score breakdowns: Picking(col metricsStart+0*2+1), Defect(2*2+1?), etc.
  // We'll just use the total QA Score for tournament scoring
  const iQuartile = ciP('quartile') >= 0 ? ciP('quartile') : 9;
  const metricsStart = iQuartile + 1;

  // Metric indices within metrics block (0-indexed pairs: value, score)
  // (Instore) Picking Time = 0, Handoff Post = 1, Cancel Rate Partner = 2, SO Ops = 3
  const METRIC_WEIGHTS = [
    {name:'Picking Time', col:0, maxPts:30},
    {name:'Defect Rate',  col:6, maxPts:20},  // Defect Rate at col 6 in metrics
    {name:'Cancel Rate',  col:2, maxPts:20},
    {name:'SO Ops',       col:3, maxPts:30},
  ];

  // Raw rows grouped by store+week: sheet has 1 row per DAY,
  // "Week ok 23 march" col always shows the Monday of that week.
  // We group by (store, weekMonday) and keep the LAST row of each group
  // (most up-to-date value for that week).
  const rawByStoreWeek = {}; // key = "CC_WH|2026-06-09"

  for (const row of rows.slice(hdrIdx + 1)) {
    const pais = normCC(row[iPais]||'');
    const wh   = normWH(row[iWH]||'');
    if (!pais || !wh || wh==='NaN') continue;
    const weekDate = parseWeekDate(row[iWeek]||'');
    if (!weekDate) continue;
    const weekStr = weekDate.toISOString().substring(0,10);
    const storeKey = pais+'_'+wh;
    const groupKey = storeKey+'|'+weekStr;
    // Always overwrite — last row in CSV for this store+week wins (most recent data)
    rawByStoreWeek[groupKey] = { pais, wh, storeKey, weekDate, weekStr, row };
  }

  // Build qaData: one entry per store per week-Monday
  qaData = {};
  for (const { pais, wh, storeKey, weekDate, weekStr, row } of Object.values(rawByStoreWeek)) {
    const qaScore = parseFloat((row[iQAScore]||'').replace(',','.')) || 0;
    const metrics = METRIC_WEIGHTS.map(m => ({
      name: m.name,
      score: parseFloat(row[metricsStart + m.col*2 + 1]) || 0,
      maxPts: m.maxPts
    }));
    if (!qaData[storeKey]) qaData[storeKey] = [];
    qaData[storeKey].push({ weekDate, weekStr, qaScore, metrics });
  }
  // Sort ascending by week
  for (const k of Object.keys(qaData)) {
    qaData[k].sort((a,b) => a.weekDate - b.weekDate);
  }
  console.log('[QA] loaded stores:', Object.keys(qaData).length,
    '| unique store+week combos:', Object.keys(rawByStoreWeek).length);
}

function processAusentismo(text) {
  if (!text || text.length < 10) { console.log('[ABS] empty'); return; }
  const rows = parseCSV(text);
  if (rows.length < 2) return;

  // Log first rows for debug
  console.log('[ABS] rows:', rows.length, '| row0:', rows[0].slice(0,6));
  if (rows[1]) console.log('[ABS] row1:', rows[1].slice(0,6));

  // Find header row: contains pais/whid/semana/puntos
  let hdrIdx = 0;
  for (let i = 0; i < Math.min(rows.length, 8); i++) {
    const r = rows[i].map(c=>(c||'').trim().toLowerCase());
    if (r.some(x =>
      x.includes('whid') || x === 'wh id' || x === 'wh_id' ||
      x === 'tienda' || x.includes('puntos') || x.includes('semana') ||
      x === 'país' || x === 'pais'
    )) { hdrIdx = i; break; }
  }
  console.log('[ABS] hdrIdx:', hdrIdx, '| hdr:', rows[hdrIdx].slice(0,7));

  const hdr = rows[hdrIdx].map(h=>(h||'').trim().toLowerCase());
  const ci = name => hdr.findIndex(h => h.includes(name.toLowerCase()));

  const iPais   = ci('país') >= 0 ? ci('país') : ci('pais') >= 0 ? ci('pais') : 0;
  const iWH     = ci('whid') >= 0 ? ci('whid') : ci('wh id') >= 0 ? ci('wh id') : ci('wh_id') >= 0 ? ci('wh_id') : 1;
  const iSemana = ci('semana') >= 0 ? ci('semana') : ci('jueves') >= 0 ? ci('jueves') : 2;
  const iFavor  = ci('favor') >= 0 ? ci('favor') : ci('a favor') >= 0 ? ci('a favor') : 3;
  const iContra = ci('contra') >= 0 ? ci('contra') : ci('en contra') >= 0 ? ci('en contra') : 4;

  console.log('[ABS] cols → pais:', iPais, 'wh:', iWH, 'semana:', iSemana, 'favor:', iFavor, 'contra:', iContra);

  absData = {};
  for (const row of rows.slice(hdrIdx + 1)) {
    const pais = normCC(row[iPais]||'');
    const wh   = normWH(row[iWH]||'');
    if (!pais || !wh || wh==='NaN') continue;
    const k = pais+'_'+wh;
    const semana = (row[iSemana]||'').trim();
    const favor  = parseFloat((row[iFavor]||'').replace(',','.')) || 0;
    const contra = parseFloat((row[iContra]||'').replace(',','.')) || 0;
    if (!absData[k]) absData[k] = [];
    absData[k].push({ semana, favor, contra, net: favor - Math.abs(contra) });
  }
  console.log('[ABS] loaded stores:', Object.keys(absData).length);
}

// ============================================================
// COMPUTE TOURNAMENT SCORES
// ============================================================
// Tournament start: June 8, 2026
const TOURNAMENT_START = new Date(2026, 5, 8); // June 8

function computeScores() {
  storeScores = {};

  // Tournament started June 8, 2026
  // Include ALL weeks from that date onwards, including current week in progress
  // QA sheet updates daily but is keyed by Monday of the week
  // We want: each Monday >= June 8 counts as one weekly score entry

  for (const [cc, country] of Object.entries(TOURNAMENT)) {
    for (const stores of Object.values(country.groups)) {
      for (const s of stores) {
        const k = cc+'_'+String(s.wh);

        // QA: only include weeks from first Monday of tourney onwards.
        // Compare as ISO strings to avoid timezone issues.
        // First valid Monday = 2026-06-09
        const FIRST_MONDAY_STR = '2026-06-09';

        const weeklyQA = (qaData[k] || [])
          .filter(e => {
            const wStr = e.weekStr || e.weekDate.toISOString().substring(0,10);
            return wStr >= FIRST_MONDAY_STR;
          })
          .map(e => ({
            date: e.weekStr || e.weekDate.toISOString().substring(0,10),
            qaScore: e.qaScore,
            metrics: e.metrics,
          }));

        const qaTotal  = weeklyQA.reduce((sum, w) => sum + w.qaScore, 0);

        // AUSENTISMO: only sum entries whose semana date >= tournament start
        // semana col is "jueves" date - parse it
        const absEntries = (absData[k] || []).filter(a => {
          if (!a.semana) return false;
          const d = parseWeekDate(a.semana);
          if (!d) return false;
          const dStr = d.toISOString().substring(0,10);
          return dStr >= '2026-06-05'; // viernes 5 jun = primera semana de ausentismo
        });
        const absTotal = absEntries.reduce((sum, a) => sum + a.net, 0);

        storeScores[k] = {
          totalScore: qaTotal + absTotal,
          qaTotal,
          absTotal,
          weekCount:  weeklyQA.length,
          weeklyQA,
          absEntries,
        };
      }
    }
  }
  console.log('[SCORES] computed for:', Object.keys(storeScores).length,
    '| stores with data:', Object.values(storeScores).filter(s=>s.weekCount>0).length);

  // DEBUG: log first 5 stores with data
  let debugCount = 0;
  for (const [k, sc] of Object.entries(storeScores)) {
    if (sc.weekCount > 0 && debugCount < 5) {
      console.log('[SCORE]', k,
        '| weeks after filter:', sc.weeklyQA.map(w => w.date+'='+w.qaScore.toFixed(1)).join(' | '),
        '| QA total:', sc.qaTotal.toFixed(1),
        '| abs:', sc.absTotal,
        '| TOTAL:', sc.totalScore.toFixed(1));
      debugCount++;
    }
  }

  // All unique week-Monday strings parsed from QA sheet (before filter)
  const allWeeks = [...new Set(
    Object.values(qaData).flatMap(arr => arr.map(e => e.weekStr || e.weekDate.toISOString().substring(0,10)))
  )].sort();
  console.log('[ALL QA weeks in sheet]', allWeeks.join(', '));
  console.log('[Filter: weeks >=]', '2026-06-09');
}

            <span style="font-size:14px">${['🥇','🥈','🥉'][i]}</span>
            <span style="font-size:12px;font-weight:700;flex:1">${s.name}</span>
            <span style="font-size:13px;font-weight:800;color:var(--gold)">${s.score > 0 ? s.score.toFixed(1) : '—'}</span>
          </div>`).join('')}
          <div style="margin-top:8px;font-size:11px;color:var(--text-dim)">Prom. acumulado: <strong style="color:var(--text)">${avgScore > 0 ? avgScore.toFixed(1) : '—'}</strong> · Toca para ver grupos →</div>
        </div>
      </div>`;
    }
    cont.innerHTML = html;
    return;
  }

  const country = TOURNAMENT[cc];
  const groups = state.grupo ? {[state.grupo]: country.groups[state.grupo]} : country.groups;

  // Phase timeline
  let tlHtml = `<div class="phase-timeline">`;
  for (const ph of country.phaseInfo) {
    const isCurrent = ph.label === 'Fase 1';
    tlHtml += `<div class="phase-item${isCurrent?' current':''}">
      <div class="phase-num">${ph.label.replace('Fase ','F')}</div>
      <div class="phase-date">${ph.dates}</div>
      <div class="phase-desc">${ph.desc}</div>
    </div>`;
  }
  tlHtml += `</div>`;

  let html = tlHtml;

  for (const [grp, stores] of Object.entries(groups)) {
    const ranked = stores
      .map(s => ({ ...s, k: cc+'_'+String(s.wh), sc: storeScores[cc+'_'+String(s.wh)] }))
      .sort((a,b) => (b.sc?.totalScore||0) - (a.sc?.totalScore||0));
    const maxScore = Math.max(...ranked.map(s => s.sc?.totalScore||0), 1);

    html += `<div class="group-card">
      <div class="group-header">
        <div class="group-label">${country.flag} GRUPO ${grp}</div>
        <div class="group-country">${ranked.length} tiendas</div>
      </div>
      <table class="standings-table">
        <thead>
          <tr>
            <th style="width:22px">#</th>
            <th>Tienda</th>
            <th style="width:80px"></th>
            <th class="right" style="width:70px">Pts</th>
          </tr>
        </thead>
        <tbody>
          ${ranked.map((s, i) => {
            const score = s.sc?.totalScore || 0;
            const barW  = maxScore > 0 ? Math.min(score / maxScore * 100, 100) : 0;
            const hasData = s.sc?.weekCount > 0;
            return `<tr class="${i >= 4 && country.phases >= 3 ? 'eliminated' : ''}" style="cursor:pointer" onclick="selectTienda('${s.k}')">
              <td class="pos-num${i < 4 ? ' top' : ''}">
                ${i < 4 ? `<span class="advance-badge"></span>` : ''}${i+1}
              </td>
              <td>
                <div class="store-name-cell">${s.name}</div>
                <div class="wh-id">WH ${s.wh}</div>
              </td>
              <td>
                ${hasData ? `<div class="score-bar-track"><div class="score-bar-fill" style="width:${barW}%"></div></div>` : ''}
              </td>
              <td class="score-cell${!hasData?' loading-dots':''}">
                ${hasData ? score.toFixed(1) : '—'}
              </td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>`;
  }

  cont.innerHTML = html;
}

// ============================================================
// RENDER DETAIL
// ============================================================
function selectTienda(k) {
  state.tienda = k;
  document.getElementById('sel-tienda').value = k;
  renderDetail(k);
  window.scrollTo(0,0);
}
function selectPais(cc) {
  state.pais = cc;
  document.getElementById('sel-pais').value = cc;
  state.grupo = ''; state.tienda = '';
  rebuildGrupo(); rebuildTienda();
  renderStandings();
  window.scrollTo(0,0);
}
function goBack() {
  state.tienda = '';
  document.getElementById('sel-tienda').value = '';
  document.getElementById('view-detail').style.display = 'none';
  renderStandings();
  window.scrollTo(0,0);
}

function renderDetail(k) {
  document.getElementById('view-standings').style.display = 'none';
  const cont = document.getElementById('view-detail');
  cont.style.display = 'block';

  // Find store info
  const [cc, wh] = k.split('_');
  const country = TOURNAMENT[cc];
  if (!country) { cont.innerHTML='<div class="empty">Tienda no encontrada.</div>'; return; }

  let storeName = k, groupLabel = '';
  for (const [grp, stores] of Object.entries(country.groups)) {
    const found = stores.find(s => String(s.wh) === wh);
    if (found) { storeName = found.name; groupLabel = `Grupo ${grp}`; break; }
  }

  const sc = storeScores[k];
  const totalScore = sc?.totalScore || 0;
  const qaTotal    = sc?.qaTotal    || 0;
  const absTotal   = sc?.absTotal   || 0;
  const weekCount  = sc?.weekCount  || 0;
  const weeklyQA   = sc?.weeklyQA   || [];
  const absEntries = sc?.absEntries || [];

  // Find group rank
  let rank = '—', totalInGroup = '—';
  for (const [grp, stores] of Object.entries(country.groups)) {
    if (stores.find(s => String(s.wh) === wh)) {
      const ranked = stores
        .map(s => storeScores[cc+'_'+String(s.wh)]?.totalScore || 0)
        .sort((a,b) => b-a);
      const myScore = storeScores[k]?.totalScore || 0;
      rank = ranked.indexOf(myScore) + 1;
      totalInGroup = stores.length;
      break;
    }
  }

  let html = `<button class="back-btn" onclick="goBack()">← Volver</button>`;

  // Store header
  html += `<div class="detail-card">
    <div class="detail-top">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px">
        <div>
          <div class="detail-name">${storeName}</div>
          <div class="detail-meta">${country.flag} ${country.name} · WH ${wh} · ${groupLabel}</div>
        </div>
        <div style="text-align:right">
          <div style="font-size:28px;font-weight:900;color:var(--gold);line-height:1">${rank}</div>
          <div style="font-size:9px;color:var(--text-dim);text-transform:uppercase">de ${totalInGroup} grupo</div>
        </div>
      </div>
      <div class="score-big-grid">
        <div class="score-big-box">
          <div class="score-big-label">⭐ Puntaje Total</div>
          <div class="score-big-num">${totalScore > 0 ? totalScore.toFixed(1) : '—'}</div>
          <div class="score-big-sub">${weekCount} semana${weekCount!==1?'s':''} acumuladas</div>
        </div>
        <div class="score-big-box">
          <div class="score-big-label">🎯 QA Acumulado</div>
          <div class="score-big-num" style="color:${qaTotal>0?'var(--gold)':'var(--text-dim)'}">${qaTotal > 0 ? qaTotal.toFixed(1) : '—'}</div>
          <div class="score-big-sub" style="color:${absTotal>=0?'#4ade80':'var(--red)'}">
            Ausent: ${absTotal >= 0 ? '+'+absTotal.toFixed(0) : absTotal.toFixed(0)} pts
          </div>
        </div>
      </div>
    </div>
  </div>`;

  // Weekly history
  if (weeklyQA.length > 0) {
    const maxQA = Math.max(...weeklyQA.map(w => w.qaScore), 1);
    html += `<div class="detail-card">
      <div class="sec-title-bar">📅 Historial semanal QA</div>
      <div class="sec-body">
        <div class="hist-chart">
          ${weeklyQA.map(w => {
            const h = Math.round(w.qaScore / 100 * 46);
            const color = w.qaScore >= 85 ? '#4ade80' : w.qaScore >= 70 ? '#fbbf24' : '#f87171';
            return `<div class="hist-bar-wrap">
              <div class="hist-val">${w.qaScore.toFixed(0)}</div>
              <div class="hist-bar" style="height:${h}px;background:${color}"></div>
              <div class="hist-label">${(w.date||'').substring(5,10)}</div>
            </div>`;
          }).join('')}
        </div>
      </div>
    </div>`;
  }

  // QA breakdown (last week)
  const lastWeekQA = weeklyQA[weeklyQA.length - 1];
  if (lastWeekQA?.metrics?.length) {
    const QA_DISPLAY = [
      {name:'Picking Time', maxPts:30, idx:0},
      {name:'Cancel Rate',  maxPts:20, idx:2},
      {name:'Defect Rate',  maxPts:20, idx:6},
      {name:'SO Ops',       maxPts:30, idx:3},
    ];
    const lastQAData = (qaData[k]||[]).filter(e => e.weekDate >= TOURNAMENT_START).sort((a,b)=>b.weekDate-a.weekDate)[0];
    if (lastQAData) {
      html += `<div class="detail-card">
        <div class="sec-title-bar">📊 QA Última semana <span style="font-weight:400;font-size:10px;margin-left:4px">${lastWeekQA.date}</span></div>
        <div class="sec-body">
          ${lastQAData.metrics.map(m => {
            const barColor = m.score >= 25 ? '#4ade80' : m.score >= 15 ? '#fbbf24' : '#f87171';
            const barW = Math.min(m.score / m.maxPts * 100, 100);
            return `<div class="qa-metric-row">
              <div class="qa-metric-name">${m.name} <span class="qa-metric-weight">${m.maxPts}pts</span></div>
              <div class="qa-bar-track"><div class="qa-bar-fill" style="width:${barW}%;background:${barColor}"></div></div>
              <div class="qa-metric-pts" style="color:${barColor}">${m.score.toFixed(1)}</div>
            </div>`;
          }).join('')}
        </div>
      </div>`;
    }
  }

  // Absences
  if (absEntries.length > 0) {
    html += `<div class="detail-card">
      <div class="sec-title-bar">📋 Ausentismo por semana</div>
      <div class="sec-body">
        ${absEntries.map(a => `<div class="abs-row">
          <div class="abs-week">${a.semana}</div>
          <div style="display:flex;gap:12px;align-items:center">
            ${a.favor > 0 ? `<span style="font-size:11px;color:#4ade80">+${a.favor} ✓</span>` : ''}
            ${a.contra < 0 ? `<span style="font-size:11px;color:var(--red)">${a.contra} ✗</span>` : ''}
            <div class="abs-pts ${a.net > 0 ? 'pos' : a.net < 0 ? 'neg' : 'zero'}">${a.net >= 0 ? '+' : ''}${a.net}</div>
          </div>
        </div>`).join('')}
        <div style="padding-top:8px;text-align:right;font-size:12px;font-weight:700;color:${absTotal>=0?'#4ade80':'var(--red)'}">
          Total ausentismo: ${absTotal >= 0 ? '+' : ''}${absTotal.toFixed(0)} pts
        </div>
      </div>
    </div>`;
  }

  html += '<div style="height:24px"></div>';
  cont.innerHTML = html;
}

// ============================================================
// EVENTS
// ============================================================
document.getElementById('sel-pais').addEventListener('change', e => {
  state.pais = e.target.value; state.grupo = ''; state.tienda = '';
  rebuildGrupo(); rebuildTienda(); renderStandings();
});
document.getElementById('sel-grupo').addEventListener('change', e => {
  state.grupo = e.target.value; state.tienda = '';
  rebuildTienda(); renderStandings();
});
document.getElementById('sel-tienda').addEventListener('change', e => {
  state.tienda = e.target.value;
  if (state.tienda) renderDetail(state.tienda);
  else renderStandings();
});

// ============================================================
// LOAD
// ============================================================
const safeFetch = url => fetch(url)
  .then(r => {
    if (!r.ok) { console.warn('[fetch 404]', url.substring(0,80)); return ''; }
    return r.text();
  })
  .catch(e => { console.warn('[fetch error]', e.message); return ''; });

async function loadAll() {
  document.getElementById('loading').style.display = 'block';
  try {
    const [qaTxt, absTxt] = await Promise.all([
      safeFetch(csvUrl(GID.qa)),
      safeFetch(csvUrl(GID.ausentismo)),
    ]);

    if (qaTxt) processQA(qaTxt);
    if (absTxt) processAusentismo(absTxt);
    computeScores();
    dataLoaded = true;

    // Set header week from QA
    const latestDates = Object.values(qaData)
      .flatMap(arr => arr.map(e => e.weekDate.toISOString().substring(0,10)))
      .sort();
    if (latestDates.length) {
      document.getElementById('header-week').textContent = 'Sem ' + latestDates[latestDates.length-1];
    } else {
      document.getElementById('header-week').textContent = 'Sin datos QA aún';
    }

    buildFilters();
    document.getElementById('loading').style.display = 'none';
    renderStandings();
  } catch(e) {
    const el = document.getElementById('loading');
    el.innerHTML = `<div style="font-size:24px;margin-bottom:8px">⚠️</div>Error al cargar.<br><span style="font-size:11px;color:#666">${e.message}</span>`;
  }
}

loadAll();
</script>
</body>
</html>
