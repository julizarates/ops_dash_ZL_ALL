<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QA Pickers — TurboOps CO</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F2F0EB;
  --card:#FFFFFF;
  --border:#E4E1D9;
  --text:#0D0D0D;
  --muted:#8A8780;
  --gold:#C9860A;
  --gold-bg:#FDF3DC;
  --gold-border:#F0CF80;
  --silver:#5A6B7A;
  --silver-bg:#EDF1F5;
  --silver-border:#B8C8D5;
  --bronze:#7A4E2D;
  --bronze-bg:#F5EDE6;
  --bronze-border:#D4A882;
  --red:#D13C2B;
  --red-bg:#FCEAE8;
  --amber:#C07000;
  --green:#2A7A4A;
  --green-bg:#E6F4EC;
  --blue:#1A5FA8;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;font-size:13px;min-height:100vh}

/* HEADER */
.hdr{background:var(--text);color:#fff;padding:14px 28px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.logo{font-size:15px;font-weight:800;letter-spacing:2px;text-transform:uppercase}
.logo span{color:#F0CF80}
.hdr-meta{display:flex;align-items:center;gap:14px}
.dot{width:6px;height:6px;border-radius:50%;background:#444;transition:background .3s}
.dot.ok{background:#4CAF50}
.upd{font-size:10px;color:#888;font-family:'DM Mono',monospace}
.btn-r{font-size:11px;font-weight:600;padding:5px 14px;border:1px solid #333;border-radius:4px;background:transparent;color:#ccc;cursor:pointer;font-family:'Syne',sans-serif;letter-spacing:.5px;text-transform:uppercase;transition:all .15s}
.btn-r:hover{background:#1a1a1a;color:#fff;border-color:#555}

/* CONTROLS */
.controls{background:var(--card);border-bottom:1px solid var(--border);padding:14px 28px;display:flex;gap:14px;align-items:center;flex-wrap:wrap}
.ctrl-lbl{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted)}
.search-wrap{position:relative;flex:1;min-width:200px;max-width:320px}
.search-wrap input{width:100%;padding:7px 12px 7px 32px;border:1.5px solid var(--border);border-radius:6px;font-family:'Syne',sans-serif;font-size:12px;background:var(--bg);color:var(--text);outline:none;transition:border-color .15s}
.search-wrap input:focus{border-color:var(--text)}
.search-wrap::before{content:'⌕';position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:14px}
select.ctrl{font-family:'Syne',sans-serif;font-size:12px;font-weight:500;background:var(--bg);border:1.5px solid var(--border);color:var(--text);padding:7px 12px;border-radius:6px;cursor:pointer;outline:none;transition:border-color .15s}
select.ctrl:focus{border-color:var(--text)}
.filter-btns{display:flex;gap:6px;flex-wrap:wrap}
.fb{padding:5px 12px;border:1.5px solid var(--border);border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;background:var(--bg);color:var(--muted);font-family:'Syne',sans-serif;letter-spacing:.3px;transition:all .15s}
.fb:hover{border-color:var(--text);color:var(--text)}
.fb.on{background:var(--text);color:#fff;border-color:var(--text)}
.fb.gold.on{background:var(--gold);border-color:var(--gold);color:#fff}
.fb.silver.on{background:var(--silver);border-color:var(--silver);color:#fff}
.fb.bronze.on{background:var(--bronze);border-color:var(--bronze);color:#fff}

/* STATS BAR */
.stats-bar{background:var(--text);color:#fff;padding:10px 28px;display:flex;gap:28px;align-items:center;flex-wrap:wrap}
.sb{display:flex;flex-direction:column;gap:1px}
.sb-n{font-size:18px;font-weight:800;line-height:1;font-family:'DM Mono',monospace}
.sb-l{font-size:9px;letter-spacing:1px;text-transform:uppercase;color:#888}
.sb-sep{width:1px;height:28px;background:#333;flex-shrink:0}

/* LOADING / EMPTY */
.ld{display:flex;align-items:center;justify-content:center;gap:10px;padding:80px;color:var(--muted)}
.sp{width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--text);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.empty-state{text-align:center;padding:80px 28px;color:var(--muted)}
.empty-state h2{font-size:18px;font-weight:700;margin-bottom:8px;color:var(--text)}

/* MAIN GRID */
.main{padding:24px 28px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px}

/* PICKER CARD */
.pk-card{background:var(--card);border:1.5px solid var(--border);border-radius:12px;overflow:hidden;transition:box-shadow .2s,transform .2s;cursor:pointer}
.pk-card:hover{box-shadow:0 6px 24px rgba(0,0,0,.1);transform:translateY(-2px)}
.pk-card.gold-card{border-color:var(--gold-border);background:linear-gradient(135deg,#fff 60%,var(--gold-bg))}
.pk-card.silver-card{border-color:var(--silver-border);background:linear-gradient(135deg,#fff 60%,var(--silver-bg))}
.pk-card.bronze-card{border-color:var(--bronze-border);background:linear-gradient(135deg,#fff 60%,var(--bronze-bg))}

.pk-head{padding:14px 16px 10px;display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
.pk-info{flex:1;min-width:0}
.pk-rank{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:3px;font-family:'DM Mono',monospace}
.pk-name{font-size:14px;font-weight:700;line-height:1.2;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pk-store{font-size:11px;color:var(--muted);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.badge{padding:4px 10px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;flex-shrink:0}
.badge.gold{background:var(--gold-bg);color:var(--gold);border:1px solid var(--gold-border)}
.badge.silver{background:var(--silver-bg);color:var(--silver);border:1px solid var(--silver-border)}
.badge.bronze{background:var(--bronze-bg);color:var(--bronze);border:1px solid var(--bronze-border)}

.pk-score{padding:4px 16px 12px;display:flex;align-items:center;gap:10px}
.score-num{font-size:32px;font-weight:800;line-height:1;font-family:'DM Mono',monospace}
.score-num.gold{color:var(--gold)}
.score-num.silver{color:var(--silver)}
.score-num.bronze{color:var(--bronze)}
.score-bar-wrap{flex:1}
.score-label{font-size:9px;letter-spacing:.8px;text-transform:uppercase;color:var(--muted);margin-bottom:4px}
.score-bar{height:6px;background:var(--bg);border-radius:3px;overflow:hidden}
.score-fill{height:6px;border-radius:3px;transition:width .6s}

.pk-metrics{display:grid;grid-template-columns:repeat(4,1fr);border-top:1px solid var(--border)}
.pm{padding:10px 8px;border-right:1px solid var(--border);text-align:center}
.pm:last-child{border-right:none}
.pm-icon{font-size:14px;margin-bottom:3px}
.pm-val{font-size:14px;font-weight:700;font-family:'DM Mono',monospace;line-height:1}
.pm-val.bad{color:var(--red)}
.pm-val.ok{color:var(--green)}
.pm-val.warn{color:var(--amber)}
.pm-lbl{font-size:9px;color:var(--muted);letter-spacing:.5px;margin-top:2px;text-transform:uppercase}

.pk-foot{padding:8px 16px;border-top:1px solid var(--border);background:var(--bg);display:flex;gap:6px;flex-wrap:wrap}
.flag{font-size:10px;padding:2px 7px;border-radius:4px;font-weight:600}
.flag.red{background:var(--red-bg);color:var(--red)}
.flag.green{background:var(--green-bg);color:var(--green)}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:none;align-items:center;justify-content:center;padding:20px}
.modal-bg.on{display:flex}
.modal{background:var(--card);border-radius:14px;width:100%;max-width:500px;max-height:90vh;overflow-y:auto}
.modal-head{padding:20px 22px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-title{font-size:16px;font-weight:700}
.modal-close{font-size:20px;cursor:pointer;color:var(--muted);line-height:1;background:none;border:none;font-family:'Syne',sans-serif}
.modal-body{padding:20px 22px}
.modal-section{margin-bottom:18px}
.modal-section-title{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:10px}
.modal-metric{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--bg)}
.modal-metric:last-child{border-bottom:none}
.mm-label{font-size:12px;font-weight:500}
.mm-val{font-size:13px;font-weight:700;font-family:'DM Mono',monospace}
.mm-bar{width:80px;height:4px;background:var(--bg);border-radius:2px;margin:0 10px}
.mm-bar-f{height:4px;border-radius:2px}

@media(max-width:600px){
  .hdr{padding:10px 16px}
  .controls{padding:10px 16px;gap:8px}
  .main{padding:16px}
  .stats-bar{padding:8px 16px;gap:14px}
  .grid{grid-template-columns:1fr}
}
</style>
</head>
<body>

<div class="hdr">
  <div class="logo">Turbo<span>Ops</span> · QA Pickers</div>
  <div class="hdr-meta">
    <span class="dot" id="dot"></span>
    <span class="upd" id="upd">Cargando...</span>
    <button class="btn-r" onclick="loadAll()">↺ Refrescar</button>
  </div>
</div>

<div class="controls">
  <span class="ctrl-lbl">Tienda</span>
  <select class="ctrl" id="f-store" onchange="render()"><option value="">Todas</option></select>
  <div class="search-wrap">
    <input type="text" id="f-search" placeholder="Buscar picker..." oninput="render()">
  </div>
  <div class="filter-btns">
    <button class="fb on" onclick="toggleFilter('all',this)">Todos</button>
    <button class="fb gold" onclick="toggleFilter('Oro',this)">🥇 Oro</button>
    <button class="fb silver" onclick="toggleFilter('Plata',this)">🥈 Plata</button>
    <button class="fb bronze" onclick="toggleFilter('Bronce',this)">🥉 Bronce</button>
  </div>
</div>

<div class="stats-bar" id="stats-bar" style="display:none">
  <div class="sb"><div class="sb-n" id="sb-total">—</div><div class="sb-l">Pickers</div></div>
  <div class="sb-sep"></div>
  <div class="sb"><div class="sb-n" style="color:#F0CF80" id="sb-gold">—</div><div class="sb-l">Oro</div></div>
  <div class="sb"><div class="sb-n" style="color:#B8C8D5" id="sb-silver">—</div><div class="sb-l">Plata</div></div>
  <div class="sb"><div class="sb-n" style="color:#D4A882" id="sb-bronze">—</div><div class="sb-l">Bronce</div></div>
  <div class="sb-sep"></div>
  <div class="sb"><div class="sb-n" style="color:#F0CF80" id="sb-store">CO</div><div class="sb-l">País</div></div>
</div>

<div class="ld" id="gld"><div class="sp"></div>Cargando datos...</div>
<div class="empty-state" id="empty-state" style="display:none"><h2>Sin resultados</h2><p>Prueba con otro filtro o búsqueda</p></div>
<div class="main" id="main" style="display:none">
  <div class="grid" id="grid"></div>
</div>

<!-- MODAL DETALLE -->
<div class="modal-bg" id="modal" onclick="closeModal(event)">
  <div class="modal" id="modal-box">
    <div class="modal-head">
      <div>
        <div class="modal-title" id="m-name">—</div>
        <div style="font-size:11px;color:var(--muted);margin-top:2px" id="m-store">—</div>
      </div>
      <button class="modal-close" onclick="document.getElementById('modal').classList.remove('on')">×</button>
    </div>
    <div class="modal-body" id="m-body"></div>
  </div>
</div>

<script>
const COUNTRY='CO';
const SID='1ieRuWkk5BxJKRFEJSHeSJuyHcnzjOyOP6l0xzOMqD8U';
const API_KEY='AIzaSyAttY6mdOrj4ic3vYCyuFpAkiYx9HFrasg';
const SHEETS={def:'Defectos',so:'Stockouts',can:'Cancelaciones',tiem:'Tiempos'};
let D={def:[],so:[],can:[],tiem:[]};
let pickers=[];
let filterCluster='all';

async function fetchSheet(g){
  const url=`https://sheets.googleapis.com/v4/spreadsheets/${SID}/values/${encodeURIComponent(SHEETS[g])}?key=${API_KEY}`;
  const r=await fetch(url);
  if(!r.ok)throw new Error('HTTP '+r.status);
  const json=await r.json();
  const rows=json.values||[];
  const known=['SEMANA','FECHA','COUNTRY','COUNTRY_CODE','TICKETS','ORDENES','AVG_PICK_PACK'];
  let hi=rows.findIndex(row=>row.some(c=>known.includes((c||'').toString().trim().toUpperCase())));
  if(hi===-1)hi=0;
  const hdrs=rows[hi];
  return rows.slice(hi+1).filter(row=>row.some(c=>c&&c.toString().trim())).map(row=>{
    const o={};hdrs.forEach((h,i)=>o[h.trim()]=(row[i]||'').toString().trim());
    if(o.SEMANA)o.SEMANA=o.SEMANA.split(' ')[0].split('T')[0];
    if(o.FECHA)o.FECHA=o.FECHA.split(' ')[0].split('T')[0];
    return o;
  });
}

async function loadAll(){
  document.getElementById('dot').className='dot';
  document.getElementById('upd').textContent='Cargando...';
  document.getElementById('gld').style.display='flex';
  document.getElementById('main').style.display='none';
  document.getElementById('stats-bar').style.display='none';
  try{
    const[def,so,can,tiem]=await Promise.all([fetchSheet('def'),fetchSheet('so'),fetchSheet('can'),fetchSheet('tiem')]);
    D={
      def:def.filter(r=>(r.COUNTRY_CODE||r.COUNTRY)===COUNTRY),
      so:so.filter(r=>r.COUNTRY===COUNTRY),
      can:can.filter(r=>r.COUNTRY===COUNTRY),
      tiem:tiem.filter(r=>r.COUNTRY===COUNTRY)
    };
    buildPickers();
    buildStoreFilter();
    document.getElementById('gld').style.display='none';
    document.getElementById('stats-bar').style.display='flex';
    document.getElementById('main').style.display='block';
    document.getElementById('dot').className='dot ok';
    document.getElementById('upd').textContent='Actualizado '+new Date().toLocaleTimeString('es',{hour:'2-digit',minute:'2-digit'});
  }catch(e){
    document.getElementById('gld').innerHTML=`<span style="color:var(--red)">Error: ${e.message}</span>`;
  }
}

function getWeeks(){
  return[...new Set([...D.def,...D.so,...D.can,...D.tiem].map(r=>r.SEMANA).filter(Boolean))].sort().reverse();
}

function buildPickers(){
  const weeks=getWeeks();
  const curW=weeks[0]||'';
  // Semana actual
  const defCur=D.def.filter(r=>r.SEMANA===curW);
  const soCur=D.so.filter(r=>r.SEMANA===curW);
  const canCur=D.can.filter(r=>r.SEMANA===curW);
  const tiemCur=D.tiem.filter(r=>r.SEMANA===curW);

  // Agregar métricas por picker
  const map={};

  defCur.forEach(r=>{
    const p=r.TOP_PICKER; if(!p||p==='—')return;
    const k=`${r.WAREHOUSENAME}||${p}`;
    if(!map[k])map[k]={name:p,store:r.WAREHOUSENAME,def:0,defRows:0,so:0,can:0,pp:[],orders:0};
    map[k].def+=+r.TICKETS||0;
    map[k].defRows++;
    map[k].orders+=+r.ORDENES||0;
  });

  soCur.forEach(r=>{
    const p=r.TOP_PICKER; if(!p||p==='—')return;
    const k=`${r.WAREHOUSENAME}||${p}`;
    if(!map[k])map[k]={name:p,store:r.WAREHOUSENAME,def:0,defRows:0,so:0,can:0,pp:[],orders:0};
    map[k].so+=+r.ORDENES||0;
  });

  canCur.forEach(r=>{
    const p=r.TOP_PICKER; if(!p||p==='—')return;
    const k=`${r.WAREHOUSENAME}||${p}`;
    if(!map[k])map[k]={name:p,store:r.WAREHOUSENAME,def:0,defRows:0,so:0,can:0,pp:[],orders:0};
    map[k].can+=+r.ORDENES||0;
  });

  tiemCur.forEach(r=>{
    const p=r.TOP_PICKER_LENTO; if(!p||p==='—')return;
    const k=`${r.WAREHOUSENAME}||${p}`;
    if(!map[k])map[k]={name:p,store:r.WAREHOUSENAME,def:0,defRows:0,so:0,can:0,pp:[],orders:0};
    if(r.AVG_PICK_PACK)map[k].pp.push(parseFloat(r.AVG_PICK_PACK));
  });

  // Calcular score QA por picker
  const all=Object.values(map).filter(p=>p.name&&p.store);

  // Normalizar métricas para scoring
  const maxDef=Math.max(...all.map(p=>p.def),1);
  const maxSO=Math.max(...all.map(p=>p.so),1);
  const maxCan=Math.max(...all.map(p=>p.can),1);
  const maxPP=Math.max(...all.map(p=>p.pp.length?p.pp.reduce((s,v)=>s+v,0)/p.pp.length:0),1);
  const maxOrd=Math.max(...all.map(p=>p.orders),1);

  pickers=all.map(p=>{
    const avgPP=p.pp.length?p.pp.reduce((s,v)=>s+v,0)/p.pp.length:0;

    // Score: menos defectos/SO/cancel/tiempo = mejor
    // Cada métrica pesa 20%, score de 0-100
    const sDef=Math.round((1-p.def/maxDef)*25);
    const sSO=Math.round((1-p.so/maxSO)*25);
    const sCan=Math.round((1-p.can/maxCan)*20);
    const sPP=avgPP>0?Math.round((1-avgPP/maxPP)*20):20;
    const sOrd=Math.round((p.orders/maxOrd)*10);

    const score=sDef+sSO+sCan+sPP+sOrd;
    const cluster=score>=80?'Oro':score>=55?'Plata':'Bronce';

    return{...p,avgPP,score,cluster,sDef,sSO,sCan,sPP,sOrd};
  }).sort((a,b)=>b.score-a.score);

  render();
}

function buildStoreFilter(){
  const stores=[...new Set(pickers.map(p=>p.store))].sort();
  const sel=document.getElementById('f-store');
  sel.innerHTML='<option value="">Todas las tiendas</option>';
  stores.forEach(s=>{const o=document.createElement('option');o.value=s;o.textContent=s;sel.appendChild(o);});
}

function render(){
  const store=document.getElementById('f-store').value;
  const search=document.getElementById('f-search').value.toLowerCase().trim();

  let filtered=pickers.filter(p=>{
    if(store&&p.store!==store)return false;
    if(search&&!p.name.toLowerCase().includes(search)&&!p.store.toLowerCase().includes(search))return false;
    if(filterCluster!=='all'&&p.cluster!==filterCluster)return false;
    return true;
  });

  // Stats
  const gold=pickers.filter(p=>p.cluster==='Oro').length;
  const silver=pickers.filter(p=>p.cluster==='Plata').length;
  const bronze=pickers.filter(p=>p.cluster==='Bronce').length;
  document.getElementById('sb-total').textContent=pickers.length;
  document.getElementById('sb-gold').textContent=gold;
  document.getElementById('sb-silver').textContent=silver;
  document.getElementById('sb-bronze').textContent=bronze;

  const grid=document.getElementById('grid');
  const empty=document.getElementById('empty-state');

  if(!filtered.length){
    grid.innerHTML='';
    empty.style.display='block';
    return;
  }
  empty.style.display='none';

  grid.innerHTML=filtered.map((p,i)=>{
    const cls=p.cluster==='Oro'?'gold-card':p.cluster==='Plata'?'silver-card':'bronze-card';
    const scoreCls=p.cluster==='Oro'?'gold':p.cluster==='Plata'?'silver':'bronze';
    const scoreColor=p.cluster==='Oro'?'var(--gold)':p.cluster==='Plata'?'var(--silver)':'var(--bronze)';
    const badgeEmoji=p.cluster==='Oro'?'🥇':p.cluster==='Plata'?'🥈':'🥉';
    const ppCls=p.avgPP>3?'bad':p.avgPP>2?'warn':'ok';
    const defCls=p.def>10?'bad':p.def>5?'warn':'ok';
    const soCls=p.so>10?'bad':p.so>5?'warn':'ok';
    const canCls=p.can>5?'bad':p.can>2?'warn':'ok';

    const flags=[];
    if(p.def>10)flags.push('<span class="flag red">Alto defectos</span>');
    if(p.so>10)flags.push('<span class="flag red">Alto SO</span>');
    if(p.can>5)flags.push('<span class="flag red">Altas cancel.</span>');
    if(p.avgPP>3)flags.push('<span class="flag red">Pick+Pack lento</span>');
    if(flags.length===0)flags.push('<span class="flag green">Sin alertas</span>');

    return`<div class="pk-card ${cls}" onclick="openModal(${i},${JSON.stringify(filtered).indexOf(JSON.stringify(p))})">
      <div class="pk-head">
        <div class="pk-info">
          <div class="pk-rank">#${i+1}</div>
          <div class="pk-name" title="${p.name}">${p.name}</div>
          <div class="pk-store">${p.store}</div>
        </div>
        <div class="badge ${scoreCls}">${badgeEmoji} ${p.cluster}</div>
      </div>
      <div class="pk-score">
        <div class="score-num ${scoreCls}">${p.score}</div>
        <div class="score-bar-wrap">
          <div class="score-label">QA Score / 100</div>
          <div class="score-bar"><div class="score-fill" style="width:${p.score}%;background:${scoreColor}"></div></div>
        </div>
      </div>
      <div class="pk-metrics">
        <div class="pm"><div class="pm-icon">🔴</div><div class="pm-val ${defCls}">${p.def}</div><div class="pm-lbl">Defectos</div></div>
        <div class="pm"><div class="pm-icon">🟠</div><div class="pm-val ${soCls}">${p.so}</div><div class="pm-lbl">Stockouts</div></div>
        <div class="pm"><div class="pm-icon">🔵</div><div class="pm-val ${canCls}">${p.can}</div><div class="pm-lbl">Cancel.</div></div>
        <div class="pm"><div class="pm-icon">⏱</div><div class="pm-val ${ppCls}">${p.avgPP>0?p.avgPP.toFixed(1)+'m':'—'}</div><div class="pm-lbl">P+P</div></div>
      </div>
      <div class="pk-foot">${flags.join('')}</div>
    </div>`;
  }).join('');
}

function openModal(idx,globalIdx){
  const store=document.getElementById('f-store').value;
  const search=document.getElementById('f-search').value.toLowerCase().trim();
  let filtered=pickers.filter(p=>{
    if(store&&p.store!==store)return false;
    if(search&&!p.name.toLowerCase().includes(search))return false;
    if(filterCluster!=='all'&&p.cluster!==filterCluster)return false;
    return true;
  });
  const p=filtered[idx];
  if(!p)return;

  document.getElementById('m-name').textContent=p.name;
  document.getElementById('m-store').textContent=p.store+' · CO';

  const scoreColor=p.cluster==='Oro'?'var(--gold)':p.cluster==='Plata'?'var(--silver)':'var(--bronze)';
  const metrics=[
    {l:'Defectos (tickets)',v:p.def,max:50,color:'var(--red)',inv:true},
    {l:'Stockouts Ops',v:p.so,max:50,color:'var(--amber)',inv:true},
    {l:'Cancelaciones',v:p.can,max:30,color:'var(--blue)',inv:true},
    {l:'Avg Pick+Pack (min)',v:p.avgPP>0?p.avgPP.toFixed(2)+'m':'—',max:5,color:'var(--green)',inv:true,raw:p.avgPP},
    {l:'Órdenes afectadas',v:p.orders,max:100,color:'var(--muted)',inv:false},
    {l:'QA Score',v:p.score+'/100',max:100,color:scoreColor,inv:false,raw:p.score},
  ];

  document.getElementById('m-body').innerHTML=`
    <div class="modal-section">
      <div class="modal-section-title">Resumen semana actual</div>
      ${metrics.map(m=>{
        const raw=m.raw!==undefined?m.raw:(typeof m.v==='number'?m.v:0);
        const pct=Math.min(100,Math.round((m.inv?1-raw/m.max:raw/m.max)*100));
        return`<div class="modal-metric">
          <span class="mm-label">${m.l}</span>
          <div class="mm-bar"><div class="mm-bar-f" style="width:${Math.max(pct,2)}%;background:${m.color}"></div></div>
          <span class="mm-val">${m.v}</span>
        </div>`;
      }).join('')}
    </div>
    <div class="modal-section">
      <div class="modal-section-title">Desglose del score</div>
      ${[
        {l:'Defectos (25 pts)',v:p.sDef,max:25},
        {l:'Stockouts (25 pts)',v:p.sSO,max:25},
        {l:'Cancelaciones (20 pts)',v:p.sCan,max:20},
        {l:'Pick+Pack (20 pts)',v:p.sPP,max:20},
        {l:'Flujo órdenes (10 pts)',v:p.sOrd,max:10},
      ].map(m=>`<div class="modal-metric">
        <span class="mm-label">${m.l}</span>
        <div class="mm-bar"><div class="mm-bar-f" style="width:${Math.round(m.v/m.max*100)}%;background:${scoreColor}"></div></div>
        <span class="mm-val">${m.v}/${m.max}</span>
      </div>`).join('')}
    </div>`;

  document.getElementById('modal').classList.add('on');
}

function closeModal(e){
  if(e.target===document.getElementById('modal'))
    document.getElementById('modal').classList.remove('on');
}

function toggleFilter(cluster,btn){
  filterCluster=cluster;
  document.querySelectorAll('.fb').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  render();
}

loadAll();
</script>
</body>
</html>
