<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pigeon · Antes vs Después</title>
<link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#F0EFEB;color:#111;font-family:'Figtree',sans-serif;font-size:14px;line-height:1.4;min-height:100vh}

.hdr{background:#fff;border-bottom:2px solid #E5E4DF;padding:12px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.logo{font-size:20px;font-weight:900;letter-spacing:-.5px}.logo b{color:#E24B4A}
.tags{display:flex;gap:6px;align-items:center;margin-left:10px}
.tag{font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;padding:3px 9px;border-radius:7px;border:1px solid}
.tag-evo{background:#FFF8E1;color:#E65100;border-color:#FFE082}
.hdr-r{display:flex;align-items:center;gap:10px}
.live{display:flex;align-items:center;gap:5px;font-size:12px;color:#999}
.dot{width:8px;height:8px;border-radius:50%;background:#ccc}.dot.ok{background:#4CAF50}
.btn{font-size:12px;font-weight:700;padding:6px 14px;border:1.5px solid #DDD;border-radius:8px;background:#fff;cursor:pointer;font-family:'Figtree',sans-serif}.btn:hover{background:#F5F4F0}

/* FILTROS */
.filters{background:#fff;border-bottom:2px solid #E5E4DF;padding:9px 24px;display:flex;align-items:flex-end;gap:14px;flex-wrap:wrap;position:sticky;top:58px;z-index:49}
.filter-col{display:flex;flex-direction:column;gap:4px}
.filter-label{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.8px;color:#bbb}
.metric-pills{display:flex;gap:5px;flex-wrap:wrap}
.mpill{font-size:11px;font-weight:700;padding:4px 11px;border-radius:7px;border:1.5px solid #E5E4DF;background:#F5F4F0;color:#888;cursor:pointer;transition:all .12s}
.mpill:hover{border-color:#bbb;color:#444}
.mpill.on{color:#fff}
.sep-v{width:1px;background:#E5E4DF;align-self:stretch;margin:0 2px}

/* DROPDOWN */
.ms-wrap{position:relative}
.ms-trigger{display:flex;align-items:center;gap:7px;padding:5px 11px;border:1.5px solid #E5E4DF;border-radius:8px;background:#fff;cursor:pointer;font-size:12px;font-weight:700;color:#555;font-family:'Figtree',sans-serif;min-width:140px}
.ms-trigger:hover{border-color:#bbb}
.ms-trigger.open{border-color:#888}
.ms-arrow{font-size:9px;color:#bbb;margin-left:auto;transition:transform .15s}
.ms-trigger.open .ms-arrow{transform:rotate(180deg)}
.ms-badge{background:#E24B4A;color:#fff;border-radius:99px;font-size:9px;font-weight:800;padding:1px 5px}
.ms-dropdown{position:absolute;top:calc(100% + 3px);left:0;min-width:100%;max-height:260px;overflow-y:auto;background:#fff;border:1.5px solid #E5E4DF;border-radius:9px;box-shadow:0 8px 24px rgba(0,0,0,.1);z-index:200;display:none}
.ms-dropdown.open{display:block}
.ms-search{padding:7px 9px;border-bottom:1px solid #F0EFEB}
.ms-search input{width:100%;border:1.5px solid #E5E4DF;border-radius:6px;padding:4px 8px;font-size:11px;font-family:'Figtree',sans-serif;outline:none}
.ms-search input:focus{border-color:#aaa}
.ms-actions{display:flex;border-bottom:1px solid #F0EFEB}
.ms-act-btn{flex:1;padding:5px;font-size:10px;font-weight:700;color:#888;background:none;border:none;cursor:pointer;font-family:'Figtree',sans-serif}
.ms-act-btn:hover{color:#333}
.ms-act-btn+.ms-act-btn{border-left:1px solid #F0EFEB}
.ms-item{display:flex;align-items:center;gap:8px;padding:6px 11px;cursor:pointer;font-size:11px;font-weight:600;color:#444}
.ms-item:hover{background:#F5F4F0}
.ms-item.checked{font-weight:700;color:#111}
.ms-chk{width:13px;height:13px;border-radius:3px;border:1.5px solid #DDD;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:8px}
.ms-item.checked .ms-chk{border-color:var(--cc,#555);background:var(--cc,#555);color:#fff}
.ms-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.ms-divider{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.7px;color:#bbb;padding:7px 11px 3px}

.wrap{padding:16px 24px 40px;max-width:1400px;margin:0 auto}
.ld{display:flex;align-items:center;justify-content:center;gap:12px;padding:80px;color:#aaa;font-size:16px}
.sp{width:20px;height:20px;border:3px solid #E0DFD9;border-top-color:#E24B4A;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.err{background:#FFF5F5;border:2px solid #F7C1C1;border-radius:10px;padding:14px 18px;color:#A32D2D;font-weight:600;margin:16px 24px}

.sec-title{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.8px;color:#bbb;margin-bottom:10px;margin-top:20px;padding-left:2px}
.sec-title:first-child{margin-top:0}

/* RESUMEN GLOBAL */
.global-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px}
@media(max-width:900px){.global-row{grid-template-columns:repeat(2,1fr)}}
.gkpi{background:#fff;border:2px solid #E5E4DF;border-radius:12px;padding:14px 16px;position:relative;overflow:hidden}
.gkpi::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--c,#ccc);border-radius:2px 0 0 2px}
.gkpi-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:#aaa;margin-bottom:6px}
.gkpi-row{display:flex;align-items:flex-end;gap:12px}
.gkpi-before{text-align:center}
.gkpi-after{text-align:center}
.gkpi-arrow{font-size:20px;margin-bottom:4px;line-height:1}
.gkpi-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#bbb;margin-bottom:2px}
.gkpi-num{font-size:22px;font-weight:900;letter-spacing:-1px;line-height:1}
.gkpi-delta{font-size:13px;font-weight:800;margin-top:4px}
.gkpi-stores{font-size:10px;color:#bbb;margin-top:6px}

/* SECCIONES POR PAÍS */
.country-block{margin-bottom:28px}
.country-hdr{display:flex;align-items:center;gap:10px;margin-bottom:12px;padding-bottom:10px;border-bottom:2px solid #E5E4DF}
.c-badge{font-size:13px;font-weight:800;padding:4px 14px;border-radius:99px;color:#fff}
.c-summary{display:flex;gap:16px;flex-wrap:wrap}
.c-stat{display:flex;flex-direction:column}
.c-stat-lbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#bbb}
.c-stat-val{font-size:14px;font-weight:800;color:#333}

/* CHART por país (barras) + grid tiendas */
.country-content{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:900px){.country-content{grid-template-columns:1fr}}
.chart-card{background:#fff;border:2px solid #E5E4DF;border-radius:12px;padding:16px 18px}
.chart-card-title{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.6px;color:#888;margin-bottom:12px}

/* TABLA DE TIENDAS */
.stores-table-wrap{background:#fff;border:2px solid #E5E4DF;border-radius:12px;overflow:hidden}
table{width:100%;border-collapse:collapse;font-size:12px}
th{padding:8px 10px;text-align:right;color:#aaa;font-size:9px;border-bottom:2px solid #E5E4DF;font-weight:700;text-transform:uppercase;letter-spacing:.5px;background:#FAFAF8}
th:first-child{text-align:left}
td{padding:7px 10px;text-align:right;border-bottom:1px solid #F0EFEB;font-weight:600;font-size:12px}
td:first-child{text-align:left}
tr:last-child td{border-bottom:none}
tr:hover td{background:#FAFAF8}
.badge{display:inline-block;padding:2px 7px;border-radius:99px;font-size:10px;font-weight:700}
.bco{background:#E3F2FD;color:#1565C0;border:1px solid #BBDEFB}
.bbr{background:#E8F5E9;color:#2E7D32;border:1px solid #C8E6C9}
.bpe{background:#FFF8E1;color:#E65100;border:1px solid #FFE082}
.bmx{background:#F3E5F5;color:#6A1B9A;border:1px solid #CE93D8}
.bcl{background:#FCE4EC;color:#880E4F;border:1px solid #F48FB1}

.delta-good{color:#2E7D32;font-weight:800}
.delta-bad {color:#A32D2D;font-weight:800}
.delta-neu {color:#aaa;font-weight:700}
.no-data{padding:32px;text-align:center;color:#aaa;font-size:13px}

/* Mini antes/después inline */
.ab-cell{display:flex;align-items:center;gap:5px;justify-content:flex-end}
.ab-before{color:#aaa}
.ab-arrow{color:#bbb;font-size:10px}
.ab-after{font-weight:800}
</style>
</head>
<body>

<div class="hdr">
  <div style="display:flex;align-items:center;flex-wrap:wrap;gap:6px">
    <span class="logo">Turbo<b>Ops</b></span>
    <div class="tags"><span class="tag tag-evo">🐦 Pigeon · Antes vs Después</span></div>
  </div>
  <div class="hdr-r">
    <span class="live"><span class="dot" id="dot"></span><span id="upd">Cargando...</span></span>
    <button class="btn" onclick="loadAll()">↺ Refrescar</button>
  </div>
</div>

<div class="filters" id="filters" style="display:none">
  <div class="filter-col">
    <div class="filter-label">Métrica principal</div>
    <div class="metric-pills" id="metric-pills"></div>
  </div>
  <div class="sep-v"></div>
  <div class="filter-col">
    <div class="filter-label">País</div>
    <div class="ms-wrap" id="ms-country">
      <button class="ms-trigger" onclick="toggleDD('ms-country')">
        <span id="ms-country-label">Todos</span><span class="ms-arrow">▼</span>
      </button>
      <div class="ms-dropdown" id="ms-country-dd"></div>
    </div>
  </div>
  <div class="sep-v"></div>
  <div class="filter-col" style="min-width:180px">
    <div class="filter-label">Tienda</div>
    <div class="ms-wrap" id="ms-store">
      <button class="ms-trigger" onclick="toggleDD('ms-store')">
        <span id="ms-store-label">Todas</span><span class="ms-arrow">▼</span>
      </button>
      <div class="ms-dropdown" id="ms-store-dd"></div>
    </div>
  </div>
</div>

<div class="ld" id="gld"><div class="sp"></div>Leyendo datos...</div>
<div class="err" id="err" style="display:none"></div>

<div class="wrap" id="app" style="display:none">
  <div class="sec-title">🌍 Resumen global — todas las tiendas</div>
  <div class="global-row" id="global-row"></div>
  <div id="countries-area"></div>
</div>

<script>
const SID   = '1V2gV4YgV4FRwIAsNf6p-kv3Uy2wx5H7O3rInwZPTFsE';
const AKEY  = 'AIzaSyAttY6mdOrj4ic3vYCyuFpAkiYx9HFrasg';
const SHEET = 'pigeon';

const CM = {
  CO:{label:'🇨🇴 CO',color:'#1565C0',cls:'bco'},
  BR:{label:'🇧🇷 BR',color:'#2E7D32',cls:'bbr'},
  PE:{label:'🇵🇪 PE',color:'#E65100',cls:'bpe'},
  MX:{label:'🇲🇽 MX',color:'#6A1B9A',cls:'bmx'},
  CL:{label:'🇨🇱 CL',color:'#880E4F',cls:'bcl'},
};

const METRICS = [
  {key:'ctHO',   label:'CT Handover',      color:'#F4511E', unit:'min', hiLo:true},
  {key:'ctPP',   label:'CT Post-Pigeon',   color:'#00897B', unit:'min', hiLo:true},
  {key:'postPig',label:'Post-Pigeon',       color:'#FF8F00', unit:'min', hiLo:true},
  {key:'hoYa',   label:'HO RT ya en tienda',color:'#4CAF50', unit:'min', hiLo:true},
  {key:'hoNo',   label:'HO RT no llegado', color:'#E24B4A', unit:'min', hiLo:true},
];

let allData=[], charts={};
let activeMetric='ctHO';
let activeCountries=new Set(), activeStoreKeys=new Set();

const pf  = v=>{const n=parseFloat((v||'').toString().replace(',','.')); return isNaN(n)?null:n;};
const sum = a=>a.reduce((s,v)=>s+(v||0),0);
const fmt = (n,d=1)=>(n===null||n===undefined||isNaN(n))?'—':(+n).toFixed(d);
// wavg ponderado por pigeo
const wavg= (rows,field)=>{
  const v=rows.filter(r=>r.pigeo>0&&r[field]!==null&&!isNaN(r[field]));
  const tw=sum(v.map(r=>r.pigeo));
  return tw?v.reduce((s,r)=>s+r[field]*r.pigeo,0)/tw:null;
};

// "Antes" = filas donde oc_pigeon=0 (solo ventanilla, sin pigeon activo)
// "Después" = filas donde oc_pigeon>0
// Para tiempos de Pigeon (postPig, hoYa, hoNo, ctPP, ctHO) solo tiene sentido en "después"
// Para CT global (assign+picking) podemos comparar antes vs después de todas las órdenes
// Usaremos: ANTES = horas sin ningún pigeon, DESPUÉS = horas con pigeon
const getPhases = rows => ({
  antes:   rows.filter(r=>r.pigeo===0),
  despues: rows.filter(r=>r.pigeo>0),
});

async function fetchSheet(name){
  const r=await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SID}/values/${encodeURIComponent(name)}?key=${AKEY}`);
  if(!r.ok) throw new Error('HTTP '+r.status);
  const json=await r.json(), rows=json.values||[];
  const KNOWN=['HORA','FECHA','PAIS','COUNTRY','WAREHOUSE_ID','WAREHOUSEID','STORE_NAME',
    'TOTAL_OC','OC_VENTANILLA','OC_PIGEON','AVG_ASSING_MIN','AVG_PICKING_MIN','AVG_PACKING_MIN',
    'AVG_POST_PIGEON_MIN','AVG_HANDOVER_RT_YA_EN_TIENDA_MIN','AVG_HANDOVER_RT_NO_LLEGADO_MIN',
    'OC_RT_YA_EN_TIENDA','OC_RT_NO_LLEGADO',
    'AVG_CYCLE_TIME_POST_PIGEON_MIN','AVG_CYCLE_TIME_HANDOVER_MIN'];
  let hi=rows.findIndex(row=>row.some(c=>KNOWN.includes((c||'').toString().trim().toUpperCase())));
  if(hi<0) hi=0;
  const hdrs=rows[hi];
  return rows.slice(hi+1).filter(row=>row.some(c=>c&&c.toString().trim())).map(row=>{
    const o={}; hdrs.forEach((h,i)=>{o[h.trim().toUpperCase()]=(row[i]||'').toString().trim();}); return o;
  });
}

function parseHora(v){
  const s=(v||'').toString().trim();
  const tp=s.includes('T')?s.split('T')[1]:s.includes(' ')?s.split(' ')[1]:s;
  return parseInt(tp)||0;
}

function parseRows(raw){
  return raw.map(r=>{
    const country=r.PAIS||r.COUNTRY||'';
    const wh=r.WAREHOUSE_ID||r.WAREHOUSEID||'';
    return {
      country, wh, storeKey:country+'§'+wh,
      store: r.STORE_NAME||r.WAREHOUSE_NAME||wh,
      fecha: (r.FECHA||'').split(' ')[0].split('T')[0],
      hora:  parseHora(r.HORA),
      total: parseInt(r.TOTAL_OC)||0,
      vent:  parseInt(r.OC_VENTANILLA)||0,
      pigeo: parseInt(r.OC_PIGEON)||0,
      assign:  pf(r.AVG_ASSING_MIN),
      picking: pf(r.AVG_PICKING_MIN),
      packing: pf(r.AVG_PACKING_MIN),
      postPig: pf(r.AVG_POST_PIGEON_MIN),
      hoYa:    pf(r.AVG_HANDOVER_RT_YA_EN_TIENDA_MIN),
      hoNo:    pf(r.AVG_HANDOVER_RT_NO_LLEGADO_MIN),
      ocYa:    parseInt(r.OC_RT_YA_EN_TIENDA)||0,
      ocNo:    parseInt(r.OC_RT_NO_LLEGADO)||0,
      ctPP:    pf(r.AVG_CYCLE_TIME_POST_PIGEON_MIN),
      ctHO:    pf(r.AVG_CYCLE_TIME_HANDOVER_MIN),
    };
  }).filter(r=>r.fecha&&r.country);
}

// ── DROPDOWNS ────────────────────────────────────────
let openDD=null;
document.addEventListener('click',e=>{
  if(!e.target.closest('.ms-wrap')&&openDD){
    document.getElementById(openDD+'-dd').classList.remove('open');
    document.getElementById(openDD).querySelector('.ms-trigger').classList.remove('open');
    openDD=null;
  }
});
function toggleDD(id){
  const dd=document.getElementById(id+'-dd'), tr=document.getElementById(id).querySelector('.ms-trigger');
  if(openDD&&openDD!==id){document.getElementById(openDD+'-dd').classList.remove('open');document.getElementById(openDD).querySelector('.ms-trigger').classList.remove('open');}
  dd.classList.toggle('open'); tr.classList.toggle('open');
  openDD=dd.classList.contains('open')?id:null;
}
function setLbl(el,sel,total,all){const n=sel.size; el.innerHTML=(n===0||n===total)?all:`${n} sel. <span class="ms-badge">${n}</span>`;}

function buildCountryDD(){
  const countries=[...new Set(allData.map(r=>r.country))].sort();
  const dd=document.getElementById('ms-country-dd');
  dd.innerHTML=`<div class="ms-actions">
    <button class="ms-act-btn" onclick="selAllC()">Todo</button>
    <button class="ms-act-btn" onclick="clrAllC()">Limpiar</button>
  </div>`+countries.map(c=>{
    const m=CM[c]||{label:c,color:'#999'}; const on=activeCountries.has(c);
    return `<div class="ms-item${on?' checked':''}" style="--cc:${m.color}" onclick="toggleC('${c}')">
      <div class="ms-chk">${on?'✓':''}</div>
      <div class="ms-dot" style="background:${m.color}"></div><span>${m.label}</span>
    </div>`;
  }).join('');
  setLbl(document.getElementById('ms-country-label'),activeCountries,countries.length,'Todos los países');
}

function buildStoreDD(){
  const byC={};
  [...new Set(allData.map(r=>r.storeKey))].forEach(sk=>{
    const row=allData.find(r=>r.storeKey===sk); if(!row) return;
    if(!byC[row.country]) byC[row.country]=[];
    byC[row.country].push({sk,store:row.store});
  });
  const allSK=new Set(allData.map(r=>r.storeKey));
  let html=`<div class="ms-search"><input type="text" placeholder="Buscar..." oninput="filterDD('ms-store-dd',this.value)"></div>
    <div class="ms-actions">
      <button class="ms-act-btn" onclick="selAllS()">Todo</button>
      <button class="ms-act-btn" onclick="clrAllS()">Limpiar</button>
    </div>`;
  Object.keys(byC).sort().forEach(c=>{
    const m=CM[c]||{label:c,color:'#999'}; const cOn=activeCountries.has(c);
    html+=`<div class="ms-divider" style="color:${m.color}">${m.label}</div>`;
    byC[c].sort((a,b)=>a.store.localeCompare(b.store)).forEach(({sk,store})=>{
      const on=activeStoreKeys.has(sk);
      html+=`<div class="ms-item${on?' checked':''}" data-val="${store}" style="--cc:${m.color};${!cOn?'opacity:.3;pointer-events:none':''}" onclick="toggleS('${sk}')">
        <div class="ms-chk">${on?'✓':''}</div>
        <div class="ms-dot" style="background:${m.color}40;border:1.5px solid ${m.color}"></div><span>${store}</span>
      </div>`;
    });
  });
  document.getElementById('ms-store-dd').innerHTML=html;
  setLbl(document.getElementById('ms-store-label'),activeStoreKeys,allSK.size,'Todas las tiendas');
}

function filterDD(id,q){document.querySelectorAll(`#${id} .ms-item`).forEach(el=>{el.style.display=(el.dataset.val||'').toLowerCase().includes(q.toLowerCase())?'':'none';});}
function selAllC(){allData.forEach(r=>{activeCountries.add(r.country);activeStoreKeys.add(r.storeKey);}); buildCountryDD(); buildStoreDD(); renderApp();}
function clrAllC(){activeCountries.clear(); activeStoreKeys.clear(); buildCountryDD(); buildStoreDD(); renderApp();}
function selAllS(){allData.filter(r=>activeCountries.has(r.country)).forEach(r=>activeStoreKeys.add(r.storeKey)); buildStoreDD(); renderApp();}
function clrAllS(){activeStoreKeys.clear(); buildStoreDD(); renderApp();}
function toggleC(c){
  if(activeCountries.has(c)){activeCountries.delete(c); allData.filter(r=>r.country===c).forEach(r=>activeStoreKeys.delete(r.storeKey));}
  else{activeCountries.add(c); allData.filter(r=>r.country===c).forEach(r=>activeStoreKeys.add(r.storeKey));}
  buildCountryDD(); buildStoreDD(); renderApp();
}
function toggleS(sk){activeStoreKeys.has(sk)?activeStoreKeys.delete(sk):activeStoreKeys.add(sk); buildStoreDD(); renderApp();}

// ── METRIC PILLS ────────────────────────────────────
function buildMetricPills(){
  document.getElementById('metric-pills').innerHTML=METRICS.map(m=>`
    <button class="mpill${m.key===activeMetric?' on':''}" id="mp-${m.key}"
      style="${m.key===activeMetric?`background:${m.color};border-color:${m.color}`:''}"
      onclick="setM('${m.key}')">${m.label}</button>`).join('');
}
function setM(k){activeMetric=k; buildMetricPills(); renderApp();}

// ── CHART HELPERS ───────────────────────────────────
const GC='#E5E4DF', TC='#aaa';
const TIP={backgroundColor:'#fff',borderColor:'#E5E4DF',borderWidth:1,
  titleColor:'#111',bodyColor:'#555',
  titleFont:{family:'Figtree',size:11,weight:'bold'},bodyFont:{family:'Figtree',size:11}};

function mkBar(id, labels, before, after, color){
  if(charts[id]) charts[id].destroy();
  const el=document.getElementById(id); if(!el) return;
  charts[id]=new Chart(el,{type:'bar',data:{labels,datasets:[
    {label:'Antes (sin Pigeon)',data:before,backgroundColor:'rgba(180,180,180,.5)',borderColor:'#bbb',borderWidth:1,borderRadius:4},
    {label:'Después (con Pigeon)',data:after,backgroundColor:color+'BB',borderColor:color,borderWidth:1,borderRadius:4},
  ]},options:{
    responsive:true, maintainAspectRatio:false,
    plugins:{
      legend:{display:true,labels:{font:{family:'Figtree',size:11},color:'#555',boxWidth:11,padding:8}},
      tooltip:{...TIP,callbacks:{label:ctx=>` ${ctx.dataset.label}: ${fmt(ctx.parsed.y)} min`}}
    },
    scales:{
      x:{grid:{color:GC},ticks:{color:TC,font:{size:10,family:'Figtree'},maxRotation:35}},
      y:{grid:{color:GC},ticks:{color:TC,font:{size:10,family:'Figtree'}},min:0,
         title:{display:true,text:'minutos',color:TC,font:{family:'Figtree',size:10}}}
    }
  }});
}

// ── RENDER ──────────────────────────────────────────
function renderApp(){
  const fd=allData.filter(r=>activeCountries.has(r.country)&&activeStoreKeys.has(r.storeKey));
  if(!fd.length){
    document.getElementById('global-row').innerHTML='<div class="no-data" style="grid-column:1/-1">Sin datos</div>';
    document.getElementById('countries-area').innerHTML='';
    Object.values(charts).forEach(c=>c&&c.destroy()); charts={};
    return;
  }

  const mMeta=METRICS.find(m=>m.key===activeMetric)||METRICS[0];
  const {antes:gAntes, despues:gDespues}=getPhases(fd);

  // ── RESUMEN GLOBAL ──
  const gVAntes =wavg(gAntes, 'ctHO');   // siempre mostramos CT Handover en el resumen global
  const gVDesp  =wavg(gDespues, activeMetric);
  const gVDesp2 =wavg(gDespues, 'ctHO'); // para comparar misma métrica
  const gVAntes2=wavg(gAntes,   'ctHO');

  const pigs=fd.filter(r=>r.pigeo>0);
  const totPig=sum(pigs.map(r=>r.pigeo));
  const totOC =sum(fd.map(r=>r.total));
  const tiendas=[...new Set(pigs.map(r=>r.storeKey))].length;

  // 4 KPIs globales: CT Handover antes, CT Handover después (Pigeon), % mejora, OC Pigeon
  const delta=(gVAntes2!==null&&gVDesp2!==null)?(gVDesp2-gVAntes2):null;
  const deltaPct=delta!==null&&gVAntes2?(delta/gVAntes2*100):null;

  document.getElementById('global-row').innerHTML=`
    <div class="gkpi" style="--c:#78909C">
      <div class="gkpi-lbl">CT Handover — Antes (sin Pigeon)</div>
      <div class="gkpi-row">
        <div>
          <div class="gkpi-num" style="color:#78909C">${fmt(gVAntes2)} <span style="font-size:14px;font-weight:600;color:#aaa">min</span></div>
          <div style="font-size:10px;color:#bbb;margin-top:3px">horas sin órdenes Pigeon</div>
        </div>
      </div>
    </div>
    <div class="gkpi" style="--c:${mMeta.color}">
      <div class="gkpi-lbl">${mMeta.label} — Después (con Pigeon)</div>
      <div class="gkpi-row">
        <div>
          <div class="gkpi-num" style="color:${mMeta.color}">${fmt(gVDesp)} <span style="font-size:14px;font-weight:600;color:#aaa">min</span></div>
          <div style="font-size:10px;color:#bbb;margin-top:3px">horas con órdenes Pigeon activas</div>
        </div>
      </div>
    </div>
    <div class="gkpi" style="--c:${delta===null?'#aaa':delta<0?'#2E7D32':'#A32D2D'}">
      <div class="gkpi-lbl">Δ CT Handover (antes vs después)</div>
      <div class="gkpi-num" style="color:${delta===null?'#aaa':delta<0?'#2E7D32':'#A32D2D'}">
        ${delta===null?'—':(delta<0?'▼':'▲')+fmt(Math.abs(delta))}
        <span style="font-size:14px;font-weight:600;color:#aaa"> min</span>
      </div>
      <div style="font-size:11px;font-weight:700;margin-top:4px;color:${delta===null?'#aaa':delta<0?'#2E7D32':'#A32D2D'}">
        ${deltaPct===null?'':(deltaPct<0?'▼':'▲')+fmt(Math.abs(deltaPct))+'%'}
      </div>
      <div class="gkpi-stores" style="margin-top:4px">${tiendas} tiendas con Pigeon activo</div>
    </div>
    <div class="gkpi" style="--c:#4CAF50">
      <div class="gkpi-lbl">OC Pigeon totales</div>
      <div class="gkpi-num" style="color:#4CAF50">${totPig.toLocaleString('es')}</div>
      <div style="font-size:10px;color:#bbb;margin-top:3px">${totOC?(totPig/totOC*100).toFixed(1):0}% de ${totOC.toLocaleString('es')} órdenes totales</div>
    </div>`;

  // ── POR PAÍS ──
  const area=document.getElementById('countries-area');
  area.innerHTML='';
  Object.values(charts).forEach(c=>{try{c.destroy();}catch(e){}});
  charts={};

  const countries=[...new Set(fd.map(r=>r.country))].sort();

  countries.forEach(country=>{
    const cRows=fd.filter(r=>r.country===country);
    const meta=CM[country]||{label:country,color:'#999',cls:''};
    const {antes:cAntes,despues:cDesp}=getPhases(cRows);

    const cVA=wavg(cAntes,'ctHO');
    const cVD=wavg(cDesp,activeMetric);
    const cVD2=wavg(cDesp,'ctHO');
    const cDelta=(cVA!==null&&cVD2!==null)?cVD2-cVA:null;
    const cPct=cDelta!==null&&cVA?(cDelta/cVA*100):null;
    const cPig=sum(cDesp.map(r=>r.pigeo));

    // Tiendas de este país
    const storeKeys=[...new Set(cRows.map(r=>r.storeKey))].sort();
    const storeRows=storeKeys.map(sk=>{
      const sRows=cRows.filter(r=>r.storeKey===sk);
      const {antes:sA,despues:sD}=getPhases(sRows);
      const sName=cRows.find(r=>r.storeKey===sk)?.store||sk;
      const vA=wavg(sA,'ctHO');
      const vD=wavg(sD,activeMetric);
      const vD2=wavg(sD,'ctHO');
      const vPP=wavg(sD,'ctPP');
      const vPig=sum(sD.map(r=>r.pigeo));
      const pctPig=sum(sRows.map(r=>r.total))>0?(vPig/sum(sRows.map(r=>r.total))*100):0;
      const d=(vA!==null&&vD2!==null)?vD2-vA:null;
      const dp=d!==null&&vA?(d/vA*100):null;
      return {sk,sName,vA,vD,vD2,vPP,vPig,pctPig,d,dp};
    });

    const block=document.createElement('div');
    block.className='country-block';

    // Header del país
    block.innerHTML=`<div class="country-hdr">
      <span class="c-badge" style="background:${meta.color}">${meta.label}</span>
      <div class="c-summary">
        <div class="c-stat"><span class="c-stat-lbl">CT HO antes</span><span class="c-stat-val">${fmt(cVA)} min</span></div>
        <div class="c-stat"><span class="c-stat-lbl">${mMeta.label} después</span><span class="c-stat-val" style="color:${mMeta.color}">${fmt(cVD)} min</span></div>
        <div class="c-stat"><span class="c-stat-lbl">Δ CT Handover</span><span class="c-stat-val" style="color:${cDelta===null?'#aaa':cDelta<0?'#2E7D32':'#A32D2D'}">${cDelta===null?'—':(cDelta<0?'▼':'▲')+fmt(Math.abs(cDelta))+' ('+fmt(cPct)+'%)'}</span></div>
        <div class="c-stat"><span class="c-stat-lbl">OC Pigeon</span><span class="c-stat-val">${cPig.toLocaleString('es')}</span></div>
      </div>
    </div>`;

    // Contenido: gráfico de barras + tabla
    const content=document.createElement('div');
    content.className='country-content';

    // GRÁFICO: antes vs después por tienda
    const chartCard=document.createElement('div');
    chartCard.className='chart-card';
    const cid='c-'+country;
    chartCard.innerHTML=`<div class="chart-card-title">Antes vs Después por tienda — ${mMeta.label}</div>
      <div style="height:${Math.max(180, storeRows.length*38)}px"><canvas id="${cid}"></canvas></div>`;
    content.appendChild(chartCard);

    // TABLA de tiendas
    const tableCard=document.createElement('div');
    tableCard.className='stores-table-wrap';
    tableCard.innerHTML=`<table>
      <thead><tr>
        <th>Tienda</th>
        <th>CT HO<br>antes</th>
        <th>${mMeta.label}<br>después</th>
        <th>Δ CT HO</th>
        <th>CT Post-Pig<br>después</th>
        <th>OC Pigeon</th>
        <th>% Pigeon</th>
      </tr></thead>
      <tbody>${storeRows.map(s=>`<tr>
        <td style="font-weight:700">${s.sName}</td>
        <td>${fmt(s.vA)} <span style="color:#bbb;font-size:10px">min</span></td>
        <td style="color:${mMeta.color};font-weight:700">${fmt(s.vD)} <span style="color:#bbb;font-size:10px">min</span></td>
        <td class="${s.d===null?'delta-neu':s.d<0?'delta-good':'delta-bad'}">
          ${s.d===null?'—':(s.d<0?'▼':'▲')+fmt(Math.abs(s.d))+'<br><span style="font-size:10px;opacity:.8">'+(s.dp<0?'▼':'▲')+fmt(Math.abs(s.dp))+'%</span>'}
        </td>
        <td>${fmt(s.vPP)} <span style="color:#bbb;font-size:10px">min</span></td>
        <td>${s.vPig.toLocaleString('es')}</td>
        <td>${fmt(s.pctPig)}%</td>
      </tr>`).join('')}</tbody>
    </table>`;
    content.appendChild(tableCard);

    block.appendChild(content);
    area.appendChild(block);

    // Render chart
    const labels=storeRows.map(s=>s.sName);
    const before=storeRows.map(s=>s.vA);
    const after =storeRows.map(s=>s.vD);
    setTimeout(()=>mkBar(cid,labels,before,after,mMeta.color),0);
  });
}

async function loadAll(){
  document.getElementById('dot').className='dot';
  document.getElementById('upd').textContent='Cargando...';
  document.getElementById('gld').style.display='flex';
  document.getElementById('app').style.display='none';
  document.getElementById('filters').style.display='none';
  document.getElementById('err').style.display='none';
  try{
    const raw=await fetchSheet(SHEET);
    allData=parseRows(raw);
    const countries=[...new Set(allData.map(r=>r.country))];
    activeCountries=new Set(countries);
    activeStoreKeys=new Set(allData.map(r=>r.storeKey));
    buildMetricPills(); buildCountryDD(); buildStoreDD();
    document.getElementById('filters').style.display='flex';
    document.getElementById('gld').style.display='none';
    document.getElementById('app').style.display='block';
    document.getElementById('dot').className='dot ok';
    document.getElementById('upd').textContent='Actualizado '+new Date().toLocaleTimeString('es',{hour:'2-digit',minute:'2-digit'});
    renderApp();
  }catch(e){
    document.getElementById('gld').style.display='none';
    document.getElementById('err').style.display='block';
    document.getElementById('err').textContent='Error: '+e.message;
  }
}
loadAll();
</script>
