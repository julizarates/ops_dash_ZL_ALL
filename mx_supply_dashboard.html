<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>TurboOps MX · Supply & Calidad</title>
<link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg:       #0F1117;
  --surface:  #181C26;
  --card:     #1E2330;
  --border:   #2A3040;
  --border2:  #353D50;
  --text:     #E8EAF0;
  --text-dim: #7A8299;
  --text-xs:  #4E5670;
  --green:    #22C55E;
  --green-bg: rgba(34,197,94,0.10);
  --yellow:   #F59E0B;
  --yellow-bg:rgba(245,158,11,0.10);
  --red:      #EF4444;
  --red-bg:   rgba(239,68,68,0.10);
  --blue:     #3B82F6;
  --blue-bg:  rgba(59,130,246,0.10);
  --orange:   #F97316;
  --accent:   #6366F1;
  --accent-bg:rgba(99,102,241,0.12);
  --radius:   10px;
  --shadow:   0 2px 12px rgba(0,0,0,0.3);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Figtree',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;min-height:100vh}

/* HEADER */
.header{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 14px;position:sticky;top:0;z-index:100;display:flex;align-items:center;gap:10px;box-shadow:0 2px 12px rgba(0,0,0,0.4)}
.logo{font-size:18px;font-weight:900;letter-spacing:-0.5px;color:var(--text)}
.logo em{font-style:normal;color:var(--accent)}
.header-meta{flex:1;text-align:right}
.header-label{font-size:10px;font-weight:600;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.8px}
.header-date{font-size:11px;color:var(--accent);font-weight:700;margin-top:1px}
.flag{font-size:18px}

/* TABS */
.tabs{background:var(--surface);border-bottom:1px solid var(--border);padding:0 14px;display:flex;gap:0;overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:10px 14px;font-size:12px;font-weight:700;color:var(--text-dim);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;text-transform:uppercase;letter-spacing:0.4px;transition:all 0.15s}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.tab:hover:not(.active){color:var(--text)}

/* CONTENT */
.content{padding:10px 12px;max-width:600px;margin:0 auto}

/* FILTERS */
.filter-bar{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap}
.filter-wrap{flex:1;min-width:calc(50% - 4px);position:relative}
.filter-wrap::after{content:'▾';position:absolute;right:8px;top:50%;transform:translateY(-50%);font-size:10px;color:var(--text-dim);pointer-events:none}
select{width:100%;padding:7px 22px 7px 9px;border:1px solid var(--border);border-radius:8px;background:var(--card);font-family:inherit;font-size:12px;color:var(--text);appearance:none;cursor:pointer;font-weight:600}
select:focus{outline:none;border-color:var(--accent)}
select option{background:var(--surface)}

/* LOADING */
.loading{text-align:center;padding:48px 24px;color:var(--text-dim);font-size:13px}
.spinner{width:24px;height:24px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.7s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}

/* SUMMARY STRIP */
.strip{display:flex;gap:0;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:10px;overflow:hidden}
.strip-item{flex:1;padding:10px 8px;text-align:center;border-right:1px solid var(--border)}
.strip-item:last-child{border-right:none}
.strip-num{font-size:18px;font-weight:900;line-height:1}
.strip-label{font-size:9px;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.4px;margin-top:2px}

/* CARDS */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:8px;overflow:hidden;box-shadow:var(--shadow)}
.card-header{padding:10px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:8px;cursor:pointer}
.card-title{font-size:13px;font-weight:800}
.card-meta{font-size:11px;color:var(--text-dim)}
.card-body{padding:10px 12px}
.card-toggle{font-size:11px;color:var(--text-dim);flex-shrink:0}

/* TABLE */
.tbl{width:100%;border-collapse:collapse}
.tbl th{font-size:9px;font-weight:700;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.5px;padding:5px 6px;border-bottom:1px solid var(--border);text-align:left}
.tbl th.r{text-align:right}
.tbl td{padding:7px 6px;font-size:12px;border-bottom:1px solid rgba(42,48,64,0.5)}
.tbl tr:last-child td{border-bottom:none}
.tbl tr{cursor:pointer;transition:background 0.1s}
.tbl tr:hover td{background:rgba(99,102,241,0.06)}
.tbl td.r{text-align:right;font-weight:700}
.tbl td.name{font-weight:700}

/* BADGE */
.badge{display:inline-block;font-size:9px;font-weight:700;padding:2px 6px;border-radius:4px;text-transform:uppercase;letter-spacing:0.3px}
.badge-red{background:var(--red-bg);color:var(--red)}
.badge-yellow{background:var(--yellow-bg);color:var(--yellow)}
.badge-green{background:var(--green-bg);color:var(--green)}
.badge-blue{background:var(--blue-bg);color:var(--blue)}
.badge-gray{background:rgba(122,130,153,0.12);color:var(--text-dim)}

/* MINI BAR */
.bar-wrap{display:flex;align-items:center;gap:5px}
.bar-track{flex:1;height:5px;background:var(--border);border-radius:3px;overflow:hidden;min-width:40px}
.bar-fill{height:100%;border-radius:3px}
.bar-val{font-size:11px;font-weight:700;min-width:34px;text-align:right;flex-shrink:0}

/* PRODUCT LIST */
.prod-row{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid rgba(42,48,64,0.5)}
.prod-row:last-child{border-bottom:none}
.prod-name{font-size:12px;font-weight:600;flex:1;min-width:0}
.prod-sub{font-size:10px;color:var(--text-dim);margin-top:1px}

/* SECTION TITLE */
.sec-title{font-size:10px;font-weight:700;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.6px;margin:12px 0 6px;display:flex;align-items:center;gap:6px}
.sec-title::after{content:'';flex:1;height:1px;background:var(--border)}

/* EMPTY */
.empty{text-align:center;padding:32px 20px;color:var(--text-dim);font-size:12px}

/* RANK # */
.rank{font-size:11px;font-weight:900;color:var(--text-xs);width:18px;flex-shrink:0}
.rank.top{color:var(--yellow)}

/* DETAIL PANEL */
.detail-back{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:700;color:var(--accent);padding:6px 10px;border-radius:8px;cursor:pointer;margin-bottom:8px;background:var(--accent-bg);border:none;font-family:inherit}
.detail-header{background:linear-gradient(135deg,#1a1f35,#12172a);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:8px}
.detail-name{font-size:20px;font-weight:900;line-height:1.2;margin-bottom:4px}
.detail-sub{font-size:11px;color:var(--text-dim)}
.kpi-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:12px}
.kpi-box{background:rgba(0,0,0,0.2);border-radius:8px;padding:10px;text-align:center;border:1px solid var(--border)}
.kpi-num{font-size:22px;font-weight:900;line-height:1}
.kpi-label{font-size:9px;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.4px;margin-top:3px}

/* PILL */
.pill{display:inline-flex;align-items:center;gap:3px;font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px}

/* SORT BTN */
.sort-btns{display:flex;gap:4px;margin-bottom:8px;flex-wrap:wrap}
.sort-btn{font-size:10px;font-weight:700;padding:4px 10px;border-radius:6px;cursor:pointer;border:1px solid var(--border);background:var(--card);color:var(--text-dim);font-family:inherit;text-transform:uppercase;letter-spacing:0.3px}
.sort-btn.active{background:var(--accent-bg);color:var(--accent);border-color:var(--accent)}

@media(max-width:360px){.kpi-grid{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>

<div class="header">
  <span class="flag">🇲🇽</span>
  <div class="logo">Turbo<em>Ops</em></div>
  <div class="header-meta">
    <div class="header-label">Supply · MX</div>
    <div class="header-date" id="hdr-date">Últimos 7 días</div>
  </div>
</div>

<div class="tabs">
  <div class="tab active" onclick="switchTab('quiebres')">🍊 Quiebres FyV</div>
  <div class="tab" onclick="switchTab('kardex')">📦 Saneo</div>
  <div class="tab" onclick="switchTab('bloqueos')">🚫 Bloqueos</div>
</div>

<div class="content">
  <div id="loading" class="loading"><div class="spinner"></div>Cargando datos...</div>
  <div id="tab-quiebres" style="display:none"></div>
  <div id="tab-kardex"   style="display:none"></div>
  <div id="tab-bloqueos" style="display:none"></div>
</div>

<script>
const PUB_ID = '2PACX-1vQnT4uViGiikmSNyKqTYcaQDcW5UUsxipbLFpETotIJm46MVdk8AwgQ0-M5IBE4sRZ6h8KJ0QGy3iXE';
const GID = {
  quiebres_tienda:  '308236444',
  quiebres_prod:    '1519938566',
  kardex:           '1283742719',
  bloqueos:         '373993216',
};
const csvUrl = g => `https://docs.google.com/spreadsheets/d/e/${PUB_ID}/pub?gid=${g}&single=true&output=csv`;

// ── State ──
let activeTab = 'quiebres';
let detailStore = null;
let sortQ = 'horas_quiebre'; // quiebres sort
let sortB = 'uds_bloqueadas';
let filterTienda = '';
let filterTiendaK = '';
let filterTiendaB = '';

// ── Data ──
let dQuiebresTienda = [];
let dQuiebresProd   = [];
let dKardex         = [];
let dBloqueos       = [];

// ── CSV ──
const safeFetch = u => fetch(u).then(r=>r.ok?r.text():'').catch(()=>'');

function parseCSV(text) {
  if (!text) return [];
  const lines = text.replace(/\r/g,'').split('\n');
  return lines.map(line => {
    const row=[]; let cur='', inQ=false;
    for(let i=0;i<=line.length;i++){
      const c=line[i];
      if(c==='"'){inQ=!inQ;}
      else if((c===','||c===undefined)&&!inQ){row.push(cur);cur='';}
      else{cur+=(c||'');}
    }
    return row;
  }).filter(r=>r.some(c=>c!==''));
}

function findHdrIdx(rows) {
  // Aleph puts metadata in first ~12 rows before the actual header
  // Scan up to row 20, find first row where ALL cells look like column names
  // (no spaces at start, no long sentences, multiple non-empty cells)
  const known = ['tienda','warehouse','horas','pct','ventas','producto','saneo',
                 'bloqueo','razon','skus','kardex','recepciones','eventos','cant',
                 'uds','dinero','stock','cero','sub_category','subcategory'];
  for (let i = 0; i < Math.min(rows.length, 25); i++) {
    const r = rows[i].map(c=>(c||'').trim().toLowerCase());
    const nonEmpty = r.filter(c=>c);
    if (nonEmpty.length >= 3 && nonEmpty.some(c => known.some(k => c.includes(k)))) {
      return i;
    }
  }
  // fallback: row with most filled cells in first 25 rows
  let best = 0, bestCount = 0;
  for (let i = 0; i < Math.min(rows.length, 25); i++) {
    const cnt = rows[i].filter(c=>(c||'').trim()).length;
    if (cnt > bestCount) { bestCount = cnt; best = i; }
  }
  return best;
}

function toObjs(text) {
  const rows = parseCSV(text);
  if (rows.length < 2) return [];
  const hdrIdx = findHdrIdx(rows);
  const hdr = rows[hdrIdx].map(h=>(h||'').trim());
  return rows.slice(hdrIdx+1).filter(r=>r.some(c=>c)).map(r=>
    Object.fromEntries(hdr.map((k,i)=>[k,(r[i]||'').trim()]))
  );
}

// ── Helpers ──
function pctColor(pct) {
  const n = parseFloat(pct)||0;
  if (n >= 60) return 'var(--red)';
  if (n >= 30) return 'var(--yellow)';
  return 'var(--green)';
}
function pctBadge(pct) {
  const n = parseFloat(pct)||0;
  if (n >= 60) return 'badge-red';
  if (n >= 30) return 'badge-yellow';
  return 'badge-green';
}
function num(v, dec=0) {
  const n = parseFloat(v)||0;
  return dec > 0 ? n.toFixed(dec) : Math.round(n).toLocaleString();
}
function uniqTiendas(data) {
  return [...new Set(data.map(r=>getTienda(r)).filter(Boolean))].sort();
}
function getField(r, ...keys) {
  for (const k of keys) {
    // try exact, then lowercase match
    if (r[k] !== undefined && r[k] !== '') return r[k];
    const lk = k.toLowerCase();
    const found = Object.entries(r).find(([rk]) => rk.toLowerCase() === lk);
    if (found && found[1] !== '') return found[1];
  }
  return '';
}
function getTienda(r) { return getField(r,'tienda','TIENDA','warehouse_name','WAREHOUSE_NAME','WAREHOUSENAME'); }

// ── Tab switch ──
function switchTab(tab) {
  activeTab = tab;
  detailStore = null;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tab')[['quiebres','kardex','bloqueos'].indexOf(tab)].classList.add('active');
  renderAll();
}

// ── RENDER QUIEBRES ──
function renderQuiebres() {
  const el = document.getElementById('tab-quiebres');

  if (detailStore) { renderStoreDetail(el, detailStore); return; }

  // Filter
  const data = dQuiebresTienda.filter(r =>
    !filterTienda || getTienda(r) === filterTienda
  );

  // Sort
  const sorted = [...data].sort((a,b) => {
    if (sortQ === 'horas_quiebre') return (parseFloat(b.horas_quiebre)||0)-(parseFloat(a.horas_quiebre)||0);
    if (sortQ === 'pct_quiebre')   return (parseFloat(getField(b,'pct_quiebre','PCT_QUIEBRE'))||0)-(parseFloat(getField(a,'pct_quiebre','PCT_QUIEBRE'))||0);
    if (sortQ === 'ventas_uds')    return (parseFloat(getField(b,'ventas_uds','VENTAS_UDS'))||0)-(parseFloat(getField(a,'ventas_uds','VENTAS_UDS'))||0);
    return 0;
  });

  const totalHq = data.reduce((s,r)=>s+(parseFloat(getField(r,'horas_quiebre','HORAS_QUIEBRE'))||0),0);
  const avgPct  = data.length ? data.reduce((s,r)=>s+(parseFloat(getField(r,'pct_quiebre','PCT_QUIEBRE'))||0),0)/data.length : 0;
  const worst   = sorted[0] ? getTienda(sorted[0]) : '—';

  // Tiendas select
  const tiendas = uniqTiendas(dQuiebresTienda);

  let html = `
  <div class="filter-bar">
    <div class="filter-wrap" style="min-width:100%;flex-basis:100%">
      <select onchange="filterTienda=this.value;renderAll()">
        <option value="">🏪 Todas las tiendas</option>
        ${tiendas.map(t=>`<option value="${t}" ${filterTienda===t?'selected':''}>${t}</option>`).join('')}
      </select>
    </div>
  </div>

  <div class="strip">
    <div class="strip-item"><div class="strip-num">${data.length}</div><div class="strip-label">Tiendas</div></div>
    <div class="strip-item"><div class="strip-num" style="color:var(--red)">${num(totalHq)}</div><div class="strip-label">Hrs quiebre</div></div>
    <div class="strip-item"><div class="strip-num" style="color:${pctColor(avgPct)}">${avgPct.toFixed(1)}%</div><div class="strip-label">% quiebre prom</div></div>
  </div>

  <div class="sort-btns">
    <button class="sort-btn ${sortQ==='horas_quiebre'?'active':''}" onclick="sortQ='horas_quiebre';renderAll()">⏱ Horas</button>
    <button class="sort-btn ${sortQ==='pct_quiebre'?'active':''}"   onclick="sortQ='pct_quiebre';renderAll()">% Quiebre</button>
    <button class="sort-btn ${sortQ==='ventas_uds'?'active':''}"    onclick="sortQ='ventas_uds';renderAll()">📦 Ventas</button>
  </div>

  <div class="card">
    <table class="tbl">
      <thead><tr>
        <th>#</th>
        <th>Tienda</th>
        <th class="r">Hrs quiebre</th>
        <th class="r">% quiebre</th>
        <th class="r">Ventas uds</th>
      </tr></thead>
      <tbody>
        ${sorted.map((r,i)=>{
          const pct = parseFloat(getField(r,'pct_quiebre','PCT_QUIEBRE'))||0;
          return `<tr onclick="detailStore='${getTienda(r).replace(/'/g,"\\'")}';renderAll()">
            <td><span class="rank ${i<3?'top':''}">${i+1}</span></td>
            <td class="name">${getTienda(r)}<div style="font-size:9px;color:var(--text-dim)">WH ${getField(r,'warehouse_id','WAREHOUSE_ID','warehouseid')||'—'}</div></td>
            <td class="r"><span style="color:${pctColor(pct)};font-weight:800">${num(getField(r,'horas_quiebre','HORAS_QUIEBRE'))}</span></td>
            <td class="r"><span class="badge ${pctBadge(pct)}">${pct.toFixed(1)}%</span></td>
            <td class="r" style="color:var(--text-dim)">${num(getField(r,'ventas_uds','VENTAS_UDS'))}</td>
          </tr>`;
        }).join('')}
      </tbody>
    </table>
  </div>`;

  el.innerHTML = html;
}

// ── STORE DETAIL ──
function renderStoreDetail(el, tienda) {
  const prods = dQuiebresProd.filter(r => getTienda(r) === tienda)
    .sort((a,b)=>(parseFloat(b.horas_quiebre||b.HORAS_QUIEBRE)||0)-(parseFloat(a.horas_quiebre||a.HORAS_QUIEBRE)||0));
  const tiendaRow = dQuiebresTienda.find(r=>getTienda(r)===tienda)||{};
  const whId = getField(tiendaRow,'warehouse_id','WAREHOUSE_ID','warehouseid')||'—';
  const hq   = getField(tiendaRow,'horas_quiebre','HORAS_QUIEBRE')||0;
  const pct  = getField(tiendaRow,'pct_quiebre','PCT_QUIEBRE')||0;
  const vtas = getField(tiendaRow,'ventas_uds','VENTAS_UDS')||0;
  const skus = getField(tiendaRow,'skus_fyv','SKUS_FYV')||0;

  let html = `<button class="detail-back" onclick="detailStore=null;renderAll()">← Volver</button>
  <div class="detail-header">
    <div class="detail-name">🍊 ${tienda}</div>
    <div class="detail-sub">WH ${whId} · Infaltables Frutas y Verduras · últimos 7 días</div>
    <div class="kpi-grid">
      <div class="kpi-box">
        <div class="kpi-num" style="color:var(--red)">${num(hq)}</div>
        <div class="kpi-label">Hrs quiebre</div>
      </div>
      <div class="kpi-box">
        <div class="kpi-num" style="color:${pctColor(pct)}">${parseFloat(pct).toFixed(1)}%</div>
        <div class="kpi-label">% sin stock</div>
      </div>
      <div class="kpi-box">
        <div class="kpi-num">${num(vtas)}</div>
        <div class="kpi-label">Ventas uds</div>
      </div>
    </div>
  </div>

  <div class="sec-title">📋 Detalle por producto (${prods.length} SKUs)</div>
  <div class="card"><div class="card-body">`;

  if (!prods.length) {
    html += `<div class="empty">Sin detalle disponible para esta tienda.</div>`;
  } else {
    html += prods.map((p,i)=>{
      const hqP  = parseFloat(getField(p,'horas_quiebre','HORAS_QUIEBRE'))||0;
      const pctP = parseFloat(getField(p,'pct_quiebre','PCT_QUIEBRE'))||0;
      const vP   = parseFloat(getField(p,'ventas_uds','VENTAS_UDS'))||0;
      const prod = getField(p,'producto','PRODUCTO','product_name','PRODUCT_NAME')||'—';
      const sub  = getField(p,'sub_category','SUB_CATEGORY','subcategory');
      const razón = getField(p,'razon_bloqueo','RAZON_BLOQUEO','razon','RAZON','blocking_reason','BLOCKING_REASON');
      return `<div class="prod-row">
        <span class="rank ${i<3?'top':''}">${i+1}</span>
        <div style="flex:1;min-width:0">
          <div class="prod-name">${prod}</div>
          <div class="prod-sub">${sub}${razón?` · <span style="color:var(--red);font-size:9px">${razón}</span>`:''}</div>
        </div>
        <div style="text-align:right;flex-shrink:0">
          <div style="font-size:13px;font-weight:800;color:${pctColor(pctP)}">${pctP.toFixed(0)}%</div>
          <div style="font-size:9px;color:var(--text-dim)">${num(hqP)} hrs</div>
        </div>
      </div>`;
    }).join('');
  }

  html += `</div></div>`;
  el.innerHTML = html;
}

// ── RENDER KARDEX ──
function renderKardex() {
  const el = document.getElementById('tab-kardex');

  const data = dKardex.filter(r=>!filterTiendaK||(getTienda(r))===filterTiendaK);
  const sorted = [...data].sort((a,b)=>(parseFloat(b.eventos_saneo||b.EVENTOS_SANEO)||0)-(parseFloat(a.eventos_saneo||a.EVENTOS_SANEO)||0));

  const tiendas = uniqTiendas(dKardex);
  const totalSaneo = data.reduce((s,r)=>s+(parseFloat(getField(r,'eventos_saneo','EVENTOS_SANEO'))||0),0);
  const tiendaSaneoTop = sorted[0] ? (sorted[0].tienda||sorted[0].TIENDA||'—') : '—';

  // Group by tienda for summary
  const byTienda = {};
  for (const r of sorted) {
    const t = getTienda(r);
    if (!byTienda[t]) byTienda[t] = {tienda:t,wh:getField(r,'warehouse_id','WAREHOUSE_ID','warehouseid'),saneo:0,recepciones:0,ceros:0};
    byTienda[t].saneo      += parseFloat(getField(r,'eventos_saneo','EVENTOS_SANEO'))||0;
    byTienda[t].recepciones+= parseFloat(getField(r,'recepciones','RECEPCIONES'))||0;
    byTienda[t].ceros      += parseFloat(getField(r,'registros_stock_cero','REGISTROS_STOCK_CERO'))||0;
  }
  const tiendas2 = Object.values(byTienda).sort((a,b)=>b.saneo-a.saneo);

  let html = `
  <div class="filter-bar">
    <div class="filter-wrap" style="min-width:100%;flex-basis:100%">
      <select onchange="filterTiendaK=this.value;renderAll()">
        <option value="">🏪 Todas las tiendas</option>
        ${tiendas.map(t=>`<option value="${t}" ${filterTiendaK===t?'selected':''}>${t}</option>`).join('')}
      </select>
    </div>
  </div>

  <div class="strip">
    <div class="strip-item"><div class="strip-num">${tiendas2.length}</div><div class="strip-label">Tiendas</div></div>
    <div class="strip-item"><div class="strip-num" style="color:var(--orange)">${num(totalSaneo)}</div><div class="strip-label">Eventos saneo</div></div>
    <div class="strip-item" style="overflow:hidden"><div class="strip-num" style="font-size:11px;font-weight:800;color:var(--red)">${tiendaSaneoTop.substring(0,10)}</div><div class="strip-label">Top ofensora</div></div>
  </div>`;

  if (filterTiendaK) {
    // Detalle productos de esa tienda
    html += `<div class="sec-title">📦 Saneo por producto — ${filterTiendaK}</div>
    <div class="card"><table class="tbl">
      <thead><tr>
        <th>#</th><th>Producto</th><th class="r">Eventos saneo</th><th class="r">Recepciones</th><th class="r">Ceros</th>
      </tr></thead><tbody>
      ${sorted.slice(0,30).map((r,i)=>{
        const s = parseFloat(getField(r,'eventos_saneo','EVENTOS_SANEO'))||0;
        const rc= parseFloat(getField(r,'recepciones','RECEPCIONES'))||0;
        const cz= parseFloat(getField(r,'registros_stock_cero','REGISTROS_STOCK_CERO'))||0;
        return `<tr>
          <td><span class="rank ${i<3?'top':''}">${i+1}</span></td>
          <td class="name">${getField(r,'producto','PRODUCTO','product_name','PRODUCT_NAME')||'—'}<div style="font-size:9px;color:var(--text-dim)">${getField(r,'sub_category','SUB_CATEGORY','subcategory')}</div></td>
          <td class="r" style="color:${s>5?'var(--red)':s>2?'var(--yellow)':'var(--green)'}">${s}</td>
          <td class="r" style="color:var(--text-dim)">${rc}</td>
          <td class="r" style="color:${cz>0?'var(--orange)':'var(--text-dim)'}">${cz}</td>
        </tr>`;
      }).join('')}
      </tbody>
    </table></div>`;
  } else {
    // Resumen por tienda
    html += `<div class="sec-title">🏪 Ranking por tienda — eventos saneo FyV</div>
    <div class="card"><table class="tbl">
      <thead><tr>
        <th>#</th><th>Tienda</th><th class="r">Saneo</th><th class="r">Recepciones</th><th class="r">Stock cero</th>
      </tr></thead><tbody>
      ${tiendas2.map((t,i)=>{
        const color = t.saneo>20?'var(--red)':t.saneo>10?'var(--yellow)':'var(--green)';
        return `<tr onclick="filterTiendaK='${t.tienda.replace(/'/g,"\\'")}';renderAll()">
          <td><span class="rank ${i<3?'top':''}">${i+1}</span></td>
          <td class="name">${t.tienda}<div style="font-size:9px;color:var(--text-dim)">WH ${t.wh}</div></td>
          <td class="r" style="color:${color};font-size:14px;font-weight:800">${t.saneo}</td>
          <td class="r" style="color:var(--text-dim)">${t.recepciones}</td>
          <td class="r" style="color:${t.ceros>0?'var(--orange)':'var(--text-dim)'}">${t.ceros}</td>
        </tr>`;
      }).join('')}
      </tbody>
    </table></div>`;
  }

  el.innerHTML = html;
}

// ── RENDER BLOQUEOS ──
function renderBloqueos() {
  const el = document.getElementById('tab-bloqueos');
  const data = dBloqueos.filter(r=>!filterTiendaB||(getTienda(r))===filterTiendaB);

  // Group by tienda
  const byTienda = {};
  for (const r of data) {
    const t = r.tienda||r.TIENDA||'Sin nombre';
    if (!byTienda[t]) byTienda[t] = {tienda:t,wh:getField(r,'warehouse_id','WAREHOUSE_ID','warehouseid'),bloq:0,uds:0,dinero:0,razones:{}};
    byTienda[t].bloq   += parseFloat(getField(r,'cant_bloqueos','CANT_BLOQUEOS'))||0;
    byTienda[t].uds    += parseFloat(getField(r,'uds_bloqueadas','UDS_BLOQUEADAS'))||0;
    byTienda[t].dinero += parseFloat(getField(r,'dinero_perdido_usd','DINERO_PERDIDO_USD'))||0;
    const reason = getField(r,'razon','REASON','RAZON','reason');
    byTienda[t].razones[reason] = (byTienda[t].razones[reason]||0)+1;
  }

  const tiendas2 = Object.values(byTienda).sort((a,b)=>{
    if (sortB==='uds_bloqueadas') return b.uds-a.uds;
    if (sortB==='dinero')         return b.dinero-a.dinero;
    if (sortB==='eventos')        return b.bloq-a.bloq;
    return b.uds-a.uds;
  });

  const tiendas = uniqTiendas(dBloqueos);
  const totalUds    = tiendas2.reduce((s,t)=>s+t.uds,0);
  const totalDinero = tiendas2.reduce((s,t)=>s+t.dinero,0);

  let html = `
  <div class="filter-bar">
    <div class="filter-wrap" style="min-width:100%;flex-basis:100%">
      <select onchange="filterTiendaB=this.value;renderAll()">
        <option value="">🏪 Todas las tiendas</option>
        ${tiendas.map(t=>`<option value="${t}" ${filterTiendaB===t?'selected':''}>${t}</option>`).join('')}
      </select>
    </div>
  </div>

  <div class="strip">
    <div class="strip-item"><div class="strip-num">${tiendas2.length}</div><div class="strip-label">Tiendas</div></div>
    <div class="strip-item"><div class="strip-num" style="color:var(--red)">${num(totalUds)}</div><div class="strip-label">Uds bloqueadas</div></div>
    <div class="strip-item"><div class="strip-num" style="color:var(--orange)">$${num(totalDinero)}</div><div class="strip-label">USD perdido</div></div>
  </div>

  <div class="sort-btns">
    <button class="sort-btn ${sortB==='uds_bloqueadas'?'active':''}" onclick="sortB='uds_bloqueadas';renderAll()">📦 Uds</button>
    <button class="sort-btn ${sortB==='dinero'?'active':''}"         onclick="sortB='dinero';renderAll()">💵 Dinero</button>
    <button class="sort-btn ${sortB==='eventos'?'active':''}"        onclick="sortB='eventos';renderAll()">📋 Eventos</button>
  </div>`;

  if (filterTiendaB) {
    const tData = data.filter(r=>(getTienda(r))===filterTiendaB)
      .sort((a,b)=>(parseFloat(b.uds_bloqueadas||b.UDS_BLOQUEADAS)||0)-(parseFloat(a.uds_bloqueadas||a.UDS_BLOQUEADAS)||0));
    html += `<div class="sec-title">📋 Detalle por razón — ${filterTiendaB}</div>
    <div class="card"><table class="tbl">
      <thead><tr><th>Razón</th><th class="r">Eventos</th><th class="r">Uds</th><th class="r">$ perdido</th></tr></thead>
      <tbody>
      ${tData.map(r=>`<tr>
        <td class="name" style="font-size:11px">${getField(r,'razon','REASON','RAZON','reason')||'—'}</td>
        <td class="r" style="color:var(--text-dim)">${getField(r,'cant_bloqueos','CANT_BLOQUEOS')||0}</td>
        <td class="r" style="color:var(--red);font-weight:800">${num(getField(r,'uds_bloqueadas','UDS_BLOQUEADAS'))}</td>
        <td class="r" style="color:var(--orange)">$${num(getField(r,'dinero_perdido_usd','DINERO_PERDIDO_USD'))}</td>
      </tr>`).join('')}
      </tbody>
    </table></div>`;
  } else {
    html += `<div class="sec-title">🏪 Ranking por tienda</div>
    <div class="card"><table class="tbl">
      <thead><tr><th>#</th><th>Tienda</th><th class="r">Uds bloq.</th><th class="r">$ perdido</th></tr></thead>
      <tbody>
      ${tiendas2.map((t,i)=>`<tr onclick="filterTiendaB='${t.tienda.replace(/'/g,"\\'")}';renderAll()">
        <td><span class="rank ${i<3?'top':''}">${i+1}</span></td>
        <td class="name">${t.tienda}<div style="font-size:9px;color:var(--text-dim)">WH ${t.wh}</div></td>
        <td class="r" style="color:var(--red);font-size:14px;font-weight:800">${num(t.uds)}</td>
        <td class="r" style="color:var(--orange)">$${num(t.dinero)}</td>
      </tr>`).join('')}
      </tbody>
    </table></div>`;
  }

  el.innerHTML = html;
}

// ── MAIN RENDER ──
function renderAll() {
  document.getElementById('tab-quiebres').style.display = activeTab==='quiebres' ? 'block' : 'none';
  document.getElementById('tab-kardex').style.display   = activeTab==='kardex'   ? 'block' : 'none';
  document.getElementById('tab-bloqueos').style.display = activeTab==='bloqueos' ? 'block' : 'none';
  if (activeTab==='quiebres') renderQuiebres();
  if (activeTab==='kardex')   renderKardex();
  if (activeTab==='bloqueos') renderBloqueos();
}

// ── LOAD ──
async function loadAll() {
  document.getElementById('loading').style.display = 'block';
  try {
    const [t1,t2,t3,t4] = await Promise.all([
      safeFetch(csvUrl(GID.quiebres_tienda)),
      safeFetch(csvUrl(GID.quiebres_prod)),
      safeFetch(csvUrl(GID.kardex)),
      safeFetch(csvUrl(GID.bloqueos)),
    ]);
    dQuiebresTienda = toObjs(t1);
    dQuiebresProd   = toObjs(t2);
    dKardex         = toObjs(t3);
    dBloqueos       = toObjs(t4);

    // Header date
    const today = new Date();
    const d7 = new Date(today); d7.setDate(today.getDate()-7);
    document.getElementById('hdr-date').textContent =
      d7.toLocaleDateString('es-MX',{day:'2-digit',month:'short'}) + ' – ' +
      today.toLocaleDateString('es-MX',{day:'2-digit',month:'short'});

    console.log('[Supply MX] Q-tienda:', dQuiebresTienda.length, '| Q-prod:', dQuiebresProd.length,
                '| Kardex:', dKardex.length, '| Bloqueos:', dBloqueos.length);

    // DEBUG: show actual column names from each sheet
    if (dQuiebresTienda[0]) console.log('[Q-TIENDA cols]', Object.keys(dQuiebresTienda[0]));
    if (dQuiebresProd[0])   console.log('[Q-PROD cols]',   Object.keys(dQuiebresProd[0]));
    if (dKardex[0])         console.log('[KARDEX cols]',   Object.keys(dKardex[0]));
    if (dBloqueos[0])       console.log('[BLOQUEOS cols]', Object.keys(dBloqueos[0]));
    if (dQuiebresTienda[0]) console.log('[Q-TIENDA row0]', JSON.stringify(dQuiebresTienda[0]));
    // Show raw first 3 lines of each CSV to detect separator
    console.log('[RAW Q-TIENDA]', t1.substring(0,400));

    document.getElementById('loading').style.display = 'none';
    renderAll();
  } catch(e) {
    document.getElementById('loading').innerHTML =
      `<div style="font-size:24px;margin-bottom:8px">⚠️</div>Error al cargar.<br><span style="font-size:11px;color:var(--text-xs)">${e.message}</span>`;
  }
}

loadAll();
</script>
</body>
</html>
