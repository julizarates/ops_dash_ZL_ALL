<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>TurboOps MX · Supply FyV</title>
<link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0F1117;--sur:#181C26;--card:#1E2330;--bor:#2A3040;
  --tx:#E8EAF0;--dim:#7A8299;--xs:#4E5670;
  --gr:#22C55E;--grb:rgba(34,197,94,.10);
  --ye:#F59E0B;--yeb:rgba(245,158,11,.10);
  --re:#EF4444;--reb:rgba(239,68,68,.10);
  --bl:#3B82F6;--blb:rgba(59,130,246,.10);
  --or:#F97316;--orb:rgba(249,115,22,.10);
  --pu:#A855F7;--pub:rgba(168,85,247,.15);
  --ac:#6366F1;--acb:rgba(99,102,241,.12);
  --r:10px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Figtree',sans-serif;background:var(--bg);color:var(--tx);font-size:14px;line-height:1.5;min-height:100vh}

.hdr{background:var(--sur);border-bottom:1px solid var(--bor);padding:10px 14px;position:sticky;top:0;z-index:100;display:flex;align-items:center;gap:10px;box-shadow:0 2px 12px rgba(0,0,0,.4)}
.logo{font-size:18px;font-weight:900;letter-spacing:-.5px}
.logo em{font-style:normal;color:var(--ac)}
.hdr-r{flex:1;text-align:right}
.hdr-lbl{font-size:10px;font-weight:600;color:var(--dim);text-transform:uppercase;letter-spacing:.8px}
.hdr-dt{font-size:11px;color:var(--ac);font-weight:700;margin-top:1px}

.tabs{background:var(--sur);border-bottom:1px solid var(--bor);display:flex;overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:10px 18px;font-size:11px;font-weight:700;color:var(--dim);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;text-transform:uppercase;letter-spacing:.4px;flex-shrink:0}
.tab.on{color:var(--ac);border-bottom-color:var(--ac)}

.pg{padding:10px 12px;max-width:600px;margin:0 auto}
.spin-wrap{text-align:center;padding:48px 24px;color:var(--dim);font-size:13px}
.spinner{width:24px;height:24px;border:2px solid var(--bor);border-top-color:var(--ac);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}

.fw{position:relative;margin-bottom:8px}
.fw::after{content:'▾';position:absolute;right:8px;top:50%;transform:translateY(-50%);font-size:10px;color:var(--dim);pointer-events:none}
select{width:100%;padding:7px 22px 7px 9px;border:1px solid var(--bor);border-radius:8px;background:var(--card);font-family:inherit;font-size:12px;color:var(--tx);appearance:none;cursor:pointer;font-weight:600}
select:focus{outline:none;border-color:var(--ac)}
select option{background:var(--sur)}

.strip{display:flex;background:var(--card);border:1px solid var(--bor);border-radius:var(--r);margin-bottom:10px;overflow:hidden}
.si{flex:1;padding:10px 6px;text-align:center;border-right:1px solid var(--bor)}
.si:last-child{border-right:none}
.sn{font-size:16px;font-weight:900;line-height:1}
.sl{font-size:9px;color:var(--dim);text-transform:uppercase;letter-spacing:.3px;margin-top:2px}

.card{background:var(--card);border:1px solid var(--bor);border-radius:var(--r);margin-bottom:8px;overflow:hidden}
.cb{padding:10px 12px}

/* insight cards */
.ins-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:10px}
.ins{background:var(--card);border:1px solid var(--bor);border-radius:var(--r);padding:10px 12px}
.ins-lbl{font-size:9px;font-weight:700;color:var(--dim);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.ins-val{font-size:13px;font-weight:800;line-height:1.3}
.ins-sub{font-size:10px;color:var(--dim);margin-top:3px}

.tbl{width:100%;border-collapse:collapse}
.tbl th{font-size:9px;font-weight:700;color:var(--dim);text-transform:uppercase;letter-spacing:.5px;padding:5px 6px;border-bottom:1px solid var(--bor);text-align:left}
.tbl th.r{text-align:right}
.tbl td{padding:7px 6px;font-size:12px;border-bottom:1px solid rgba(42,48,64,.5)}
.tbl tr:last-child td{border-bottom:none}
.tbl td.r{text-align:right;font-weight:700}
.tbl td.nm{font-weight:700}

.st{font-size:10px;font-weight:700;color:var(--dim);text-transform:uppercase;letter-spacing:.6px;margin:12px 0 6px;display:flex;align-items:center;gap:6px}
.st::after{content:'';flex:1;height:1px;background:var(--bor)}

/* heatmap */
.hmap-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
.hmap{border-collapse:collapse}
.hmap th{font-size:8px;color:var(--dim);padding:2px 3px;text-align:center;font-weight:600;white-space:nowrap;min-width:22px}
.hmap th.lbl{text-align:left;min-width:80px;max-width:100px}
.hmap td{width:22px;height:22px;text-align:center;font-size:7px;font-weight:800;border:1px solid var(--bg);border-radius:2px;cursor:default;position:relative}
.hmap td.lbl{font-size:10px;color:var(--dim);text-align:left;padding:2px 6px 2px 0;border:none;background:transparent;white-space:nowrap;width:auto;height:auto}
/* cell colors */
.hc0 {background:rgba(255,255,255,.03);color:transparent}
/* ventas */
.hcv1{background:rgba(34,197,94,.15);color:var(--gr)}
.hcv2{background:rgba(34,197,94,.35);color:var(--gr)}
.hcv3{background:rgba(34,197,94,.60);color:#fff}
.hcv4{background:rgba(34,197,94,.88);color:#fff}
/* quiebre */
.hcq {background:rgba(239,68,68,.35);color:var(--re)}
.hcqi{background:rgba(239,68,68,.75);color:#fff}
/* ingreso OC */
.hci {background:rgba(59,130,246,.55);color:#fff}
/* saneo */
.hcs {background:rgba(168,85,247,.55);color:#fff}
/* ciclico + */
.hccp{background:rgba(245,158,11,.45);color:#fff}
/* ciclico - */
.hccn{background:rgba(239,68,68,.25);color:var(--re)}

/* inv dia row */
.inv-row{display:flex;gap:6px;margin-bottom:6px;font-size:11px}
.inv-box{background:rgba(255,255,255,.04);border:1px solid var(--bor);border-radius:6px;padding:5px 8px;flex:1;text-align:center}
.inv-num{font-size:14px;font-weight:800}
.inv-lbl{font-size:9px;color:var(--dim);margin-top:1px}

/* legend */
.legend{display:flex;gap:8px;flex-wrap:wrap;font-size:9px;color:var(--dim);margin-bottom:8px}
.leg-item{display:flex;align-items:center;gap:3px}
.leg-dot{width:10px;height:10px;border-radius:2px;flex-shrink:0}

/* saneo */
.sem-pills{display:flex;gap:4px;margin-bottom:8px;flex-wrap:wrap}
.sp{font-size:10px;font-weight:700;padding:4px 10px;border-radius:6px;cursor:pointer;border:1px solid var(--bor);background:var(--card);color:var(--dim);font-family:inherit}
.sp.on{background:var(--acb);color:var(--ac);border-color:var(--ac)}

.pb{display:flex;align-items:center;gap:6px}
.pt{flex:1;height:6px;background:var(--bor);border-radius:3px;overflow:hidden;min-width:40px}
.pf{height:100%;border-radius:3px}
.pv{font-size:11px;font-weight:800;min-width:38px;text-align:right;flex-shrink:0}

.empty{text-align:center;padding:32px;color:var(--dim);font-size:12px}
.rk{font-size:11px;font-weight:900;color:var(--xs);width:18px;text-align:center;flex-shrink:0}
.rk.top{color:var(--ye)}
</style>
</head>
<body>

<div class="hdr">
  <span style="font-size:18px">🇲🇽</span>
  <div class="logo">Turbo<em>Ops</em></div>
  <div class="hdr-r">
    <div class="hdr-lbl">Supply · FyV MX</div>
    <div class="hdr-dt" id="hdt">Últimos 7 días</div>
  </div>
</div>

<div class="tabs">
  <div class="tab on" onclick="sw('resumen')">📊 Resumen</div>
  <div class="tab"    onclick="sw('horario')">⏰ Horario</div>
  <div class="tab"    onclick="sw('saneo')">🗑 Saneo</div>
</div>

<div class="pg">
  <div id="loading" class="spin-wrap"><div class="spinner"></div>Cargando datos...</div>
  <div id="vresumen" style="display:none"></div>
  <div id="vhorario" style="display:none"></div>
  <div id="vsaneo"   style="display:none"></div>
</div>

<script>
const PUB = '2PACX-1vQnT4uViGiikmSNyKqTYcaQDcW5UUsxipbLFpETotIJm46MVdk8AwgQ0-M5IBE4sRZ6h8KJ0QGy3iXE';
const G = { resumen:'1233507558', horario:'1600804818', saneo:'1986766957' };
const csvUrl = g => `https://docs.google.com/spreadsheets/d/e/${PUB}/pub?gid=${g}&single=true&output=csv`;

let tab='resumen', fT={resumen:'',horario:'',saneo:''}, fP='', selSem='';
let D={resumen:[],horario:[],saneo:[]};

const safe = u => fetch(u).then(r=>r.ok?r.text():'').catch(()=>'');

function parseCSV(txt){
  if(!txt) return [];
  return txt.replace(/\r/g,'').split('\n').map(line=>{
    const row=[]; let c='',q=false;
    for(let i=0;i<=line.length;i++){
      const ch=line[i];
      if(ch==='"'){q=!q;}
      else if((ch===','||ch===undefined)&&!q){row.push(c);c='';}
      else c+=(ch||'');
    }
    return row;
  }).filter(r=>r.some(x=>x!==''));
}

function parse(txt){
  const rows=parseCSV(txt);
  if(rows.length<2) return [];
  const kw=['tienda','warehouse','ventas','saneo','ingreso','fecha','hora','semana',
            'pedidos','saneados','cumplimiento','producto','ciclico','inv','stock',
            'dia_semana','uds_','kardex','pct_','registros','inv_inicio','inv_fin'];
  let hi=0;
  // Scan up to row 25, find row with most non-empty cells that contains a keyword
  let bestScore=-1;
  for(let i=0;i<Math.min(rows.length,25);i++){
    const r=rows[i].map(c=>(c||'').trim().toLowerCase());
    const nonEmpty=r.filter(c=>c).length;
    const hasKW=r.some(c=>kw.some(k=>c.includes(k)));
    if(nonEmpty>=3&&hasKW){
      // prefer row with more non-empty cells (actual header vs metadata)
      if(nonEmpty>bestScore){bestScore=nonEmpty;hi=i;}
    }
  }
  const hdr=rows[hi].map(h=>(h||'').trim());
  return rows.slice(hi+1).filter(r=>r.some(c=>c))
    .map(r=>Object.fromEntries(hdr.map((k,i)=>[k,(r[i]||'').trim()])));
}

function gf(r,...keys){
  for(const k of keys){
    if(r[k]!==undefined&&r[k]!=='') return r[k];
    const lk=k.toLowerCase();
    const e=Object.entries(r).find(([rk])=>rk.toLowerCase()===lk);
    if(e&&e[1]!=='') return e[1];
  }
  return '';
}
const gt  = r=>gf(r,'TIENDA','tienda','WAREHOUSE_NAME','warehouse_name');
const gw  = r=>gf(r,'WAREHOUSE_ID','warehouse_id');
const gp  = r=>gf(r,'PRODUCTO','producto','PRODUCT_NAME','product_name');
const n   = (v,d=0)=>{const x=parseFloat(v)||0;return d?x.toFixed(d):Math.round(x).toLocaleString();};
const pc2 = v=>{const x=parseFloat(v)||0;return x>=80?'var(--gr)':x>=50?'var(--ye)':'var(--re)';};
const uniq= (arr,fn)=>[...new Set(arr.map(fn).filter(Boolean))].sort();

function sw(t){
  tab=t;
  document.querySelectorAll('.tab').forEach((el,i)=>el.classList.toggle('on',['resumen','horario','saneo'][i]===t));
  renderAll();
}

// ── RESUMEN ──
function renderResumen(){
  const el=document.getElementById('vresumen');
  const data=D.resumen.filter(r=>!fT.resumen||gt(r)===fT.resumen);

  // compute per-tienda from horario (richer data)
  const byT={};
  for(const r of D.horario){
    const t=gt(r); if(!t) continue;
    if(!byT[t]) byT[t]={t,w:gw(r),ing:0,ven:0,san:0,cpos:0,cneg:0,qhrs:0,rows:[]};
    byT[t].ing  +=parseFloat(gf(r,'UDS_INGRESO','uds_ingreso'))||0;
    byT[t].ven  +=parseFloat(gf(r,'UDS_VENTAS','uds_ventas'))||0;
    byT[t].san  +=parseFloat(gf(r,'UDS_SANEO','uds_saneo'))||0;
    byT[t].cpos +=parseFloat(gf(r,'UDS_CICLICO_POS','uds_ciclico_pos'))||0;
    byT[t].cneg +=parseFloat(gf(r,'UDS_CICLICO_NEG','uds_ciclico_neg'))||0;
    byT[t].qhrs +=parseInt(gf(r,'REGISTROS_CERO','registros_cero'))||0;
    byT[t].rows.push(r);
  }

  // insight: hora con más quiebres globalmente
  const horaMap={};
  for(const r of D.horario){
    const h=gf(r,'HORA','hora');
    const q=parseInt(gf(r,'REGISTROS_CERO','registros_cero'))||0;
    horaMap[h]=(horaMap[h]||0)+q;
  }
  const horaTopK=Object.entries(horaMap).sort((a,b)=>b[1]-a[1])[0];
  const horaTop=horaTopK?`${horaTopK[0]}:00 h`:'—';

  // insight: producto con más quiebres
  const prodMap={};
  for(const r of D.horario){
    const p=gp(r);
    const q=parseInt(gf(r,'REGISTROS_CERO','registros_cero'))||0;
    prodMap[p]=(prodMap[p]||0)+q;
  }
  const prodTopK=Object.entries(prodMap).sort((a,b)=>b[1]-a[1])[0];
  const prodTop=prodTopK?prodTopK[0]:'—';

  // insight: tienda con más quiebres
  const tiendaTop=Object.values(byT).sort((a,b)=>b.qhrs-a.qhrs)[0];

  // insight: tienda con más saneo
  const tiendaSanTop=Object.values(byT).sort((a,b)=>b.san-a.san)[0];

  const ts=Object.values(byT).sort((a,b)=>b.qhrs-a.qhrs);
  const totIng=ts.reduce((s,t)=>s+t.ing,0);
  const totVen=ts.reduce((s,t)=>s+t.ven,0);
  const totSan=ts.reduce((s,t)=>s+t.san,0);
  const totQ  =ts.reduce((s,t)=>s+t.qhrs,0);

  el.innerHTML=`
  <div class="fw">
    <select onchange="fT.resumen=this.value;renderAll()">
      <option value="">🏪 Todas las tiendas</option>
      ${uniq(D.horario,gt).map(t=>`<option value="${t}" ${fT.resumen===t?'selected':''}>${t}</option>`).join('')}
    </select>
  </div>

  <div class="strip">
    <div class="si"><div class="sn" style="color:var(--bl)">${n(totIng)}</div><div class="sl">📦 Ingresó</div></div>
    <div class="si"><div class="sn" style="color:var(--gr)">${n(totVen)}</div><div class="sl">💚 Vendido</div></div>
    <div class="si"><div class="sn" style="color:var(--or)">${n(totSan)}</div><div class="sl">🗑 Saneado</div></div>
    <div class="si"><div class="sn" style="color:var(--re)">${n(totQ)}</div><div class="sl">⚠️ Hrs cero</div></div>
  </div>

  <div class="st">🔍 Insights últimos 7 días</div>
  <div class="ins-grid">
    <div class="ins">
      <div class="ins-lbl">⏰ Hora más crítica</div>
      <div class="ins-val" style="color:var(--re)">${horaTop}</div>
      <div class="ins-sub">Mayor acumulado de quiebres</div>
    </div>
    <div class="ins">
      <div class="ins-lbl">🍊 Producto más quiebre</div>
      <div class="ins-val" style="color:var(--re);font-size:11px">${prodTop}</div>
      <div class="ins-sub">${prodTopK?n(prodTopK[1])+' registros en 0':''}</div>
    </div>
    <div class="ins">
      <div class="ins-lbl">🏪 Tienda más quiebres</div>
      <div class="ins-val" style="color:var(--re);font-size:11px">${tiendaTop?tiendaTop.t:'—'}</div>
      <div class="ins-sub">${tiendaTop?n(tiendaTop.qhrs)+' registros en 0':''}</div>
    </div>
    <div class="ins">
      <div class="ins-lbl">🗑 Más saneo</div>
      <div class="ins-val" style="color:var(--or);font-size:11px">${tiendaSanTop?tiendaSanTop.t:'—'}</div>
      <div class="ins-sub">${tiendaSanTop?n(tiendaSanTop.san)+' uds saneadas':''}</div>
    </div>
  </div>

  <div class="st">📋 Por tienda</div>
  <div class="card"><table class="tbl">
    <thead><tr>
      <th>#</th><th>Tienda</th>
      <th class="r">Ingreso</th><th class="r">Ventas</th>
      <th class="r">Saneo</th><th class="r">Cíc +/-</th><th class="r">Hrs cero</th>
    </tr></thead>
    <tbody>
    ${ts.map((t,i)=>{
      const cic=t.cpos>0||t.cneg>0?`<span style="color:var(--gr)">+${n(t.cpos)}</span> <span style="color:var(--re)">-${n(t.cneg)}</span>`:'—';
      return `<tr style="cursor:pointer" onclick="fT.horario='${t.t.replace(/'/g,"\\'")}';sw('horario')">
        <td><span class="rk ${i<3?'top':''}">${i+1}</span></td>
        <td class="nm">${t.t}<div style="font-size:9px;color:var(--dim)">WH ${t.w}</div></td>
        <td class="r" style="color:var(--bl)">${n(t.ing)}</td>
        <td class="r" style="color:var(--gr)">${n(t.ven)}</td>
        <td class="r" style="color:${t.san>50?'var(--re)':t.san>20?'var(--ye)':'var(--gr)'}">${n(t.san)}</td>
        <td class="r" style="font-size:11px">${cic}</td>
        <td class="r" style="color:${t.qhrs>50?'var(--re)':t.qhrs>20?'var(--ye)':'var(--dim)'};font-weight:800">${n(t.qhrs)}</td>
      </tr>`;
    }).join('')}
    </tbody>
  </table></div>
  <div style="font-size:10px;color:var(--dim);padding:2px">Toca una tienda para ver su horario detallado</div>`;
}

// ── HORARIO ──
function renderHorario(){
  const el=document.getElementById('vhorario');
  const tiendas=uniq(D.horario,gt);
  if(!fT.horario&&tiendas.length) fT.horario=tiendas[0];

  const prods=uniq(D.horario.filter(r=>gt(r)===fT.horario),gp);
  if(!fP&&prods.length) fP=prods[0];

  const data=D.horario.filter(r=>gt(r)===fT.horario&&gp(r)===fP);
  const dias=uniq(data,r=>gf(r,'FECHA','fecha'));
  const HORAS=Array.from({length:24},(_,i)=>i);

  // build cell map
  const mp={};
  for(const r of data){
    const dia=gf(r,'FECHA','fecha');
    const h=parseInt(gf(r,'HORA','hora'))||0;
    const k=`${dia}_${h}`;
    if(!mp[k]) mp[k]={v:0,ing:0,san:0,cpos:0,cneg:0,sm:999,cero:0};
    mp[k].v   +=parseFloat(gf(r,'UDS_VENTAS','uds_ventas'))||0;
    mp[k].ing +=parseFloat(gf(r,'UDS_INGRESO','uds_ingreso'))||0;
    mp[k].san +=parseFloat(gf(r,'UDS_SANEO','uds_saneo'))||0;
    // ciclicos: si delta_reserved=0 usar stock_min como proxy
    const cpRaw=parseFloat(gf(r,'UDS_CICLICO_POS','uds_ciclico_pos'))||0;
    const cnRaw=parseFloat(gf(r,'UDS_CICLICO_NEG','uds_ciclico_neg'))||0;
    mp[k].cpos+=cpRaw;
    mp[k].cneg+=cnRaw;
    mp[k].sm  =Math.min(mp[k].sm,parseFloat(gf(r,'STOCK_MIN_HORA','stock_min_hora'))||0);
    mp[k].cero+=parseInt(gf(r,'REGISTROS_CERO','registros_cero'))||0;
  }
  const maxV=Math.max(...Object.values(mp).map(x=>x.v),1);

  // inv inicio/fin por dia
  const invByDia={};
  for(const r of data){
    const dia=gf(r,'FECHA','fecha');
    if(!invByDia[dia]) invByDia[dia]={ini:null,fin:null};
    const ini=parseFloat(gf(r,'INV_INICIO_DIA','inv_inicio_dia'));
    const fin=parseFloat(gf(r,'INV_FIN_DIA','inv_fin_dia'));
    if(!isNaN(ini)&&ini>=0) invByDia[dia].ini=ini;
    if(!isNaN(fin)&&fin>=0) invByDia[dia].fin=fin;
  }

  function cc(k){
    const c=mp[k]; if(!c) return 'hc0';
    if(c.ing>0) return 'hci';
    if(c.san>0) return 'hcs';
    if(c.cpos>0&&c.cneg===0) return 'hccp';
    if(c.cneg>0&&c.cpos===0) return 'hccn';
    if(c.cero>0&&c.v===0) return 'hcqi';
    if(c.cero>0) return 'hcq';
    if(c.v===0) return 'hc0';
    const p=c.v/maxV;
    return p>.6?'hcv4':p>.35?'hcv3':p>.15?'hcv2':'hcv1';
  }
  function cv(k){
    const c=mp[k]; if(!c) return '';
    if(c.ing>0)  return `+${Math.round(c.ing)}`;
    if(c.san>0)  return `S${Math.round(c.san)}`;
    if(c.cpos>0&&c.cneg===0) return `+${Math.round(c.cpos)}`;
    if(c.cneg>0&&c.cpos===0) return `-${Math.round(c.cneg)}`;
    if(c.v>0)    return Math.round(c.v);
    if(c.cero>0) return '✗';
    return '';
  }

  const hrsQ =Object.values(mp).filter(c=>c.cero>0&&c.v===0).length;
  const hrsI =Object.values(mp).filter(c=>c.ing>0).length;
  const totV =data.reduce((s,r)=>s+(parseFloat(gf(r,'UDS_VENTAS','uds_ventas'))||0),0);
  const totS =data.reduce((s,r)=>s+(parseFloat(gf(r,'UDS_SANEO','uds_saneo'))||0),0);

  el.innerHTML=`
  <div class="fw">
    <select onchange="fT.horario=this.value;fP='';renderAll()">
      ${tiendas.map(t=>`<option value="${t}" ${fT.horario===t?'selected':''}>${t}</option>`).join('')}
    </select>
  </div>
  <div class="fw">
    <select onchange="fP=this.value;renderAll()">
      ${prods.map(p=>`<option value="${p}" ${fP===p?'selected':''}>${p}</option>`).join('')}
    </select>
  </div>

  <div class="strip">
    <div class="si"><div class="sn" style="color:var(--re)">${hrsQ}</div><div class="sl">Hrs quiebre</div></div>
    <div class="si"><div class="sn" style="color:var(--bl)">${hrsI}</div><div class="sl">Hrs con OC</div></div>
    <div class="si"><div class="sn" style="color:var(--gr)">${n(totV)}</div><div class="sl">Uds vendidas</div></div>
    <div class="si"><div class="sn" style="color:var(--pu)">${n(totS)}</div><div class="sl">Uds saneo</div></div>
  </div>

  <div class="legend">
    <span class="leg-item"><span class="leg-dot" style="background:rgba(59,130,246,.55)"></span>OC ingreso</span>
    <span class="leg-item"><span class="leg-dot" style="background:rgba(34,197,94,.6)"></span>Ventas</span>
    <span class="leg-item"><span class="leg-dot" style="background:rgba(239,68,68,.75)"></span>Quiebre</span>
    <span class="leg-item"><span class="leg-dot" style="background:rgba(168,85,247,.55)"></span>Saneo</span>
    <span class="leg-item"><span class="leg-dot" style="background:rgba(245,158,11,.45)"></span>Cíc +</span>
    <span class="leg-item"><span class="leg-dot" style="background:rgba(239,68,68,.25)"></span>Cíc -</span>
  </div>

  ${!dias.length?'<div class="empty">Sin datos para esta selección.</div>':
    dias.map(dia=>{
      const inv=invByDia[dia]||{};
      return `
      <div class="st">${dia.substring(5)} ${dia?'·':''} ${gf({},{})}</div>
      <div class="inv-row">
        <div class="inv-box">
          <div class="inv-num" style="color:var(--bl)">${inv.ini!=null?n(inv.ini):'—'}</div>
          <div class="inv-lbl">Stock inicio día</div>
        </div>
        <div class="inv-box">
          <div class="inv-num" style="color:${inv.fin!=null&&inv.ini!=null?(inv.fin<inv.ini?'var(--re)':'var(--gr)'):'var(--dim)'}">${inv.fin!=null?n(inv.fin):'—'}</div>
          <div class="inv-lbl">Stock fin día</div>
        </div>
        <div class="inv-box">
          <div class="inv-num" style="color:var(--dim)">${inv.ini!=null&&inv.fin!=null?n(inv.ini-inv.fin):'—'}</div>
          <div class="inv-lbl">Δ día</div>
        </div>
      </div>
      <div class="card" style="padding:8px;margin-bottom:12px">
        <div class="hmap-wrap">
          <table class="hmap">
            <thead><tr>
              <th class="lbl">Hora →</th>
              ${HORAS.map(h=>`<th>${h}</th>`).join('')}
            </tr></thead>
            <tbody><tr>
              <td class="lbl">${dia.substring(5)}</td>
              ${HORAS.map(h=>{
                const k=`${dia}_${h}`;
                const c=mp[k];
                const tip=c?`OC:${n(c.ing)} V:${n(c.v)} S:${n(c.san)} C+:${n(c.cpos)} C-:${n(c.cneg)}`:'';
                return `<td class="${cc(k)}" title="${tip}">${cv(k)}</td>`;
              }).join('')}
            </tr></tbody>
          </table>
        </div>
      </div>`;
    }).join('')}`;
}

// ── SANEO ──
function renderSaneo(){
  const el=document.getElementById('vsaneo');
  const sems=uniq(D.saneo,r=>gf(r,'SEMANA','semana')).reverse();
  if(!selSem&&sems.length) selSem=sems[0];

  const data=D.saneo.filter(r=>
    (!fT.saneo||gt(r)===fT.saneo)&&
    (!selSem||gf(r,'SEMANA','semana')===selSem)
  );
  const sorted=[...data].sort((a,b)=>{
    const pa=parseFloat(gf(a,'PCT_CUMPLIMIENTO','pct_cumplimiento'))||0;
    const pb=parseFloat(gf(b,'PCT_CUMPLIMIENTO','pct_cumplimiento'))||0;
    return pa-pb;
  });

  const avg=sorted.length?sorted.reduce((s,r)=>s+(parseFloat(gf(r,'PCT_CUMPLIMIENTO','pct_cumplimiento'))||0),0)/sorted.length:0;
  const totP=sorted.reduce((s,r)=>s+(parseFloat(gf(r,'PRODUCTOS_PEDIDOS','productos_pedidos'))||0),0);
  const totS=sorted.reduce((s,r)=>s+(parseFloat(gf(r,'PRODUCTOS_SANEADOS','productos_saneados'))||0),0);

  el.innerHTML=`
  <div class="fw">
    <select onchange="fT.saneo=this.value;renderAll()">
      <option value="">🏪 Todas las tiendas</option>
      ${uniq(D.saneo,gt).map(t=>`<option value="${t}" ${fT.saneo===t?'selected':''}>${t}</option>`).join('')}
    </select>
  </div>
  <div class="sem-pills">
    ${sems.map(s=>`<button class="sp ${selSem===s?'on':''}" onclick="selSem='${s}';renderAll()">${s.substring(5)}</button>`).join('')}
  </div>

  <div class="strip">
    <div class="si"><div class="sn">${sorted.length}</div><div class="sl">Tiendas</div></div>
    <div class="si"><div class="sn" style="color:${pc2(avg)}">${avg.toFixed(1)}%</div><div class="sl">% cumpl. prom</div></div>
    <div class="si"><div class="sn">${n(totP)}</div><div class="sl">Pedidos</div></div>
    <div class="si"><div class="sn" style="color:var(--gr)">${n(totS)}</div><div class="sl">Saneados</div></div>
  </div>

  <div class="card"><table class="tbl">
    <thead><tr>
      <th>#</th><th>Tienda</th>
      <th class="r">Pedidos</th><th class="r">Saneados</th>
      <th class="r" style="min-width:110px">% Cumpl.</th>
    </tr></thead>
    <tbody>
    ${sorted.map((r,i)=>{
      const ped=parseFloat(gf(r,'PRODUCTOS_PEDIDOS','productos_pedidos'))||0;
      const san=parseFloat(gf(r,'PRODUCTOS_SANEADOS','productos_saneados'))||0;
      const pc =parseFloat(gf(r,'PCT_CUMPLIMIENTO','pct_cumplimiento'))||0;
      return `<tr>
        <td><span class="rk ${i<3?'top':''}">${i+1}</span></td>
        <td class="nm">${gt(r)}<div style="font-size:9px;color:var(--dim)">WH ${gw(r)}</div></td>
        <td class="r" style="color:var(--dim)">${n(ped)}</td>
        <td class="r" style="color:var(--gr)">${n(san)}</td>
        <td class="r">
          <div class="pb">
            <div class="pt"><div class="pf" style="width:${Math.min(pc,100)}%;background:${pc2(pc)}"></div></div>
            <span class="pv" style="color:${pc2(pc)}">${pc.toFixed(1)}%</span>
          </div>
        </td>
      </tr>`;
    }).join('')}
    </tbody>
  </table></div>`;
}

function renderAll(){
  ['resumen','horario','saneo'].forEach(t=>{
    document.getElementById('v'+t).style.display=t===tab?'block':'none';
  });
  if(tab==='resumen') renderResumen();
  if(tab==='horario') renderHorario();
  if(tab==='saneo')   renderSaneo();
}

async function load(){
  try{
    const [r1,r2,r3]=await Promise.all([
      safe(csvUrl(G.resumen)), safe(csvUrl(G.horario)), safe(csvUrl(G.saneo))
    ]);
    D.resumen=parse(r1);
    D.horario=parse(r2);
    D.saneo  =parse(r3);

    const today=new Date();
    const d7=new Date(today); d7.setDate(today.getDate()-7);
    document.getElementById('hdt').textContent=
      d7.toLocaleDateString('es-MX',{day:'2-digit',month:'short'})+' – '+
      today.toLocaleDateString('es-MX',{day:'2-digit',month:'short'});

    console.log('[Supply MX] horario:',D.horario.length,'| saneo:',D.saneo.length);
    if(D.horario[0]) console.log('[horario cols]',Object.keys(D.horario[0]));

    document.getElementById('loading').style.display='none';
    renderAll();
  }catch(e){
    document.getElementById('loading').innerHTML=
      `<div style="font-size:24px;margin-bottom:8px">⚠️</div>${e.message}`;
  }
}
load();
</script>
</body>
</html>
