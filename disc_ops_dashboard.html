<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>TurboOps — Disciplina Operativa</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#F8F8F6;color:#1A1A1A;font-family:'Inter',sans-serif;font-size:13px;min-height:100vh}

/* ── HEADER ── */
.hdr{
  background:#fff;border-bottom:1px solid #E8E8E5;
  padding:13px 28px;display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:100;gap:12px;flex-wrap:wrap;
}
.logo{font-family:'DM Sans',sans-serif;font-size:18px;font-weight:700;letter-spacing:-.3px;color:#1A1A1A}
.logo b{color:#E24B4A;font-weight:700}
.logo-sub{font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;
  background:#F0F7E6;color:#3B6D11;padding:3px 9px;border-radius:20px;margin-left:8px}
.hdr-right{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.live{display:flex;align-items:center;gap:6px;font-size:11px;color:#888780}
.dot{width:7px;height:7px;border-radius:50%;background:#D3D1C7;display:inline-block;transition:background .3s}
.dot.on{background:#639922;box-shadow:0 0 0 2px rgba(99,153,34,.2)}
.week-pill{font-size:11px;font-weight:600;background:#F0F7E6;color:#3B6D11;
  padding:4px 10px;border-radius:20px;display:none}
.btn-ref{font-size:11px;font-weight:600;padding:6px 14px;border:1px solid #D3D1C7;
  border-radius:6px;background:#fff;color:#444;cursor:pointer;font-family:'Inter',sans-serif;
  transition:all .15s}
.btn-ref:hover{background:#F1EFE8;border-color:#999}

/* ── FILTER BAR ── */
.filter-bar{
  background:#fff;border-bottom:1px solid #E8E8E5;
  padding:9px 28px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;
  position:sticky;top:57px;z-index:99;
}
.fl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:#888780}
select{font-family:'Inter',sans-serif;font-size:12px;font-weight:500;
  background:#F8F8F6;border:1px solid #D3D1C7;color:#1A1A1A;
  padding:5px 10px;border-radius:6px;cursor:pointer;outline:none;transition:border-color .15s}
select:focus,select:hover{border-color:#888780}
.sep{width:1px;height:20px;background:#E8E8E5}

/* ── MAIN ── */
.main{padding:20px 28px;max-width:1400px;margin:0 auto}

/* ── LOADING / ERROR ── */
.loading{text-align:center;padding:60px 24px;color:#888780}
.spinner{width:28px;height:28px;border:2px solid #E8E8E5;border-top-color:#E24B4A;
  border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
.loading p{font-size:12px;letter-spacing:.04em}
.err-box{background:#FFF0F0;border:1px solid #FDD;border-radius:8px;
  padding:14px 18px;color:#C0392B;font-size:13px;margin-bottom:16px;display:none}

/* ── ZL SUMMARY CARD ── */
.zl-card{
  background:#fff;border:1px solid #E8E8E5;border-radius:10px;
  padding:18px 22px;margin-bottom:16px;display:none;
  display:flex;gap:20px;align-items:flex-start;flex-wrap:wrap;
  border-left:4px solid #E24B4A;
}
.zl-info{flex:1;min-width:180px}
.zl-name{font-family:'DM Sans',sans-serif;font-size:18px;font-weight:700;margin-bottom:3px}
.zl-meta{font-size:11px;color:#888780;display:flex;gap:12px;flex-wrap:wrap}
.zl-meta a{color:#E24B4A;text-decoration:none}
.zl-meta a:hover{text-decoration:underline}

.stat-row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.stat{background:#F8F8F6;border:1px solid #E8E8E5;border-radius:8px;
  padding:10px 14px;text-align:center;min-width:76px}
.stat .v{font-family:'DM Sans',sans-serif;font-size:20px;font-weight:700;display:block}
.stat .l{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:#888780;margin-top:1px}
.stat.gold  .v{color:#D97706}
.stat.silver .v{color:#94a3b8}
.stat.bronze .v{color:#B45309}
.stat.dis   .v{color:#E24B4A}

.avg-wrap{flex:1;min-width:160px;max-width:240px}
.avg-lbl{display:flex;justify-content:space-between;font-size:11px;color:#888780;margin-bottom:4px}
.avg-lbl span:last-child{font-weight:700;color:#1A1A1A}
.bar-bg{background:#F0EFEB;border-radius:3px;height:6px;overflow:hidden}
.bar-fill{height:6px;border-radius:3px;background:linear-gradient(90deg,#E24B4A,#F97316);transition:width .6s}

.ai-btn{
  font-family:'Inter',sans-serif;font-size:11px;font-weight:600;
  padding:8px 16px;border-radius:20px;cursor:pointer;
  background:#FFF0F0;border:1px solid #FDD;color:#E24B4A;
  display:flex;align-items:center;gap:6px;white-space:nowrap;align-self:center;
  transition:all .2s;
}
.ai-btn:hover{background:#FFE4E1;border-color:#E24B4A;box-shadow:0 2px 8px rgba(226,75,74,.15)}
.ai-btn:disabled{opacity:.45;cursor:not-allowed}
.ai-spin{width:10px;height:10px;border:1.5px solid #E24B4A;border-top-color:transparent;
  border-radius:50%;animation:spin .6s linear infinite;display:none}

/* ── AI PANEL ── */
.ai-panel{
  background:#fff;border:1px solid #E8E8E5;border-left:4px solid #E24B4A;
  border-radius:10px;padding:18px 22px;margin-bottom:16px;display:none;
  animation:fadeUp .25s ease;
}
.ai-panel.show{display:block}
@keyframes fadeUp{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:none}}
.ai-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.ai-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#E24B4A}
.ai-close{background:none;border:none;color:#888780;cursor:pointer;font-size:16px;padding:0 2px;line-height:1}
.ai-close:hover{color:#1A1A1A}
.ai-body{font-size:13px;line-height:1.7;color:#333;white-space:pre-wrap}
.ai-body strong{color:#E24B4A;font-weight:600}

/* ── TABLE ── */
.section-lbl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;
  color:#888780;margin-bottom:8px}
.tbl-wrap{background:#fff;border:1px solid #E8E8E5;border-radius:10px;overflow:hidden;overflow-x:auto}
table{width:100%;border-collapse:collapse;min-width:860px}
thead tr{background:#F8F8F6;border-bottom:2px solid #E8E8E5}
th{padding:9px 12px;text-align:left;font-size:10px;font-weight:600;
  text-transform:uppercase;letter-spacing:.06em;color:#888780;white-space:nowrap}
th.r{text-align:right}
tbody tr{border-bottom:1px solid #F0EFEB;transition:background .12s}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:#FAFAF8}
td{padding:10px 12px;vertical-align:middle}
td.r{text-align:right}

/* ── CLUSTER BADGE ── */
.badge{display:inline-flex;align-items:center;gap:4px;font-size:9px;font-weight:700;
  letter-spacing:.06em;padding:3px 8px;border-radius:20px;white-space:nowrap}
.badge-gold  {background:#FEF3C7;color:#D97706;border:1px solid #FDE68A}
.badge-silver{background:#F1F5F9;color:#64748B;border:1px solid #E2E8F0}
.badge-bronze{background:#FEF0E7;color:#B45309;border:1px solid #FCD9B4}

/* ── STORE NAME ── */
.st-name{font-weight:600;font-size:13px;color:#1A1A1A}
.st-id{font-size:10px;color:#888780;margin-top:1px}

/* ── METRIC MINI ── */
.mc{min-width:88px}
.mrow{display:flex;justify-content:space-between;font-size:11px;margin-bottom:3px}
.mrow .mp{font-weight:600;color:#1A1A1A}
.mini-bg{background:#F0EFEB;border-radius:2px;height:4px;overflow:hidden}
.mini-f{height:4px;border-radius:2px;transition:width .5s}
.f-green {background:#639922}
.f-yellow{background:#F59E0B}
.f-red   {background:#E24B4A}
.f-gray  {background:#D3D1C7}

/* ── DIS_OPS SCORE ── */
.dis-score{font-family:'DM Sans',sans-serif;font-size:16px;font-weight:700}
.ds-green {color:#639922}
.ds-yellow{color:#D97706}
.ds-red   {color:#E24B4A}

/* ── OFF SKU ── */
.off-ok {color:#639922;font-weight:700;font-size:12px}
.off-bad{color:#E24B4A;font-weight:700;font-size:12px}

/* ── FEFO TAG ── */
.fefo{font-size:10px;font-weight:600;background:#F8F8F6;border:1px solid #E8E8E5;
  padding:2px 7px;border-radius:4px;color:#888780}

/* ── EMPTY ── */
.empty{text-align:center;padding:48px 24px;color:#888780}
.empty-icon{font-size:36px;margin-bottom:10px}

/* scrollbar */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:#F8F8F6}
::-webkit-scrollbar-thumb{background:#D3D1C7;border-radius:3px}
</style>
</head>
<body>

<!-- HEADER -->
<div class="hdr">
  <div style="display:flex;align-items:center;gap:8px">
    <span class="logo">Turbo<b>Ops</b></span>
    <span class="logo-sub">Disciplina Operativa</span>
  </div>
  <div class="hdr-right">
    <div class="live"><span class="dot" id="dot"></span><span id="upd-txt">Cargando…</span></div>
    <span class="week-pill" id="weekPill"></span>
    <button class="btn-ref" onclick="init()">↺ Refrescar</button>
  </div>
</div>

<!-- FILTERS -->
<div class="filter-bar">
  <span class="fl">País</span>
  <select id="selC"><option value="">Todos</option></select>
  <div class="sep"></div>
  <span class="fl">Zone Lead</span>
  <select id="selZL"><option value="">Todos</option></select>
</div>

<!-- MAIN -->
<div class="main">
  <div class="err-box" id="errBox"></div>

  <!-- LOADING -->
  <div class="loading" id="ldBlock">
    <div class="spinner"></div>
    <p>Cargando datos del sheet…</p>
  </div>

  <!-- CONTENT -->
  <div id="cnt" style="display:none">

    <!-- ZL CARD (visible cuando ZL está seleccionado) -->
    <div class="zl-card" id="zlCard" style="display:none">
      <div class="zl-info">
        <div class="zl-name" id="zlName">—</div>
        <div class="zl-meta" id="zlMeta"></div>
      </div>
      <div class="stat-row" id="zlStats"></div>
      <div class="avg-wrap" id="zlAvgWrap">
        <div class="avg-lbl"><span>DIS_OPS Promedio</span><span id="zlAvgVal">—</span></div>
        <div class="bar-bg"><div class="bar-fill" id="zlAvgBar" style="width:0%"></div></div>
      </div>
      <button class="ai-btn" id="aiBtnMain" onclick="runAI()">
        ⚡ Analizar con IA
        <div class="ai-spin" id="aiSpin"></div>
      </button>
    </div>

    <!-- AI PANEL -->
    <div class="ai-panel" id="aiPanel">
      <div class="ai-hdr">
        <div class="ai-title">⚡ Análisis IA — Zone Lead</div>
        <button class="ai-close" onclick="closeAI()">✕</button>
      </div>
      <div class="ai-body" id="aiBody"></div>
    </div>

    <!-- TABLE -->
    <div class="section-lbl" id="tblLbl">Tiendas</div>
    <div class="tbl-wrap">
      <table>
        <thead>
          <tr>
            <th>Cluster</th>
            <th>Tienda</th>
            <th>País</th>
            <th class="mc">Surtido <span style="color:#C8C6BF">40%</span></th>
            <th class="mc">Cíclicos <span style="color:#C8C6BF">5%</span></th>
            <th class="mc">Cyclic SO <span style="color:#C8C6BF">20%</span></th>
            <th class="mc">Fruver <span style="color:#C8C6BF">20%</span></th>
            <th>Off SKU <span style="color:#C8C6BF">15%</span></th>
            <th>FEFO <span style="color:#C8C6BF;font-weight:400">(info)</span></th>
            <th class="r">DIS_OPS</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>

  </div><!-- /cnt -->
</div>

<script>
const SHEET_ID = '1LIaSEsGHCXPHmgbi-f1gJxC5A7KchMnp8hE9x4edqAo';

// ── utils ─────────────────────────────────────────────────
const num = v => (v === null || v === undefined || v === '') ? null : +v;
const pct = v => v === null ? '—' : `${(+v*100).toFixed(1)}%`;

const mcolor = v => {
  if (v === null) return 'f-gray';
  if (v >= 0.85) return 'f-green';
  if (v >= 0.70) return 'f-yellow';
  return 'f-red';
};
const dcolor = v => {
  if (v === null) return '';
  if (v >= 0.90) return 'ds-green';
  if (v >= 0.80) return 'ds-yellow';
  return 'ds-red';
};
const clsBadge = v => {
  if (v === null) return { cls:'badge-bronze', label:'—', icon:'' };
  if (v >= 0.90) return { cls:'badge-gold',   label:'GOLD',   icon:'🥇' };
  if (v >= 0.80) return { cls:'badge-silver', label:'SILVER', icon:'🥈' };
  return              { cls:'badge-bronze', label:'BRONZE', icon:'🥉' };
};
const miniBar = (v, cls) => {
  const w = Math.min(100, Math.max(0, (v||0)*100)).toFixed(1);
  return `<div class="mini-bg"><div class="mini-f ${cls}" style="width:${w}%"></div></div>`;
};
const mCell = (v) => {
  const cls = mcolor(v);
  return `<td class="mc">
    <div class="mrow"><span class="mp">${pct(v)}</span></div>
    ${miniBar(v, cls)}
  </td>`;
};

// ── sheet fetch ───────────────────────────────────────────
async function fetchTab(tab) {
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(tab)}`;
  const res = await fetch(url);
  if (!res.ok) throw new Error(`HTTP ${res.status} al leer "${tab}"`);
  const raw = await res.text();
  const j = JSON.parse(raw.replace(/^[^(]+\(|\);?\s*$/g, ''));
  if (j.status !== 'ok') throw new Error(j.errors?.[0]?.message || 'Error gviz');
  const cols = j.table.cols.map(c => c.label || c.id);
  return (j.table.rows || []).map(r =>
    Object.fromEntries(cols.map((c,i) => [c, r.c?.[i]?.v ?? null]))
  );
}

// ── state ─────────────────────────────────────────────────
let rows = [];   // latest week per store
let zlMap = {};  // "PAÍS|WH_ID" -> zl info
let fc = '', fz = '';

// ── init ──────────────────────────────────────────────────
async function init() {
  show('ldBlock');
  hide('cnt');
  hideErr();
  setDot(false);

  try {
    const [det, zl] = await Promise.all([fetchTab('DETALLES'), fetchTab('ZL')]);

    // ── build zlMap ──
    zlMap = {};
    zl.forEach(r => {
      const country = str(r['PAÍS'] || r['PAIS'] || r['COUNTRY_CODE'] || '');
      const wh = str(r['WH ID'] || r['WH_ID'] || '');
      if (!country || !wh) return;
      zlMap[`${country}|${wh}`] = {
        lead:     str(r['Zone Lead'] || r['ZONE_LEAD'] || ''),
        email:    str(r['Email ZL'] || ''),
        district: str(r['District Lead'] || ''),
        city:     str(r['CITY_NAME'] || ''),
        whName:   str(r['WAREHOUSE_NAME'] || ''),
      };
    });

    // ── latest week per store ──
    const byStore = {};
    det.forEach(r => {
      const country = str(r['COUNTRY_CODE'] || '');
      const wh = str(r['WH_ID'] || '');
      if (!country || !wh) return;
      const sem = str(r['SEMANA'] || '').substring(0, 10);
      const k = `${country}|${wh}`;
      if (!byStore[k] || sem > byStore[k]._sem) {
        byStore[k] = { ...r, _sem: sem, _country: country, _wh: wh, _key: k };
      }
    });
    rows = Object.values(byStore);

    // ── week badge ──
    const weeks = [...new Set(rows.map(r => r._sem))].sort();
    const lastW = weeks.at(-1) || '';
    if (lastW) { setText('weekPill', `Semana ${lastW}`); show('weekPill'); }
    setText('upd-txt', `Actualizado ${new Date().toLocaleTimeString('es', {hour:'2-digit',minute:'2-digit'})}`);
    setDot(true);

    // ── populate filters ──
    const countries = [...new Set(rows.map(r => r._country))].sort();
    fillSelect('selC', countries, 'Todos los países');
    buildZLFilter();

    document.getElementById('selC').onchange = e => { fc = e.target.value; buildZLFilter(); render(); };
    document.getElementById('selZL').onchange = e => { fz = e.target.value; render(); };

    hide('ldBlock');
    show('cnt');
    render();

  } catch(e) {
    hide('ldBlock');
    showErr(e.message);
    setDot(false);
  }
}

function buildZLFilter() {
  const filtered = fc ? rows.filter(r => r._country === fc) : rows;
  const leads = [...new Set(filtered.map(r => zlMap[r._key]?.lead || 'Sin ZL').filter(Boolean))].sort();
  fillSelect('selZL', leads, 'Todos los ZL');
  if (!leads.includes(fz)) { fz = ''; document.getElementById('selZL').value = ''; }
}

function fillSelect(id, opts, placeholder) {
  const el = document.getElementById(id);
  el.innerHTML = `<option value="">${placeholder}</option>` +
    opts.map(o => `<option value="${o}">${o}</option>`).join('');
}

// ── render ────────────────────────────────────────────────
function render() {
  closeAI();

  let visible = rows;
  if (fc) visible = visible.filter(r => r._country === fc);
  if (fz) visible = visible.filter(r => (zlMap[r._key]?.lead || 'Sin ZL') === fz);
  visible = [...visible].sort((a,b) => (num(a['DIS_OPS'])||0) - (num(b['DIS_OPS'])||0));

  renderZLCard(visible);
  renderTable(visible);
  setText('tblLbl', `${visible.length} tienda${visible.length!==1?'s':''}`);
}

function renderZLCard(vis) {
  const card = document.getElementById('zlCard');
  if (!vis.length || !fz) { card.style.display = 'none'; return; }
  card.style.display = 'flex';

  const zl = zlMap[vis[0]?._key] || {};
  const disVals = vis.map(r => num(r['DIS_OPS'])).filter(v=>v!==null);
  const avg = disVals.length ? disVals.reduce((a,b)=>a+b,0)/disVals.length : 0;
  const gold   = vis.filter(r=>(num(r['DIS_OPS'])||0)>=0.90).length;
  const silver = vis.filter(r=>{const v=num(r['DIS_OPS'])||0;return v>=0.80&&v<0.90}).length;
  const bronze = vis.filter(r=>(num(r['DIS_OPS'])||0)<0.80).length;

  setText('zlName', zl.lead || fz);
  document.getElementById('zlMeta').innerHTML = [
    zl.email ? `<a href="mailto:${zl.email}">${zl.email}</a>` : '',
    zl.district ? `<span>District: ${zl.district}</span>` : '',
    fc ? `<span>País: ${fc}</span>` : '',
  ].filter(Boolean).join('');

  document.getElementById('zlStats').innerHTML = `
    <div class="stat dis"><span class="v">${pct(avg)}</span><span class="l">DIS_OPS avg</span></div>
    <div class="stat"><span class="v">${vis.length}</span><span class="l">Tiendas</span></div>
    <div class="stat gold"><span class="v">${gold}</span><span class="l">🥇 Gold</span></div>
    <div class="stat silver"><span class="v">${silver}</span><span class="l">🥈 Silver</span></div>
    <div class="stat bronze"><span class="v">${bronze}</span><span class="l">🥉 Bronze</span></div>
  `;
  setText('zlAvgVal', pct(avg));
  document.getElementById('zlAvgBar').style.width = `${(avg*100).toFixed(1)}%`;
}

function renderTable(vis) {
  const tbody = document.getElementById('tbody');
  if (!vis.length) {
    tbody.innerHTML = `<tr><td colspan="10"><div class="empty">
      <div class="empty-icon">🔍</div>
      <p>Sin tiendas para los filtros seleccionados</p>
    </div></td></tr>`;
    return;
  }

  tbody.innerHTML = vis.map(r => {
    const zl   = zlMap[r._key] || {};
    const dis  = num(r['DIS_OPS']);
    const surt = num(r['PROGRESS_SURTIDO']);
    const cyc  = num(r['PROGRESS_CYCLICS']);
    const so   = num(r['PROGRESS_CYCLIC_SO']);
    const fruv = num(r['DISC_FRUVER']);
    const off  = num(r['OFF_SKU']);
    const fefo = num(r['FEFO_PCT_COMPLETADAS']);
    const b = clsBadge(dis);
    const name = str(r['WAREHOUSENAME'] || zl.whName || '');

    return `<tr>
      <td><span class="badge ${b.cls}">${b.icon} ${b.label}</span></td>
      <td>
        <div class="st-name">${name || `Tienda ${r._wh}`}</div>
        <div class="st-id">ID ${r._wh} · ${zl.lead || 'Sin ZL'}</div>
      </td>
      <td style="color:#888780;font-size:11px;font-weight:600">${r._country}</td>
      ${mCell(surt)}
      ${mCell(cyc)}
      ${mCell(so)}
      ${mCell(fruv)}
      <td>${off===null ? '—' : off<=5
        ? `<span class="off-ok">✓ ${off}</span>`
        : `<span class="off-bad">✗ ${off}</span>`}</td>
      <td>${fefo!==null ? `<span class="fefo">${pct(fefo)}</span>` : '<span class="fefo">—</span>'}</td>
      <td class="r"><span class="dis-score ${dcolor(dis)}">${pct(dis)}</span></td>
    </tr>`;
  }).join('');
}

// ── AI analysis ───────────────────────────────────────────
async function runAI() {
  const btn = document.getElementById('aiBtnMain');
  const spin = document.getElementById('aiSpin');
  const panel = document.getElementById('aiPanel');
  const body = document.getElementById('aiBody');

  btn.disabled = true; spin.style.display = 'block';
  panel.classList.add('show');
  body.textContent = 'Generando análisis…';

  let vis = rows;
  if (fc) vis = vis.filter(r => r._country === fc);
  if (fz) vis = vis.filter(r => (zlMap[r._key]?.lead||'Sin ZL') === fz);
  vis = [...vis].sort((a,b)=>(num(a['DIS_OPS'])||0)-(num(b['DIS_OPS'])||0));

  const zl = zlMap[vis[0]?._key] || {};
  const disVals = vis.map(r=>num(r['DIS_OPS'])).filter(v=>v!==null);
  const avg = disVals.length ? disVals.reduce((a,b)=>a+b,0)/disVals.length : 0;
  const gold   = vis.filter(r=>(num(r['DIS_OPS'])||0)>=0.90).length;
  const silver = vis.filter(r=>{const v=num(r['DIS_OPS'])||0;return v>=0.80&&v<0.90}).length;
  const bronze = vis.filter(r=>(num(r['DIS_OPS'])||0)<0.80).length;

  const lines = vis.map(r => {
    const b = clsBadge(num(r['DIS_OPS']));
    return `  • ${str(r['WAREHOUSENAME']||r._wh)} (${r._country}) — DIS_OPS: ${pct(num(r['DIS_OPS']))} [${b.label}] | Surtido: ${pct(num(r['PROGRESS_SURTIDO']))} | Cyclics: ${pct(num(r['PROGRESS_CYCLICS']))} | SO: ${pct(num(r['PROGRESS_CYCLIC_SO']))} | Fruver: ${pct(num(r['DISC_FRUVER']))} | Off SKU: ${r['OFF_SKU']??'?'}`;
  }).join('\n');

  const prompt = `Eres experto en operaciones de dark stores / quick commerce. Analiza el reporte de Disciplina Operativa para el Zone Lead "${fz||'Vista global'}" y genera un análisis ejecutivo en español.

RESUMEN ZL:
- Zone Lead: ${fz||'Vista global'} ${zl.district?`| District: ${zl.district}`:''}
- Tiendas: ${vis.length} | 🥇 Gold (≥90%): ${gold} | 🥈 Silver (80-90%): ${silver} | 🥉 Bronze (<80%): ${bronze}
- DIS_OPS Promedio: ${pct(avg)}

PESOS DEL SCORE: Surtido 40% | Cyclic SO 20% | Fruver 20% | Apagados 15% | Cyclics 5%
(FEFO es informativo, no impacta el score)

TIENDAS (peor → mejor):
${lines}

Entrega:
1. **Diagnóstico** (2-3 líneas): situación general del ZL.
2. **Top 3 críticas**: para cada una, la métrica que más la arrastra y UNA acción concreta esta semana.
3. **Palanca principal**: la métrica más débil del portafolio y por qué importa.
4. **Prioridad de la semana**: qué debe atacar primero.

Directo, usa números, máximo 320 palabras.`;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        model:'claude-sonnet-4-20250514', max_tokens:1000,
        messages:[{role:'user',content:prompt}]
      })
    });
    const data = await res.json();
    const text = data.content?.find(b=>b.type==='text')?.text || 'Sin respuesta.';
    body.innerHTML = text
      .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
      .replace(/\n/g,'<br>');
  } catch(e) {
    body.textContent = `Error: ${e.message}`;
  } finally {
    btn.disabled = false; spin.style.display = 'none';
  }
}

function closeAI() { document.getElementById('aiPanel').classList.remove('show'); }

const hide = id => document.getElementById(id).style.display = 'none';

const setDot = on => document.getElementById('dot').className = 'dot'+(on?' on':'');

const hideErr = () => { document.getElementById('errBox').style.display='none'; };

init();
</script>
