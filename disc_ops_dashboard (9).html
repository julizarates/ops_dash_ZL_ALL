<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TurboOps — Disciplina Operativa</title>
<link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#F5F4F0;color:#111;font-family:'Figtree',sans-serif;font-size:13px;line-height:1.5;overflow-x:hidden}

.hdr{background:#fff;border-bottom:1px solid #E5E4DF;padding:12px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;flex-wrap:wrap;gap:8px}
.logo{font-size:17px;font-weight:700;letter-spacing:-.4px}.logo b{color:#E24B4A}
.rtag{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;background:#FCEAE8;color:#C0392B;border:1px solid #F5C6C0;padding:2px 8px;border-radius:10px;margin-left:8px}
.hdr-r{display:flex;align-items:center;gap:12px}
.live{display:flex;align-items:center;gap:5px;font-size:11px;color:#999}
.dot{width:6px;height:6px;border-radius:50%;background:#ccc;transition:background .3s}
.dot.ok{background:#4CAF50}
.btn{font-size:11px;font-weight:600;padding:5px 14px;border:1px solid #DDD;border-radius:6px;background:#fff;cursor:pointer;font-family:'Figtree',sans-serif}
.btn:hover{background:#F5F4F0}

.fbar{background:#fff;border-bottom:1px solid #E5E4DF;padding:10px 24px;display:flex;gap:10px;align-items:center;flex-wrap:wrap;position:sticky;top:53px;z-index:49}
.fl{font-size:10px;font-weight:700;color:#aaa;text-transform:uppercase;letter-spacing:.7px;white-space:nowrap}
.sbtns{display:flex;gap:6px;flex-wrap:wrap}
.sb{padding:5px 14px;border:1.5px solid #E0DFD9;border-radius:20px;font-size:12px;font-weight:500;color:#666;cursor:pointer;background:#fff;font-family:'Figtree',sans-serif;transition:all .15s;white-space:nowrap}
.sb:hover{border-color:#888;color:#111}
.sb.on{background:#111;color:#fff;border-color:#111}
.fsep{width:1px;height:20px;background:#E5E4DF;flex-shrink:0}
select{font-family:'Figtree',sans-serif;font-size:13px;font-weight:500;background:#fff;
  border:1.5px solid #E0DFD9;color:#111;padding:6px 12px;border-radius:8px;
  cursor:pointer;outline:none;transition:border-color .15s;min-width:160px;max-width:260px}
select:focus,select:hover{border-color:#888}

.wstrip{background:#111;color:#fff;padding:8px 24px;display:flex;gap:20px;align-items:center;flex-wrap:wrap}
.wi{display:flex;flex-direction:column}
.wi-l{font-size:9px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;color:#666}
.wi-v{font-size:13px;font-weight:600;margin-top:1px}
.wsep{width:1px;height:22px;background:#333}

.main{padding:20px 24px}
.stitle{font-size:13px;font-weight:700;margin-bottom:12px;color:#111}
.stitle-sub{font-size:11px;font-weight:400;color:#999;margin-left:6px}

.kpi-row{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:22px}
.kpi{background:#fff;border:1px solid #E5E4DF;border-radius:10px;padding:16px 18px;border-left:3px solid var(--c,#E24B4A)}
.kpi-l{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:#aaa;margin-bottom:8px}
.kpi-v{font-size:28px;font-weight:700;letter-spacing:-.6px;line-height:1;margin-bottom:4px}
.kpi-sub{font-size:11px;color:#bbb}

.badge{display:inline-flex;align-items:center;gap:3px;font-size:9px;font-weight:700;letter-spacing:.05em;padding:2px 8px;border-radius:10px;white-space:nowrap}
.b-gold  {background:#FEF3C7;color:#D97706;border:1px solid #FDE68A}
.b-silver{background:#F1F5F9;color:#64748B;border:1px solid #E2E8F0}
.b-bronze{background:#FEF0E7;color:#B45309;border:1px solid #FCD9B4}

.tlist{display:flex;flex-direction:column;gap:6px;margin-bottom:22px}
.trow{background:#fff;border:1px solid #E5E4DF;border-radius:8px;padding:12px 16px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;border-left:3px solid transparent;transition:border-color .15s}
.trow:hover{border-left-color:#E24B4A}
.trow-left{min-width:170px}
.trow-name{font-size:13px;font-weight:700}
.trow-id{font-size:10px;color:#aaa;margin-top:2px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.trow-zl{font-size:10px;color:#aaa;margin-top:1px}
.trow-metrics{display:flex;gap:16px;flex:1;flex-wrap:wrap;align-items:flex-end}
.tm{display:flex;flex-direction:column;gap:1px;min-width:60px}
.tm-v{font-size:15px;font-weight:700;line-height:1}
.tm-l{font-size:9px;color:#bbb;text-transform:uppercase;letter-spacing:.5px;margin-top:1px}
.tm-bar{height:3px;background:#F0EFEB;border-radius:2px;margin-top:3px;overflow:hidden}
.tm-fill{height:3px;border-radius:2px;transition:width .5s}
.fill-g{background:#4CAF50}.fill-y{background:#FF9800}.fill-r{background:#E24B4A}.fill-gr{background:#ccc}
.trow-right{display:flex;flex-direction:column;align-items:flex-end;gap:3px;min-width:72px}
.dis-big{font-size:22px;font-weight:700;letter-spacing:-.5px;line-height:1}
.dc-g{color:#2A7A4A}.dc-y{color:#D97706}.dc-r{color:#E24B4A}
.off-ok{color:#2A7A4A;font-weight:700;font-size:12px}
.off-bad{color:#E24B4A;font-weight:700;font-size:12px}
.fefo{font-size:10px;font-weight:600;background:#F5F4F0;border:1px solid #E5E4DF;padding:1px 6px;border-radius:4px;color:#888}

.ai-btn{font-family:'Figtree',sans-serif;font-size:11px;font-weight:600;padding:6px 16px;border-radius:20px;cursor:pointer;background:#FCEAE8;border:1px solid #F5C6C0;color:#E24B4A;display:inline-flex;align-items:center;gap:6px;transition:all .2s;margin-bottom:14px}
.ai-btn:hover{background:#FFD5D0;border-color:#E24B4A}
.ai-btn:disabled{opacity:.4;cursor:not-allowed}
.ai-sp{width:10px;height:10px;border:1.5px solid #E24B4A;border-top-color:transparent;border-radius:50%;animation:spin .6s linear infinite;display:none}

.ai-panel{background:#fff;border:1px solid #E5E4DF;border-left:3px solid #E24B4A;border-radius:8px;padding:16px 20px;margin-bottom:16px;display:none}
.ai-panel.show{display:block}
.ai-ph{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.ai-pt{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#E24B4A}
.ai-cl{background:none;border:none;color:#aaa;cursor:pointer;font-size:16px;line-height:1}
.ai-cl:hover{color:#111}
.ai-body{font-size:13px;line-height:1.7;color:#333;white-space:pre-wrap}
.ai-body strong{color:#E24B4A;font-weight:700}

.ld{display:flex;align-items:center;justify-content:center;gap:10px;padding:60px;color:#aaa;font-size:13px}
.sp{width:16px;height:16px;border:2px solid #E0DFD9;border-top-color:#E24B4A;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.err{background:#FCEAE8;border:1px solid #F5C6C0;border-radius:8px;padding:14px 18px;color:#C0392B;font-size:13px;margin:16px 24px;display:none}

@media(max-width:700px){
  .hdr,.fbar,.main{padding-left:14px;padding-right:14px}
  .wstrip{padding:8px 14px;gap:12px}
  .kpi-row{grid-template-columns:repeat(2,1fr)}
  .trow{flex-wrap:wrap}
}
</style>
</head>
<body>

<div class="hdr">
  <div style="display:flex;align-items:center">
    <span class="logo">Turbo<b>Ops</b></span>
    <span class="rtag">Disciplina Operativa</span>
  </div>
  <div class="hdr-r">
    <span class="live"><span class="dot" id="dot"></span><span id="upd">Cargando...</span></span>
    <button class="btn" onclick="loadAll()">↺ Refrescar</button>
  </div>
</div>

<div class="fbar">
  <span class="fl">País</span>
  <select id="country-sel" onchange="setCountryFromSel(this)">
    <option value="all">Todos los países</option>
  </select>
  <div class="fsep"></div>
  <span class="fl">Zone Lead</span>
  <select id="zl-sel" onchange="setZLFromSel(this)">
    <option value="all">Todos los ZL</option>
  </select>
</div>

<div class="err" id="err"></div>
<div class="ld" id="gld"><div class="sp"></div>Cargando datos...</div>

<div id="app" style="display:none">
  <div class="wstrip">
    <div class="wi"><div class="wi-l">Semana</div><div class="wi-v" id="w-sem">—</div></div>
    <div class="wsep"></div>
    <div class="wi"><div class="wi-l">Zone Lead</div><div class="wi-v" id="w-zl">Todos</div></div>
    <div class="wsep"></div>
    <div class="wi"><div class="wi-l">Tiendas</div><div class="wi-v" id="w-stores">—</div></div>
    <div class="wsep"></div>
    <div class="wi"><div class="wi-l">Cluster</div><div class="wi-v" id="w-badges">—</div></div>
  </div>

  <div class="main">
    <div class="stitle">Resumen <span class="stitle-sub" id="kpi-sub">vista general</span></div>
    <div class="kpi-row">
      <div class="kpi" style="--c:#E24B4A">
        <div class="kpi-l">DIS_OPS Promedio</div>
        <div class="kpi-v" id="kv-dis">—</div>
        <div class="kpi-sub">score ponderado</div>
      </div>
      <div class="kpi" style="--c:#1976D2">
        <div class="kpi-l">Surtido <span style="color:#ddd;font-weight:400">40%</span></div>
        <div class="kpi-v" id="kv-sur">—</div>
        <div class="kpi-sub" id="ks-sur"></div>
      </div>
      <div class="kpi" style="--c:#4CAF50">
        <div class="kpi-l">Cyclic SO <span style="color:#ddd;font-weight:400">20%</span></div>
        <div class="kpi-v" id="kv-so">—</div>
        <div class="kpi-sub" id="ks-so"></div>
      </div>
      <div class="kpi" style="--c:#FF9800">
        <div class="kpi-l">Fruver <span style="color:#ddd;font-weight:400">20%</span></div>
        <div class="kpi-v" id="kv-fr">—</div>
        <div class="kpi-sub" id="ks-fr"></div>
      </div>
      <div class="kpi" style="--c:#00897B">
        <div class="kpi-l">Cíclicos <span style="color:#ddd;font-weight:400">5%</span></div>
        <div class="kpi-v" id="kv-cy">—</div>
        <div class="kpi-sub" id="ks-cy"></div>
      </div>
    </div>

    <button class="ai-btn" id="aibtn" onclick="runAI()">
      ⚡ Analizar con IA <div class="ai-sp" id="aispin"></div>
    </button>
    <div class="ai-panel" id="aipanel">
      <div class="ai-ph">
        <div class="ai-pt">⚡ Análisis IA</div>
        <button class="ai-cl" onclick="closeAI()">✕</button>
      </div>
      <div class="ai-body" id="aibody"></div>
    </div>

    <div class="stitle">Por tienda <span class="stitle-sub">ordenadas peor → mejor DIS_OPS</span></div>
    <div class="tlist" id="tlist"></div>
  </div>
</div>

<script>
// ── CONFIG ────────────────────────────────────────────────
const PUB_ID = '2PACX-1vQnT4uViGiikmSNyKqTYcaQDcW5UUsxipbLFpETotIJm46MVdk8AwgQ0-M5IBE4sRZ6h8KJ0QGy3iXE';
const GID_DETALLES = '1138623282';
const GID_ZL       = '258561144';

const csvUrl = gid =>
  `https://docs.google.com/spreadsheets/d/e/${PUB_ID}/pub?gid=${gid}&single=true&output=csv`;

// ── STATE ─────────────────────────────────────────────────
let dataRows = [];
let zlMap    = {};
let selCountry = 'all';
let selZL      = 'all';

// ── CSV PARSER ────────────────────────────────────────────
function parseCSV(text) {
  const lines = text.trim().split('\n');
  const clean = l => l.replace(/\r/g, '');
  const splitLine = line => {
    const res = []; let cur = ''; let inQ = false;
    for (let i = 0; i < line.length; i++) {
      const c = line[i];
      if (c === '"') { inQ = !inQ; continue; }
      if (c === ',' && !inQ) { res.push(cur.trim()); cur = ''; continue; }
      cur += c;
    }
    res.push(cur.trim()); return res;
  };
  // Auto-detect header row — Aleph agrega filas de metadata antes de los datos
  const KNOWN = ['COUNTRY_CODE','WH_ID','DIS_OPS','SEMANA','WAREHOUSENAME',
                 'PROGRESS_SURTIDO','PAÍS','PAIS','ZONE_LEAD','WH ID','Zone Lead','Key'];
  let headerIdx = 0;
  for (let i = 0; i < Math.min(lines.length, 30); i++) {
    const cols = splitLine(clean(lines[i])).map(c => c.trim());
    if (cols.some(c => KNOWN.includes(c))) { headerIdx = i; break; }
  }
  const headers = splitLine(clean(lines[headerIdx]));
  return lines.slice(headerIdx + 1).map(l => {
    const vals = splitLine(clean(l));
    const o = {};
    headers.forEach((h, i) => o[h.trim()] = (vals[i] || '').trim());
    return o;
  }).filter(r => Object.values(r).some(v => v));
}

// ── FETCH ─────────────────────────────────────────────────
async function fetchCSV(gid) {
  const res = await fetch(csvUrl(gid));
  if (!res.ok) throw new Error(`Error ${res.status} al leer tab (gid ${gid}). Asegura que el sheet esté publicado en la web (Archivo → Publicar en la web).`);
  return parseCSV(await res.text());
}

// ── LOAD ──────────────────────────────────────────────────
async function loadAll() {
  document.getElementById('dot').className = 'dot';
  document.getElementById('upd').textContent = 'Cargando...';
  document.getElementById('gld').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
  document.getElementById('err').style.display = 'none';

  try {
    const [det, zl] = await Promise.all([fetchCSV(GID_DETALLES), fetchCSV(GID_ZL)]);

    // build zlMap
    zlMap = {};
    zl.forEach(r => {
      const country = (r['PAÍS'] || r['PAIS'] || r['COUNTRY_CODE'] || '').trim();
      const wh = (r['WH ID'] || r['WH_ID'] || '').toString().trim();
      if (!country || !wh) return;
      zlMap[`${country}|${wh}`] = {
        lead:     (r['Zone Lead'] || r['ZONE_LEAD'] || '').trim(),
        email:    (r['Email ZL'] || '').trim(),
        district: (r['District Lead'] || '').trim(),
        city:     (r['CITY_NAME'] || '').trim(),
      };
    });

    // latest week per store
    const byStore = {};
    det.forEach(r => {
      const country = (r['COUNTRY_CODE'] || '').trim();
      const wh = (r['WH_ID'] || '').toString().trim();
      if (!country || !wh) return;
      const sem = (r['SEMANA'] || '').substring(0, 10);
      const k = `${country}|${wh}`;
      if (!byStore[k] || sem > (byStore[k]._sem || '')) {
        byStore[k] = { ...r, _sem: sem, _country: country, _wh: wh, _key: k };
      }
    });
    dataRows = Object.values(byStore).filter(r => (zlMap[r._key]?.lead || '').trim() !== '');

    buildFilters();

    document.getElementById('gld').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    document.getElementById('dot').className = 'dot ok';
    document.getElementById('upd').textContent = 'Act. ' + new Date().toLocaleTimeString('es', {hour:'2-digit',minute:'2-digit'});
    render();

  } catch(e) {
    document.getElementById('gld').style.display = 'none';
    const eb = document.getElementById('err');
    eb.textContent = '⚠️ ' + e.message;
    eb.style.display = '';
  }
}

// ── FILTERS ───────────────────────────────────────────────
function buildFilters() {
  const countries = [...new Set(dataRows.map(r => r._country).filter(Boolean))].sort();

  const csel = document.getElementById('country-sel');
  csel.innerHTML = '<option value="all">Todos los países</option>';
  countries.forEach(c => {
    const o = document.createElement('option');
    o.value = c; o.textContent = `${flag(c)} ${c}`;
    if (c === selCountry) o.selected = true;
    csel.appendChild(o);
  });

  buildZLFilter();
}

function buildZLFilter() {
  const vis = selCountry === 'all' ? dataRows : dataRows.filter(r => r._country === selCountry);
  const zls = [...new Set(vis.map(r => zlMap[r._key]?.lead || '').filter(Boolean))].sort();

  const zsel = document.getElementById('zl-sel');
  zsel.innerHTML = '<option value="all">Todos los ZL</option>';
  zls.forEach(z => {
    const o = document.createElement('option');
    o.value = z; o.textContent = z;
    if (z === selZL) o.selected = true;
    zsel.appendChild(o);
  });
}

function setCountryFromSel(sel) {
  selCountry = sel.value; selZL = 'all';
  document.getElementById('zl-sel').value = 'all';
  buildZLFilter();
  render();
}
function setZLFromSel(sel) {
  selZL = sel.value;
  render();
}

// ── RENDER ────────────────────────────────────────────────
function render() {
  closeAI();

  let vis = dataRows;
  if (selCountry !== 'all') vis = vis.filter(r => r._country === selCountry);
  if (selZL !== 'all') vis = vis.filter(r => (zlMap[r._key]?.lead || '') === selZL);
  vis = [...vis].sort((a,b) => (n(a['DIS_OPS'])||0) - (n(b['DIS_OPS'])||0));

  const sem = [...new Set(vis.map(r => r._sem).filter(Boolean))].sort().at(-1) || '—';
  document.getElementById('w-sem').textContent = 'Sem. ' + fmtW(sem);
  document.getElementById('w-zl').textContent = selZL !== 'all' ? selZL : 'Todos';
  document.getElementById('w-stores').textContent = vis.length;
  document.getElementById('kpi-sub').textContent =
    selZL !== 'all' ? selZL : (selCountry !== 'all' ? selCountry : 'vista general');

  const gold   = vis.filter(r => (n(r['DIS_OPS'])||0) >= 0.90).length;
  const silver = vis.filter(r => { const v=n(r['DIS_OPS'])||0; return v>=0.80&&v<0.90; }).length;
  const bronze = vis.filter(r => (n(r['DIS_OPS'])||0) < 0.80).length;
  document.getElementById('w-badges').textContent = `🥇${gold}  🥈${silver}  🥉${bronze}`;

  // KPIs
  const avg = col => {
    const vals = vis.map(r => n(r[col])).filter(v => v !== null);
    return vals.length ? vals.reduce((a,b)=>a+b,0)/vals.length : null;
  };
  const setKV = (vid, val) => {
    document.getElementById(vid).textContent = val !== null ? pct(val) : '—';
  };
  setKV('kv-dis', avg('DIS_OPS'));
  setKV('kv-sur', avg('PROGRESS_SURTIDO'));
  setKV('kv-so',  avg('PROGRESS_CYCLIC_SO'));
  setKV('kv-fr',  avg('DISC_FRUVER'));
  setKV('kv-cy',  avg('PROGRESS_CYCLICS'));

  // Identify weakest metric for sub-labels
  const metrics = [
    {id:'ks-sur', col:'PROGRESS_SURTIDO', v: avg('PROGRESS_SURTIDO')},
    {id:'ks-so',  col:'PROGRESS_CYCLIC_SO', v: avg('PROGRESS_CYCLIC_SO')},
    {id:'ks-fr',  col:'DISC_FRUVER', v: avg('DISC_FRUVER')},
    {id:'ks-cy',  col:'PROGRESS_CYCLICS', v: avg('PROGRESS_CYCLICS')},
  ];
  const weakest = metrics.filter(m=>m.v!==null).sort((a,b)=>a.v-b.v)[0];
  metrics.forEach(m => {
    const el = document.getElementById(m.id);
    if (!el) return;
    el.textContent = m.v !== null
      ? (m === weakest ? '⚠️ más débil' : `${vis.filter(r=>(n(r[m.col])||0)<0.80).length} tiendas < 80%`)
      : '';
  });

  // Store list
  document.getElementById('tlist').innerHTML = vis.length
    ? vis.map(r => storeRow(r)).join('')
    : `<div style="text-align:center;padding:40px;color:#aaa">Sin tiendas para los filtros seleccionados</div>`;
}

function storeRow(r) {
  const zl   = zlMap[r._key] || {};
  const dis  = n(r['DIS_OPS']);
  const surt = n(r['PROGRESS_SURTIDO']);
  const cyc  = n(r['PROGRESS_CYCLICS']);
  const so   = n(r['PROGRESS_CYCLIC_SO']);
  const fruv = n(r['DISC_FRUVER']);
  const off  = n(r['OFF_SKU']);
  const fefo = n(r['FEFO_PCT_COMPLETADAS']);
  const b    = clsBadge(dis);
  const name = (r['WAREHOUSENAME'] || r['WAREHOUSE_NAME'] || '').trim() || (zl.city ? zl.city : `Tienda ${r._wh}`);

  return `<div class="trow">
    <div class="trow-left">
      <div class="trow-name">${name}</div>
      <div class="trow-id">
        <span class="badge ${b.cls}">${b.icon} ${b.label}</span>
        ID ${r._wh} · ${r._country}
      </div>
      ${zl.lead ? `<div class="trow-zl">${zl.lead}${zl.city?` · ${zl.city}`:''}</div>` : ''}
    </div>
    <div class="trow-metrics">
      ${mCell('Surtido','40%', surt)}
      ${mCell('Cíclicos','5%', cyc)}
      ${mCell('Cyclic SO','20%', so)}
      ${mCell('Fruver','20%', fruv)}
      <div class="tm">
        <div class="tm-v" style="font-size:13px">
          ${off===null ? '—' : off<=5
            ? `<span class="off-ok">✓ ${off}</span>`
            : `<span class="off-bad">✗ ${off}</span>`}
        </div>
        <div class="tm-l">Off SKU <span style="color:#ddd">15%</span></div>
      </div>
      <div class="tm">
        <div class="tm-v">
          ${fefo!==null ? `<span class="fefo">${pct(fefo)}</span>` : '<span class="fefo">—</span>'}
        </div>
        <div class="tm-l">FEFO <span style="color:#ddd">(info)</span></div>
      </div>
    </div>
    <div class="trow-right">
      <div class="dis-big ${dcolor(dis)}">${pct(dis)}</div>
      <div style="font-size:10px;color:#aaa">DIS_OPS</div>
    </div>
  </div>`;
}

function mCell(label, wt, v) {
  const cls = mcolor(v);
  const hex = mhex(v);
  const w   = Math.min(100, Math.max(0, (v||0)*100)).toFixed(1);
  return `<div class="tm">
    <div class="tm-v" style="color:${hex}">${pct(v)}</div>
    <div class="tm-l">${label} <span style="color:#ddd">${wt}</span></div>
    <div class="tm-bar"><div class="tm-fill ${cls}" style="width:${w}%"></div></div>
  </div>`;
}

// ── HELPERS ───────────────────────────────────────────────
const n = v => {
  if (v === null || v === undefined || v === '') return null;
  const s = String(v).trim();
  // Si viene como porcentaje tipo "85.7%" -> convertir a 0-1
  if (s.endsWith('%')) return parseFloat(s) / 100;
  const num = parseFloat(s);
  if (isNaN(num)) return null;
  // Si el valor es > 1 asumir que está en escala 0-100 -> convertir a 0-1
  return num > 1 ? num / 100 : num;
};
const pct  = v => v===null ? '—' : (v*100).toFixed(1)+'%';
const esc  = s => s.replace(/'/g,"\\'");
const flag = c => ({'CO':'🇨🇴','AR':'🇦🇷','PE':'🇵🇪','BR':'🇧🇷','CL':'🇨🇱','MX':'🇲🇽'}[c]||'');
const fmtW = w => { if(!w||w==='—')return'—'; const d=new Date(w); return isNaN(d)?w:d.toLocaleDateString('es',{day:'numeric',month:'short'}); };

const mcolor = v => { if(v===null)return'fill-gr'; if(v>=0.85)return'fill-g'; if(v>=0.70)return'fill-y'; return'fill-r'; };
const mhex   = v => { if(v===null)return'#ccc'; if(v>=0.85)return'#2A7A4A'; if(v>=0.70)return'#D97706'; return'#E24B4A'; };
const dcolor = v => { if(v===null)return''; if(v>=0.90)return'dc-g'; if(v>=0.80)return'dc-y'; return'dc-r'; };
const clsBadge = v => {
  if(v===null)         return {cls:'b-bronze',label:'—',     icon:''};
  if(v>=0.90)          return {cls:'b-gold',  label:'GOLD',  icon:'🥇'};
  if(v>=0.80)          return {cls:'b-silver',label:'SILVER',icon:'🥈'};
  return                      {cls:'b-bronze',label:'BRONZE',icon:'🥉'};
};
