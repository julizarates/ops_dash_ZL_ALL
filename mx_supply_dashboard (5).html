<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>TurboOps MX · Supply FyV</title>
<link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0F1117; --surface:#181C26; --card:#1E2330; --border:#2A3040; --border2:#353D50;
  --text:#E8EAF0; --dim:#7A8299; --xs:#4E5670;
  --green:#22C55E; --gbg:rgba(34,197,94,.10);
  --yellow:#F59E0B; --ybg:rgba(245,158,11,.10);
  --red:#EF4444; --rbg:rgba(239,68,68,.10);
  --blue:#3B82F6; --bbg:rgba(59,130,246,.10);
  --orange:#F97316; --obg:rgba(249,115,22,.10);
  --accent:#6366F1; --abg:rgba(99,102,241,.12);
  --r:10px; --sh:0 2px 12px rgba(0,0,0,.3);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Figtree',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;min-height:100vh}

.hdr{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 14px;position:sticky;top:0;z-index:100;display:flex;align-items:center;gap:10px;box-shadow:0 2px 12px rgba(0,0,0,.4)}
.logo{font-size:18px;font-weight:900;letter-spacing:-.5px}
.logo em{font-style:normal;color:var(--accent)}
.hdr-r{flex:1;text-align:right}
.hdr-lbl{font-size:10px;font-weight:600;color:var(--dim);text-transform:uppercase;letter-spacing:.8px}
.hdr-dt{font-size:11px;color:var(--accent);font-weight:700;margin-top:1px}

.tabs{background:var(--surface);border-bottom:1px solid var(--border);display:flex;overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:10px 14px;font-size:11px;font-weight:700;color:var(--dim);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;text-transform:uppercase;letter-spacing:.4px;transition:all .15s;flex-shrink:0}
.tab.on{color:var(--accent);border-bottom-color:var(--accent)}

.pg{padding:10px 12px;max-width:600px;margin:0 auto}

.spin-wrap{text-align:center;padding:48px 24px;color:var(--dim);font-size:13px}
.spinner{width:24px;height:24px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}

/* filters */
.fbar{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap}
.fw{flex:1;min-width:calc(50% - 4px);position:relative}
.fw::after{content:'▾';position:absolute;right:8px;top:50%;transform:translateY(-50%);font-size:10px;color:var(--dim);pointer-events:none}
.fw.full{min-width:100%;flex-basis:100%}
select{width:100%;padding:7px 22px 7px 9px;border:1px solid var(--border);border-radius:8px;background:var(--card);font-family:inherit;font-size:12px;color:var(--text);appearance:none;cursor:pointer;font-weight:600}
select:focus{outline:none;border-color:var(--accent)}
select option{background:var(--surface)}

/* strip */
.strip{display:flex;background:var(--card);border:1px solid var(--border);border-radius:var(--r);margin-bottom:10px;overflow:hidden}
.si{flex:1;padding:10px 8px;text-align:center;border-right:1px solid var(--border)}
.si:last-child{border-right:none}
.sn{font-size:18px;font-weight:900;line-height:1}
.sl{font-size:9px;color:var(--dim);text-transform:uppercase;letter-spacing:.4px;margin-top:2px}

/* card */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);margin-bottom:8px;overflow:hidden;box-shadow:var(--sh)}
.cb{padding:10px 12px}

/* table */
.tbl{width:100%;border-collapse:collapse}
.tbl th{font-size:9px;font-weight:700;color:var(--dim);text-transform:uppercase;letter-spacing:.5px;padding:5px 6px;border-bottom:1px solid var(--border);text-align:left}
.tbl th.r{text-align:right}
.tbl td{padding:7px 6px;font-size:12px;border-bottom:1px solid rgba(42,48,64,.5)}
.tbl tr:last-child td{border-bottom:none}
.tbl tr.cl{cursor:pointer}
.tbl tr.cl:hover td{background:rgba(99,102,241,.06)}
.tbl td.r{text-align:right;font-weight:700}
.tbl td.nm{font-weight:700}

/* badge */
.bdg{display:inline-block;font-size:9px;font-weight:700;padding:2px 6px;border-radius:4px;text-transform:uppercase;letter-spacing:.3px}
.br{background:var(--rbg);color:var(--red)}
.by{background:var(--ybg);color:var(--yellow)}
.bg{background:var(--gbg);color:var(--green)}
.bb{background:var(--bbg);color:var(--blue)}
.bo{background:var(--obg);color:var(--orange)}

/* rank */
.rk{font-size:11px;font-weight:900;color:var(--xs);width:18px;flex-shrink:0;text-align:center}
.rk.top{color:var(--yellow)}

/* sort btns */
.sbts{display:flex;gap:4px;margin-bottom:8px;flex-wrap:wrap}
.sbt{font-size:10px;font-weight:700;padding:4px 10px;border-radius:6px;cursor:pointer;border:1px solid var(--border);background:var(--card);color:var(--dim);font-family:inherit;text-transform:uppercase;letter-spacing:.3px}
.sbt.on{background:var(--abg);color:var(--accent);border-color:var(--accent)}

/* detail */
.dbk{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:700;color:var(--accent);padding:6px 10px;border-radius:8px;cursor:pointer;margin-bottom:8px;background:var(--abg);border:none;font-family:inherit}
.dh{background:linear-gradient(135deg,#1a1f35,#12172a);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:8px}
.dn{font-size:20px;font-weight:900;line-height:1.2;margin-bottom:4px}
.dm{font-size:11px;color:var(--dim)}
.kg{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:12px}
.kb{background:rgba(0,0,0,.2);border-radius:8px;padding:10px;text-align:center;border:1px solid var(--border)}
.kn{font-size:22px;font-weight:900;line-height:1}
.kl{font-size:9px;color:var(--dim);text-transform:uppercase;letter-spacing:.4px;margin-top:3px}

/* sec title */
.st{font-size:10px;font-weight:700;color:var(--dim);text-transform:uppercase;letter-spacing:.6px;margin:12px 0 6px;display:flex;align-items:center;gap:6px}
.st::after{content:'';flex:1;height:1px;background:var(--border)}

/* heatmap */
.hmap-wrap{overflow-x:auto;margin-top:4px}
.hmap{border-collapse:collapse;min-width:100%}
.hmap th{font-size:9px;color:var(--dim);padding:3px 4px;text-align:center;font-weight:600;white-space:nowrap}
.hmap th.prod{text-align:left;min-width:120px;max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.hmap td{width:28px;height:26px;text-align:center;font-size:9px;font-weight:700;border:1px solid var(--bg);border-radius:3px}
.hmap td.lbl{font-size:10px;color:var(--dim);text-align:left;padding:3px 6px 3px 0;white-space:nowrap;max-width:140px;overflow:hidden;text-overflow:ellipsis;border:none;background:transparent}
.hc0{background:rgba(239,68,68,.0);color:var(--xs)}
.hc1{background:rgba(34,197,94,.15);color:var(--green)}
.hc2{background:rgba(34,197,94,.35);color:var(--green)}
.hc3{background:rgba(34,197,94,.6);color:#fff}
.hc4{background:rgba(34,197,94,.85);color:#fff}
.hc-q{background:rgba(239,68,68,.35);color:var(--red)}
.hc-qi{background:rgba(239,68,68,.7);color:#fff}
.hc-in{background:rgba(59,130,246,.5);color:#fff}

.empty{text-align:center;padding:32px 20px;color:var(--dim);font-size:12px}

/* prod rows */
.pr{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid rgba(42,48,64,.5)}
.pr:last-child{border-bottom:none}
.pn{font-size:12px;font-weight:600;flex:1;min-width:0}
.ps{font-size:10px;color:var(--dim);margin-top:1px}

/* bar mini */
.bw{display:flex;align-items:center;gap:5px}
.bt{flex:1;height:5px;background:var(--border);border-radius:3px;overflow:hidden;min-width:30px}
.bf{height:100%;border-radius:3px}

@media(max-width:360px){.kg{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>

<div class="hdr">
  <span style="font-size:18px">🇲🇽</span>
  <div class="logo">Turbo<em>Ops</em></div>
  <div class="hdr-r">
    <div class="hdr-lbl">Supply · FyV MX</div>
    <div class="hdr-dt" id="hdt">Últimos 7 días</div>
  </div>
</div>

<div class="tabs">
  <div class="tab on"  onclick="sw('resumen')">📊 Resumen</div>
  <div class="tab"     onclick="sw('quiebres')">🍊 Quiebres</div>
  <div class="tab"     onclick="sw('horario')">⏰ Horario</div>
  <div class="tab"     onclick="sw('saneo')">🗑 Saneo</div>
  <div class="tab"     onclick="sw('bloqueos')">🚫 Bloqueos</div>
</div>

<div class="pg">
  <div id="loading" class="spin-wrap"><div class="spinner"></div>Cargando...</div>
  <div id="vresumen"  style="display:none"></div>
  <div id="vquiebres" style="display:none"></div>
  <div id="vhorario"  style="display:none"></div>
  <div id="vsaneo"    style="display:none"></div>
  <div id="vbloqueos" style="display:none"></div>
</div>

<script>
const PUB = '2PACX-1vQnT4uViGiikmSNyKqTYcaQDcW5UUsxipbLFpETotIJm46MVdk8AwgQ0-M5IBE4sRZ6h8KJ0QGy3iXE';
const G = {
  resumen:  '1233507558',
  quiebres: '308236444',
  qprod:    '1519938566',
  horario:  '1600804818',
  saneo:    '1283742719',
  bloqueos: '373993216',
};
const url = g => `https://docs.google.com/spreadsheets/d/e/${PUB}/pub?gid=${g}&single=true&output=csv`;

// ── state ──
let tab = 'resumen';
let detT = null; // detail tienda key
let fT = { resumen:'', quiebres:'', horario:'', saneo:'', bloqueos:'' };
let fP = ''; // product filter for horario
let sortR = 'uds_saneo', sortQ = 'horas_quiebre', sortB = 'uds_bloqueadas';

// ── data ──
let D = { resumen:[], quiebres:[], qprod:[], horario:[], saneo:[], bloqueos:[] };

// ── CSV ──
const safe = u => fetch(u).then(r=>r.ok?r.text():'').catch(()=>'');

function csv(text) {
  if (!text) return [];
  return text.replace(/\r/g,'').split('\n').map(line => {
    const row=[]; let c='', q=false;
    for(let i=0;i<=line.length;i++){
      const ch=line[i];
      if(ch==='"'){q=!q;}
      else if((ch===','||ch===undefined)&&!q){row.push(c);c='';}
      else c+=(ch||'');
    }
    return row;
  }).filter(r=>r.some(x=>x!==''));
}

function parse(text) {
  const rows = csv(text);
  if (rows.length < 2) return [];
  // Find header: first row with 3+ non-empty cells containing known keywords
  const kw = ['tienda','warehouse','horas','pct','ventas','producto','saneo','bloqueo',
               'razon','skus','kardex','recepciones','eventos','cant','uds','dinero',
               'stock','cero','sub_category','subcategory','ingreso','fecha','hora','dia'];
  let hi = 0;
  for (let i = 0; i < Math.min(rows.length, 25); i++) {
    const r = rows[i].map(c=>(c||'').trim().toLowerCase());
    const ne = r.filter(c=>c);
    if (ne.length >= 3 && ne.some(c=>kw.some(k=>c.includes(k)))) { hi = i; break; }
  }
  const hdr = rows[hi].map(h=>(h||'').trim());
  return rows.slice(hi+1).filter(r=>r.some(c=>c))
    .map(r => Object.fromEntries(hdr.map((k,i)=>[k,(r[i]||'').trim()])));
}

// ── field helpers ──
function gf(r, ...keys) {
  for (const k of keys) {
    if (r[k]!==undefined && r[k]!=='') return r[k];
    const lk = k.toLowerCase();
    const e = Object.entries(r).find(([rk])=>rk.toLowerCase()===lk);
    if (e && e[1]!=='') return e[1];
  }
  return '';
}
const gt = r => gf(r,'TIENDA','tienda','WAREHOUSE_NAME','warehouse_name','WAREHOUSENAME');
const gw = r => gf(r,'WAREHOUSE_ID','warehouse_id');
const n  = (v,d=0) => { const x=parseFloat(v)||0; return d?x.toFixed(d):Math.round(x).toLocaleString(); };
const pc = v => { const x=parseFloat(v)||0; return x>=60?'var(--red)':x>=30?'var(--yellow)':'var(--green)'; };
const pb = v => { const x=parseFloat(v)||0; return x>=60?'br':x>=30?'by':'bg'; };
const uniq = (arr,fn) => [...new Set(arr.map(fn).filter(Boolean))].sort();

// ── tab switch ──
function sw(t) {
  tab = t; detT = null; fP = '';
  document.querySelectorAll('.tab').forEach((el,i)=>{
    el.classList.toggle('on', ['resumen','quiebres','horario','saneo','bloqueos'][i]===t);
  });
  renderAll();
}

// ── RENDER RESUMEN ──
function renderResumen() {
  const el = document.getElementById('vresumen');
  const data = D.resumen.filter(r=>!fT.resumen||gt(r)===fT.resumen);
  const sorted = [...data].sort((a,b)=>{
    if(sortR==='uds_saneo')    return (parseFloat(gf(b,'UDS_SANEO','uds_saneo'))||0)-(parseFloat(gf(a,'UDS_SANEO','uds_saneo'))||0);
    if(sortR==='uds_ventas')   return (parseFloat(gf(b,'UDS_VENTAS','uds_ventas'))||0)-(parseFloat(gf(a,'UDS_VENTAS','uds_ventas'))||0);
    if(sortR==='uds_ingreso')  return (parseFloat(gf(b,'UDS_INGRESO','uds_ingreso'))||0)-(parseFloat(gf(a,'UDS_INGRESO','uds_ingreso'))||0);
    if(sortR==='registros_cero') return (parseFloat(gf(b,'REGISTROS_CERO','registros_cero'))||0)-(parseFloat(gf(a,'REGISTROS_CERO','registros_cero'))||0);
    return 0;
  });

  const totI = data.reduce((s,r)=>s+(parseFloat(gf(r,'UDS_INGRESO','uds_ingreso'))||0),0);
  const totV = data.reduce((s,r)=>s+(parseFloat(gf(r,'UDS_VENTAS','uds_ventas'))||0),0);
  const totS = data.reduce((s,r)=>s+(parseFloat(gf(r,'UDS_SANEO','uds_saneo'))||0),0);

  el.innerHTML = `
  <div class="fbar"><div class="fw full">
    <select onchange="fT.resumen=this.value;renderAll()">
      <option value="">🏪 Todas las tiendas</option>
      ${uniq(D.resumen,gt).map(t=>`<option value="${t}" ${fT.resumen===t?'selected':''}>${t}</option>`).join('')}
    </select>
  </div></div>

  <div class="strip">
    <div class="si"><div class="sn">${data.length}</div><div class="sl">Tiendas</div></div>
    <div class="si"><div class="sn" style="color:var(--blue)">${n(totI)}</div><div class="sl">Ingreso uds</div></div>
    <div class="si"><div class="sn" style="color:var(--green)">${n(totV)}</div><div class="sl">Ventas uds</div></div>
    <div class="si"><div class="sn" style="color:var(--orange)">${n(totS)}</div><div class="sl">Saneo uds</div></div>
  </div>

  <div class="sbts">
    <button class="sbt ${sortR==='uds_saneo'?'on':''}"     onclick="sortR='uds_saneo';renderAll()">🗑 Saneo</button>
    <button class="sbt ${sortR==='uds_ventas'?'on':''}"    onclick="sortR='uds_ventas';renderAll()">💚 Ventas</button>
    <button class="sbt ${sortR==='uds_ingreso'?'on':''}"   onclick="sortR='uds_ingreso';renderAll()">📦 Ingreso</button>
    <button class="sbt ${sortR==='registros_cero'?'on':''}" onclick="sortR='registros_cero';renderAll()">⚠️ Ceros</button>
  </div>

  <div class="card"><table class="tbl">
    <thead><tr>
      <th>#</th><th>Tienda</th>
      <th class="r">Ingreso</th><th class="r">Ventas</th><th class="r">Saneo</th><th class="r">Ceros</th>
    </tr></thead>
    <tbody>
    ${sorted.map((r,i)=>{
      const ing = parseFloat(gf(r,'UDS_INGRESO','uds_ingreso'))||0;
      const ven = parseFloat(gf(r,'UDS_VENTAS','uds_ventas'))||0;
      const san = parseFloat(gf(r,'UDS_SANEO','uds_saneo'))||0;
      const cer = parseFloat(gf(r,'REGISTROS_CERO','registros_cero'))||0;
      const sanColor = san>200?'var(--red)':san>100?'var(--yellow)':'var(--green)';
      return `<tr class="cl" onclick="detT='${gt(r).replace(/'/g,"\\'")}';sw('horario')">
        <td><span class="rk ${i<3?'top':''}">${i+1}</span></td>
        <td class="nm">${gt(r)}<div style="font-size:9px;color:var(--dim)">WH ${gw(r)}</div></td>
        <td class="r" style="color:var(--blue)">${n(ing)}</td>
        <td class="r" style="color:var(--green)">${n(ven)}</td>
        <td class="r" style="color:${sanColor};font-size:13px;font-weight:800">${n(san)}</td>
        <td class="r" style="color:${cer>50?'var(--red)':cer>20?'var(--yellow)':'var(--dim)'}">${n(cer)}</td>
      </tr>`;
    }).join('')}
    </tbody>
  </table></div>`;
}

// ── RENDER QUIEBRES ──
function renderQuiebres() {
  const el = document.getElementById('vquiebres');
  if (detT) { renderQDetail(el); return; }

  const data = D.quiebres.filter(r=>!fT.quiebres||gt(r)===fT.quiebres);
  const sorted = [...data].sort((a,b)=>{
    if(sortQ==='horas_quiebre') return (parseFloat(gf(b,'HORAS_QUIEBRE','horas_quiebre'))||0)-(parseFloat(gf(a,'HORAS_QUIEBRE','horas_quiebre'))||0);
    if(sortQ==='pct_quiebre')   return (parseFloat(gf(b,'PCT_QUIEBRE','pct_quiebre'))||0)-(parseFloat(gf(a,'PCT_QUIEBRE','pct_quiebre'))||0);
    if(sortQ==='ventas_uds')    return (parseFloat(gf(b,'VENTAS_UDS','ventas_uds'))||0)-(parseFloat(gf(a,'VENTAS_UDS','ventas_uds'))||0);
    return 0;
  });
  const totHq = data.reduce((s,r)=>s+(parseFloat(gf(r,'HORAS_QUIEBRE','horas_quiebre'))||0),0);
  const avgPct = data.length?data.reduce((s,r)=>s+(parseFloat(gf(r,'PCT_QUIEBRE','pct_quiebre'))||0),0)/data.length:0;

  el.innerHTML = `
  <div class="fbar"><div class="fw full">
    <select onchange="fT.quiebres=this.value;renderAll()">
      <option value="">🏪 Todas las tiendas</option>
      ${uniq(D.quiebres,gt).map(t=>`<option value="${t}" ${fT.quiebres===t?'selected':''}>${t}</option>`).join('')}
    </select>
  </div></div>

  <div class="strip">
    <div class="si"><div class="sn">${data.length}</div><div class="sl">Tiendas</div></div>
    <div class="si"><div class="sn" style="color:var(--red)">${n(totHq)}</div><div class="sl">Hrs quiebre</div></div>
    <div class="si"><div class="sn" style="color:${pc(avgPct)}">${avgPct.toFixed(1)}%</div><div class="sl">% quiebre prom</div></div>
  </div>

  <div class="sbts">
    <button class="sbt ${sortQ==='horas_quiebre'?'on':''}" onclick="sortQ='horas_quiebre';renderAll()">⏱ Horas</button>
    <button class="sbt ${sortQ==='pct_quiebre'?'on':''}"   onclick="sortQ='pct_quiebre';renderAll()">% Quiebre</button>
    <button class="sbt ${sortQ==='ventas_uds'?'on':''}"    onclick="sortQ='ventas_uds';renderAll()">📦 Ventas</button>
  </div>

  <div class="card"><table class="tbl">
    <thead><tr>
      <th>#</th><th>Tienda</th><th class="r">Hrs sin stock</th><th class="r">% quiebre</th><th class="r">Ventas</th>
    </tr></thead>
    <tbody>
    ${sorted.map((r,i)=>{
      const hq  = parseFloat(gf(r,'HORAS_QUIEBRE','horas_quiebre'))||0;
      const pct = parseFloat(gf(r,'PCT_QUIEBRE','pct_quiebre'))||0;
      const ven = parseFloat(gf(r,'VENTAS_UDS','ventas_uds'))||0;
      return `<tr class="cl" onclick="detT='${gt(r).replace(/'/g,"\\'")}';renderAll()">
        <td><span class="rk ${i<3?'top':''}">${i+1}</span></td>
        <td class="nm">${gt(r)}<div style="font-size:9px;color:var(--dim)">WH ${gw(r)}</div></td>
        <td class="r" style="color:${pc(pct)};font-size:13px;font-weight:800">${n(hq)}</td>
        <td class="r"><span class="bdg ${pb(pct)}">${pct.toFixed(1)}%</span></td>
        <td class="r" style="color:var(--dim)">${n(ven)}</td>
      </tr>`;
    }).join('')}
    </tbody>
  </table></div>`;
}

function renderQDetail(el) {
  const prods = D.qprod.filter(r=>gt(r)===detT)
    .sort((a,b)=>(parseFloat(gf(b,'HORAS_QUIEBRE','horas_quiebre'))||0)-(parseFloat(gf(a,'HORAS_QUIEBRE','horas_quiebre'))||0));
  const tr = D.quiebres.find(r=>gt(r)===detT)||{};
  const hq  = parseFloat(gf(tr,'HORAS_QUIEBRE','horas_quiebre'))||0;
  const pct = parseFloat(gf(tr,'PCT_QUIEBRE','pct_quiebre'))||0;
  const ven = parseFloat(gf(tr,'VENTAS_UDS','ventas_uds'))||0;

  el.innerHTML = `
  <button class="dbk" onclick="detT=null;renderAll()">← Volver</button>
  <div class="dh">
    <div class="dn">🍊 ${detT}</div>
    <div class="dm">WH ${gw(tr)} · Infaltables FyV · últimos 7 días</div>
    <div class="kg">
      <div class="kb"><div class="kn" style="color:var(--red)">${n(hq)}</div><div class="kl">Hrs quiebre</div></div>
      <div class="kb"><div class="kn" style="color:${pc(pct)}">${pct.toFixed(1)}%</div><div class="kl">% sin stock</div></div>
      <div class="kb"><div class="kn">${n(ven)}</div><div class="kl">Ventas uds</div></div>
    </div>
  </div>
  <div class="st">📋 Por producto (${prods.length} SKUs)</div>
  <div class="card"><div class="cb">
  ${!prods.length ? '<div class="empty">Sin detalle disponible.</div>' :
    prods.map((p,i)=>{
      const hqP  = parseFloat(gf(p,'HORAS_QUIEBRE','horas_quiebre'))||0;
      const pctP = parseFloat(gf(p,'PCT_QUIEBRE','pct_quiebre'))||0;
      const prod = gf(p,'PRODUCTO','producto','PRODUCT_NAME','product_name')||'—';
      const sub  = gf(p,'SUB_CATEGORY','sub_category','subcategory');
      const raz  = gf(p,'RAZON_BLOQUEO','razon_bloqueo','BLOCKING_REASON','blocking_reason');
      return `<div class="pr">
        <span class="rk ${i<3?'top':''}">${i+1}</span>
        <div style="flex:1;min-width:0">
          <div class="pn">${prod}</div>
          <div class="ps">${sub}${raz?` · <span style="color:var(--red)">${raz}</span>`:''}</div>
        </div>
        <div style="text-align:right;flex-shrink:0">
          <div style="font-size:13px;font-weight:800;color:${pc(pctP)}">${pctP.toFixed(0)}%</div>
          <div style="font-size:9px;color:var(--dim)">${n(hqP)} hrs</div>
        </div>
      </div>`;
    }).join('')}
  </div></div>`;
}

// ── RENDER HORARIO (heatmap) ──
function renderHorario() {
  const el = document.getElementById('vhorario');

  const tiendas = uniq(D.horario, gt);
  const curT = fT.horario || (detT && tiendas.includes(detT) ? detT : tiendas[0] || '');
  if (!fT.horario && detT && tiendas.includes(detT)) fT.horario = detT;

  const prods = uniq(D.horario.filter(r=>gt(r)===curT), r=>gf(r,'PRODUCTO','producto','PRODUCT_NAME','product_name'));
  const curP = fP && prods.includes(fP) ? fP : prods[0] || '';

  const data = D.horario.filter(r=>gt(r)===curT && gf(r,'PRODUCTO','producto','PRODUCT_NAME','product_name')===curP);

  // Build heatmap: rows=days, cols=hours 0-23
  const dias = uniq(data, r=>gf(r,'FECHA','fecha'));
  const HORAS = Array.from({length:24},(_,i)=>i);

  // Map data: dia+hora -> {ventas, ingreso, saneo, stock_min, ceros}
  const mp = {};
  for (const r of data) {
    const dia  = gf(r,'FECHA','fecha');
    const hora = parseInt(gf(r,'HORA','hora'))||0;
    const key  = `${dia}_${hora}`;
    if (!mp[key]) mp[key] = {v:0,ing:0,san:0,sm:999,cero:0};
    mp[key].v   += parseFloat(gf(r,'UDS_VENTAS','uds_ventas'))||0;
    mp[key].ing += parseFloat(gf(r,'UDS_INGRESO','uds_ingreso'))||0;
    mp[key].san += parseFloat(gf(r,'UDS_SANEO','uds_saneo'))||0;
    mp[key].sm   = Math.min(mp[key].sm, parseFloat(gf(r,'STOCK_MIN_HORA','stock_min_hora'))||0);
    mp[key].cero+= parseInt(gf(r,'REGISTROS_CERO','registros_cero'))||0;
  }

  const maxV = Math.max(...Object.values(mp).map(x=>x.v), 1);

  // Heatmap cell color:
  // azul = ingreso, rojo oscuro = quiebre (cero>0 y sin venta), verde claro->oscuro = ventas
  function cellClass(key) {
    const c = mp[key];
    if (!c) return 'hc0';
    if (c.ing > 0) return 'hc-in';
    if (c.cero > 0 && c.v === 0) return 'hc-qi';
    if (c.cero > 0) return 'hc-q';
    if (c.v === 0) return 'hc0';
    const pct = c.v / maxV;
    if (pct > 0.6) return 'hc4';
    if (pct > 0.4) return 'hc3';
    if (pct > 0.2) return 'hc2';
    return 'hc1';
  }
  function cellVal(key) {
    const c = mp[key];
    if (!c) return '';
    if (c.ing > 0) return `+${Math.round(c.ing)}`;
    if (c.v > 0) return Math.round(c.v);
    if (c.cero > 0) return '✗';
    return '';
  }

  el.innerHTML = `
  <div class="fbar">
    <div class="fw full">
      <select onchange="fT.horario=this.value;fP='';renderAll()">
        ${tiendas.map(t=>`<option value="${t}" ${curT===t?'selected':''}>${t}</option>`).join('')}
      </select>
    </div>
    <div class="fw full">
      <select onchange="fP=this.value;renderAll()">
        ${prods.map(p=>`<option value="${p}" ${curP===p?'selected':''}>${p}</option>`).join('')}
      </select>
    </div>
  </div>

  <div class="card" style="padding:10px 8px">
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px;font-size:10px">
      <span style="display:flex;align-items:center;gap:4px"><span style="width:12px;height:12px;border-radius:2px;background:rgba(59,130,246,.5);display:inline-block"></span>Ingreso OC</span>
      <span style="display:flex;align-items:center;gap:4px"><span style="width:12px;height:12px;border-radius:2px;background:rgba(34,197,94,.6);display:inline-block"></span>Ventas</span>
      <span style="display:flex;align-items:center;gap:4px"><span style="width:12px;height:12px;border-radius:2px;background:rgba(239,68,68,.7);display:inline-block"></span>Quiebre</span>
    </div>
    ${!dias.length ? '<div class="empty">Sin datos para esta selección.</div>' : `
    <div class="hmap-wrap">
      <table class="hmap">
        <thead><tr>
          <th style="width:70px">Fecha</th>
          ${HORAS.map(h=>`<th>${h}</th>`).join('')}
        </tr></thead>
        <tbody>
        ${dias.map(dia=>`<tr>
          <td class="lbl">${dia.substring(5)}</td>
          ${HORAS.map(h=>{
            const key=`${dia}_${h}`;
            return `<td class="${cellClass(key)}" title="${dia} ${h}h">${cellVal(key)}</td>`;
          }).join('')}
        </tr>`).join('')}
        </tbody>
      </table>
    </div>`}
  </div>

  <div class="st">📊 Resumen semana — ${curP}</div>
  <div class="card"><div class="cb">
  ${['UDS_INGRESO','UDS_VENTAS','UDS_SANEO'].map(k=>{
    const tot = data.reduce((s,r)=>s+(parseFloat(gf(r,k,k.toLowerCase()))||0),0);
    const label = k==='UDS_INGRESO'?'📦 Ingreso total':k==='UDS_VENTAS'?'💚 Ventas totales':'🗑 Saneo total';
    const col   = k==='UDS_INGRESO'?'var(--blue)':k==='UDS_VENTAS'?'var(--green)':'var(--orange)';
    return `<div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid rgba(42,48,64,.4)">
      <span style="font-size:12px">${label}</span>
      <span style="font-size:16px;font-weight:900;color:${col}">${n(tot)}</span>
    </div>`;
  }).join('')}
  <div style="margin-top:8px;font-size:10px;color:var(--dim)">
    Horas con quiebre: <strong style="color:var(--red)">${Object.values(mp).filter(c=>c.cero>0&&c.v===0).length}</strong> · 
    Horas con ingreso: <strong style="color:var(--blue)">${Object.values(mp).filter(c=>c.ing>0).length}</strong>
  </div>
  </div></div>`;
}

// ── RENDER SANEO ──
function renderSaneo() {
  const el = document.getElementById('vsaneo');
  const data = D.saneo.filter(r=>!fT.saneo||gt(r)===fT.saneo);

  // Group by tienda
  const byT = {};
  for (const r of data) {
    const t = gt(r);
    if (!byT[t]) byT[t] = {t,w:gw(r),san:0,rec:0,cero:0,prods:[]};
    byT[t].san  += parseFloat(gf(r,'EVENTOS_SANEO','eventos_saneo'))||0;
    byT[t].rec  += parseFloat(gf(r,'RECEPCIONES','recepciones'))||0;
    byT[t].cero += parseFloat(gf(r,'REGISTROS_STOCK_CERO','registros_stock_cero'))||0;
    byT[t].prods.push(r);
  }
  const tiendas2 = Object.values(byT).sort((a,b)=>b.san-a.san);

  el.innerHTML = `
  <div class="fbar"><div class="fw full">
    <select onchange="fT.saneo=this.value;renderAll()">
      <option value="">🏪 Todas las tiendas</option>
      ${uniq(D.saneo,gt).map(t=>`<option value="${t}" ${fT.saneo===t?'selected':''}>${t}</option>`).join('')}
    </select>
  </div></div>

  <div class="strip">
    <div class="si"><div class="sn">${tiendas2.length}</div><div class="sl">Tiendas</div></div>
    <div class="si"><div class="sn" style="color:var(--orange)">${n(tiendas2.reduce((s,t)=>s+t.san,0))}</div><div class="sl">Eventos saneo</div></div>
    <div class="si"><div class="sn" style="color:var(--red)">${tiendas2[0]?tiendas2[0].t.substring(0,10):'—'}</div><div class="sl">Top ofensora</div></div>
  </div>

  ${fT.saneo ? (() => {
    const prods = (byT[fT.saneo]?.prods||[]).sort((a,b)=>(parseFloat(gf(b,'EVENTOS_SANEO','eventos_saneo'))||0)-(parseFloat(gf(a,'EVENTOS_SANEO','eventos_saneo'))||0));
    return `<div class="st">📦 Saneo por producto — ${fT.saneo}</div>
    <div class="card"><table class="tbl">
      <thead><tr><th>#</th><th>Producto</th><th class="r">Saneo</th><th class="r">Recepciones</th><th class="r">Ceros</th></tr></thead>
      <tbody>${prods.map((r,i)=>{
        const s = parseFloat(gf(r,'EVENTOS_SANEO','eventos_saneo'))||0;
        const rc= parseFloat(gf(r,'RECEPCIONES','recepciones'))||0;
        const cz= parseFloat(gf(r,'REGISTROS_STOCK_CERO','registros_stock_cero'))||0;
        return `<tr>
          <td><span class="rk ${i<3?'top':''}">${i+1}</span></td>
          <td class="nm">${gf(r,'PRODUCTO','producto','PRODUCT_NAME','product_name')||'—'}<div style="font-size:9px;color:var(--dim)">${gf(r,'SUB_CATEGORY','sub_category','subcategory')}</div></td>
          <td class="r" style="color:${s>5?'var(--red)':s>2?'var(--yellow)':'var(--green)'}">${s}</td>
          <td class="r" style="color:var(--dim)">${rc}</td>
          <td class="r" style="color:${cz>0?'var(--orange)':'var(--dim)'}">${cz}</td>
        </tr>`;
      }).join('')}</tbody>
    </table></div>`;
  })() : `
  <div class="card"><table class="tbl">
    <thead><tr><th>#</th><th>Tienda</th><th class="r">Saneo</th><th class="r">Recepciones</th><th class="r">Ceros</th></tr></thead>
    <tbody>${tiendas2.map((t,i)=>`<tr class="cl" onclick="fT.saneo='${t.t.replace(/'/g,"\\'")}';renderAll()">
      <td><span class="rk ${i<3?'top':''}">${i+1}</span></td>
      <td class="nm">${t.t}<div style="font-size:9px;color:var(--dim)">WH ${t.w}</div></td>
      <td class="r" style="color:${t.san>20?'var(--red)':t.san>10?'var(--yellow)':'var(--green)'};font-size:14px;font-weight:800">${t.san}</td>
      <td class="r" style="color:var(--dim)">${t.rec}</td>
      <td class="r" style="color:${t.cero>0?'var(--orange)':'var(--dim)'}">${t.cero}</td>
    </tr>`).join('')}</tbody>
  </table></div>`}`;
}

// ── RENDER BLOQUEOS ──
function renderBloqueos() {
  const el = document.getElementById('vbloqueos');
  const data = D.bloqueos.filter(r=>!fT.bloqueos||gt(r)===fT.bloqueos);

  const byT = {};
  for (const r of data) {
    const t = gt(r)||'Sin nombre';
    if (!byT[t]) byT[t] = {t,w:gw(r),uds:0,din:0,ev:0};
    byT[t].uds += parseFloat(gf(r,'UDS_BLOQUEADAS','uds_bloqueadas'))||0;
    byT[t].din += parseFloat(gf(r,'DINERO_PERDIDO_USD','dinero_perdido_usd'))||0;
    byT[t].ev  += parseFloat(gf(r,'CANT_BLOQUEOS','cant_bloqueos'))||0;
  }
  const ts = Object.values(byT).sort((a,b)=>{
    if(sortB==='uds_bloqueadas') return b.uds-a.uds;
    if(sortB==='dinero')         return b.din-a.din;
    return b.ev-a.ev;
  });

  el.innerHTML = `
  <div class="fbar"><div class="fw full">
    <select onchange="fT.bloqueos=this.value;renderAll()">
      <option value="">🏪 Todas las tiendas</option>
      ${uniq(D.bloqueos,gt).map(t=>`<option value="${t}" ${fT.bloqueos===t?'selected':''}>${t}</option>`).join('')}
    </select>
  </div></div>

  <div class="strip">
    <div class="si"><div class="sn">${ts.length}</div><div class="sl">Tiendas</div></div>
    <div class="si"><div class="sn" style="color:var(--red)">${n(ts.reduce((s,t)=>s+t.uds,0))}</div><div class="sl">Uds bloq.</div></div>
    <div class="si"><div class="sn" style="color:var(--orange)">$${n(ts.reduce((s,t)=>s+t.din,0))}</div><div class="sl">USD perdido</div></div>
  </div>

  <div class="sbts">
    <button class="sbt ${sortB==='uds_bloqueadas'?'on':''}" onclick="sortB='uds_bloqueadas';renderAll()">📦 Uds</button>
    <button class="sbt ${sortB==='dinero'?'on':''}"         onclick="sortB='dinero';renderAll()">💵 Dinero</button>
    <button class="sbt ${sortB==='eventos'?'on':''}"        onclick="sortB='eventos';renderAll()">📋 Eventos</button>
  </div>

  ${fT.bloqueos ? (() => {
    const rows = data.sort((a,b)=>(parseFloat(gf(b,'UDS_BLOQUEADAS','uds_bloqueadas'))||0)-(parseFloat(gf(a,'UDS_BLOQUEADAS','uds_bloqueadas'))||0));
    return `<div class="card"><table class="tbl">
      <thead><tr><th>Razón</th><th class="r">Eventos</th><th class="r">Uds</th><th class="r">$ perdido</th></tr></thead>
      <tbody>${rows.map(r=>`<tr>
        <td class="nm" style="font-size:11px">${gf(r,'RAZON','razon','REASON','reason')||'—'}</td>
        <td class="r" style="color:var(--dim)">${gf(r,'CANT_BLOQUEOS','cant_bloqueos')||0}</td>
        <td class="r" style="color:var(--red);font-weight:800">${n(gf(r,'UDS_BLOQUEADAS','uds_bloqueadas'))}</td>
        <td class="r" style="color:var(--orange)">$${n(gf(r,'DINERO_PERDIDO_USD','dinero_perdido_usd'))}</td>
      </tr>`).join('')}</tbody>
    </table></div>`;
  })() : `
  <div class="card"><table class="tbl">
    <thead><tr><th>#</th><th>Tienda</th><th class="r">Uds bloq.</th><th class="r">$ perdido</th></tr></thead>
    <tbody>${ts.map((t,i)=>`<tr class="cl" onclick="fT.bloqueos='${t.t.replace(/'/g,"\\'")}';renderAll()">
      <td><span class="rk ${i<3?'top':''}">${i+1}</span></td>
      <td class="nm">${t.t}<div style="font-size:9px;color:var(--dim)">WH ${t.w}</div></td>
      <td class="r" style="color:var(--red);font-size:14px;font-weight:800">${n(t.uds)}</td>
      <td class="r" style="color:var(--orange)">$${n(t.din)}</td>
    </tr>`).join('')}</tbody>
  </table></div>`}`;
}

// ── MAIN ──
function renderAll() {
  ['resumen','quiebres','horario','saneo','bloqueos'].forEach(t=>{
    document.getElementById('v'+t).style.display = t===tab?'block':'none';
  });
  if(tab==='resumen')  renderResumen();
  if(tab==='quiebres') renderQuiebres();
  if(tab==='horario')  renderHorario();
  if(tab==='saneo')    renderSaneo();
  if(tab==='bloqueos') renderBloqueos();
}

async function load() {
  document.getElementById('loading').style.display = 'block';
  try {
    const [r1,r2,r3,r4,r5,r6] = await Promise.all([
      safe(url(G.resumen)), safe(url(G.quiebres)), safe(url(G.qprod)),
      safe(url(G.horario)), safe(url(G.saneo)),    safe(url(G.bloqueos)),
    ]);
    D.resumen  = parse(r1);
    D.quiebres = parse(r2);
    D.qprod    = parse(r3);
    D.horario  = parse(r4);
    D.saneo    = parse(r5);
    D.bloqueos = parse(r6);

    const today = new Date();
    const d7 = new Date(today); d7.setDate(today.getDate()-7);
    document.getElementById('hdt').textContent =
      d7.toLocaleDateString('es-MX',{day:'2-digit',month:'short'}) + ' – ' +
      today.toLocaleDateString('es-MX',{day:'2-digit',month:'short'});

    console.log('[Supply MX]',
      'resumen:', D.resumen.length, '| quiebres:', D.quiebres.length,
      '| horario:', D.horario.length, '| saneo:', D.saneo.length,
      '| bloqueos:', D.bloqueos.length);
    if(D.resumen[0])  console.log('[resumen cols]',  Object.keys(D.resumen[0]));
    if(D.horario[0])  console.log('[horario cols]',  Object.keys(D.horario[0]));

    document.getElementById('loading').style.display = 'none';
    renderAll();
  } catch(e) {
    document.getElementById('loading').innerHTML =
      `<div style="font-size:24px;margin-bottom:8px">⚠️</div>${e.message}`;
  }
}
load();
</script>
</body>
</html>
