<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Control Board — Experimento HC</title>
<link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#F5F4F0;color:#111;font-family:'Figtree',sans-serif;font-size:13px;line-height:1.5}

/* HEADER */
.hdr{background:#fff;border-bottom:1px solid #E5E4DF;padding:12px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.logo{font-size:17px;font-weight:700;letter-spacing:-.4px}.logo b{color:#E24B4A}
.exp-tag{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;background:#FFF3E0;color:#E65100;border:1px solid #FFCC80;padding:2px 8px;border-radius:10px;margin-left:8px}
.hdr-r{display:flex;align-items:center;gap:12px}
.live{display:flex;align-items:center;gap:5px;font-size:11px;color:#999}
.dot{width:6px;height:6px;border-radius:50%;background:#ccc;transition:background .3s}.dot.ok{background:#4CAF50}
.btn{font-size:11px;font-weight:600;padding:5px 14px;border:1px solid #DDD;border-radius:6px;background:#fff;cursor:pointer;font-family:'Figtree',sans-serif}.btn:hover{background:#F5F4F0}

/* EXP BANNER */
.exp-banner{background:#fff;border-bottom:1px solid #E5E4DF;padding:10px 24px;display:flex;align-items:center;gap:20px;flex-wrap:wrap}
.exp-pill{display:flex;align-items:center;gap:6px;font-size:11px}
.exp-pill-lbl{color:#aaa;font-weight:600;text-transform:uppercase;letter-spacing:.5px;font-size:10px}
.exp-pill-val{font-weight:700;color:#111}
.exp-sep{width:1px;height:20px;background:#E5E4DF}
.day-badge{background:#FFF3E0;color:#E65100;border:1px solid #FFCC80;font-size:11px;font-weight:700;padding:2px 10px;border-radius:10px}

/* COUNTRY NAV */
.country-nav{background:#fff;border-bottom:1px solid #E5E4DF;padding:0 24px;display:flex;gap:0;position:sticky;top:53px;z-index:49}
.country-tab{padding:10px 20px;font-size:12px;font-weight:600;color:#888;cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;user-select:none}
.country-tab.on{color:#111;border-bottom-color:#111}
.country-tab:hover{color:#555}

/* LOADING / EMPTY */
.ld{display:flex;align-items:center;justify-content:center;gap:10px;padding:60px;color:#aaa}
.sp{width:16px;height:16px;border:2px solid #E0DFD9;border-top-color:#E65100;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* CONTENT */
.content{padding:20px 24px}
.country-sec{display:none}.country-sec.on{display:block}
.country-hdr{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.country-hdr h2{font-size:16px;font-weight:700}
.country-flag{font-size:20px}
.stores-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px}

/* STORE CARD */
.store-card{background:#fff;border:1px solid #E5E4DF;border-radius:12px;overflow:hidden}
.store-card-hdr{padding:12px 16px;border-bottom:1px solid #F0EFEB;display:flex;align-items:center;justify-content:space-between;border-top:3px solid var(--cc,#E24B4A)}
.store-card-name{font-size:15px;font-weight:700;letter-spacing:-.3px}
.store-card-body{padding:16px}

/* SECTION LABELS */
.sec-lbl{font-size:10px;font-weight:700;color:#aaa;text-transform:uppercase;letter-spacing:.6px;margin-bottom:8px;margin-top:14px}
.sec-lbl:first-child{margin-top:0}

/* HC COMPARE */
.hc-row{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.hc-box{flex:1;background:#F5F4F0;border-radius:8px;padding:8px 12px;text-align:center}
.hc-box-lbl{font-size:10px;color:#aaa;font-weight:600;margin-bottom:2px}
.hc-box-val{font-size:22px;font-weight:700;letter-spacing:-.5px;line-height:1}
.hc-box-sub{font-size:10px;color:#888;margin-top:1px}
.hc-arrow{font-size:18px;color:#ddd;flex-shrink:0}
.hc-delta{text-align:center;min-width:52px}
.delta-badge{display:inline-block;font-size:12px;font-weight:700;padding:3px 8px;border-radius:6px}
.delta-bad{background:#FFF0F0;color:#C62828}
.delta-ok{background:#F1F8E9;color:#2E7D32}
.delta-neu{background:#E3F2FD;color:#1565C0}

/* KPI BEFORE/AFTER */
.kpi-ba-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:6px}
.kpi-ba{background:#F9F8F5;border-radius:8px;padding:8px 10px}
.kpi-ba-lbl{font-size:10px;color:#aaa;font-weight:600;text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px}
.kpi-ba-row{display:flex;align-items:center;gap:5px;font-size:11px;flex-wrap:wrap}
.kpi-ba-before{color:#999;font-weight:500}
.kpi-ba-after{font-weight:700;color:#111}
.kpi-ba-arr{color:#ccc;font-size:10px}
.kpi-ba-delta{font-size:10px;font-weight:700;padding:1px 5px;border-radius:4px}
.kba-bad{background:#FFF0F0;color:#C62828}
.kba-ok{background:#F1F8E9;color:#2E7D32}
.kba-neu{background:#F5F4F0;color:#888}

/* HC CHART */
.hc-chart-wrap{position:relative;height:80px;background:#F9F8F5;border-radius:8px;overflow:hidden;display:flex;align-items:flex-end;gap:1px;padding:4px 4px 18px}
.hc-bar{flex:1;border-radius:2px 2px 0 0;transition:height .4s;min-width:4px;cursor:default;position:relative}
.hc-bar:hover::after{content:attr(title);position:absolute;bottom:calc(100% + 4px);left:50%;transform:translateX(-50%);background:#333;color:#fff;font-size:9px;padding:2px 5px;border-radius:3px;white-space:nowrap;z-index:10}
.hc-ref-line{position:absolute;left:4px;right:4px;height:1px;background:#E24B4A;border-top:1px dashed #E24B4A;z-index:2}
.hc-chart-labels{display:flex;gap:1px;padding:0 4px;overflow:hidden}
.hc-chart-lbl{flex:1;font-size:8px;color:#bbb;text-align:center;overflow:hidden;text-overflow:clip;white-space:nowrap;min-width:4px}
.chart-legend{display:flex;gap:12px;margin-top:6px}
.chart-leg-item{display:flex;align-items:center;gap:4px;font-size:10px;color:#888}
.chart-leg-dot{width:8px;height:4px;border-radius:2px}

/* WEEKLY TABLE */
.wtbl{width:100%;border-collapse:collapse;font-size:11px}
.wtbl th{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.3px;color:#aaa;padding:5px 8px;border-bottom:1px solid #E5E4DF;text-align:right;white-space:nowrap}
.wtbl th:first-child{text-align:left}
.wtbl td{padding:5px 8px;border-bottom:1px solid #F5F4F0;text-align:right;white-space:nowrap}
.wtbl td:first-child{text-align:left;font-weight:500}
.wtbl tr:last-child td{border-bottom:none}
.wtbl tr.partial td{color:#aaa}
.mn{font-weight:700}
.mp{font-size:10px;margin-left:2px}
.mp-n{color:#aaa}.mp-hi{color:#C62828;font-weight:600}.mp-lo{color:#2E7D32;font-weight:600}.mp-w{color:#E65100;font-weight:600}

/* PICKERS TABLE */
.pk-tbl-wrap{overflow-x:auto}
.pk-tbl{width:100%;border-collapse:collapse;font-size:11px}
.pk-tbl th{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.3px;color:#aaa;padding:5px 8px;border-bottom:1px solid #E5E4DF;text-align:right;white-space:nowrap}
.pk-tbl th:first-child{text-align:left}
.pk-tbl td{padding:6px 8px;border-bottom:1px solid #F5F4F0;text-align:right;white-space:nowrap}
.pk-tbl td:first-child{text-align:left;font-weight:500;max-width:140px;overflow:hidden;text-overflow:ellipsis}
.pk-tbl tr:last-child td{border-bottom:none}
.pk-rank{font-size:10px;color:#ccc;font-weight:700;margin-right:4px}

/* RESPONSIVE */
@media(max-width:900px){.stores-grid{grid-template-columns:1fr}}
@media(max-width:600px){.hdr{padding:10px 14px}.content{padding:14px}.exp-banner{padding:8px 14px}.country-nav{padding:0 14px}.kpi-ba-grid{grid-template-columns:1fr}.hc-row{flex-wrap:wrap}}
</style>
</head>
<body>

<div class="hdr">
  <div style="display:flex;align-items:center">
    <span class="logo">Turbo<b>Ops</b></span>
    <span class="exp-tag">Experimento HC</span>
  </div>
  <div class="hdr-r">
    <span class="live"><span class="dot" id="dot"></span><span id="upd">Cargando...</span></span>
    <button class="btn" onclick="loadAll()">↺ Refrescar</button>
  </div>
</div>

<div class="exp-banner">
  <div class="exp-pill">
    <span class="exp-pill-lbl">Inicio</span>
    <span class="exp-pill-val">Lun 4 Abr 2026</span>
  </div>
  <div class="exp-sep"></div>
  <div class="exp-pill">
    <span class="exp-pill-lbl">Duración</span>
    <span class="exp-pill-val" id="exp-days">— días</span>
  </div>
  <div class="exp-sep"></div>
  <div class="exp-pill">
    <span class="exp-pill-lbl">Tiendas</span>
    <span class="exp-pill-val">6 (2 por país)</span>
  </div>
  <div class="exp-sep"></div>
  <div class="exp-pill">
    <span class="exp-pill-lbl">Países</span>
    <span class="exp-pill-val">PE · AR · BR</span>
  </div>
  <div class="exp-sep"></div>
  <div class="exp-pill">
    <span class="exp-pill-lbl">Target HC</span>
    <span class="day-badge">-30% Pickers</span>
  </div>
  <div class="exp-sep"></div>
  <div class="exp-pill">
    <span class="exp-pill-lbl">Baseline</span>
    <span class="exp-pill-val">Prom. 4 sem anteriores</span>
  </div>
</div>

<div class="country-nav">
  <div class="country-tab on" onclick="showCountry('all',this)">Todas</div>
  <div class="country-tab" onclick="showCountry('PE',this)">🇵🇪 Perú</div>
  <div class="country-tab" onclick="showCountry('AR',this)">🇦🇷 Argentina</div>
  <div class="country-tab" onclick="showCountry('BR',this)">🇧🇷 Brasil</div>
</div>

<div class="ld" id="gld"><div class="sp"></div>Cargando datos del experimento...</div>

<div class="content" id="content" style="display:none">
  <div class="country-sec on" id="sec-PE">
    <div class="country-hdr"><span class="country-flag">🇵🇪</span><h2>Perú</h2></div>
    <div class="stores-grid" id="grid-PE"></div>
  </div>
  <div class="country-sec on" id="sec-AR">
    <div class="country-hdr"><span class="country-flag">🇦🇷</span><h2>Argentina</h2></div>
    <div class="stores-grid" id="grid-AR"></div>
  </div>
  <div class="country-sec on" id="sec-BR">
    <div class="country-hdr"><span class="country-flag">🇧🇷</span><h2>Brasil</h2></div>
    <div class="stores-grid" id="grid-BR"></div>
  </div>
</div>

<script>
// ── Config ────────────────────────────────────────────────────
const EXP_START   = '2026-04-04';   // experiment start date
const BEFORE_WEEKS = 4;             // weeks of baseline
const SID = '1ieRuWkk5BxJKRFEJSHeSJuyHcnzjOyOP6l0xzOMqD8U';
const API_KEY = 'AIzaSyAttY6mdOrj4ic3vYCyuFpAkiYx9HFrasg';
const SHEETS = {def:'Defectos',so:'Stockouts',can:'Cancelaciones',pick:'Pickers',hc:'HC'};

const EXP_STORES = [
  {id:'bena',   country:'PE', name:'Benavides',     cc:'#E24B4A', match:n=>/benavides/i.test(n)},
  {id:'macchu', country:'PE', name:'Macchu Picchu',  cc:'#E24B4A', match:n=>/macchu/i.test(n)},
  {id:'humb',   country:'AR', name:'Humboldt',       cc:'#2196F3', match:n=>/humboldt/i.test(n)},
  {id:'vicen',  country:'AR', name:'Vicente Lopez',  cc:'#2196F3', match:n=>/vicente/i.test(n)},
  {id:'acli',   country:'BR', name:'Aclimação',      cc:'#4CAF50', match:n=>/aclima/i.test(n)},
  {id:'carrao', country:'BR', name:'Carrão',         cc:'#4CAF50', match:n=>/carr/i.test(n)},
];

const DOW = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
let D = {def:[],so:[],can:[],pick:[],hc:[]};

// ── Date helpers ──────────────────────────────────────────────
function addDays(d,n){const r=new Date(d+'T12:00:00');r.setDate(r.getDate()+n);return r.toISOString().split('T')[0];}
function getMonday(d){const dt=new Date(d+'T12:00:00');const day=dt.getDay();const diff=day===0?-6:1-day;dt.setDate(dt.getDate()+diff);return dt.toISOString().split('T')[0];}
function fmtDate(d){if(!d)return'—';const dt=new Date(d+'T12:00:00');return dt.toLocaleDateString('es',{day:'numeric',month:'short'});}
function fmtDateShort(d){if(!d)return'';const dt=new Date(d+'T12:00:00');return dt.toLocaleDateString('es',{day:'numeric',month:'short'}).replace(' ','/');}
function daysDiff(a,b){return Math.round((new Date(b+'T12:00:00')-new Date(a+'T12:00:00'))/(864e5));}
function dowOf(d){return new Date(d+'T12:00:00').getDay();}

// Before period: 4 Mondays before the Monday of EXP_START's week
function getBeforeSemanas(){
  const expMon = getMonday(EXP_START);
  const s=[];for(let i=1;i<=BEFORE_WEEKS;i++){s.push(addDays(expMon,-i*7));}
  return s;
}
function getExpSemana(){return getMonday(EXP_START);}

// All dates in a range
function datesInRange(start,end){
  const r=[];let d=start;
  while(d<=end){r.push(d);d=addDays(d,1);}
  return r;
}

// ── Fetch ─────────────────────────────────────────────────────
async function fetchSheet(g){
  const url=`https://sheets.googleapis.com/v4/spreadsheets/${SID}/values/${encodeURIComponent(SHEETS[g])}?key=${API_KEY}`;
  const r=await fetch(url);if(!r.ok)throw new Error('HTTP '+r.status);
  const json=await r.json();const rows=json.values||[];
  const known=['SEMANA','FECHA','DATE','WEEK','COUNTRY','COUNTRY_CODE','TICKETS','ORDENES','WAREHOUSENAME',
    'KEYWH','PICKER_NAME','AVG_ASSIGN','AVG_PICKING','AVG_PACKING','AVG_PICK_PACK','AVG_HANDOFF',
    'AVG_ASSING_TO_PICKER','AVG_HANDOFF_POST','AVG_CYCLE_TIME','P90_PICK_PACK','AVG_TOTAL_TIME',
    'PICKERS','STORE_LEAD','TOTAL_HC','LEVEL_2','STOCKOUT_TYPE','SUBCATEGORY','TOP_PICKER'];
  let hi=rows.findIndex(row=>row.filter(Boolean).some(c=>known.includes(c.toString().trim().toUpperCase())));
  if(hi===-1)hi=0;
  const hdrs=rows[hi];
  return rows.slice(hi+1).filter(row=>row.some(c=>c&&c.toString().trim())).map(row=>{
    const o={};hdrs.forEach((h,i)=>{if(h)o[h.toString().trim()]=(row[i]||'').toString().trim();});
    ['SEMANA','FECHA','DATE','WEEK'].forEach(k=>{if(o[k])o[k]=o[k].split(' ')[0].split('T')[0];});
    return o;
  });
}

async function loadAll(){
  document.getElementById('dot').className='dot';
  document.getElementById('upd').textContent='Cargando...';
  document.getElementById('gld').style.display='flex';
  document.getElementById('content').style.display='none';
  try{
    const results=await Promise.all(Object.keys(SHEETS).map(g=>fetchSheet(g)));
    [D.def,D.so,D.can,D.pick,D.hc]=results;
    renderAll();
    document.getElementById('gld').style.display='none';
    document.getElementById('content').style.display='block';
    document.getElementById('dot').className='dot ok';
    document.getElementById('upd').textContent='Actualizado '+new Date().toLocaleTimeString('es',{hour:'2-digit',minute:'2-digit'});
    // Experiment duration
    const today=new Date().toISOString().split('T')[0];
    const days=Math.max(0,daysDiff(EXP_START,today));
    document.getElementById('exp-days').textContent=`${days} (Sem ${Math.ceil(days/7)})`;
  }catch(e){
    document.getElementById('gld').innerHTML=`<span style="color:#E24B4A">Error: ${e.message}. Verifica que la pestaña "HC" exista en el sheet.</span>`;
  }
}

// ── Math ──────────────────────────────────────────────────────
function sum(arr,col){return arr.reduce((s,r)=>s+(parseFloat(r[col])||0),0);}
function avg(arr){return arr.length?arr.reduce((a,b)=>a+b,0)/arr.length:0;}
function wAvg(arr,col){const w=sum(arr,'ORDENES');return w?arr.reduce((s,r)=>s+(parseFloat(r.ORDENES)||0)*(parseFloat(r[col])||0),0)/w:0;}
function cycleOf(r){return(parseFloat(r.AVG_ASSIGN)||0)+(parseFloat(r.AVG_PICKING)||0)+(parseFloat(r.AVG_PACKING)||0)+(parseFloat(r.AVG_HANDOFF)||0);}
function wAvgCy(arr){const w=sum(arr,'ORDENES');return w?arr.reduce((s,r)=>s+(parseFloat(r.ORDENES)||0)*cycleOf(r),0)/w:0;}

// Group by a date column, summing a value column
function groupSumByDate(arr,dateCol,valCol){
  const m={};arr.forEach(r=>{const k=r[dateCol];if(k){m[k]=(m[k]||0)+(parseFloat(r[valCol])||0);}});
  return m;
}

// ── Match ─────────────────────────────────────────────────────
function storeRows(data,store){return data.filter(r=>store.match(r.WAREHOUSENAME||''));}

// ── Compute per store ─────────────────────────────────────────
function computeStore(store){
  const beforeSems = getBeforeSemanas();
  const expSem    = getExpSemana();
  const today     = new Date().toISOString().split('T')[0];

  // Filter data for this store
  const def  = storeRows(D.def, store);
  const so   = storeRows(D.so, store);
  const can  = storeRows(D.can, store);
  const pick = storeRows(D.pick, store);
  const hc   = storeRows(D.hc, store);

  // ── BEFORE baseline (SEMANA-based operational) ────────────
  function beforeAvgOp(rows, countCol){
    const byWeek={};
    rows.filter(r=>beforeSems.includes(r.SEMANA||r.FECHA?.slice(0,10))).forEach(r=>{
      const w=r.SEMANA||r.FECHA?.slice(0,10);
      if(w)byWeek[w]=(byWeek[w]||0)+(parseFloat(r[countCol])||0);
    });
    const vals=Object.values(byWeek);
    return vals.length?vals.reduce((a,b)=>a+b,0)/vals.length:0;
  }

  function beforeAvgPickerTime(col){
    const byWeek={};
    pick.filter(r=>beforeSems.includes(r.SEMANA||r.FECHA?.slice(0,10))).forEach(r=>{
      const w=r.SEMANA||r.FECHA?.slice(0,10);if(!w)return;
      if(!byWeek[w])byWeek[w]=[];byWeek[w].push(r);
    });
    const weekAvgs=Object.values(byWeek).map(rows=>wAvg(rows,col));
    return avg(weekAvgs);
  }

  function beforeAvgCy(){
    const byWeek={};
    pick.filter(r=>beforeSems.includes(r.SEMANA||r.FECHA?.slice(0,10))).forEach(r=>{
      const w=r.SEMANA||r.FECHA?.slice(0,10);if(!w)return;
      if(!byWeek[w])byWeek[w]=[];byWeek[w].push(r);
    });
    const weekAvgs=Object.values(byWeek).map(rows=>wAvgCy(rows));
    return avg(weekAvgs);
  }

  function beforeAvgOrders(){
    const byWeek={};
    pick.filter(r=>beforeSems.includes(r.SEMANA||r.FECHA?.slice(0,10))).forEach(r=>{
      const w=r.SEMANA||r.FECHA?.slice(0,10);if(!w)return;
      byWeek[w]=(byWeek[w]||0)+(parseFloat(r.ORDENES)||0);
    });
    const vals=Object.values(byWeek);
    return vals.length?vals.reduce((a,b)=>a+b,0)/vals.length:0;
  }

  const bOrd = beforeAvgOrders();
  const bDef = beforeAvgOp(def, 'TICKETS');
  const bSO  = beforeAvgOp(so,  'ORDENES');
  const bCan = beforeAvgOp(can, 'ORDENES');
  const bCy  = beforeAvgCy();
  const bDefRate = bOrd ? bDef/bOrd : 0;
  const bSORate  = bOrd ? bSO/bOrd  : 0;
  const bCanRate = bOrd ? bCan/bOrd : 0;

  // HC before: daily avg from HC sheet where DATE < EXP_START and within 4 weeks
  const hcBeforeCut = addDays(EXP_START, -BEFORE_WEEKS*7);
  const hcBefore = hc.filter(r=>{const d=r.DATE||r.FECHA;return d&&d>=hcBeforeCut&&d<EXP_START;});
  const bPickers = hcBefore.length ? avg(hcBefore.map(r=>parseFloat(r.PICKERS)||0)) : 0;

  // ── AFTER: experiment period ───────────────────────────────
  // Using SEMANA >= expSem for operational (week-based)
  // Using DATE >= EXP_START for HC (daily)

  const afterPickRows = pick.filter(r=>{const s=r.SEMANA||r.FECHA?.slice(0,10);return s&&s>=expSem;});
  const afterDefRows  = def.filter(r=>{const s=r.SEMANA||r.FECHA?.slice(0,10);return s&&s>=expSem;});
  const afterSORows   = so.filter(r=>{const s=r.SEMANA||r.FECHA?.slice(0,10);return s&&s>=expSem;});
  const afterCanRows  = can.filter(r=>{const s=r.SEMANA||r.FECHA?.slice(0,10);return s&&s>=expSem;});
  const afterHCRows   = hc.filter(r=>{const d=r.DATE||r.FECHA;return d&&d>=EXP_START;});

  // Total after (latest week or average)
  const afterOrd  = sum(afterPickRows,'ORDENES');
  const afterDef  = sum(afterDefRows,'TICKETS');
  const afterSO   = sum(afterSORows,'ORDENES');
  const afterCan  = sum(afterCanRows,'ORDENES');
  const afterCy   = afterPickRows.length ? wAvgCy(afterPickRows) : 0;
  const afterDefRate = afterOrd ? afterDef/afterOrd : 0;
  const afterSORate  = afterOrd ? afterSO/afterOrd  : 0;
  const afterCanRate = afterOrd ? afterCan/afterOrd : 0;
  const afterPickers = afterHCRows.length ? avg(afterHCRows.map(r=>parseFloat(r.PICKERS)||0)) : 0;

  // ── Weekly breakdown (after period) ───────────────────────
  const allAfterSems=[...new Set([...afterDefRows,...afterSORows,...afterCanRows,...afterPickRows]
    .map(r=>r.SEMANA||r.FECHA?.slice(0,10)).filter(Boolean))].sort();

  const weeklyData = allAfterSems.map(sem=>{
    const pRows = afterPickRows.filter(r=>(r.SEMANA||r.FECHA?.slice(0,10))===sem);
    const dRows = afterDefRows.filter(r=>(r.SEMANA||r.FECHA?.slice(0,10))===sem);
    const sRows = afterSORows.filter(r=>(r.SEMANA||r.FECHA?.slice(0,10))===sem);
    const cRows = afterCanRows.filter(r=>(r.SEMANA||r.FECHA?.slice(0,10))===sem);
    const hcSemEnd = addDays(sem,6);
    const hcRows  = afterHCRows.filter(r=>{const d=r.DATE||r.FECHA;return d&&d>=sem&&d<=hcSemEnd;});
    const ord = sum(pRows,'ORDENES');
    const defN = sum(dRows,'TICKETS'), soN = sum(sRows,'ORDENES'), canN = sum(cRows,'ORDENES');
    const cy  = pRows.length ? wAvgCy(pRows) : 0;
    const pk  = hcRows.length ? avg(hcRows.map(r=>parseFloat(r.PICKERS)||0)) : null;
    const isPartial = sem >= getMonday(today);
    return {sem, ord, defN, defR:ord?defN/ord:0, soN, soR:ord?soN/ord:0, canN, canR:ord?canN/ord:0, cy, pk, isPartial};
  });

  // ── HC daily (after) for chart ─────────────────────────────
  const hcDailyAfter = afterHCRows.map(r=>({
    date: r.DATE||r.FECHA,
    pickers: parseFloat(r.PICKERS)||0
  })).sort((a,b)=>a.date.localeCompare(b.date));

  // ── Top 10 pickers (after period) ─────────────────────────
  const defMapAfter={},soMapAfter={},canMapAfter={};
  afterDefRows.forEach(r=>{const p=r.TOP_PICKER;if(p&&p!=='—')defMapAfter[p]=(defMapAfter[p]||0)+(parseFloat(r.TICKETS)||0);});
  afterSORows.forEach(r=>{const p=r.TOP_PICKER;if(p&&p!=='—')soMapAfter[p]=(soMapAfter[p]||0)+(parseFloat(r.ORDENES)||0);});
  afterCanRows.forEach(r=>{const p=r.TOP_PICKER;if(p&&p!=='—')canMapAfter[p]=(canMapAfter[p]||0)+(parseFloat(r.ORDENES)||0);});
  const avgPickA=wAvg(afterPickRows,'AVG_PICKING'),avgPackA=wAvg(afterPickRows,'AVG_PACKING'),avgHandA=wAvg(afterPickRows,'AVG_HANDOFF'),avgCyA=wAvgCy(afterPickRows);

  const topPickers = afterPickRows.map(r=>{
    const nm=r.PICKER_NAME||r.FULLNAME||'';
    const ord=parseFloat(r.ORDENES)||0;
    const pick=parseFloat(r.AVG_PICKING)||0,pack=parseFloat(r.AVG_PACKING)||0,hand=parseFloat(r.AVG_HANDOFF)||0;
    const cy=cycleOf(r);
    const def=defMapAfter[nm]||0,soN=soMapAfter[nm]||0,canN=canMapAfter[nm]||0;
    return{name:nm,ord,def,defR:afterOrd?def/afterOrd:0,soN,soR:afterOrd?soN/afterOrd:0,canN,canR:afterOrd?canN/afterOrd:0,
      pick,pickD:avgPickA?Math.round((pick/avgPickA-1)*100):0,
      cy,cyD:avgCyA?Math.round((cy/avgCyA-1)*100):0};
  }).sort((a,b)=>b.defR-a.defR).slice(0,10);

  return {bPickers,bDefRate,bSORate,bCanRate,bCy,bOrd,afterPickers,afterDefRate,afterSORate,afterCanRate,afterCy,afterOrd,weeklyData,hcDailyAfter,topPickers};
}

// ── Render helpers ────────────────────────────────────────────
function deltaBadge(after,before,lessIsBetter=true,fmt='%'){
  if(!before)return`<span class="delta-badge delta-neu">—</span>`;
  const d=(after-before)/before;
  const worse=(lessIsBetter&&d>0)||(!lessIsBetter&&d<0);
  const cls=Math.abs(d)<0.02?'delta-neu':worse?'delta-bad':'delta-ok';
  const sign=d>=0?'+':'';
  const val=fmt==='%'?`${sign}${(d*100).toFixed(1)}%`:`${sign}${d.toFixed(2)} min`;
  return`<span class="delta-badge ${cls}">${val}</span>`;
}

function kbaDelta(after,before,lessIsBetter=true){
  if(!before)return'<span class="kpi-ba-delta kba-neu">—</span>';
  const d=(after-before)/before;
  const worse=(lessIsBetter&&d>0)||(!lessIsBetter&&d<0);
  const cls=Math.abs(d)<0.02?'kba-neu':worse?'kba-bad':'kba-ok';
  const sign=d>=0?'+':'';
  return`<span class="kpi-ba-delta ${cls}">${sign}${(d*100).toFixed(1)}%</span>`;
}

function pct(v){return`${(v*100).toFixed(1)}%`;}
function mpCls(v,b,li=true){if(!b||Math.abs(v-b)/b<0.02)return'mp-n';const w=(li&&v>b)||(!li&&v<b);return Math.abs(v-b)/b>=0.2?(w?'mp-hi':'mp-lo'):w?'mp-w':'mp-n';}
function mpD(v,b){if(!b)return'';const d=(v-b)/b;const s=d>=0?'+':'';return`${s}${(d*100).toFixed(1)}%`;}

// ── HC chart ──────────────────────────────────────────────────
function renderHCChart(id,dailyData,beforeAvg){
  const el=document.getElementById(id);if(!el)return;
  if(!dailyData.length){el.innerHTML='<div style="color:#aaa;font-size:11px;padding:12px">Sin datos HC</div>';return;}
  const vals=dailyData.map(d=>d.pickers);
  const maxV=Math.max(...vals,beforeAvg*1.3,1);
  const refPct=(beforeAvg/maxV*100).toFixed(1);
  const barsHTML=dailyData.map(d=>{
    const h=Math.max(4,(d.pickers/maxV)*100);
    const dow=DOW[dowOf(d.date)];
    const isWorse=d.pickers>beforeAvg*1.05;
    const color=isWorse?'#FF9800':'#378ADD'; // orange if more than expected (shouldn't happen), blue otherwise
    return`<div class="hc-bar" style="height:${h}%;background:${color}" title="${dow} ${fmtDate(d.date)}: ${d.pickers} pickers"></div>`;
  }).join('');
  const labelsHTML=dailyData.map(d=>{
    const dow=DOW[dowOf(d.date)];
    // Only show Mon label to avoid clutter
    return`<span class="hc-chart-lbl">${dowOf(d.date)===1?dow:''}</span>`;
  }).join('');
  el.innerHTML=`
    <div class="hc-chart-wrap" style="position:relative">
      <div class="hc-ref-line" style="bottom:calc(4px + ${refPct}% * 0.92);z-index:2"></div>
      ${barsHTML}
    </div>
    <div class="hc-chart-labels">${labelsHTML}</div>
    <div class="chart-legend">
      <div class="chart-leg-item"><div class="chart-leg-dot" style="background:#378ADD"></div> Pickers/día</div>
      <div class="chart-leg-item"><div class="chart-leg-dot" style="background:#E24B4A;height:2px;margin-top:1px"></div> Prom. antes (${beforeAvg.toFixed(1)})</div>
    </div>`;
}

// ── Store card ────────────────────────────────────────────────

  // Weekly table
  const wRowsHTML=weeklyData.map(w=>`
    <tr${w.isPartial?' class="partial"':''}>
      <td>${fmtDate(w.sem)}${w.isPartial?' <span style="font-size:9px;color:#aaa">(cursando)</span>':''}</td>
      <td><span class="mn">${w.pk!==null?w.pk.toFixed(1):'—'}</span></td>
      <td><span class="mn">${w.ord||'—'}</span></td>
      <td><span class="mn">${w.defN}</span> <span class="mp ${mpCls(w.defR,bDefRate)}">${pct(w.defR)}</span></td>
      <td><span class="mp ${mpCls(w.defR,bDefRate)}">${mpD(w.defR,bDefRate)}</span></td>
      <td><span class="mn">${w.soN}</span> <span class="mp ${mpCls(w.soR,bSORate)}">${pct(w.soR)}</span></td>
      <td><span class="mp ${mpCls(w.soR,bSORate)}">${mpD(w.soR,bSORate)}</span></td>
      <td><span class="mn">${w.canN}</span> <span class="mp ${mpCls(w.canR,bCanRate)}">${pct(w.canR)}</span></td>
      <td><span class="mp ${mpCls(w.canR,bCanRate)}">${mpD(w.canR,bCanRate)}</span></td>
      <td><span class="mn">${w.cy?w.cy.toFixed(2):'—'}</span></td>
      <td><span class="mp ${mpCls(w.cy,bCy)}">${mpD(w.cy,bCy)}</span></td>
    </tr>`).join('');

  // Top pickers table
  const pkRowsHTML=topPickers.map((p,i)=>`
    <tr>
      <td><span class="pk-rank">${i+1}</span>${p.name||'—'}</td>
      <td><span class="mn">${p.ord}</span> <span class="mp mp-n">${afterOrd?pct(p.ord/afterOrd):'—'}</span></td>
      <td><span class="mn">${p.def}</span> <span class="mp ${p.def>0?'mp-hi':'mp-n'}">${pct(p.defR)}</span></td>
      <td><span class="mn">${p.soN}</span> <span class="mp ${p.soN>0?'mp-w':'mp-n'}">${pct(p.soR)}</span></td>
      <td><span class="mn">${p.canN}</span> <span class="mp ${p.canN>0?'mp-w':'mp-n'}">${pct(p.canR)}</span></td>
      <td><span class="mn">${p.pick.toFixed(2)}</span> <span class="mp ${p.pickD>15?'mp-hi':p.pickD<-15?'mp-lo':'mp-n'}">${p.pickD>0?'+':''}${p.pickD}%</span></td>
      <td><span class="mn">${p.cy.toFixed(2)}</span> <span class="mp ${p.cyD>15?'mp-hi':p.cyD<-15?'mp-lo':'mp-n'}">${p.cyD>0?'+':''}${p.cyD}%</span></td>
    </tr>`).join('');

  const card=document.createElement('div');
  card.className='store-card';
  card.style.setProperty('--cc',store.cc);
  card.innerHTML=`
    <div class="store-card-hdr">
      <span class="store-card-name">${store.name}</span>
      <span style="font-size:10px;font-weight:700;background:#F5F4F0;color:#888;padding:2px 8px;border-radius:8px">${store.country}</span>
    </div>
    <div class="store-card-body">

      <div class="sec-lbl">HC — Headcount conectado</div>
      <div class="hc-row">
        <div class="hc-box">
          <div class="hc-box-lbl">Antes (4 sem prom)</div>
          <div class="hc-box-val">${bPickers.toFixed(1)}</div>
          <div class="hc-box-sub">pickers/día</div>
        </div>
        <div class="hc-arrow">→</div>
        <div class="hc-box" style="background:#E3F2FD">
          <div class="hc-box-lbl">Experimento (prom)</div>
          <div class="hc-box-val">${afterPickers?afterPickers.toFixed(1):'—'}</div>
          <div class="hc-box-sub">pickers/día</div>
        </div>
        <div class="hc-delta">${deltaBadge(afterPickers,bPickers,false)}</div>
      </div>

      <div class="sec-lbl">Métricas operacionales — Antes vs Experimento total</div>
      <div class="kpi-ba-grid">
        <div class="kpi-ba">
          <div class="kpi-ba-lbl">Defectos / Órdenes</div>
          <div class="kpi-ba-row">
            <span class="kpi-ba-before">${pct(bDefRate)}</span>
            <span class="kpi-ba-arr">→</span>
            <span class="kpi-ba-after">${pct(afterDefRate)}</span>
            ${kbaDelta(afterDefRate,bDefRate,true)}
          </div>
        </div>
        <div class="kpi-ba">
          <div class="kpi-ba-lbl">Stockouts / Órdenes</div>
          <div class="kpi-ba-row">
            <span class="kpi-ba-before">${pct(bSORate)}</span>
            <span class="kpi-ba-arr">→</span>
            <span class="kpi-ba-after">${pct(afterSORate)}</span>
            ${kbaDelta(afterSORate,bSORate,true)}
          </div>
        </div>
        <div class="kpi-ba">
          <div class="kpi-ba-lbl">Cancelaciones / Órdenes</div>
          <div class="kpi-ba-row">
            <span class="kpi-ba-before">${pct(bCanRate)}</span>
            <span class="kpi-ba-arr">→</span>
            <span class="kpi-ba-after">${pct(afterCanRate)}</span>
            ${kbaDelta(afterCanRate,bCanRate,true)}
          </div>
        </div>
        <div class="kpi-ba">
          <div class="kpi-ba-lbl">Cycle Time</div>
          <div class="kpi-ba-row">
            <span class="kpi-ba-before">${bCy.toFixed(2)} min</span>
            <span class="kpi-ba-arr">→</span>
            <span class="kpi-ba-after">${afterCy.toFixed(2)} min</span>
            ${kbaDelta(afterCy,bCy,true)}
          </div>
        </div>
      </div>

      <div class="sec-lbl">HC diario durante el experimento <span style="font-size:10px;color:#bbb;font-weight:400">(línea roja = prom antes)</span></div>
      <div id="hchart-${store.id}"></div>

      <div class="sec-lbl">Cierre semanal vs baseline</div>
      ${weeklyData.length?`
      <div style="overflow-x:auto">
        <table class="wtbl">
          <thead><tr>
            <th>Semana</th><th>HC</th><th>Órdenes</th>
            <th>Def</th><th>Δ Def</th>
            <th>SO</th><th>Δ SO</th>
            <th>Cancel</th><th>Δ Can</th>
            <th>Cycle T</th><th>Δ CT</th>
          </tr></thead>
          <tbody>${wRowsHTML}</tbody>
        </table>
      </div>`:'<div style="color:#aaa;font-size:11px;padding:4px">Sin datos del experimento aún</div>'}

      <div class="sec-lbl">Top 10 pickers más críticos <span style="font-size:10px;color:#bbb;font-weight:400">(período experimento · Δ% = vs prom tienda)</span></div>
      ${topPickers.length?`
      <div class="pk-tbl-wrap">
        <table class="pk-tbl">
          <thead><tr>
            <th>Picker</th><th>Órdenes</th><th>Defectos</th><th>SO</th><th>Cancel.</th><th>Picking</th><th>Cycle T</th>
          </tr></thead>
          <tbody>${pkRowsHTML}</tbody>
        </table>
      </div>`:'<div style="color:#aaa;font-size:11px;padding:4px">Sin datos de pickers</div>'}
    </div>`;

  return card;
}

// ── Render all ────────────────────────────────────────────────
function renderAll(){
  const countries={PE:[],AR:[],BR:[]};
  EXP_STORES.forEach(s=>countries[s.country].push(s));

  Object.entries(countries).forEach(([country,stores])=>{
    const grid=document.getElementById(`grid-${country}`);
    grid.innerHTML='';
    stores.forEach(store=>{
      const data=computeStore(store);
      const card=renderStoreCard(store,data);
      grid.appendChild(card);
    });
    // Render charts after DOM is ready
    stores.forEach(store=>{
      const data=computeStore(store);
      renderHCChart(`hchart-${store.id}`,data.hcDailyAfter,data.bPickers);
    });
  });
}

// ── Country nav ───────────────────────────────────────────────
function showCountry(c,tab){
  document.querySelectorAll('.country-tab').forEach(t=>t.classList.remove('on'));
  tab.classList.add('on');
  const secs=document.querySelectorAll('.country-sec');
  if(c==='all'){secs.forEach(s=>s.classList.add('on'));}
  else{secs.forEach(s=>{s.classList.toggle('on',s.id===`sec-${c}`);});}
}
