<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Control Board — Experimento HC</title>
<link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#F5F4F0;color:#111;font-family:'Figtree',sans-serif;font-size:13px;line-height:1.5}
.hdr{background:#fff;border-bottom:1px solid #E5E4DF;padding:12px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.logo{font-size:17px;font-weight:700;letter-spacing:-.4px}.logo b{color:#E24B4A}
.exp-tag{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;background:#FFF3E0;color:#E65100;border:1px solid #FFCC80;padding:2px 8px;border-radius:10px;margin-left:8px}
.hdr-r{display:flex;align-items:center;gap:12px}
.live{display:flex;align-items:center;gap:5px;font-size:11px;color:#999}
.dot{width:6px;height:6px;border-radius:50%;background:#ccc;transition:background .3s}.dot.ok{background:#4CAF50}
.btn{font-size:11px;font-weight:600;padding:5px 14px;border:1px solid #DDD;border-radius:6px;background:#fff;cursor:pointer;font-family:'Figtree',sans-serif}.btn:hover{background:#F5F4F0}
.exp-banner{background:#fff;border-bottom:1px solid #E5E4DF;padding:10px 24px;display:flex;align-items:center;gap:20px;flex-wrap:wrap}
.ep{display:flex;align-items:center;gap:6px;font-size:11px}
.epl{color:#aaa;font-weight:600;text-transform:uppercase;letter-spacing:.5px;font-size:10px}
.epv{font-weight:700;color:#111}
.esep{width:1px;height:20px;background:#E5E4DF}
.ebadge{background:#FFF3E0;color:#E65100;border:1px solid #FFCC80;font-size:11px;font-weight:700;padding:2px 10px;border-radius:10px}
.country-nav{background:#fff;border-bottom:1px solid #E5E4DF;padding:0 24px;display:flex;position:sticky;top:53px;z-index:49}
.ctab{padding:10px 20px;font-size:12px;font-weight:600;color:#888;cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;user-select:none}
.ctab.on{color:#111;border-bottom-color:#111}.ctab:hover{color:#555}
.ld{display:flex;align-items:center;justify-content:center;gap:10px;padding:60px;color:#aaa}
.sp{width:16px;height:16px;border:2px solid #E0DFD9;border-top-color:#E65100;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.content{padding:20px 24px}.csec{display:none}.csec.on{display:block}
.chdr{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.chdr h2{font-size:16px;font-weight:700}
.sgrid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px}
/* STORE CARD */
.scard{background:#fff;border:1px solid #E5E4DF;border-radius:12px;overflow:hidden}
.scard-hdr{padding:11px 16px;border-bottom:1px solid #F0EFEB;display:flex;align-items:center;justify-content:space-between;border-top:3px solid var(--cc,#E24B4A)}
.scard-name{font-size:15px;font-weight:700;letter-spacing:-.3px}
.scard-body{padding:16px}
.slbl{font-size:10px;font-weight:700;color:#aaa;text-transform:uppercase;letter-spacing:.6px;margin-bottom:8px;margin-top:14px}
.slbl:first-child{margin-top:0}
/* HC rows */
.hcrow{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.hcbox{flex:1;background:#F5F4F0;border-radius:8px;padding:8px 10px;text-align:center}
.hcbox.exp{background:#E3F2FD}
.hcbox-lbl{font-size:9px;color:#aaa;font-weight:700;text-transform:uppercase;letter-spacing:.4px;margin-bottom:2px}
.hcbox-val{font-size:20px;font-weight:700;letter-spacing:-.5px;line-height:1}
.hcbox-sub{font-size:10px;color:#888;margin-top:1px}
.hcarr{font-size:16px;color:#ddd;flex-shrink:0}
.hcdelta{text-align:center;min-width:52px;flex-shrink:0}
/* Delta badges */
.dbadge{display:inline-block;font-size:12px;font-weight:700;padding:3px 8px;border-radius:6px}
.dbad{background:#FFF0F0;color:#C62828}.dok{background:#F1F8E9;color:#2E7D32}.dneu{background:#E3F2FD;color:#1565C0}
/* KPI before/after */
.kgrid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.kba{background:#F9F8F5;border-radius:8px;padding:8px 10px}
.kba-lbl{font-size:10px;color:#aaa;font-weight:700;text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px}
.kba-row{display:flex;align-items:center;gap:4px;font-size:11px;flex-wrap:wrap}
.kba-b{color:#999;font-weight:500}.kba-arr{color:#ccc;font-size:10px}.kba-a{font-weight:700;color:#111}
.kbadge{font-size:10px;font-weight:700;padding:1px 5px;border-radius:4px}
.kbad{background:#FFF0F0;color:#C62828}.kok{background:#F1F8E9;color:#2E7D32}.kneu{background:#F5F4F0;color:#888}
/* Chart */
.chart-bars{position:relative;height:80px;background:#F9F8F5;border-radius:8px;overflow:hidden;display:flex;align-items:flex-end;gap:1px;padding:4px 4px 0}
.chart-ref{position:absolute;left:4px;right:4px;height:0;border-top:1.5px dashed #2196F3;z-index:2}
.chart-lbl-row{display:flex;gap:1px;padding:2px 4px 0}
.chart-leg{display:flex;gap:14px;margin-top:5px;flex-wrap:wrap}
.chart-leg-i{display:flex;align-items:center;gap:4px;font-size:10px;color:#888}
.chart-leg-dot{width:8px;height:8px;border-radius:2px}
/* Weekly table */
.wtbl{width:100%;border-collapse:collapse;font-size:11px}
.wtbl th{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.3px;color:#aaa;padding:5px 8px;border-bottom:1px solid #E5E4DF;text-align:right;white-space:nowrap}
.wtbl th:first-child{text-align:left}
.wtbl td{padding:5px 8px;border-bottom:1px solid #F5F4F0;text-align:right;white-space:nowrap}
.wtbl td:first-child{text-align:left;font-weight:500}
.wtbl tr:last-child td{border-bottom:none}
.wtbl tr.partial td{color:#bbb}
/* Pickers table */
.ptbl-wrap{overflow-x:auto}
.ptbl{width:100%;border-collapse:collapse;font-size:11px}
.ptbl th{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.3px;color:#aaa;padding:5px 8px;border-bottom:1px solid #E5E4DF;text-align:right;white-space:nowrap}
.ptbl th:first-child{text-align:left}
.ptbl td{padding:6px 8px;border-bottom:1px solid #F5F4F0;text-align:right;white-space:nowrap}
.ptbl td:first-child{text-align:left;font-weight:500;max-width:130px;overflow:hidden;text-overflow:ellipsis}
.ptbl tr:last-child td{border-bottom:none}
.prank{font-size:10px;color:#ccc;font-weight:700;margin-right:3px}
/* Misc */
.mn{font-weight:700}.mp{font-size:10px;margin-left:2px}
.mph{color:#C62828;font-weight:600}.mpl{color:#2E7D32;font-weight:600}.mpw{color:#E65100;font-weight:600}.mpn{color:#aaa}
.nodata{color:#aaa;font-size:11px;padding:8px 0}
@media(max-width:900px){.sgrid{grid-template-columns:1fr}}
@media(max-width:600px){.hdr{padding:10px 14px}.content{padding:12px}.exp-banner{padding:8px 14px}.country-nav{padding:0 14px}.kgrid{grid-template-columns:1fr}}
</style>
</head>
<body>

<div class="hdr">
  <div style="display:flex;align-items:center">
    <span class="logo">Turbo<b>Ops</b></span>
    <span class="exp-tag">Experimento HC</span>
  </div>
  <div class="hdr-r">
    <span class="live"><span class="dot" id="dot"></span><span id="upd">Cargando...</span></span>
    <button class="btn" onclick="loadAll()">↺ Refrescar</button>
  </div>
</div>

<div class="exp-banner">
  <div class="ep"><span class="epl">Inicio</span><span class="epv">Jue 1 May 2026</span></div>
  <div class="esep"></div>
  <div class="ep"><span class="epl">Duración</span><span class="epv" id="exp-days">—</span></div>
  <div class="esep"></div>
  <div class="ep"><span class="epl">Tiendas</span><span class="epv">6 (2 por país)</span></div>
  <div class="esep"></div>
  <div class="ep"><span class="epl">Países</span><span class="epv">PE · AR · BR</span></div>
  <div class="esep"></div>
  <div class="ep"><span class="epl">Target HC</span><span class="ebadge">-30% Pickers</span></div>
  <div class="esep"></div>
  <div class="ep"><span class="epl">Baseline</span><span class="epv">4 sem anteriores</span></div>
</div>

<div class="country-nav">
  <div class="ctab on" onclick="showC('all',this)">Todas</div>
  <div class="ctab" onclick="showC('PE',this)">🇵🇪 Perú</div>
  <div class="ctab" onclick="showC('AR',this)">🇦🇷 Argentina</div>
  <div class="ctab" onclick="showC('BR',this)">🇧🇷 Brasil</div>
</div>

<div class="ld" id="gld"><div class="sp"></div>Cargando datos del experimento...</div>

<div class="content" id="content" style="display:none">
  <div class="csec on" id="sec-PE"><div class="chdr"><span style="font-size:20px">🇵🇪</span><h2>Perú</h2></div><div class="sgrid" id="grid-PE"></div></div>
  <div class="csec on" id="sec-AR"><div class="chdr"><span style="font-size:20px">🇦🇷</span><h2>Argentina</h2></div><div class="sgrid" id="grid-AR"></div></div>
  <div class="csec on" id="sec-BR"><div class="chdr"><span style="font-size:20px">🇧🇷</span><h2>Brasil</h2></div><div class="sgrid" id="grid-BR"></div></div>
</div>

<script>
// ── Config ────────────────────────────────────────────────────
const EXP_START    = '2026-05-01';
const BEFORE_WEEKS = 4;
const SID = '1ieRuWkk5BxJKRFEJSHeSJuyHcnzjOyOP6l0xzOMqD8U';
const API_KEY = 'AIzaSyAttY6mdOrj4ic3vYCyuFpAkiYx9HFrasg';
const SHEETS = {def:'Defectos',so:'Stockouts',can:'Cancelaciones',pick:'Pickers',hc:'HC'};
const EXP_STORES = [
  {id:'bena',   country:'PE', name:'Benavides',     cc:'#E24B4A', match:n=>/benavides/i.test(n)},
  {id:'macchu', country:'PE', name:'Macchu Picchu',  cc:'#E24B4A', match:n=>/macchu/i.test(n)},
  {id:'humb',   country:'AR', name:'Humboldt',       cc:'#2196F3', match:n=>/humboldt/i.test(n)},
  {id:'vicen',  country:'AR', name:'Vicente Lopez',  cc:'#2196F3', match:n=>/vicente/i.test(n)},
  {id:'acli',   country:'BR', name:'Aclimação',      cc:'#4CAF50', match:n=>/aclima/i.test(n)},
  {id:'carrao', country:'BR', name:'Carrão',         cc:'#4CAF50', match:n=>/carr/i.test(n)},
];
const DOW = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
let D = {def:[],so:[],can:[],pick:[],hc:[]};

// ── Safe number helpers ───────────────────────────────────────
const n = v => (isFinite(v) && v != null) ? +v : 0;   // safe number
const fmt1 = v => n(v).toFixed(1);
const fmt2 = v => n(v).toFixed(2);
const pct  = v => n(v*100).toFixed(1)+'%';

// ── Date helpers ──────────────────────────────────────────────
function addDays(d,k){const r=new Date(d+'T12:00:00');r.setDate(r.getDate()+k);return r.toISOString().split('T')[0];}
function getMonday(d){const dt=new Date(d+'T12:00:00');const day=dt.getDay();dt.setDate(dt.getDate()+(day===0?-6:1-day));return dt.toISOString().split('T')[0];}
function fmtDate(d){if(!d)return'—';const dt=new Date(d+'T12:00:00');return isNaN(dt)?d:dt.toLocaleDateString('es',{day:'numeric',month:'short'});}
function daysDiff(a,b){return Math.round((new Date(b+'T12:00:00')-new Date(a+'T12:00:00'))/(864e5));}
function dowOf(d){return new Date(d+'T12:00:00').getDay();}

const EXP_MON      = getMonday(EXP_START);                       // Monday of exp start week
const BEFORE_START = addDays(EXP_MON, -BEFORE_WEEKS*7);          // 4 weeks back

function isBeforeOp(r){const s=r.SEMANA||r.FECHA||'';return s>=BEFORE_START&&s<EXP_MON;}
function isAfterOp(r) {const s=r.SEMANA||r.FECHA||'';return s>=EXP_MON;}
function isBeforeHC(r){const d=r.DATE||r.FECHA||'';return d>=BEFORE_START&&d<EXP_START;}
function isAfterHC(r) {const d=r.DATE||r.FECHA||'';return d>=EXP_START;}

// ── Fetch ─────────────────────────────────────────────────────
async function fetchSheet(g){
  const url=`https://sheets.googleapis.com/v4/spreadsheets/${SID}/values/${encodeURIComponent(SHEETS[g])}?key=${API_KEY}`;
  const r=await fetch(url);if(!r.ok)throw new Error(g+': HTTP '+r.status);
  const json=await r.json();const rows=json.values||[];
  const known=['SEMANA','FECHA','DATE','WEEK','COUNTRY','COUNTRY_CODE','TICKETS','ORDENES',
    'WAREHOUSENAME','KEYWH','PICKER_NAME','FULLNAME','AVG_ASSIGN','AVG_PICKING','AVG_PACKING',
    'AVG_PICK_PACK','AVG_HANDOFF','AVG_ASSING_TO_PICKER','AVG_HANDOFF_POST','AVG_CYCLE_TIME',
    'P90_PICK_PACK','AVG_TOTAL_TIME','PICKERS','STORE_LEAD','TOTAL_HC',
    'LEVEL_2','STOCKOUT_TYPE','SUBCATEGORY','TOP_PICKER','PRODUCT_NAME'];
  let hi=rows.findIndex(row=>row.filter(Boolean).some(c=>known.includes(c.toString().trim().toUpperCase())));
  if(hi===-1)hi=0;
  const hdrs=rows[hi];
  return rows.slice(hi+1).filter(row=>row.some(c=>c&&c.toString().trim())).map(row=>{
    const o={};hdrs.forEach((h,i)=>{if(h)o[h.toString().trim()]=(row[i]||'').toString().trim();});
    ['SEMANA','FECHA','DATE','WEEK'].forEach(k=>{if(o[k])o[k]=o[k].split(' ')[0].split('T')[0];});
    return o;
  });
}

async function loadAll(){
  document.getElementById('dot').className='dot';
  document.getElementById('upd').textContent='Cargando...';
  document.getElementById('gld').style.display='flex';
  document.getElementById('content').style.display='none';
  try{
    const results = await Promise.all(Object.keys(SHEETS).map(g=>fetchSheet(g)));
    [D.def,D.so,D.can,D.pick,D.hc] = results;
    renderAll();
    document.getElementById('gld').style.display='none';
    document.getElementById('content').style.display='block';
    document.getElementById('dot').className='dot ok';
    document.getElementById('upd').textContent='Actualizado '+new Date().toLocaleTimeString('es',{hour:'2-digit',minute:'2-digit'});
    const today=new Date().toISOString().split('T')[0];
    const days=Math.max(0,daysDiff(EXP_START,today));
    document.getElementById('exp-days').textContent=`${days} días (Sem ${Math.ceil(days/7)})`;
  }catch(e){
    document.getElementById('gld').innerHTML=`<span style="color:#E24B4A;font-size:12px;padding:20px">❌ Error: ${e.message}</span>`;
    console.error(e);
  }
}

// ── Math ──────────────────────────────────────────────────────
function sumF(arr,col){return arr.reduce((s,r)=>s+n(parseFloat(r[col])),0);}
function wavg(arr,col){const w=sumF(arr,'ORDENES');return w?arr.reduce((s,r)=>s+n(parseFloat(r.ORDENES))*n(parseFloat(r[col])),0)/w:0;}
function cycleOf(r){return n(parseFloat(r.AVG_ASSIGN))+n(parseFloat(r.AVG_PICKING))+n(parseFloat(r.AVG_PACKING))+n(parseFloat(r.AVG_HANDOFF));}
function wavgCy(arr){const w=sumF(arr,'ORDENES');return w?arr.reduce((s,r)=>s+n(parseFloat(r.ORDENES))*cycleOf(r),0)/w:0;}
function avgArr(arr){return arr.length?arr.reduce((a,b)=>a+b,0)/arr.length:0;}

function storeF(data,store){return data.filter(r=>store.match(r.WAREHOUSENAME||''));}

// ── Compute per store ─────────────────────────────────────────
function computeStore(store){
  const def  = storeF(D.def,  store);
  const so   = storeF(D.so,   store);
  const can  = storeF(D.can,  store);
  const pick = storeF(D.pick, store);
  const hc   = storeF(D.hc,   store);

  // ── BEFORE baseline ───────────────────────────────────────
  function wkAvg(rows,col){
    const m={};
    rows.filter(isBeforeOp).forEach(r=>{const w=r.SEMANA||r.FECHA||'';if(w)m[w]=(m[w]||0)+n(parseFloat(r[col]));});
    const v=Object.values(m);return v.length?avgArr(v):0;
  }
  function wkAvgPick(col){
    const m={};
    pick.filter(isBeforeOp).forEach(r=>{const w=r.SEMANA||r.FECHA||'';if(w){if(!m[w])m[w]=[];m[w].push(r);}});
    return avgArr(Object.values(m).map(rows=>wavg(rows,col)));
  }
  function wkAvgCy(){
    const m={};
    pick.filter(isBeforeOp).forEach(r=>{const w=r.SEMANA||r.FECHA||'';if(w){if(!m[w])m[w]=[];m[w].push(r);}});
    return avgArr(Object.values(m).map(rows=>wavgCy(rows)));
  }

  const bOrd       = wkAvg(pick,'ORDENES');
  const bDefN      = wkAvg(def,'TICKETS');
  const bSON       = wkAvg(so,'ORDENES');
  const bCanN      = wkAvg(can,'ORDENES');
  const bCy        = n(wkAvgCy());
  const bDefRate   = bOrd ? bDefN/bOrd : 0;
  const bSORate    = bOrd ? bSON/bOrd  : 0;
  const bCanRate   = bOrd ? bCanN/bOrd : 0;

  const hcB = hc.filter(isBeforeHC);
  const bPickers   = n(avgArr(hcB.map(r=>n(parseFloat(r.PICKERS)))));
  const bStoreLead = n(avgArr(hcB.map(r=>n(parseFloat(r.STORE_LEAD)))));

  // ── AFTER experiment period ───────────────────────────────
  const afterPick = pick.filter(isAfterOp);
  const afterDef  = def.filter(isAfterOp);
  const afterSO   = so.filter(isAfterOp);
  const afterCan  = can.filter(isAfterOp);
  const afterHC   = hc.filter(isAfterHC);

  const aOrd     = n(sumF(afterPick,'ORDENES'));
  const aDefN    = n(sumF(afterDef,'TICKETS'));
  const aSON     = n(sumF(afterSO,'ORDENES'));
  const aCanN    = n(sumF(afterCan,'ORDENES'));
  const aCy      = n(wavgCy(afterPick));
  const aDefRate = aOrd ? aDefN/aOrd : 0;
  const aSORate  = aOrd ? aSON/aOrd  : 0;
  const aCanRate = aOrd ? aCanN/aOrd : 0;
  const aPickers   = n(avgArr(afterHC.map(r=>n(parseFloat(r.PICKERS)))));
  const aStoreLead = n(avgArr(afterHC.map(r=>n(parseFloat(r.STORE_LEAD)))));

  // ── Weekly breakdown ───────────────────────────────────────
  const today = new Date().toISOString().split('T')[0];
  const sems = [...new Set([...afterDef,...afterSO,...afterCan,...afterPick].map(r=>r.SEMANA||r.FECHA||'').filter(Boolean))].sort();
  const weekly = sems.map(sem=>{
    const pR=afterPick.filter(r=>(r.SEMANA||r.FECHA||'')===sem);
    const dR=afterDef.filter(r=>(r.SEMANA||r.FECHA||'')===sem);
    const sR=afterSO.filter(r=>(r.SEMANA||r.FECHA||'')===sem);
    const cR=afterCan.filter(r=>(r.SEMANA||r.FECHA||'')===sem);
    const end=addDays(sem,6);
    const hR=afterHC.filter(r=>{const d=r.DATE||r.FECHA||'';return d>=sem&&d<=end;});
    const ord=n(sumF(pR,'ORDENES'));
    return{
      sem, ord,
      defN:n(sumF(dR,'TICKETS')), defR:ord?n(sumF(dR,'TICKETS'))/ord:0,
      soN:n(sumF(sR,'ORDENES')),  soR:ord?n(sumF(sR,'ORDENES'))/ord:0,
      canN:n(sumF(cR,'ORDENES')), canR:ord?n(sumF(cR,'ORDENES'))/ord:0,
      cy:n(wavgCy(pR)),
      pk:hR.length?n(avgArr(hR.map(r=>n(parseFloat(r.PICKERS))))):null,
      sl:hR.length?n(avgArr(hR.map(r=>n(parseFloat(r.STORE_LEAD))))):null,
      partial: sem>=getMonday(today)
    };
  });

  // ── HC daily chart data ────────────────────────────────────
  const hcDaily = afterHC
    .map(r=>({date:r.DATE||r.FECHA||'',pk:n(parseFloat(r.PICKERS)),sl:n(parseFloat(r.STORE_LEAD))}))
    .filter(r=>r.date).sort((a,b)=>a.date.localeCompare(b.date));

  // ── Top 10 pickers ─────────────────────────────────────────
  const dM={},sM={},cM={};
  afterDef.forEach(r=>{const p=r.TOP_PICKER;if(p&&p!=='—')dM[p]=(dM[p]||0)+n(parseFloat(r.TICKETS));});
  afterSO.forEach(r=>{const p=r.TOP_PICKER;if(p&&p!=='—')sM[p]=(sM[p]||0)+n(parseFloat(r.ORDENES));});
  afterCan.forEach(r=>{const p=r.TOP_PICKER;if(p&&p!=='—')cM[p]=(cM[p]||0)+n(parseFloat(r.ORDENES));});
  const avgPkA=n(wavg(afterPick,'AVG_PICKING')),avgCyA=n(wavgCy(afterPick));
  const top10=afterPick.map(r=>{
    const nm=r.PICKER_NAME||r.FULLNAME||'';
    const ord=n(parseFloat(r.ORDENES));
    const pkT=n(parseFloat(r.AVG_PICKING));
    const cy=cycleOf(r);
    return{nm,ord,
      def:n(dM[nm]),defR:aOrd?n(dM[nm])/aOrd:0,
      so:n(sM[nm]),soR:aOrd?n(sM[nm])/aOrd:0,
      can:n(cM[nm]),canR:aOrd?n(cM[nm])/aOrd:0,
      pkT,pkD:avgPkA?Math.round((pkT/avgPkA-1)*100):0,
      cy,cyD:avgCyA?Math.round((cy/avgCyA-1)*100):0
    };
  }).sort((a,b)=>b.defR-a.defR).slice(0,10);

  return {bPickers,bStoreLead,bOrd,bDefRate,bSORate,bCanRate,bCy,
          aPickers,aStoreLead,aOrd,aDefRate,aSORate,aCanRate,aCy,
          weekly,hcDaily,top10};
}

// ── Render helpers ────────────────────────────────────────────
function dbadge(after,before,lessIsBetter){
  if(!before)return'<span class="dbadge dneu">—</span>';
  const d=(after-before)/before;
  const bad=(lessIsBetter&&d>0.02)||(!lessIsBetter&&d<-0.02);
  const good=(lessIsBetter&&d<-0.02)||(!lessIsBetter&&d>0.02);
  const cls=good?'dok':bad?'dbad':'dneu';
  return`<span class="dbadge ${cls}">${d>=0?'+':''}${(d*100).toFixed(1)}%</span>`;
}
function kbadge(after,before,lessIsBetter){
  if(!before)return'<span class="kbadge kneu">—</span>';
  const d=(after-before)/before;
  const bad=(lessIsBetter&&d>0.02)||(!lessIsBetter&&d<-0.02);
  const good=(lessIsBetter&&d<-0.02)||(!lessIsBetter&&d>0.02);
  const cls=good?'kok':bad?'kbad':'kneu';
  return`<span class="kbadge ${cls}">${d>=0?'+':''}${(d*100).toFixed(1)}%</span>`;
}
function mpCls(v,b,li=true){
  if(!b||Math.abs(v-b)/b<0.02)return'mpn';
  const bad=(li&&v>b)||(!li&&v<b);
  return Math.abs(v-b)/b>=0.2?(bad?'mph':'mpl'):bad?'mpw':'mpn';
}
function mpD(v,b){if(!b)return'';const d=(v-b)/b;return`${d>=0?'+':''}${(d*100).toFixed(1)}%`;}

// ── HC daily chart ────────────────────────────────────────────
function renderChart(id,hcDaily,bPickers,bStoreLead){
  const el=document.getElementById(id);if(!el)return;
  if(!hcDaily.length){el.innerHTML='<div class="nodata">Sin datos HC en el período</div>';return;}
  const maxV=Math.max(...hcDaily.map(d=>d.pk+d.sl),n(bPickers)+n(bStoreLead),1)*1.15;
  const refPct=n(bPickers)/maxV*100;
  const bars=hcDaily.map(d=>{
    const hSl=Math.max(0,n(d.sl)/maxV*100);
    const hPk=Math.max(2,n(d.pk)/maxV*100);
    const worse=n(d.pk)>n(bPickers)*1.1;
    const pkC=worse?'#FF9800':'#378ADD';
    const dow=DOW[dowOf(d.date)];
    return`<div style="flex:1;display:flex;flex-direction:column;align-items:stretch;gap:0;min-width:3px">
      ${hSl>0?`<div style="height:${hSl}%;background:#FF9800;border-radius:2px 2px 0 0" title="${dow} ${fmtDate(d.date)}: ${fmt1(d.sl)} Store Lead"></div>`:''}
      <div style="height:${hPk}%;background:${pkC};border-radius:${hSl>0?'0':'2px 2px'} 0 0" title="${dow} ${fmtDate(d.date)}: ${fmt1(d.pk)} Pickers"></div>
    </div>`;
  }).join('');
  const lbls=hcDaily.map(d=>`<span style="flex:1;font-size:8px;color:#bbb;text-align:center;min-width:3px;overflow:hidden">${dowOf(d.date)===1?DOW[1]:''}</span>`).join('');
  el.innerHTML=`
    <div class="chart-bars">
      <div class="chart-ref" style="bottom:calc(${refPct.toFixed(1)}% * 0.9 + 1px)"></div>
      ${bars}
    </div>
    <div class="chart-lbl-row">${lbls}</div>
    <div class="chart-leg">
      <div class="chart-leg-i"><div class="chart-leg-dot" style="background:#378ADD"></div>Pickers (ref ${fmt1(bPickers)}/día)</div>
      <div class="chart-leg-i"><div class="chart-leg-dot" style="background:#FF9800"></div>Store Lead (ref ${fmt1(bStoreLead)}/día)</div>
      <div class="chart-leg-i"><div style="width:12px;height:0;border-top:1.5px dashed #2196F3"></div>Prom. antes</div>
    </div>`;
}

// ── Store card ────────────────────────────────────────────────
function buildCard(store,data){
  const {bPickers,bStoreLead,bDefRate,bSORate,bCanRate,bCy,
         aPickers,aStoreLead,aDefRate,aSORate,aCanRate,aCy,
         weekly,hcDaily,top10,aOrd}=data;

  const wHTML=weekly.length?weekly.map(w=>`
    <tr${w.partial?' class="partial"':''}>
      <td>${fmtDate(w.sem)}${w.partial?' <span style="font-size:9px;color:#bbb">(cursando)</span>':''}</td>
      <td>${w.pk!=null?fmt1(w.pk):'—'}</td>
      <td>${w.sl!=null?fmt1(w.sl):'—'}</td>
      <td>${w.ord||'—'}</td>
      <td><span class="mn">${w.defN}</span> <span class="mp ${mpCls(w.defR,bDefRate)}">${pct(w.defR)}</span></td>
      <td><span class="mp ${mpCls(w.defR,bDefRate)}">${mpD(w.defR,bDefRate)}</span></td>
      <td><span class="mn">${w.soN}</span> <span class="mp ${mpCls(w.soR,bSORate)}">${pct(w.soR)}</span></td>
      <td><span class="mp ${mpCls(w.soR,bSORate)}">${mpD(w.soR,bSORate)}</span></td>
      <td><span class="mn">${w.canN}</span> <span class="mp ${mpCls(w.canR,bCanRate)}">${pct(w.canR)}</span></td>
      <td><span class="mp ${mpCls(w.canR,bCanRate)}">${mpD(w.canR,bCanRate)}</span></td>
      <td>${fmt2(w.cy)} <span class="mp ${mpCls(w.cy,bCy)}">${mpD(w.cy,bCy)}</span></td>
    </tr>`).join('')
    :'<tr><td colspan="11" class="nodata" style="padding:8px">Sin semanas completas aún</td></tr>';

  const pkHTML=top10.length?top10.map((p,i)=>`
    <tr>
      <td><span class="prank">${i+1}</span>${p.nm||'—'}</td>
      <td><span class="mn">${p.ord}</span> <span class="mp mpn">${aOrd?pct(p.ord/aOrd):'—'}</span></td>
      <td><span class="mn">${p.def}</span> <span class="mp ${p.def>0?'mph':'mpn'}">${pct(p.defR)}</span></td>
      <td><span class="mn">${p.so}</span> <span class="mp ${p.so>0?'mpw':'mpn'}">${pct(p.soR)}</span></td>
      <td><span class="mn">${p.can}</span> <span class="mp ${p.can>0?'mpw':'mpn'}">${pct(p.canR)}</span></td>
      <td><span class="mn">${fmt2(p.pkT)}</span> <span class="mp ${p.pkD>15?'mph':p.pkD<-15?'mpl':'mpn'}">${p.pkD>0?'+':''}${p.pkD}%</span></td>
      <td><span class="mn">${fmt2(p.cy)}</span> <span class="mp ${p.cyD>15?'mph':p.cyD<-15?'mpl':'mpn'}">${p.cyD>0?'+':''}${p.cyD}%</span></td>
    </tr>`).join('')
    :'<tr><td colspan="7" class="nodata" style="padding:8px">Sin datos de pickers</td></tr>';

  const div=document.createElement('div');
  div.className='scard';
  div.style.setProperty('--cc',store.cc);
  div.innerHTML=`
    <div class="scard-hdr">
      <span class="scard-name">${store.name}</span>
      <span style="font-size:10px;font-weight:700;background:#F5F4F0;color:#888;padding:2px 8px;border-radius:8px">${store.country}</span>
    </div>
    <div class="scard-body">

      <div class="slbl">HC — Headcount conectado</div>
      <div style="display:flex;flex-direction:column;gap:6px">
        <!-- Pickers row -->
        <div class="hcrow">
          <div class="hcbox"><div class="hcbox-lbl">👷 Pickers · Antes</div><div class="hcbox-val">${fmt1(bPickers)}</div><div class="hcbox-sub">prom/día</div></div>
          <div class="hcarr">→</div>
          <div class="hcbox exp"><div class="hcbox-lbl">👷 Pickers · Exp</div><div class="hcbox-val">${aPickers?fmt1(aPickers):'—'}</div><div class="hcbox-sub">prom/día</div></div>
          <div class="hcdelta">${dbadge(aPickers,bPickers,false)}</div>
        </div>
        <!-- Store Lead row -->
        <div class="hcrow">
          <div class="hcbox"><div class="hcbox-lbl">🧑‍💼 Store Lead · Antes</div><div class="hcbox-val">${fmt1(bStoreLead)}</div><div class="hcbox-sub">prom/día</div></div>
          <div class="hcarr">→</div>
          <div class="hcbox exp"><div class="hcbox-lbl">🧑‍💼 Store Lead · Exp</div><div class="hcbox-val">${aStoreLead?fmt1(aStoreLead):'—'}</div><div class="hcbox-sub">prom/día</div></div>
          <div class="hcdelta">${dbadge(aStoreLead,bStoreLead,false)}</div>
        </div>
      </div>

      <div class="slbl">Métricas operacionales — Antes vs Experimento total</div>
      <div class="kgrid">
        <div class="kba"><div class="kba-lbl">Defectos / Órdenes</div>
          <div class="kba-row"><span class="kba-b">${pct(bDefRate)}</span><span class="kba-arr">→</span><span class="kba-a">${pct(aDefRate)}</span>${kbadge(aDefRate,bDefRate,true)}</div></div>
        <div class="kba"><div class="kba-lbl">Stockouts / Órdenes</div>
          <div class="kba-row"><span class="kba-b">${pct(bSORate)}</span><span class="kba-arr">→</span><span class="kba-a">${pct(aSORate)}</span>${kbadge(aSORate,bSORate,true)}</div></div>
        <div class="kba"><div class="kba-lbl">Cancelaciones / Órdenes</div>
          <div class="kba-row"><span class="kba-b">${pct(bCanRate)}</span><span class="kba-arr">→</span><span class="kba-a">${pct(aCanRate)}</span>${kbadge(aCanRate,bCanRate,true)}</div></div>
        <div class="kba"><div class="kba-lbl">Cycle Time</div>
          <div class="kba-row"><span class="kba-b">${fmt2(bCy)} min</span><span class="kba-arr">→</span><span class="kba-a">${fmt2(aCy)} min</span>${kbadge(aCy,bCy,true)}</div></div>
      </div>

      <div class="slbl">HC diario — experimento <span style="font-size:10px;color:#bbb;font-weight:400;text-transform:none">(línea punteada = prom antes)</span></div>
      <div id="hc-${store.id}"></div>

      <div class="slbl">Cierre semanal vs baseline</div>
      <div style="overflow-x:auto">
        <table class="wtbl">
          <thead><tr>
            <th>Semana</th><th>Pickers</th><th>St.Lead</th><th>Órdenes</th>
            <th>Defectos</th><th>Δ Def</th><th>SO</th><th>Δ SO</th>
            <th>Cancel</th><th>Δ Can</th><th>Cycle T</th>
          </tr></thead>
          <tbody>${wHTML}</tbody>
        </table>
      </div>

      <div class="slbl" style="margin-top:14px">Top 10 pickers más críticos <span style="font-size:10px;color:#bbb;font-weight:400;text-transform:none">(Δ% = vs prom tienda · % = vs órdenes tienda)</span></div>
      <div class="ptbl-wrap">
        <table class="ptbl">
          <thead><tr><th>Picker</th><th>Órdenes</th><th>Defectos</th><th>SO</th><th>Cancel</th><th>Picking</th><th>Cycle T</th></tr></thead>
          <tbody>${pkHTML}</tbody>
        </table>
      </div>

    </div>`;
  return div;
}

// ── Render all ────────────────────────────────────────────────
function renderAll(){
  const byCountry={PE:[],AR:[],BR:[]};
  EXP_STORES.forEach(s=>byCountry[s.country].push(s));
  Object.entries(byCountry).forEach(([country,stores])=>{
    const grid=document.getElementById(`grid-${country}`);
    grid.innerHTML='';
    stores.forEach(store=>{
      let data;
      try{data=computeStore(store);}catch(e){console.error(store.name,e);data={bPickers:0,bStoreLead:0,bOrd:0,bDefRate:0,bSORate:0,bCanRate:0,bCy:0,aPickers:0,aStoreLead:0,aOrd:0,aDefRate:0,aSORate:0,aCanRate:0,aCy:0,weekly:[],hcDaily:[],top10:[]};}
      const card=buildCard(store,data);
      grid.appendChild(card);
      // Chart rendered after card is in DOM
      renderChart(`hc-${store.id}`,data.hcDaily,data.bPickers,data.bStoreLead);
    });
  });
}

// ── Country nav ───────────────────────────────────────────────
function showC(c,tab){
  document.querySelectorAll('.ctab').forEach(t=>t.classList.remove('on'));tab.classList.add('on');
  document.querySelectorAll('.csec').forEach(s=>s.classList.toggle('on',c==='all'||s.id===`sec-${c}`));
}

loadAll();
</script>
