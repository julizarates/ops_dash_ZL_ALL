<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>TurboOps | Segmentación por Cuartil</title>
<link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --red: #E24B4A; --red-bg: #FEF2F2;
  --q1: #10B981; --q1-bg: #ECFDF5;
  --q2: #F59E0B; --q2-bg: #FFFBEB;
  --q3: #FB923C; --q3-bg: #FFF7ED;
  --q4: #E24B4A; --q4-bg: #FEF2F2;
  --border: #E5E7EB; --surface: #F9FAFB;
  --text: #111827; --text-sm: #6B7280;
  --radius: 12px; --shadow: 0 1px 4px rgba(0,0,0,0.08);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: 'Figtree', sans-serif; background: #F5F5F5; color: var(--text); font-size: 14px; line-height: 1.5; }

.header {
  background: #fff; border-bottom: 2.5px solid var(--red);
  padding: 12px 16px 10px; display: flex; align-items: center; gap: 10px;
  position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px rgba(0,0,0,0.06);
}
.logo { font-size: 20px; font-weight: 800; letter-spacing: -0.5px; }
.logo em { font-style: normal; color: var(--red); }
.header-info { flex: 1; }
.header-title { font-size: 11px; font-weight: 600; color: var(--text-sm); text-transform: uppercase; letter-spacing: 0.3px; }
.header-sub { font-size: 10px; color: #aaa; margin-top: 1px; }

.filters { background: #fff; border-bottom: 1px solid var(--border); padding: 8px 10px; display: flex; gap: 6px; }
.filter-wrap { flex: 1; position: relative; }
.filter-wrap::after { content: '▾'; position: absolute; right: 8px; top: 50%; transform: translateY(-50%); font-size: 10px; color: var(--text-sm); pointer-events: none; }
select {
  width: 100%; padding: 7px 22px 7px 9px; border: 1px solid var(--border); border-radius: 8px;
  background: var(--surface); font-family: inherit; font-size: 12px; color: var(--text);
  appearance: none; cursor: pointer; font-weight: 500;
}
select:focus { outline: none; border-color: var(--red); }

#loading { text-align: center; padding: 48px 24px; color: var(--text-sm); font-size: 13px; }
.spinner { width: 28px; height: 28px; border: 3px solid var(--border); border-top-color: var(--red); border-radius: 50%; animation: spin .7s linear infinite; margin: 0 auto 12px; }
@keyframes spin { to { transform: rotate(360deg); } }

.content-area { padding: 10px; max-width: 560px; margin: 0 auto; }
#summary-view, #detail-view { display: none; }

.totals-strip {
  background: #111; color: #fff; padding: 10px 14px; display: flex; gap: 14px;
  overflow-x: auto; font-size: 11px; align-items: center; margin-bottom: 10px; border-radius: 10px;
}
.t-item { display: flex; flex-direction: column; align-items: center; gap: 1px; white-space: nowrap; }
.t-num { font-size: 17px; font-weight: 800; }
.t-label { font-size: 9px; color: #aaa; text-transform: uppercase; letter-spacing: .3px; }
.t-sep { width: 1px; background: #333; height: 28px; }

.sec { background: #fff; border-radius: var(--radius); margin-bottom: 8px; border: 1px solid var(--border); box-shadow: var(--shadow); overflow: hidden; }
.sec-header { padding: 12px 14px 2px; }
.sec-title { font-size: 13px; font-weight: 700; }
.sec-sub { font-size: 10px; color: var(--text-sm); margin-top: 2px; }
.sec-body { padding: 8px 14px 12px; }

.metric-row { padding: 9px 0; border-bottom: 1px solid var(--border); cursor: pointer; }
.metric-row:last-child { border-bottom: none; }
.metric-row:active { background: var(--surface); }
.metric-top { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 5px; }
.metric-name { font-size: 12px; font-weight: 700; }
.metric-count { font-size: 10px; color: var(--text-sm); }
.qbar { display: flex; height: 16px; border-radius: 8px; overflow: hidden; background: var(--border); }
.qseg { display: flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 800; color: #fff; min-width: 0; transition: filter .1s; }
.qseg:active { filter: brightness(0.9); }
.qseg.q1 { background: var(--q1); }
.qseg.q2 { background: var(--q2); }
.qseg.q3 { background: var(--q3); }
.qseg.q4 { background: var(--q4); }
.qlegend { display: flex; gap: 10px; margin-top: 10px; font-size: 9px; color: var(--text-sm); flex-wrap: wrap; }
.qlegend span { display: inline-flex; align-items: center; gap: 3px; }
.dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; }

.pill { display: inline-flex; align-items: center; font-size: 9px; font-weight: 800; padding: 2px 7px; border-radius: 20px; }
.pill.q1 { background: var(--q1-bg); color: #065F46; }
.pill.q2 { background: var(--q2-bg); color: #92400E; }
.pill.q3 { background: var(--q3-bg); color: #9A3412; }
.pill.q4 { background: var(--q4-bg); color: #991B1B; }
.pill.na { background: var(--surface); color: #aaa; }

.store-card { background: #fff; border-radius: var(--radius); padding: 12px 14px; margin-bottom: 8px; border: 1px solid var(--border); box-shadow: var(--shadow); }
.store-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; margin-bottom: 2px; }
.store-name { font-size: 13px; font-weight: 700; flex: 1; }
.store-meta { font-size: 10px; color: var(--text-sm); margin-bottom: 8px; }
.store-pills { display: flex; flex-wrap: wrap; gap: 5px; }
.store-pill-wrap { display: flex; flex-direction: column; align-items: flex-start; gap: 2px; }
.store-pill-label { font-size: 8px; color: #aaa; text-transform: uppercase; letter-spacing: .2px; }

.back-btn {
  display: inline-flex; align-items: center; gap: 5px; font-size: 12px; font-weight: 600; color: var(--red);
  padding: 6px 10px 6px 6px; border-radius: 8px; cursor: pointer; margin-bottom: 8px;
  background: var(--red-bg); border: none; font-family: inherit;
}
.detail-title { font-size: 12px; font-weight: 700; color: var(--text-sm); margin-bottom: 8px; padding: 0 2px; }
.empty { text-align: center; padding: 40px 24px; color: var(--text-sm); font-size: 13px; }
</style>
<script async src="https://www.googletagmanager.com/gtag/js?id=G-QGKHDSSRV8"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-QGKHDSSRV8');
</script>
</head>
<body>

<div class="header">
  <div class="logo">Turbo<em>Ops</em></div>
  <div class="header-info">
    <div class="header-title">Segmentación por Cuartil</div>
    <div class="header-sub" id="header-sub">Cargando...</div>
  </div>
</div>

<div class="filters">
  <div class="filter-wrap"><select id="sel-pais"><option value="">🌎 Todos los países</option></select></div>
</div>

<div id="loading">
  <div class="spinner"></div>
  Cargando datos...
</div>

<div class="content-area">
  <div id="summary-view"></div>
  <div id="detail-view"></div>
</div>

<script>
// ===================== CONFIG =====================
// Ajusta esto si el link cambia. Requiere que el sheet esté compartido
// como "cualquiera con el link puede ver" (no hace falta Publicar en la web).
const SHEET_ID = '1-AgdOsK3C4WES6EdVOql3S58oTEUUS0L0GWsWCFYlI4';
const GID = '437977502';
const csvUrl = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=${GID}`;

// Métricas esperadas: label visible + nombre de columna de valor + nombre de columna de cuartil.
// El match de headers es flexible (trim, minúsculas, sin saltos de línea), así que no
// hace falta que el texto sea 100% exacto, pero si una métrica no aparece revisa el
// nombre real de columna en el sheet y ajústalo aquí.
const METRICS = [
  { key: 'retention',         label: 'Retention',            valueHeader: 'retention',             qHeader: 'retention q' },
  { key: 'cancelRate',        label: 'Cancel Rate',          valueHeader: 'cancel_rate',            qHeader: 'cancel_rate q' },
  { key: 'cancelRatePartner', label: 'Cancel Rate Partner',  valueHeader: 'cancel_rate_partner',    qHeader: 'cancel_rate_partner q' },
  { key: 'defectRate',        label: 'Defect Rate',          valueHeader: 'defect_rate',            qHeader: 'defect_rate q' },
  { key: 'defectRateOps',     label: 'Defect Rate OPS',      valueHeader: 'defect_rate ops',        qHeader: 'defect_rate ops q' },
  { key: 'delayRate',         label: 'Delay Rate',           valueHeader: 'delay_rate',             qHeader: 'delay_rate q' },
  { key: 'normalTotalTime',   label: 'Normal Total Time',    valueHeader: 'normal_total_time',      qHeader: 'normal_total_time q' },
  { key: 'pickingTime',       label: 'Picking Time',         valueHeader: 'picking time',           qHeader: 'picking time q' },
  { key: 'handoff',           label: 'Handoff',              valueHeader: 'handoff',                qHeader: 'handoff q' },
];

const Q_ORDER = ['Q1', 'Q2', 'Q3', 'Q4'];

// ===================== STATE =====================
let stores = [];   // [{ concat, country, whId, warehouse, cluster, metrics: {key: {value, q}} }]
let state = { pais: '' };

// ===================== CSV PARSER =====================
function parseCSV(text) {
  const lines = text.replace(/\r/g, '').split('\n');
  return lines.map(line => {
    const row = []; let cur = '', inQ = false;
    for (let i = 0; i <= line.length; i++) {
      const c = line[i];
      if (c === '"') { inQ = !inQ; }
      else if ((c === ',' || c === undefined) && !inQ) { row.push(cur); cur = ''; }
      else { cur += (c || ''); }
    }
    return row;
  }).filter(r => r.some(c => c !== ''));
}

function normHeader(h) {
  return (h || '').replace(/\n/g, ' ').replace(/\s+/g, ' ').trim().toLowerCase();
}

function findHeaderRow(rows) {
  for (let i = 0; i < Math.min(rows.length, 10); i++) {
    const norm = rows[i].map(normHeader);
    if (norm.includes('concat') && norm.includes('country')) return i;
  }
  return 0;
}

// ===================== DATA LOAD =====================
async function loadAll() {
  try {
    const res = await fetch(csvUrl);
    if (!res.ok) throw new Error('No se pudo cargar el sheet (status ' + res.status + '). Verifica que esté compartido como "cualquiera con el link puede ver".');
    const text = await res.text();
    const rows = parseCSV(text);
    const hIdx = findHeaderRow(rows);
    const header = rows[hIdx].map(normHeader);
    const ci = name => header.indexOf(normHeader(name));

    const iConcat  = ci('concat');
    const iCountry = ci('country');
    const iWhId    = ci('warehouse id');
    const iWh      = ci('warehouse');
    const iCluster = ci('cluster');

    if (iConcat < 0 || iCountry < 0) throw new Error('No encontré las columnas Concat/Country en la fila ' + (hIdx + 1) + '. Revisa el nombre real de las columnas.');

    // Resolver índices de cada métrica una sola vez, y avisar en consola las que no matchean
    const metricIdx = METRICS.map(m => ({
      ...m, vIdx: ci(m.valueHeader), qIdx: ci(m.qHeader)
    }));
    metricIdx.forEach(m => {
      if (m.vIdx < 0 && m.qIdx < 0) console.warn('[Segmentación] No encontré columnas para métrica:', m.label);
    });

    stores = [];
    for (const row of rows.slice(hIdx + 1)) {
      const concat = (row[iConcat] || '').trim();
      const country = (row[iCountry] || '').trim().toUpperCase();
      if (!concat || !country) continue;

      const metrics = {};
      metricIdx.forEach(m => {
        const qRaw = m.qIdx >= 0 ? (row[m.qIdx] || '').trim().toUpperCase() : '';
        const q = Q_ORDER.includes(qRaw) ? qRaw : '';
        metrics[m.key] = {
          value: m.vIdx >= 0 ? (row[m.vIdx] || '').trim() : '',
          q
        };
      });

      stores.push({
        concat, country,
        whId: iWhId >= 0 ? (row[iWhId] || '').trim() : '',
        warehouse: iWh >= 0 ? (row[iWh] || '').trim() : concat,
        cluster: iCluster >= 0 ? (row[iCluster] || '').trim() : '',
        metrics
      });
    }

    document.getElementById('header-sub').textContent = stores.length + ' tiendas cargadas';
    buildFilters();
    document.getElementById('loading').style.display = 'none';
    render();
  } catch (e) {
    document.getElementById('loading').innerHTML =
      '<div style="font-size:24px;margin-bottom:8px">⚠️</div>Error al cargar los datos.<br>' +
      '<span style="font-size:11px;color:#aaa">' + (e.message || '') + '</span>';
  }
}

// ===================== FILTERS =====================
function buildFilters() {
  const countries = [...new Set(stores.map(s => s.country))].sort();
  const sel = document.getElementById('sel-pais');
  sel.innerHTML = '<option value="">🌎 Todos los países</option>' +
    countries.map(c => `<option value="${c}">${c}</option>`).join('');
}
document.getElementById('sel-pais').addEventListener('change', e => {
  state.pais = e.target.value;
  render();
});

function filteredStores() {
  return state.pais ? stores.filter(s => s.country === state.pais) : stores;
}

// ===================== RENDER: SUMMARY =====================
const Q_LABEL = { Q1: 'Q1', Q2: 'Q2', Q3: 'Q3', Q4: 'Q4' };
const Q_CLASS = { Q1: 'q1', Q2: 'q2', Q3: 'q3', Q4: 'q4' };

function render() {
  document.getElementById('detail-view').style.display = 'none';
  renderSummary();
  document.getElementById('summary-view').style.display = 'block';
}

function renderSummary() {
  const list = filteredStores();
  const el = document.getElementById('summary-view');

  if (!list.length) {
    el.innerHTML = '<div class="empty">No hay tiendas para este filtro.</div>';
    return;
  }

  const countries = state.pais ? [state.pais] : [...new Set(list.map(s => s.country))].sort();

  const stripCounts = Q_ORDER.map(q => ({
    q, n: list.filter(s => s.metrics.retention && s.metrics.retention.q === q).length
  }));
  const strip = `<div class="totals-strip">
    <div class="t-item"><div class="t-num">${list.length}</div><div class="t-label">Tiendas</div></div>
    <div class="t-sep"></div>
    ${stripCounts.map(c => `<div class="t-item"><div class="t-num" style="color:${c.q==='Q1'?'#10B981':c.q==='Q2'?'#F59E0B':c.q==='Q3'?'#FB923C':'#E24B4A'}">${c.n}</div><div class="t-label">Ret. ${c.q}</div></div>`).join('')}
  </div>`;

  const sections = countries.map(country => {
    const inCountry = list.filter(s => s.country === country);
    const rows = METRICS.map(m => {
      const counts = Q_ORDER.map(q => inCountry.filter(s => s.metrics[m.key] && s.metrics[m.key].q === q).length);
      const total = counts.reduce((a, b) => a + b, 0);
      if (total === 0) return '';
      const segs = Q_ORDER.map((q, i) => {
        const n = counts[i];
        if (!n) return '';
        const pct = (n / total * 100).toFixed(1);
        return `<div class="qseg ${Q_CLASS[q]}" style="width:${pct}%" onclick="openDetail('${country}','${m.key}','${q}')" title="${m.label} ${q}: ${n}">${pct > 12 ? n : ''}</div>`;
      }).join('');
      return `<div class="metric-row">
        <div class="metric-top">
          <div class="metric-name">${m.label}</div>
          <div class="metric-count">${total} tiendas</div>
        </div>
        <div class="qbar">${segs}</div>
      </div>`;
    }).join('');

    return `<div class="sec">
      <div class="sec-header">
        <div class="sec-title">${country} <span style="font-weight:400;color:var(--text-sm);font-size:11px">(${inCountry.length} tiendas)</span></div>
        <div class="sec-sub">Toca un segmento para ver el detalle de esas tiendas</div>
      </div>
      <div class="sec-body">
        ${rows}
        <div class="qlegend">
          <span><span class="dot" style="background:var(--q1)"></span>Q1 Gold</span>
          <span><span class="dot" style="background:var(--q2)"></span>Q2</span>
          <span><span class="dot" style="background:var(--q3)"></span>Q3</span>
          <span><span class="dot" style="background:var(--q4)"></span>Q4 Crítico</span>
        </div>
      </div>
    </div>`;
  }).join('');

  el.innerHTML = strip + sections;
}

// ===================== RENDER: DETAIL =====================
function openDetail(country, metricKey, q) {
  const metric = METRICS.find(m => m.key === metricKey);
  const list = stores.filter(s => s.country === country && s.metrics[metricKey] && s.metrics[metricKey].q === q);

  document.getElementById('summary-view').style.display = 'none';
  const el = document.getElementById('detail-view');

  const cards = list.map(s => {
    const pillsHtml = METRICS.map(m => {
      const d = s.metrics[m.key];
      if (!d || !d.q) return '';
      return `<div class="store-pill-wrap">
        <div class="store-pill-label">${m.label}</div>
        <span class="pill ${Q_CLASS[d.q]}">${d.q}${d.value ? ' · ' + d.value : ''}</span>
      </div>`;
    }).join('');

    return `<div class="store-card">
      <div class="store-top"><div class="store-name">${s.warehouse || s.concat}</div></div>
      <div class="store-meta">${s.country}${s.whId ? ' · WH ' + s.whId : ''}${s.cluster ? ' · ' + s.cluster : ''}</div>
      <div class="store-pills">${pillsHtml}</div>
    </div>`;
  }).join('');

  el.innerHTML = `
    <button class="back-btn" onclick="closeDetail()">← Volver al resumen</button>
    <div class="detail-title">${country} · ${metric ? metric.label : metricKey} en ${q} (${list.length} tiendas)</div>
    ${list.length ? cards : '<div class="empty">No hay tiendas en este cuartil.</div>'}
  `;
  el.style.display = 'block';
  window.scrollTo(0, 0);
}

function closeDetail() {
  document.getElementById('detail-view').style.display = 'none';
  document.getElementById('summary-view').style.display = 'block';
  window.scrollTo(0, 0);
}

loadAll();
</script>
</body>
</html>
