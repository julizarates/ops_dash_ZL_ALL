<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>TurboOps MX · Forecast vs Real</title>
<link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0F1117;--sur:#181C26;--card:#1E2330;--bor:#2A3040;
  --tx:#E8EAF0;--dim:#7A8299;--xs:#4E5670;
  --gr:#22C55E;--grb:rgba(34,197,94,.10);
  --ye:#F59E0B;--yeb:rgba(245,158,11,.10);
  --re:#EF4444;--reb:rgba(239,68,68,.10);
  --bl:#3B82F6;--blb:rgba(59,130,246,.10);
  --or:#F97316;
  --ac:#6366F1;--acb:rgba(99,102,241,.12);
  --r:10px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Figtree',sans-serif;background:var(--bg);color:var(--tx);font-size:14px;line-height:1.5;min-height:100vh}

.hdr{background:var(--sur);border-bottom:1px solid var(--bor);padding:10px 14px;position:sticky;top:0;z-index:100;display:flex;align-items:center;gap:10px;box-shadow:0 2px 12px rgba(0,0,0,.4)}
.logo{font-size:18px;font-weight:900;letter-spacing:-.5px}
.logo em{font-style:normal;color:var(--ac)}
.hdr-r{flex:1;text-align:right}
.hdr-lbl{font-size:10px;font-weight:600;color:var(--dim);text-transform:uppercase;letter-spacing:.8px}
.hdr-dt{font-size:11px;color:var(--ac);font-weight:700;margin-top:1px}

.pg{padding:10px 12px;max-width:640px;margin:0 auto}
.spin-wrap{text-align:center;padding:48px 24px;color:var(--dim);font-size:13px}
.spinner{width:24px;height:24px;border:2px solid var(--bor);border-top-color:var(--ac);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}

.fw{position:relative;margin-bottom:8px}
.fw::after{content:'▾';position:absolute;right:8px;top:50%;transform:translateY(-50%);font-size:10px;color:var(--dim);pointer-events:none}
select{width:100%;padding:7px 22px 7px 9px;border:1px solid var(--bor);border-radius:8px;background:var(--card);font-family:inherit;font-size:12px;color:var(--tx);appearance:none;cursor:pointer;font-weight:600}
select:focus{outline:none;border-color:var(--ac)}
select option{background:var(--sur)}

.strip{display:flex;background:var(--card);border:1px solid var(--bor);border-radius:var(--r);margin-bottom:10px;overflow:hidden}
.si{flex:1;padding:10px 6px;text-align:center;border-right:1px solid var(--bor)}
.si:last-child{border-right:none}
.sn{font-size:16px;font-weight:900;line-height:1}
.sl{font-size:9px;color:var(--dim);text-transform:uppercase;letter-spacing:.3px;margin-top:2px}

.card{background:var(--card);border:1px solid var(--bor);border-radius:var(--r);margin-bottom:8px;overflow:hidden}

.st{font-size:10px;font-weight:700;color:var(--dim);text-transform:uppercase;letter-spacing:.6px;margin:12px 0 6px;display:flex;align-items:center;gap:6px}
.st::after{content:'';flex:1;height:1px;background:var(--bor)}

/* heatmap */
.hmap-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;padding:8px}
.hmap{border-collapse:collapse}
.hmap th{font-size:8px;color:var(--dim);padding:2px 3px;text-align:center;font-weight:600;white-space:nowrap;min-width:22px}
.hmap th.lbl{text-align:left;min-width:72px}
.hmap th.end{color:var(--ye);min-width:48px}
.hmap td{width:22px;height:22px;text-align:center;font-size:7px;font-weight:800;border:1px solid var(--bg);border-radius:2px;cursor:default}
.hmap td.lbl{font-size:10px;color:var(--dim);text-align:left;padding:2px 6px 2px 0;border:none;background:transparent;white-space:nowrap;width:auto;height:auto}
.hmap td.avg-cell{font-size:8px;font-weight:800;text-align:center;padding:0 4px;border:none;background:rgba(245,158,11,.08);border-radius:4px;white-space:nowrap;min-width:48px}

/* delta colors */
.hc0  {background:rgba(255,255,255,.03);color:transparent}
.hcg1 {background:rgba(34,197,94,.20);color:var(--gr)}   /* +1 a +5 */
.hcg2 {background:rgba(34,197,94,.45);color:var(--gr)}   /* +6 a +15 */
.hcg3 {background:rgba(34,197,94,.75);color:#fff}         /* +16+ */
.hcr1 {background:rgba(239,68,68,.20);color:var(--re)}   /* -1 a -5 */
.hcr2 {background:rgba(239,68,68,.45);color:var(--re)}   /* -6 a -15 */
.hcr3 {background:rgba(239,68,68,.75);color:#fff}         /* -16+ */
.hcn  {background:rgba(99,102,241,.25);color:var(--ac)}  /* exacto 0 */

/* legend */
.legend{display:flex;gap:8px;flex-wrap:wrap;font-size:9px;color:var(--dim);margin-bottom:8px}
.leg-item{display:flex;align-items:center;gap:3px}
.leg-dot{width:10px;height:10px;border-radius:2px;flex-shrink:0}

.ins-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:10px}
.ins{background:var(--card);border:1px solid var(--bor);border-radius:var(--r);padding:10px 12px}
.ins-lbl{font-size:9px;font-weight:700;color:var(--dim);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.ins-val{font-size:14px;font-weight:800;line-height:1.2}
.ins-sub{font-size:10px;color:var(--dim);margin-top:3px}

.empty{text-align:center;padding:32px;color:var(--dim);font-size:12px}
</style>
</head>
<body>

<div class="hdr">
  <span style="font-size:18px">🇲🇽</span>
  <div class="logo">Turbo<em>Ops</em></div>
  <div class="hdr-r">
    <div class="hdr-lbl">Forecast vs Real</div>
    <div class="hdr-dt" id="hdt">—</div>
  </div>
</div>

<div class="pg">
  <div id="loading" class="spin-wrap"><div class="spinner"></div>Cargando datos...</div>
  <div id="main" style="display:none"></div>
</div>

<script>
const PUB = '2PACX-1vSjvn2pYoqZE7P3McgTyxBFVVwHJ4twsjYek6ozjErLjRqLbIbaRy7n8XUtL-05nynBmGwFpnQ-H45d';
const GID = '1885728971';
const csvUrl = `https://docs.google.com/spreadsheets/d/e/${PUB}/pub?gid=${GID}&single=true&output=csv`;

let D = [], fT = '';
const safe = u => fetch(u).then(r => r.ok ? r.text() : '').catch(() => '');

function parseCSV(txt) {
  if (!txt) return [];
  return txt.replace(/\r/g, '').split('\n').map(line => {
    const row = []; let c = '', q = false;
    for (let i = 0; i <= line.length; i++) {
      const ch = line[i];
      if (ch === '"') { q = !q; }
      else if ((ch === ',' || ch === undefined) && !q) { row.push(c); c = ''; }
      else c += (ch || '');
    }
    return row;
  }).filter(r => r.some(x => x !== ''));
}

function parse(txt) {
  const rows = parseCSV(txt);
  if (rows.length < 2) return [];
  const kw = ['warehouse','tienda','fecha','hora','predicted','ordenes','delta','pickers','avg'];
  let hi = 0, bestScore = -1;
  for (let i = 0; i < Math.min(rows.length, 25); i++) {
    const r = rows[i].map(c => (c || '').trim().toLowerCase());
    const nonEmpty = r.filter(c => c).length;
    const hasKW = r.some(c => kw.some(k => c.includes(k)));
    if (nonEmpty >= 3 && hasKW && nonEmpty > bestScore) { bestScore = nonEmpty; hi = i; }
  }
  const hdr = rows[hi].map(h => (h || '').trim().toUpperCase());
  return rows.slice(hi + 1).filter(r => r.some(c => c))
    .map(r => Object.fromEntries(hdr.map((k, i) => [k, (r[i] || '').trim()])));
}

const gf = (r, ...keys) => {
  for (const k of keys) {
    if (r[k] !== undefined && r[k] !== '') return r[k];
  }
  return '';
};
const gt   = r => gf(r, 'WAREHOUSE_NAME', 'TIENDA');
const gw   = r => gf(r, 'WAREHOUSE_ID');
const gdate= r => gf(r, 'FECHA');
const ghora= r => parseInt(gf(r, 'HORA')) || 0;
const greal= r => parseFloat(gf(r, 'ORDENES_REALES')) || 0;
const gfc  = r => parseFloat(gf(r, 'PREDICTED')) || 0;
const gdel = r => parseFloat(gf(r, 'DELTA')) || 0;
const gpk  = r => parseFloat(gf(r, 'PICKERS_CONECTADOS')) || 0;
const gavg = r => parseFloat(gf(r, 'AVG_IN_STORE')) || 0;

const n    = (v, d = 0) => { const x = parseFloat(v) || 0; return d ? x.toFixed(d) : Math.round(x).toLocaleString(); };
const uniq = (arr, fn) => [...new Set(arr.map(fn).filter(Boolean))].sort();

function deltaClass(delta) {
  if (delta === 0) return 'hcn';
  if (delta > 0) return delta >= 16 ? 'hcg3' : delta >= 6 ? 'hcg2' : 'hcg1';
  const ad = Math.abs(delta);
  return ad >= 16 ? 'hcr3' : ad >= 6 ? 'hcr2' : 'hcr1';
}

function render() {
  const el = document.getElementById('main');
  const tiendas = uniq(D, gt);
  if (!fT && tiendas.length) fT = tiendas[0];

  const data = D.filter(r => gt(r) === fT);
  const dias  = uniq(data, gdate);
  const HORAS = Array.from({ length: 24 }, (_, i) => i);

  // build cell map
  const mp = {};
  for (const r of data) {
    const k = `${gdate(r)}_${ghora(r)}`;
    if (!mp[k]) mp[k] = { real: 0, fc: 0, delta: 0, pk: 0, avg: 0, cnt: 0 };
    mp[k].real  += greal(r);
    mp[k].fc    += gfc(r);
    mp[k].delta += gdel(r);
    mp[k].pk    += gpk(r);
    mp[k].avg   += gavg(r);
    mp[k].cnt++;
  }

  // per-dia totals
  const byDia = {};
  for (const dia of dias) {
    byDia[dia] = { real: 0, fc: 0, delta: 0, pk: 0, avg: [], avgSum: 0, avgCnt: 0 };
    for (let h = 0; h < 24; h++) {
      const c = mp[`${dia}_${h}`];
      if (!c) continue;
      byDia[dia].real  += c.real;
      byDia[dia].fc    += c.fc;
      byDia[dia].delta += c.delta;
      byDia[dia].pk    += c.pk;
      if (c.avg > 0) { byDia[dia].avgSum += c.avg; byDia[dia].avgCnt++; }
    }
    byDia[dia].avgVal = byDia[dia].avgCnt > 0 ? byDia[dia].avgSum / byDia[dia].avgCnt : 0;
    byDia[dia].ocxpk  = byDia[dia].pk > 0 ? byDia[dia].real / byDia[dia].pk : 0;
  }

  // global totals
  const totReal  = dias.reduce((s, d) => s + byDia[d].real, 0);
  const totFC    = dias.reduce((s, d) => s + byDia[d].fc, 0);
  const totPK    = dias.reduce((s, d) => s + byDia[d].pk, 0);
  const totOCxPK = totPK > 0 ? totReal / totPK : 0;
  const globDelta = totReal - totFC;
  const globAvgCnt = dias.filter(d => byDia[d].avgCnt > 0).length;
  const globAvg = globAvgCnt > 0 ? dias.reduce((s, d) => s + byDia[d].avgVal, 0) / globAvgCnt : 0;

  // worst/best day
  const diasSorted = [...dias].sort((a, b) => byDia[a].delta - byDia[b].delta);
  const worstDay = diasSorted[0];
  const bestDay  = diasSorted[diasSorted.length - 1];

  const wh = gw(data[0]) || '';

  el.innerHTML = `
  <div class="fw">
    <select onchange="fT=this.value;render()">
      ${tiendas.map(t => `<option value="${t}" ${fT === t ? 'selected' : ''}>${t}</option>`).join('')}
    </select>
  </div>

  <div class="strip">
    <div class="si">
      <div class="sn" style="color:var(--bl)">${n(totReal)}</div>
      <div class="sl">OC Reales</div>
    </div>
    <div class="si">
      <div class="sn" style="color:var(--dim)">${n(totFC)}</div>
      <div class="sl">Forecast</div>
    </div>
    <div class="si">
      <div class="sn" style="color:${globDelta >= 0 ? 'var(--gr)' : 'var(--re)'}">${globDelta >= 0 ? '+' : ''}${n(globDelta)}</div>
      <div class="sl">Δ Total</div>
    </div>
    <div class="si">
      <div class="sn" style="color:var(--ye)">${totOCxPK.toFixed(1)}</div>
      <div class="sl">OC/Picker</div>
    </div>
  </div>

  <div class="ins-grid">
    <div class="ins">
      <div class="ins-lbl">📉 Peor día</div>
      <div class="ins-val" style="color:var(--re)">${worstDay ? worstDay.substring(5) : '—'}</div>
      <div class="ins-sub">${worstDay ? (byDia[worstDay].delta >= 0 ? '+' : '') + n(byDia[worstDay].delta) + ' vs forecast' : ''}</div>
    </div>
    <div class="ins">
      <div class="ins-lbl">📈 Mejor día</div>
      <div class="ins-val" style="color:var(--gr)">${bestDay ? bestDay.substring(5) : '—'}</div>
      <div class="ins-sub">${bestDay ? '+' + n(byDia[bestDay].delta) + ' vs forecast' : ''}</div>
    </div>
    <div class="ins">
      <div class="ins-lbl">⏱ Avg in-store</div>
      <div class="ins-val" style="color:var(--ye)">${globAvg.toFixed(2)} min</div>
      <div class="ins-sub">Promedio tiempo en tienda</div>
    </div>
    <div class="ins">
      <div class="ins-lbl">🛒 Precisión forecast</div>
      <div class="ins-val" style="color:${Math.abs(globDelta / (totFC || 1)) < 0.1 ? 'var(--gr)' : Math.abs(globDelta / (totFC || 1)) < 0.2 ? 'var(--ye)' : 'var(--re)'}">${totFC > 0 ? (100 - Math.abs(globDelta / totFC) * 100).toFixed(1) + '%' : '—'}</div>
      <div class="ins-sub">1 − |Δ| / Forecast</div>
    </div>
  </div>

  <div class="legend">
    <span class="leg-item"><span class="leg-dot" style="background:rgba(34,197,94,.75)"></span>Real &gt; FC</span>
    <span class="leg-item"><span class="leg-dot" style="background:rgba(239,68,68,.75)"></span>Real &lt; FC</span>
    <span class="leg-item"><span class="leg-dot" style="background:rgba(99,102,241,.25)"></span>Exacto</span>
    <span style="margin-left:4px;font-size:9px">· Valor = Δ (Real − FC)</span>
  </div>

  ${!dias.length ? '<div class="empty">Sin datos para esta tienda.</div>' : (() => {
    const rows = dias.map(dia => {
      const bd = byDia[dia];
      const avgColor = bd.avgVal > 0
        ? (bd.avgVal < 8 ? 'var(--gr)' : bd.avgVal < 12 ? 'var(--ye)' : 'var(--re)')
        : 'var(--xs)';

      const cells = HORAS.map(h => {
        const c = mp[`${dia}_${h}`];
        if (!c) return '<td class="hc0"></td>';
        const delta = Math.round(c.delta);
        const cls = deltaClass(delta);
        const lbl = delta === 0 ? '=' : (delta > 0 ? '+' + delta : delta);
        const tip = `FC:${n(c.fc,1)} Real:${n(c.real)} Δ:${delta > 0 ? '+' : ''}${delta} Pickers:${c.pk}`;
        return `<td class="${cls}" title="${tip}">${lbl}</td>`;
      }).join('');

      const avgDisp = bd.avgVal > 0 ? bd.avgVal.toFixed(2) : '—';
      const ocxpkC  = bd.ocxpk < 5 ? 'var(--re)' : bd.ocxpk < 10 ? 'var(--ye)' : 'var(--gr)';

      return `<tr>
        <td class="lbl">${dia.substring(5)}</td>
        <td style="text-align:center;font-size:9px;font-weight:800;color:var(--bl);background:rgba(59,130,246,.08);border-radius:3px;padding:0 3px;min-width:32px">${n(bd.real)}</td>
        ${cells}
        <td class="avg-cell" style="color:${avgColor}">${avgDisp}</td>
      </tr>`;
    }).join('');

    return `<div class="card"><div class="hmap-wrap"><table class="hmap">
      <thead><tr>
        <th class="lbl">Fecha</th>
        <th style="min-width:32px;color:var(--bl);font-size:8px">Real</th>
        ${HORAS.map(h => `<th>${h}</th>`).join('')}
        <th class="end" style="font-size:8px">AvgStore</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table></div></div>`;
  })()}

  <div style="font-size:10px;color:var(--dim);padding:2px 0 8px">WH ${wh} · Toca una celda para ver detalle (tooltip)</div>
  `;
}

async function load() {
  try {
    const txt = await safe(csvUrl);
    D = parse(txt);

    // fecha range en header
    const fechas = uniq(D, gdate);
    if (fechas.length) {
      document.getElementById('hdt').textContent =
        fechas[0].substring(5) + ' – ' + fechas[fechas.length - 1].substring(5);
    }

    console.log('[Forecast MX] rows:', D.length);
    if (D[0]) console.log('[cols]', Object.keys(D[0]));

    document.getElementById('loading').style.display = 'none';
    document.getElementById('main').style.display = 'block';
    render();
  } catch (e) {
    document.getElementById('loading').innerHTML =
      `<div style="font-size:24px;margin-bottom:8px">⚠️</div>${e.message}`;
  }
}
load();
</script>
</body>
</html>
