<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QA Weekly Pulse — TurboOps</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F5F4F0;--surface:#FFFFFF;--surface2:#F0EFEB;--border:#E5E4DF;
  --text:#111111;--muted:#888888;--subtle:#D0CFC9;
  --gold:#B8860B;--silver:#607D8B;--bronze:#8D4E1A;
  --green:#166534;--red:#A32D2D;--blue:#1565C0;--orange:#E65100;
  --accent:#5B4EE8;
}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;font-size:13px;min-height:100vh}

/* HEADER */
.hdr{padding:20px 32px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
.logo{font-size:20px;font-weight:800;letter-spacing:-.5px}
.logo span{color:var(--accent)}
.hdr-meta{display:flex;align-items:center;gap:16px}
.week-badge{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:5px 14px;font-size:12px;font-weight:600;color:var(--muted)}
.week-badge b{color:var(--text)}
.live{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--muted)}
.dot{width:7px;height:7px;border-radius:50%;background:var(--subtle)}.dot.ok{background:var(--green);box-shadow:none}
.btn{font-size:11px;font-weight:700;padding:6px 14px;border:1px solid var(--border);border-radius:6px;background:var(--surface2);color:var(--text);cursor:pointer;font-family:'Syne',sans-serif;letter-spacing:.3px}
.btn:hover{border-color:var(--accent);color:var(--accent)}

/* COUNTRY TABS */
.tabs{padding:14px 32px;display:flex;gap:8px;border-bottom:1px solid var(--border);flex-wrap:wrap;align-items:center}
.tab{padding:5px 16px;border-radius:20px;font-size:11px;font-weight:700;cursor:pointer;border:1.5px solid var(--border);color:var(--muted);background:transparent;letter-spacing:.5px;font-family:'Syne',sans-serif;transition:all .15s}
.tab.on{background:var(--accent);color:#fff;border-color:var(--accent)}
.tabs-label{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-right:4px}

/* LOADING */
.ld{display:flex;align-items:center;justify-content:center;padding:80px;gap:12px;color:var(--muted);font-size:14px}
.sp{width:18px;height:18px;border:2px solid var(--subtle);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}

/* MAIN */
.main{padding:24px 32px;display:flex;flex-direction:column;gap:20px}

/* QA TREND HERO */
.trend-hero{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px}
.country-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px 20px;position:relative;overflow:hidden;transition:border-color .2s}
.country-card:hover{border-color:var(--subtle)}
.country-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--cl)}
.cc-flag{font-size:22px;margin-bottom:8px}
.cc-country{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:4px}
.cc-qa{font-family:'DM Mono',monospace;font-size:38px;font-weight:500;line-height:1;margin-bottom:6px}
.cc-qa.up{color:var(--green)}.cc-qa.dn{color:var(--red)}.cc-qa.eq{color:var(--text)}
.cc-delta{display:inline-flex;align-items:center;gap:4px;font-size:12px;font-weight:700;padding:3px 10px;border-radius:20px}
.cc-delta.up{background:rgba(22,101,52,.08);color:var(--green)}
.cc-delta.dn{background:rgba(163,45,45,.08);color:var(--red)}
.cc-delta.eq{background:var(--surface2);color:var(--muted)}
.cc-subs{margin-top:10px;display:flex;flex-direction:column;gap:4px}
.cc-sub{display:flex;justify-content:space-between;font-size:11px;color:var(--muted)}
.cc-sub b{color:var(--text);font-family:'DM Mono',monospace;font-weight:500}
.cc-cluster{display:flex;gap:5px;margin-top:10px;flex-wrap:wrap}
.clu{font-size:10px;font-weight:700;padding:2px 8px;border-radius:4px}
.clu.Gold{background:rgba(184,134,11,.1);color:var(--gold)}
.clu.Silver{background:rgba(96,125,135,.1);color:var(--silver)}
.clu.Bronze{background:rgba(141,78,26,.1);color:var(--bronze)}

/* METRICS TABLE */
.section{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.sec-hdr{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.sec-title{font-size:13px;font-weight:700;display:flex;align-items:center;gap:8px}
.sec-accent{width:8px;height:8px;border-radius:2px;flex-shrink:0}
.sec-hint{font-size:11px;color:var(--muted)}

.mtable{width:100%;border-collapse:collapse}
.mtable th{padding:9px 16px;text-align:left;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);background:var(--surface2);border-bottom:1px solid var(--border)}
.mtable th.r{text-align:right}
.mtable td{padding:9px 16px;border-bottom:1px solid var(--border);font-size:12px;vertical-align:middle}
.mtable td.r{text-align:right;font-family:'DM Mono',monospace;font-size:12px}
.mtable tr:last-child td{border-bottom:none}
.mtable tr:hover td{background:rgba(0,0,0,.02)}

.cpill{font-size:10px;font-weight:700;padding:2px 8px;border-radius:4px;background:var(--surface2);color:var(--muted);letter-spacing:.5px}
.dpill{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:700}
.dpill.up{background:rgba(163,45,45,.08);color:var(--red)}
.dpill.dn{background:rgba(22,101,52,.08);color:var(--green)}
.dpill.eq{background:var(--surface2);color:var(--muted)}
.bar-wrap{width:100px;height:5px;background:var(--subtle);border-radius:3px;overflow:hidden;display:inline-block;vertical-align:middle;margin-right:6px}
.bar-fill{height:100%;border-radius:3px;transition:width .4s}

/* METRIC MINI BARS */
.metric-row{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;padding:16px 20px}
.met{background:var(--surface2);border-radius:8px;padding:12px 14px;border:1px solid var(--border)}
.met-name{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px}
.met-val{font-family:'DM Mono',monospace;font-size:22px;font-weight:500;line-height:1;margin-bottom:4px}
.met-delta{font-size:11px;font-weight:700}
.met-delta.up{color:var(--green)}.met-delta.dn{color:var(--red)}.met-delta.eq{color:var(--muted)}
.met-bar{height:4px;background:var(--subtle);border-radius:2px;overflow:hidden;margin-top:6px}
.met-fill{height:100%;border-radius:2px}

/* CLUSTER EVOLUTION */
.cluster-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:0;padding:16px 20px;border-top:1px solid var(--border)}
.cg-item{text-align:center}
.cg-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;margin-bottom:8px}
.cg-label.Gold{color:var(--gold)}.cg-label.Silver{color:var(--silver)}.cg-label.Bronze{color:var(--bronze)}
.cg-num{font-family:'DM Mono',monospace;font-size:36px;font-weight:500;line-height:1}
.cg-num.Gold{color:var(--gold)}.cg-num.Silver{color:var(--silver)}.cg-num.Bronze{color:var(--bronze)}
.cg-delta{font-size:11px;font-weight:700;margin-top:4px}

/* NO DATA */
.no-data{padding:40px;text-align:center;color:var(--muted);font-size:13px}
</style>
</head>
<body>

<div class="hdr">
  <div style="display:flex;align-items:center;gap:14px">
    <div class="logo">Turbo<span>Ops</span></div>
    <div style="width:1px;height:22px;background:var(--border)"></div>
    <span style="font-size:13px;font-weight:600;color:var(--muted)">QA Weekly Pulse</span>
  </div>
  <div class="hdr-meta">
    <div class="week-badge" id="week-badge">Cargando...</div>
    <span class="live"><span class="dot" id="dot"></span><span id="upd">Cargando...</span></span>
    <button class="btn" onclick="init()">↺ Refrescar</button>
  </div>
</div>

<div class="tabs">
  <span class="tabs-label">País</span>
  <div id="tabs-container" style="display:flex;gap:6px;flex-wrap:wrap"></div>
</div>

<div id="main-content"><div class="ld"><span class="sp"></span>Cargando datos del sheet...</div></div>

<script>
const SID  = '1V2gV4YgV4FRwIAsNf6p-kv3Uy2wx5H7O3rInwZPTFsE';
const AKEY = 'AIzaSyAttY6mdOrj4ic3vYCyuFpAkiYx9HFrasg';
const SHEET = 'Wh Data';

const FLAGS = {CO:'🇨🇴',AR:'🇦🇷',PE:'🇵🇪',BR:'🇧🇷',MX:'🇲🇽',CL:'🇨🇱'};
const COLORS = {CO:'#F5C842',AR:'#60A5FA',PE:'#F87171',BR:'#4ADE80',MX:'#FB923C',CL:'#C084FC'};
const METRICS = [
  {col:'SCORE_PICKING_TIME', label:'Picking Time', icon:'⏱', max:30, inv:true},
  {col:'SCORE_HANDOFF_POST', label:'Handoff Post', icon:'🤝', max:10, inv:true},
  {col:'SCORE_CR_PARTNER',   label:'Cancel Rate',  icon:'❌', max:10, inv:true},
  {col:'SCORE_SO_OPS',       label:'SO Ops',       icon:'📦', max:15, inv:true},
  {col:'SCORE_DEFECT_RATE',  label:'Defect Rate',  icon:'🔍', max:17, inv:true},
];
const MAX_SCORE = 82;
const Q1_END = '2026-03-31';
const Q2_START = '2026-04-01';

let allRows = [];
let selCountry = 'ALL';

function pf(v){if(!v||v==='')return 0;const n=parseFloat(v.toString().replace(/,/g,''));return isNaN(n)?0:n;}
function fmtW(w){if(!w)return'—';const d=new Date(w+'T12:00:00');return isNaN(d)?w:d.toLocaleDateString('es',{day:'numeric',month:'short'});}

function currentWeekMonday(){
  const d=new Date();const day=d.getDay();
  const diff=d.getDate()-day+(day===0?-6:1);
  return new Date(new Date().setDate(diff)).toISOString().split('T')[0];
}

function normDate(s){
  if(!s)return'';
  const d=s.toString().split(' ')[0].split('T')[0];
  if(d.includes('/')){const p=d.split('/');if(p.length===3){const y=p[2].length===4?p[2]:'20'+p[2];return`${y}-${p[0].padStart(2,'0')}-${p[1].padStart(2,'0')}`;}}
  return d;
}

async function fetchSheet(){
  const url=`https://sheets.googleapis.com/v4/spreadsheets/${SID}/values/${encodeURIComponent(SHEET)}?key=${AKEY}`;
  const r=await fetch(url);if(!r.ok)throw new Error('HTTP '+r.status);
  const json=await r.json();const rows=json.values||[];
  let hi=rows.findIndex(row=>row.some(c=>['SEMANA','COUNTRY','KEYWH','WH_NAME'].includes((c||'').toString().trim().toUpperCase())));
  if(hi===-1)hi=0;const hdrs=rows[hi];
  return rows.slice(hi+1).filter(row=>row.some(c=>c&&c.toString().trim())).map(row=>{
    const o={};hdrs.forEach((h,i)=>{o[h.trim()]=(row[i]||'').toString().trim();});
    if(o.SEMANA)o.SEMANA=normDate(o.SEMANA);
    return o;
  });
}

function calcQA(r){
  const hC=parseFloat(r.CRITIC_HANDOFF_POST)===1,hR=pf(r.SCORE_HANDOFF_POST),hF=(!hC&&hR===0)?10:hR;
  const scores=METRICS.map(m=>m.label==='Handoff Post'?hF:pf(r[m.col]));
  return scores.reduce((a,b)=>a+b,0)/MAX_SCORE*100;
}

function getValidWeeks(rows){
  const mon=currentWeekMonday();
  const wc={};
  rows.filter(r=>r.WH_NAME&&r.WH_NAME.trim()&&r.QA_SCORE&&r.SEMANA&&normDate(r.SEMANA)<mon)
      .forEach(r=>{wc[r.SEMANA]=(wc[r.SEMANA]||0)+1;});
  return Object.keys(wc).filter(w=>wc[w]>=3).sort();
}

async function init(){
  document.getElementById('dot').className='dot';
  document.getElementById('upd').textContent='Cargando...';
  document.getElementById('main-content').innerHTML='<div class="ld"><span class="sp"></span>Cargando datos...</div>';
  try{
    const rows=await fetchSheet();
    allRows=rows.filter(r=>r.WH_NAME&&r.WH_NAME.trim()&&r.QA_SCORE&&r.QA_SCORE.trim());
    buildTabs();
    document.getElementById('dot').className='dot ok';
    document.getElementById('upd').textContent='Actualizado '+new Date().toLocaleTimeString('es',{hour:'2-digit',minute:'2-digit'});
    render();
  }catch(e){
    document.getElementById('main-content').innerHTML=`<div class="ld" style="color:var(--red)">Error: ${e.message}</div>`;
  }
}

function buildTabs(){
  const countries=[...new Set(allRows.map(r=>r.COUNTRY).filter(Boolean))].sort();
  const c=document.getElementById('tabs-container');c.innerHTML='';
  const makeTab=(label,val)=>{
    const b=document.createElement('button');
    b.className='tab'+(selCountry===val?' on':'');
    b.textContent=label;
    b.onclick=()=>{selCountry=val;document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));b.classList.add('on');render();};
    return b;
  };
  c.appendChild(makeTab('Todos','ALL'));
  countries.forEach(co=>c.appendChild(makeTab((FLAGS[co]||'')+' '+co, co)));
}

function getCountryStats(country, weeks, rows){
  const filtered = rows.filter(r => r.COUNTRY === country);
  const result = [];
  weeks.forEach(w => {
    const wRows = filtered.filter(r => r.SEMANA === w);
    if(!wRows.length) return;
    const qaVals = wRows.map(r => calcQA(r)).filter(v => v > 0);
    const avgQA = qaVals.length ? qaVals.reduce((a,b)=>a+b,0)/qaVals.length : 0;
    const clusters = {Gold:0, Silver:0, Bronze:0};
    wRows.forEach(r => {
      const qa = calcQA(r);
      const cl = qa>=93?'Gold':qa>=85?'Silver':'Bronze';
      clusters[cl]++;
    });
    const metricAvgs = {};
    METRICS.forEach(m => {
      const vals = wRows.map(r => m.label==='Handoff Post' ? 
        (parseFloat(r.CRITIC_HANDOFF_POST)===1 ? pf(r.SCORE_HANDOFF_POST) : (pf(r.SCORE_HANDOFF_POST)===0?10:pf(r.SCORE_HANDOFF_POST)))
        : pf(r[m.col]));
      metricAvgs[m.label] = vals.reduce((a,b)=>a+b,0)/vals.length;
    });
    const critics = {picking:0,handoff:0,cancel:0,so:0,defect:0};
    wRows.forEach(r=>{
      if(parseFloat(r.CRITIC_PICKING_TIME)===1) critics.picking++;
      if(parseFloat(r.CRITIC_HANDOFF_POST)===1) critics.handoff++;
      if(parseFloat(r.CRITIC_CR_PARTNER)===1) critics.cancel++;
      if(parseFloat(r.CRITIC_SO_OPS)===1) critics.so++;
      if(parseFloat(r.CRITIC_DEFECT_RATE)===1) critics.defect++;
    });
    result.push({week:w, avgQA, clusters, metricAvgs, critics, total:wRows.length});
  });
  return result;
}

function render(){
  const weeks = getValidWeeks(allRows);
  if(weeks.length < 2){
    document.getElementById('main-content').innerHTML='<div class="no-data">Se necesitan al menos 2 semanas cerradas de historia</div>';
    return;
  }

  const curW = weeks[weeks.length-1];
  const prevW = weeks[weeks.length-2];
  const q2Weeks = weeks.filter(w => w >= Q2_START);
  const q1LastW = [...weeks].reverse().find(w => w <= Q1_END);

  document.getElementById('week-badge').innerHTML=
    `Semana: <b>${fmtW(curW)}</b> &nbsp;·&nbsp; vs <b>${fmtW(prevW)}</b>`;

  const countries = selCountry==='ALL'
    ? [...new Set(allRows.map(r=>r.COUNTRY).filter(Boolean))].sort()
    : [selCountry];

  // Build per-country stats
  const countryData = {};
  countries.forEach(co => {
    countryData[co] = getCountryStats(co, weeks, allRows);
  });

  // ── HERO: QA por país ──────────────────────────────────────────────
  const heroCards = countries.map(co => {
    const stats = countryData[co];
    const cur = stats.find(s=>s.week===curW);
    const prev = stats.find(s=>s.week===prevW);
    if(!cur) return '';

    const qa = cur.avgQA;
    const prevQA = prev ? prev.avgQA : qa;
    const diff = qa - prevQA;
    const diffCls = diff > 0.5 ? 'up' : diff < -0.5 ? 'dn' : 'eq';
    const diffSign = diff > 0 ? '+' : '';

    // Q2 acumulado
    const q2Stats = stats.filter(s => s.week >= Q2_START);
    const q2AvgQA = q2Stats.length ? q2Stats.reduce((a,s)=>a+s.avgQA,0)/q2Stats.length : qa;
    const q2Cl = q2AvgQA>=93?'Gold':q2AvgQA>=85?'Silver':'Bronze';

    // vs cierre Q1
    const q1Stat = stats.find(s=>s.week===q1LastW);
    const q1QA = q1Stat ? q1Stat.avgQA : null;
    const vsQ1 = q1QA ? q2AvgQA - q1QA : null;

    const color = COLORS[co] || '#7C6AF7';
    const flag = FLAGS[co] || '';

    return`<div class="country-card" style="--cl:${color}">
      <div class="cc-flag">${flag}</div>
      <div class="cc-country">${co}</div>
      <div class="cc-qa ${diffCls}" style="color:${color}">${qa.toFixed(1)}</div>
      <div><span class="cc-delta ${diffCls}">${diffCls==='up'?'↑':diffCls==='dn'?'↓':'→'} ${diffSign}${diff.toFixed(1)} pts vs sem ant.</span></div>
      <div class="cc-subs">
        <div class="cc-sub"><span>Q2 acum.</span><b>${q2AvgQA.toFixed(1)}</b></div>
        ${q1QA ? `<div class="cc-sub"><span>vs cierre Q1</span><b style="color:${vsQ1>=0?'var(--green)':'var(--red)'}">  ${vsQ1>=0?'+':''}${vsQ1.toFixed(1)}</b></div>` : ''}
        <div class="cc-sub"><span>Tiendas</span><b>${cur.total}</b></div>
      </div>
      <div class="cc-cluster">
        <span class="clu Gold">🥇 ${cur.clusters.Gold}</span>
        <span class="clu Silver">🥈 ${cur.clusters.Silver}</span>
        <span class="clu Bronze">🥉 ${cur.clusters.Bronze}</span>
      </div>
    </div>`;
  }).join('');

  // ── MÉTRICAS POR PAÍS ─────────────────────────────────────────────
  const metricSections = countries.map(co => {
    const stats = countryData[co];
    const cur = stats.find(s=>s.week===curW);
    const prev = stats.find(s=>s.week===prevW);
    if(!cur) return '';

    const color = COLORS[co]||'#7C6AF7';
    const flag = FLAGS[co]||'';

    // Metric mini bars
    const metBars = METRICS.map(m => {
      const sc = cur.metricAvgs[m.label] || 0;
      const psc = prev ? (prev.metricAvgs[m.label]||0) : sc;
      const diff = sc - psc;
      const pct = (sc/m.max)*100;
      const dcls = diff > 0.2 ? 'up' : diff < -0.2 ? 'dn' : 'eq';
      const fillColor = sc/m.max >= 0.9 ? 'var(--green)' : sc/m.max >= 0.7 ? 'var(--gold)' : 'var(--red)';
      return`<div class="met">
        <div class="met-name">${m.icon} ${m.label}</div>
        <div class="met-val" style="color:${fillColor}">${sc.toFixed(1)}<span style="font-size:13px;color:var(--muted)">/${m.max}</span></div>
        <div class="met-delta ${dcls}">${dcls==='up'?'↑':dcls==='dn'?'↓':'→'} ${diff>0?'+':''}${diff.toFixed(1)}</div>
        <div class="met-bar"><div class="met-fill" style="width:${pct.toFixed(0)}%;background:${fillColor}"></div></div>
      </div>`;
    }).join('');

    // Cluster evolution table — show last 4 weeks or available
    const showWeeks = weeks.slice(-4);
    const clusterRows = ['Gold','Silver','Bronze'].map(cl => {
      const cells = showWeeks.map(w => {
        const st = stats.find(s=>s.week===w);
        const n = st ? st.clusters[cl] : '—';
        const prev_st = stats.find(s=>s.week===showWeeks[showWeeks.indexOf(w)-1]);
        const prevN = prev_st ? prev_st.clusters[cl] : null;
        const diff = (typeof n==='number'&&prevN!==null) ? n-prevN : null;
        const dcls = diff===null?'eq':diff>0?(cl==='Gold'||cl==='Silver'?'up':'dn'):(cl==='Bronze'?'up':'dn');
        return`<td class="r">
          <span style="font-weight:700;color:var(--${cl.toLowerCase()})">${n}</span>
          ${diff!==null&&diff!==0?`<span class="dpill ${diff>0?'up':'dn'}" style="margin-left:4px">${diff>0?'+':''}${diff}</span>`:''}
        </td>`;
      }).join('');
      return`<tr>
        <td><span class="clu ${cl}" style="font-size:11px">${cl==='Gold'?'🥇':cl==='Silver'?'🥈':'🥉'} ${cl}</span></td>
        ${cells}
      </tr>`;
    });

    // Critics summary
    const criticsRow = Object.entries(cur.critics).map(([k,v])=>{
      const pv = prev ? (prev.critics[k]||0) : v;
      const diff = v - pv;
      return`<div style="display:flex;align-items:center;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border)">
        <span style="color:var(--muted);font-size:11px">${{picking:'⏱ Picking',handoff:'🤝 Handoff',cancel:'❌ Cancel',so:'📦 SO Ops',defect:'🔍 Defect'}[k]}</span>
        <div style="display:flex;align-items:center;gap:8px">
          <span style="font-family:'DM Mono',monospace;font-weight:500;color:${v>0?'var(--red)':'var(--green)'}">${v}</span>
          ${diff!==0?`<span class="dpill ${diff>0?'up':'dn'}">${diff>0?'+':''}${diff}</span>`:''}
        </div>
      </div>`;
    }).join('');

    return`<div class="section">
      <div class="sec-hdr">
        <div class="sec-title">
          <div class="sec-accent" style="background:${color}"></div>
          ${flag} ${co} — Semana ${fmtW(curW)}
        </div>
        <span class="sec-hint">vs ${fmtW(prevW)}</span>
      </div>
      <div class="metric-row">${metBars}</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:0;border-top:1px solid var(--border)">
        <div style="padding:16px 20px;border-right:1px solid var(--border)">
          <div style="font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:12px">Evolución clusters (últimas ${showWeeks.length} semanas)</div>
          <table class="mtable" style="font-size:12px">
            <thead><tr>
              <th>Cluster</th>
              ${showWeeks.map(w=>`<th class="r">${fmtW(w)}</th>`).join('')}
            </tr></thead>
            <tbody>${clusterRows.join('')}</tbody>
          </table>
        </div>
        <div style="padding:16px 20px">
          <div style="font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:12px">Tiendas con críticos esta semana</div>
          ${criticsRow}
        </div>
      </div>
    </div>`;
  }).join('');

  document.getElementById('main-content').innerHTML=`
    <div class="main">
      <div class="trend-hero">${heroCards}</div>
      ${metricSections}
    </div>`;
}

init();
</script>
</body>
</html>
